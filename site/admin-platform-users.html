<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜平台帳號管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }



/* ===== remove hamburger menu, keep sidebar visible ===== */
#sbToggle,
#sbOverlay { display:none !important; }

@media (max-width: 768px) {
  body {
    display:flex !important;
    min-height:100vh;
    padding:12px;
    gap:12px;
  }

  #adminSidebar {
    display:flex !important;
    position:sticky !important;
    top:0 !important;
    left:auto !important;
    height:calc(100vh - 24px) !important;
    transform:none !important;
    transition:none !important;
    border-radius:16px !important;
  }

  #adminSidebar.sb-open {
    transform:none !important;
  }

  #adminMain {
    min-height:calc(100vh - 24px) !important;
    padding:0 !important;
  }
}

</style>
  <style>
/* ============================================================
   sidebar.css — 後台側邊欄（圓角版，白色側欄）
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
  background: #e8eaee !important;
  display: flex !important;
  min-height: 100vh;
  padding: 12px;
  gap: 12px;
  color: #111;
}

/* ════════════════════════
   SIDEBAR — 白色左欄，圓角
════════════════════════ */
#adminSidebar {
  width: 260px;
  min-width: 260px;
  height: calc(100vh - 24px);
  position: sticky;
  top: 0;
  background: #fff;
  border-radius: 16px;           /* ← 四角都圓 */
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  /* 未登入時隱藏 */
  display: none;
}
#adminSidebar.sb-visible { display: flex; }

/* Brand */
.sb-brand {
  padding: 20px 16px 16px;
  display: flex;
  align-items: center;
  gap: 11px;
  text-decoration: none;
  flex-shrink: 0;
  border-bottom: 1px solid #f2f2f2;
}
.sb-brand-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #f0f4ff;
  font-size: 21px;
}
.sb-brand-name {
  font-size: 13px; font-weight: 900; color: #111;
  line-height: 1.35;
}
.sb-brand-sub {
  font-size: 9px; color: #bbb;
  letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px;
}

/* Nav */
.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
  scrollbar-width: thin;
  scrollbar-color: #ebebeb transparent;
}
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: #e8e8e8; border-radius: 2px; }

/* 不顯示分組標籤 */
.sb-group-label { display: none; }

.sb-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 11px;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  color: #555;
  transition: background .12s, color .12s;
  margin-bottom: 2px;
}
.sb-item:hover  { background: #f5f7fb; color: #111; }
.sb-item.sb-active {
  background: #2563eb;
  color: #fff;
  box-shadow: 0 3px 10px rgba(37,99,235,.25);
}
.sb-item[aria-disabled="true"] { opacity: .35; pointer-events: none; }

.sb-item-icon {
  width: 34px; height: 34px;
  background: #f5f7fb;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  transition: background .12s;
}
.sb-item:hover     .sb-item-icon { background: #eef2ff; }
.sb-item.sb-active .sb-item-icon { background: rgba(255,255,255,.22); }

.sb-item-label {
  font-size: 13px; font-weight: 700;
  color: inherit; line-height: 1.3;
}
.sb-item-desc {
  font-size: 11px; color: #aaa;
  line-height: 1.3; margin-top: 1px;
}
.sb-item.sb-active .sb-item-desc  { color: rgba(255,255,255,.65); }
.sb-item.sb-active .sb-item-label { color: #fff; }

/* Footer */
.sb-footer-info {
  padding: 8px 14px 6px;
  font-size: 11px; color: #bbb;
  border-top: 1px solid #f2f2f2;
  flex-shrink: 0;
  line-height: 1.6;
}

.sb-logout {
  display: flex; align-items: center; justify-content: center;
  width: calc(100% - 20px);
  margin: 6px 10px 12px;
  padding: 10px;
  border-radius: 10px;
  background: #2563eb;
  border: none; color: #fff;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background .13s;
  flex-shrink: 0;
}
.sb-logout:hover { background: #1d4ed8; }

/* Mobile toggle */
#sbToggle {
  display: none;
  position: fixed; top: 16px; left: 16px; z-index: 200;
  width: 38px; height: 38px; border-radius: 10px;
  background: #fff; border: 1px solid #e8eaed;
  color: #333; font-size: 16px; cursor: pointer;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
#sbOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 49;
}

/* ════════════════════════
   MAIN — 白色右欄，圓角
════════════════════════ */
#adminMain {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  height: calc(100vh - 24px);
  background: #fff;
  border-radius: 16px;           /* ← 四角都圓 */
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  overflow: hidden;
  /* 未登入時佔滿寬度 */
}

/* Topbar */
#adminTopbar {
  height: 56px;
  padding: 0 26px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #f2f2f2;
}
.tb-page-title {
  font-size: 15px; font-weight: 900; color: #111; flex: 1;
}
.tb-user  { display: flex; align-items: center; gap: 9px; }
.tb-info  { text-align: right; }
.tb-name  { font-size: 13px; font-weight: 800; color: #111; }
.tb-sub   { font-size: 11px; color: #aaa; margin-top: 1px; }
.tb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #60a5fa, #2563eb);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900; flex-shrink: 0;
}
.tb-online {
  width: 8px; height: 8px;
  background: #22c55e; border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(34,197,94,.2);
}

/* Content */
#adminContent {
  flex: 1;
  overflow-y: auto;
  padding: 22px 26px 26px;
  background: #fff;
}

/* 取消 .wrap 佈局限制 */
#adminContent .wrap,
#adminContent .wrap.page {
  max-width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  opacity: 1 !important;
  transform: none !important;
  display: block !important;
}

/* Modals 不受限 */
.modalBack, .modal-back { z-index: 9999 !important; }
.modal { border-radius: 16px !important; }

/* ════════════════════════
   GATE（登入畫面）— 仿圖片風格
════════════════════════ */
body.gate-mode {
  padding: 0;
  background: #e8ecf0 !important;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
}
body.gate-mode #adminSidebar  { display: none !important; }
body.gate-mode #adminTopbar   { display: none !important; }
body.gate-mode #adminMain {
  flex: none;
  width: 100%;
  height: 100vh;
  min-height: 100vh;
  border-radius: 0;
  box-shadow: none;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px 48px;
}
body.gate-mode #adminContent {
  width: 100%;
  max-width: 480px;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: visible;
}

/* ════════════════════════
   MOBILE
════════════════════════ */
@media (max-width: 820px) {
  body { padding: 0; gap: 0; }
  #adminSidebar {
    position: fixed;
    left: -280px;
    top: 0; height: 100vh;
    border-radius: 0 16px 16px 0;
    transition: left .22s ease;
    z-index: 100;
  }
  #adminSidebar.sb-open { left: 0; }
  #sbToggle.sb-show { display: flex; }
  #sbOverlay.sb-open { display: block; }
  #adminMain  { border-radius: 0; height: 100vh; }
  #adminTopbar { padding-left: 60px; }
  #adminContent { padding: 14px; }

  body.gate-mode { padding: 16px; }
  body.gate-mode #adminMain {
    max-width: 100%; border-radius: 16px;
  }
}

</style>

  <!-- Firebase compat -->

  <script>
/**
 * shared.js — 校園演唱會購票系統 共用 JS 模組
 *
 * 使用方式：在 HTML <head> 載入 Firebase SDK 後，
 * 再載入此檔案。此檔案會自動初始化 Firebase 並掛載全域工具。
 *
 * 暴露的全域物件：
 *   window.db        — Firestore 實例
 *   window.AppAuth   — 認證輔助工具
 *   window.AppUI     — UI 工具（esc, norm, tsToText, page transition…）
 *   window.AppNav    — 頂部導覽列
 */

(function () {
  "use strict";

  /* ── Firebase 初始化 ── */
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  // 避免重複初始化（多頁面同時引入時安全）
  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  /* ══════════════════════════════════════════
     AppUI — 共用 UI 工具
  ══════════════════════════════════════════ */
  window.AppUI = {

    /** HTML 跳脫（防 XSS） */
    esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    },

    /** 去頭尾空白 */
    norm(s) {
      return String(s ?? "").trim();
    },

    /** Firestore Timestamp → 本地時間字串 */
    tsToText(ts) {
      try {
        if (!ts) return "-";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleString("zh-Hant", { hour12: false });
      } catch { return "-"; }
    },

    /** 頁面淡入 */
    pageIn(el) {
      if (!el) return;
      requestAnimationFrame(() => el.classList.add("on"));
    },

    /** 頁面淡出後跳轉 */
    go(href, pageEl) {
      const root = pageEl || document.getElementById("pageRoot");
      if (root) root.classList.add("leaving");
      setTimeout(() => { location.href = href; }, 140);
    },

    /** 攔截所有 <a> 的頁面跳轉並套用轉場動畫 */
    initPageLinks(pageEl) {
      document.addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        const href = a.getAttribute("href");
        if (!href || href.startsWith("#") || href.startsWith("http")) return;
        if (a.getAttribute("aria-disabled") === "true") return;
        e.preventDefault();
        AppUI.go(href, pageEl);
      });
    },

    /**
     * 渲染「Gate」錯誤/登入卡片
     * @param {HTMLElement} gateEl
     * @param {HTMLElement} appEl
     * @param {{ title, msg, showEmailLogin, extraBtns }} opts
     */
    showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = false, extraBtns = "" } = {}) {
      if (appEl) appEl.style.display = "none";
      gateEl.style.display = "block";

      // 若是 gate-mode（全頁登入），用新版樣式
      const isGateMode = document.body?.classList?.contains("gate-mode");

      if (isGateMode) {
        // 新版：仿圖片，背景灰，白卡片
        let loginFields = "";
        if (showEmailLogin) {
          loginFields = `
            <div style="margin-bottom:15px;">
              <label style="display:block;font-size:13px;font-weight:700;color:#444;margin-bottom:6px;">帳號</label>
              <input id="_loginEmail" type="text" placeholder="輸入 Email"
                style="width:100%;padding:12px 14px;border:1.5px solid #dde1e7;border-radius:10px;
                       font-size:14px;outline:none;background:#fff;transition:border-color .15s;"
                onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#dde1e7'" />
            </div>
            <div style="margin-bottom:18px;">
              <label style="display:block;font-size:13px;font-weight:700;color:#444;margin-bottom:6px;">密碼</label>
              <input id="_loginPassword" type="password" placeholder="輸入密碼"
                style="width:100%;padding:12px 14px;border:1.5px solid #dde1e7;border-radius:10px;
                       font-size:14px;outline:none;background:#fff;transition:border-color .15s;"
                onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#dde1e7'" />
            </div>
            <button id="_loginBtn"
              style="width:100%;padding:13px;background:#2563eb;color:#fff;border:none;
                     border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
                     transition:background .15s;"
              onmouseover="this.style.background='#1d4ed8'"
              onmouseout="if(!this.disabled)this.style.background='#2563eb'">
              登入
            </button>
            <div id="_loginMsg" style="font-size:13px;color:#dc2626;margin-top:10px;text-align:center;display:none;"></div>
          `;
        }

        let extraHtml = extraBtns
          ? `<div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">${extraBtns}</div>`
          : "";
        if (!showEmailLogin && !extraBtns) {
          extraHtml = `<button onclick="if(typeof AppAuth!=='undefined')AppAuth.logout()"
            style="width:100%;margin-top:6px;padding:12px;border-radius:10px;border:1.5px solid #dde1e7;
                   background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:#555;">
            返回初選單 / 登出
          </button>`;
        }

        gateEl.innerHTML = `
          <div style="text-align:center;margin-bottom:26px;">
            <div style="font-size:38px;margin-bottom:10px;">🎤</div>
            <div style="font-size:19px;font-weight:900;color:#1e2a45;letter-spacing:.3px;">校園演唱會購票系統</div>
            <div style="font-size:9px;letter-spacing:2.5px;color:#bbb;margin-top:5px;text-transform:uppercase;">Concert Ticketing System</div>
          </div>
          <div style="background:#fff;border-radius:16px;padding:26px 26px 22px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);">
            ${showEmailLogin
              ? `<div style="font-size:17px;font-weight:900;color:#111;margin-bottom:18px;">登入</div>`
              : `<div style="font-size:15px;font-weight:900;color:#111;margin-bottom:8px;">${AppUI.esc(title)}</div>
                 ${msg ? `<div style="font-size:13px;color:#888;margin-bottom:16px;line-height:1.6;">${msg}</div>` : ""}`
            }
            ${loginFields}
            ${extraHtml}
          </div>
          <div style="font-size:12px;color:#bbb;margin-top:22px;text-align:center;">© Concert Ticketing System</div>
        `;

      } else {
        // 舊版：行內 gate 卡片（用於非 dashboard 的頁面）
        gateEl.innerHTML = `
          <h1 style="margin:0 0 6px;font-size:20px;font-weight:900;">${AppUI.esc(title)}</h1>
          <div class="sub" style="margin-bottom:${showEmailLogin||extraBtns?"16px":"0"}">${msg}</div>
          ${showEmailLogin ? `
            <div style="max-width:360px;display:grid;gap:10px;margin-top:8px;">
              <input id="_loginEmail" type="text" placeholder="帳號（Email）"
                style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #dde1e7;font-size:15px;outline:none;"/>
              <input id="_loginPassword" type="password" placeholder="密碼"
                style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #dde1e7;font-size:15px;outline:none;"/>
              <button id="_loginBtn" style="padding:12px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">登入</button>
              <div id="_loginMsg" style="font-size:13px;color:#dc2626;display:none;"></div>
            </div>
          ` : ""}
          ${extraBtns ? `<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">${extraBtns}</div>` : ""}
          ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" style="margin-top:12px;">登出</button>` : ""}
        `;
      }

      // 登入按鈕共用邏輯
      const loginBtn = document.getElementById("_loginBtn");
      if (loginBtn) {
        const doLogin = async () => {
          const emailVal = (document.getElementById("_loginEmail")?.value || "").trim();
          const pwVal    = document.getElementById("_loginPassword")?.value || "";
          const msgEl    = document.getElementById("_loginMsg");
          if (!emailVal || !pwVal) {
            if (msgEl) { msgEl.textContent = "請輸入帳號與密碼"; msgEl.style.display = "block"; }
            return;
          }
          loginBtn.disabled = true;
          loginBtn.textContent = "登入中…";
          if (msgEl) msgEl.style.display = "none";
          try {
            await firebase.auth().signInWithEmailAndPassword(emailVal, pwVal);
          } catch (e) {
            if (msgEl) { msgEl.textContent = "帳號或密碼錯誤，請再試一次。"; msgEl.style.display = "block"; }
            loginBtn.disabled = false;
            loginBtn.textContent = "登入";
            if (loginBtn.style) loginBtn.style.background = "#2563eb";
          }
        };
        loginBtn.onclick = doLogin;
        ["_loginEmail","_loginPassword"].forEach(id => {
          document.getElementById(id)?.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
        });
      }
      const logoutBtn = document.getElementById("_logoutBtn");
      if (logoutBtn) logoutBtn.onclick = AppAuth.logout;
    } = {}) {
      if (appEl) appEl.style.display = "none";
      gateEl.style.display = "block";

      gateEl.innerHTML = `
        <h1 style="margin:0 0 6px; font-size:22px;">${AppUI.esc(title)}</h1>
        <div class="sub">${msg}</div>

        ${showEmailLogin ? `
          <div style="margin-top:16px; max-width:360px; display:grid; gap:10px;">
            <input
              id="_loginEmail"
              type="text"
              placeholder="帳號（Email）"
              style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;"
            />
            <input
              id="_loginPassword"
              type="password"
              placeholder="密碼"
              style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;"
            />
            <button class="btn btn-primary" id="_loginBtn">登入</button>
            <div id="_loginMsg" style="font-size:13px; color:#b91c1c; display:none;"></div>
          </div>
        ` : ""}

        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${extraBtns}
          ${!showEmailLogin ? `<button class="btn" id="_logoutBtn">登出</button>` : ""}
        </div>
      `;

      const loginBtn = document.getElementById("_loginBtn");
      if (loginBtn) {
        const doLogin = async () => {
          const email = (document.getElementById("_loginEmail")?.value || "").trim();
          const password = document.getElementById("_loginPassword")?.value || "";
          const msgEl = document.getElementById("_loginMsg");

          if (!email || !password) { alert("請輸入帳號與密碼"); return; }

          loginBtn.disabled = true;
          const oldText = loginBtn.textContent;
          loginBtn.textContent = "登入中…";
          if (msgEl) msgEl.style.display = "none";

          try {
            await firebase.auth().signInWithEmailAndPassword(email, password);
          } catch (e) {
            console.error(e);
            if (msgEl) {
              msgEl.textContent = "登入失敗，請確認帳號密碼是否正確";
              msgEl.style.display = "block";
            } else {
              alert("登入失敗，請確認帳號密碼是否正確");
            }
          } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = oldText;
          }
        };

        loginBtn.onclick = doLogin;

        ["_loginEmail", "_loginPassword"].forEach(id => {
          document.getElementById(id)?.addEventListener("keydown", (e) => {
            if (e.key === "Enter") doLogin();
          });
        });
      }

      const logoutBtn = document.getElementById("_logoutBtn");
      if (logoutBtn) logoutBtn.onclick = AppAuth.logout;
    },

    /** 顯示 Toast 提示（輕量版，自動消失） */
    toast(msg, type = "ok", duration = 3000) {
      let el = document.getElementById("_appToast");
      if (!el) {
        el = document.createElement("div");
        el.id = "_appToast";
        el.style.cssText = `
          position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
          min-width:200px; max-width:360px; padding:12px 20px;
          border-radius:999px; font-size:14px; font-weight:900;
          box-shadow:0 10px 30px rgba(0,0,0,.15); z-index:99999;
          opacity:0; transition:opacity .2s ease, transform .2s ease;
          text-align:center; pointer-events:none;
        `;
        document.body.appendChild(el);
      }

      const colors = {
        ok:   { bg: "#166534", color: "#fff" },
        warn: { bg: "#b91c1c", color: "#fff" },
        info: { bg: "#1d4ed8", color: "#fff" },
        neutral: { bg: "#111", color: "#fff" }
      };
      const c = colors[type] || colors.neutral;
      el.style.background = c.bg;
      el.style.color = c.color;
      el.textContent = msg;

      clearTimeout(el._timer);
      requestAnimationFrame(() => {
        el.style.opacity = "1";
        el.style.transform = "translateX(-50%) translateY(0)";
      });

      el._timer = setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(-50%) translateY(10px)";
      }, duration);
    }
  };

  // 短別名
  const { esc, norm } = window.AppUI;

  /* ══════════════════════════════════════════
     AppAuth — 認證 & 角色輔助
  ══════════════════════════════════════════ */
  window.AppAuth = {

    /** 登出 */
    async logout() {
      try {
        await firebase.auth().signOut();
      } catch (e) {
        console.error(e);
        alert("登出失敗（請看 Console）");
      }
    },

    /** 從 Firestore users/{uid} 讀取用戶資料 */
    async loadUser(uid) {
      const snap = await window.db.collection("users").doc(uid).get();
      if (!snap.exists) return null;
      return { id: snap.id, ...snap.data() };
    },

    /** 角色判斷 */
    isPlatform(role)      { return role === "platform_super" || role === "platform_admin"; },
    isPlatformSuper(role) { return role === "platform_super"; },
    isOrgRole(role)       { return ["org_super","org_admin","org_staff"].includes(role); },
    isProtectedSuper(u)   { return norm(u?.role) === "platform_super"; },

    /**
     * 模擬帳號（impersonate）工具
     */
    impersonate: {
      get uid()      { return sessionStorage.getItem("impersonateUid") || ""; },
      get email()    { return sessionStorage.getItem("impersonateEmail") || ""; },
      get role()     { return sessionStorage.getItem("impersonateRole") || ""; },
      get orgId()    { return sessionStorage.getItem("impersonateOrgId") || ""; },
      get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
      get active()   { return !!sessionStorage.getItem("impersonateUid"); },

      start({ uid, email, role, orgId, schoolId, team }) {
        sessionStorage.setItem("impersonateUid", uid || "");
        sessionStorage.setItem("impersonateEmail", email || "");
        sessionStorage.setItem("impersonateRole", role || "");
        sessionStorage.setItem("impersonateOrgId", orgId || "");
        sessionStorage.setItem("impersonateSchoolId", schoolId || "");
        sessionStorage.setItem("impersonateTeam", team || "");
        sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
      },

      stop() {
        [
          "impersonateUid", "impersonateEmail", "impersonateRole",
          "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
          "impersonateStartedAt"
        ].forEach(k => sessionStorage.removeItem(k));
      },

      /** 取得目前「有效」的 uid（模擬中用模擬 uid，否則用真實 uid） */
      getActingUid(realUser) {
        return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
      }
    },

    /**
     * 渲染模擬帳號 Banner（需要有 class="impersonate-banner" 的元素，id="impersonateBanner"）
     * @param {Function} onStop — 點「結束模擬」後的回呼
     */
    renderImpersonateBanner(onStop) {
      const banner = document.getElementById("impersonateBanner");
      if (!banner) return;

      const imp = AppAuth.impersonate;

  <script>
    // ===== Firebase init（沿用你專案）=====
    
    const db = window.db;

    // ===== page transition（淡入/淡出）=====
    const pageRoot = document.getElementById("pageRoot");
    // go() → AppUI.go()

    // ===== DOM =====
    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const meEmail = document.getElementById("meEmail");
    const meRole  = document.getElementById("meRole");
    const logoutBtn = document.getElementById("logoutBtn");

    const reloadBtn = document.getElementById("reloadBtn");
    const exportBtn = document.getElementById("exportBtn");
    const searchBox = document.getElementById("searchBox");
    const schoolFilter = document.getElementById("schoolFilter");

    const sourceCol = document.getElementById("sourceCol");
    const countTag  = document.getElementById("countTag");
    const hint      = document.getElementById("hint");
    const list      = document.getElementById("list");
    const empty     = document.getElementById("empty");

    // ===== helpers =====
    const esc = AppUI.esc;
    const norm = AppUI.norm;
    const tsToText = AppUI.tsToText;
    async function copyText(txt){
      try{
        await navigator.clipboard.writeText(String(txt||""));
        AppUI.toast("已複製", "ok");
      }catch{
        AppUI.toast("複製失敗（可能瀏覽器不支援）", "warn");
      }
    }

    const doLogout = AppAuth.logout;
    logoutBtn.onclick = doLogout;

    async function loadMyRole(uid){
      const doc = await db.collection("users").doc(uid).get();
      if (!doc.exists) return { ok:false, reason:"等待授權（users/{uid} 不存在）" };
      const u = doc.data() || {};
      if (u.enabled !== true) return { ok:false, reason:"帳號已停用" };
      const role = norm(u.role);
      return { ok:true, role, userData:u };
    }

    // ====== collection auto detect ======
    const CANDIDATE_COLLECTIONS = [
      "members",
      "platformUsers",
      "users_public",
      "users" // 最後才用（避免把後台帳號混進來）
    ];

    let ACTIVE_COL = "";
    let RAW = []; // all loaded
    let VIEW = []; // filtered

    async function tryCollection(colName){
      // 只要能成功讀到（就算 0 筆）也算可用
      // 但這裡用 limit(1) 先探測是否允許讀取
      const ref = db.collection(colName).limit(1);
      await ref.get();
      return true;
    }

    async function detectCollection(){
      for (const c of CANDIDATE_COLLECTIONS){
        try{
          await tryCollection(c);
          return c;
        }catch(e){
          // ignore and try next
        }
      }
      throw new Error("找不到可讀取的會員集合（Rules 不允許或集合不存在）");
    }

    function pick(d, keys){
      for (const k of keys){
        if (d && d[k] !== undefined && d[k] !== null && String(d[k]).trim() !== "") return d[k];
      }
      return "";
    }

    function normalizeMember(doc){
      const d = doc.data() || {};
      return {
        uid: doc.id,
        email: pick(d, ["email","accountEmail","mail"]),
        name:  pick(d, ["name","displayName","studentName","fullName"]),
        orgId: pick(d, ["orgId","organizationId","org"]),
        schoolId: pick(d, ["schoolId","school","campusId"]),
        verifyKey: pick(d, ["verifyKey","verify_code","verificationKey"]),
        verified: (d.verified === true) || (d.isVerified === true) || (d.verifyStatus === "verified"),
        createdAt: d.createdAt || d.created_time || d.created || null,
        updatedAt: d.updatedAt || d.updated_time || d.updated || null,
        raw: d
      };
    }

    async function loadAll(){
      list.innerHTML = "";
      empty.style.display = "none";
      hint.textContent = "載入中…";
      countTag.textContent = "0";
      sourceCol.textContent = "-";
      exportBtn.disabled = true;

      try{
        if (!ACTIVE_COL){
          ACTIVE_COL = await detectCollection();
        }
        sourceCol.textContent = ACTIVE_COL;

        // 先拉 300 筆（之後你要分頁我再幫你加）
        // 如果 collection 很大，這裡會需要分頁（你之後跟我說）
        const snap = await db.collection(ACTIVE_COL).orderBy("createdAt","desc").limit(300).get().catch(async () => {
          // 如果沒有 createdAt index/欄位，改成不排序
          return await db.collection(ACTIVE_COL).limit(300).get();
        });

        RAW = [];
        snap.forEach(doc => RAW.push(normalizeMember(doc)));

        // 建立 schoolId 下拉選單（動態補齊）
        const schools = Array.from(new Set(RAW.map(x => norm(x.schoolId)).filter(Boolean))).sort();
        const current = schoolFilter.value;
        schoolFilter.innerHTML = `
          <option value="">全部（含未歸屬學校）</option>
          <option value="__NONE__">只看：未歸屬學校</option>
          ${schools.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}
        `;
        if (schools.includes(current) || current === "" || current === "__NONE__") schoolFilter.value = current;

        applyFilter();
        hint.innerHTML = `已載入 <span class="mono">${RAW.length}</span> 筆（最多 300）。`;
        exportBtn.disabled = RAW.length === 0;

      }catch(e){
        console.error(e);
        hint.innerHTML = `<span class="warn">讀取失敗：</span><span class="mono">${esc(e.message || e)}</span>`;
        list.innerHTML = `
          <div class="item">
            <div class="title">⚠️ 無法讀取平台會員清單</div>
            <div class="meta">可能原因：Firestore Rules 不允許讀取、或集合名稱與你目前資料不一致。</div>
          </div>
        `;
      }
    }

    function matches(m, q){
      if (!q) return true;
      const t = q.toLowerCase();
      const hay = [
        m.uid, m.email, m.name, m.orgId, m.schoolId, m.verifyKey
      ].map(x => String(x || "").toLowerCase()).join(" | ");
      return hay.includes(t);
    }

    function applyFilter(){
      const q = norm(searchBox.value);
      const sf = schoolFilter.value;

      VIEW = RAW.filter(m => {
        if (!matches(m, q)) return false;

        if (sf === "__NONE__") return !norm(m.schoolId);
        if (sf) return norm(m.schoolId) === sf;

        return true;
      });

      countTag.textContent = String(VIEW.length);
      render();
    }

    function render(){
      list.innerHTML = "";
      empty.style.display = VIEW.length ? "none" : "block";

      VIEW.forEach(m => {
        const created = tsToText(m.createdAt);
        const updated = tsToText(m.updatedAt);

        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="itemTop">
            <div style="min-width:0;">
              <div class="title">👤 ${esc(m.name || "(未填姓名)")} <span class="mono" style="font-size:12px; color:rgba(17,17,17,.55);">${esc(m.uid)}</span></div>
              <div class="meta">
                Email：<span class="mono">${esc(m.email || "-")}</span><br/>
                註冊：<span class="mono">${esc(created)}</span>${updated !== "-" ? ` ｜ 更新：<span class="mono">${esc(updated)}</span>` : ``}
              </div>
            </div>
            <div class="pill">${m.verified ? "verified" : "unverified"}</div>
          </div>

          <div class="kvs">
            <div class="kv">
              <div class="k">歸屬</div>
              <div class="v">
                schoolId：<span class="mono">${esc(m.schoolId || "(無)")}</span><br/>
                orgId：<span class="mono">${esc(m.orgId || "(無)")}</span>
              </div>
            </div>
            <div class="kv">
              <div class="k">驗證</div>
              <div class="v">
                verifyKey：<span class="mono">${esc(m.verifyKey || "(無)")}</span><br/>
                verified：<span class="mono">${m.verified ? "true" : "false"}</span>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-sm" data-copy="uid">複製 UID</button>
            <button class="btn btn-sm" data-copy="email">複製 Email</button>
            <button class="btn btn-sm" data-copy="verifyKey">複製 verifyKey</button>
          </div>

          <details>
            <summary>查看完整資料（raw）</summary>
            <pre>${esc(JSON.stringify(m.raw || {}, null, 2))}</pre>
          </details>
        `;

        item.querySelectorAll("[data-copy]").forEach(btn => {
          btn.addEventListener("click", () => {
            const kind = btn.getAttribute("data-copy");
            if (kind === "uid") return copyText(m.uid);
            if (kind === "email") return copyText(m.email || "");
            if (kind === "verifyKey") return copyText(m.verifyKey || "");
          });
        });

        list.appendChild(item);
      });
    }

    function exportCSV(){
      if (!RAW.length) return;

      const rows = RAW.map(m => ({
        uid: m.uid || "",
        email: m.email || "",
        name: m.name || "",
        schoolId: m.schoolId || "",
        orgId: m.orgId || "",
        verifyKey: m.verifyKey || "",
        verified: m.verified ? "true" : "false",
        createdAt: tsToText(m.createdAt),
        updatedAt: tsToText(m.updatedAt)
      }));

      const headers = Object.keys(rows[0]);
      const escCSV = (v) => {
        const s = String(v ?? "");
        if (/[",\n]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
        return s;
      };

      const csv = [
        headers.join(","),
        ...rows.map(r => headers.map(h => escCSV(r[h])).join(","))
      ].join("\n");

      const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `platform-users_${ACTIVE_COL || "unknown"}_${Date.now()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    reloadBtn.onclick = () => loadAll();
    exportBtn.onclick = exportCSV;
    searchBox.addEventListener("input", applyFilter);
    schoolFilter.addEventListener("change", applyFilter);

    // ===== boot =====
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        AppUI.showGate(gate, app, { title: "平台帳號管理", msg: "請先使用 Email 與密碼登入管理帳號以繼續。", showEmailLogin: true });
        return;
      }

      try{
        const r = await loadMyRole(user.uid);
        if (!r.ok){
          AppUI.showGate(gate, app, { title: "無法進入", msg: r.reason, showEmailLogin: false });
          return;
        }

        const role = r.role;
        meEmail.textContent = user.email || "-";
        meRole.textContent = role || "-";

        // 只有 platform_super / platform_admin
        if (!["platform_super","platform_admin"].includes(role)){
          AppUI.showGate(gate, app, { title: "權限不足", msg: "此頁僅限平台管理員使用。", showEmailLogin: false });
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";
        if (window.SidebarShow) { const _u = firebase.auth().currentUser; SidebarShow(_u?.email||"", typeof myRole!=="undefined"?myRole:(typeof currentRole!=="undefined"?currentRole:"")); }

        await loadAll();

      }catch(e){
        console.error(e);
        AppUI.showGate(gate, app, { title: "發生錯誤", msg: "無法讀取權限資料，請查看 Console。", showEmailLogin: false });
      }
    });
  </script>

/**

    { g:"入場", e:"🛠️", t:"服務中心核銷",      d:"條碼槍查詢與核銷",       h:"admin-checkin-assist.html" },

  );
  const cur = location.pathname.split("/").pop() || "";

  function pageTitle() {
    return document.title.replace(/^後台[｜|]/, "").trim()
      || document.querySelector("h1")?.textContent?.trim() || "後台管理";

  /* ── 建構側邊欄 HTML ── */
  function buildSidebar() {

      <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
        <div class="sb-item-icon">${n.e}</div>

          <div class="sb-item-label">${esc(n.t)}</div>
          <div class="sb-item-desc">${esc(n.d)}</div>
        </div>
      </a>`).join("");

    const el = document.createElement("nav");
    el.id = "adminSidebar";   // 預設 display:none，登入後加 .sb-visible
    el.innerHTML = `
      <a class="sb-brand" href="dashboard.html">
        <div class="sb-brand-icon">🎤</div>
        <div>
          <div class="sb-brand-name">演唱會購票系統</div>
          <div class="sb-brand-sub">Admin Panel</div>
        </div>
      </a>
      <nav class="sb-nav">${nav}</nav>
      <div class="sb-footer-info" id="sbFooterInfo"></div>
      <button class="sb-logout" id="sbLogoutBtn">登出</button>`;
    return el;
  }

  /* ── 建構 Topbar ── */
  function buildTopbar() {
    const el = document.createElement("div");
    el.id = "adminTopbar";
    el.innerHTML = `
      <div class="tb-page-title">${esc(pageTitle())}</div>
      <div class="tb-user">
        <div class="tb-online"></div>
        <div class="tb-info">
          <div class="tb-name" id="sbName">-</div>
          <div class="tb-sub"  id="sbRole">-</div>
        </div>
        <div class="tb-avatar" id="sbAvatar">?</div>
      </div>`;
    return el;
  }

  /* ── 注入框架（只建結構，不顯示側欄） ── */
  function inject() {
    if (document.getElementById("adminSidebar")) return;

    // 1. 把現有 body 內容包進 #adminContent
    const content = document.createElement("div");
    content.id = "adminContent";
    while (document.body.firstChild) content.appendChild(document.body.firstChild);

    // 2. Mobile helpers
    const toggle  = document.createElement("button");
    toggle.id = "sbToggle"; toggle.innerHTML = "☰";
    toggle.setAttribute("aria-label", "選單");

    const overlay = document.createElement("div");
    overlay.id = "sbOverlay";

    // 3. Main 區域
    const main = document.createElement("div");
    main.id = "adminMain";
    main.appendChild(buildTopbar());
    main.appendChild(content);

    // 4. 組裝（側邊欄先隱藏）
    document.body.appendChild(toggle);
    document.body.appendChild(overlay);
    document.body.appendChild(buildSidebar());
    document.body.appendChild(main);

    // 5. 一開始進入「gate mode」— body 加 class
    document.body.classList.add("gate-mode");

    // 6. 事件
    const sidebar = document.getElementById("adminSidebar");
    toggle.onclick  = () => { sidebar.classList.toggle("sb-open"); overlay.classList.toggle("sb-open"); };
    overlay.onclick = () => { sidebar.classList.remove("sb-open"); overlay.classList.remove("sb-open"); };
    document.getElementById("sbLogoutBtn").onclick = () => {
      if (typeof AppAuth !== "undefined") AppAuth.logout();
      else if (typeof firebase !== "undefined") firebase.auth().signOut();
    };

    if (typeof AppUI !== "undefined") AppUI.initPageLinks(document.body);
  }

  /* ── 登入成功後「解鎖」佈局 ── */

    const toggle = document.getElementById("sbToggle");
    if (toggle) toggle.classList.add("sb-show");       // mobile 才顯示

    // 更新 topbar
    const name  = document.getElementById("sbName");
    const roleEl= document.getElementById("sbRole");
    const avatar= document.getElementById("sbAvatar");
    const footer= document.getElementById("sbFooterInfo");

    if (name)   name.textContent   = email || "-";
    if (roleEl) roleEl.textContent = role  || "-";
    if (avatar) avatar.textContent = (email||"?")[0].toUpperCase();
    if (footer) footer.textContent = `角色：${role}`;
  };

  /* ── 登出後「鎖回」gate mode ── */
  window.SidebarHide = function() {
    document.body.classList.add("gate-mode");
    const sidebar = document.getElementById("adminSidebar");
    if (sidebar) {
      sidebar.classList.remove("sb-visible");
      sidebar.classList.remove("sb-open");
    }
    const overlay = document.getElementById("sbOverlay");
    if (overlay) overlay.classList.remove("sb-open");
    const toggle = document.getElementById("sbToggle");
    if (toggle) toggle.classList.remove("sb-show");
  };

  /* ── Auth 監聽（只更新 topbar，不控制顯示邏輯） ── */
  function watchAuth() {
    if (typeof firebase === "undefined") return;
    firebase.auth().onAuthStateChanged(async user => {
      if (!user) { window.SidebarHide && SidebarHide(); return; }
      try {
        const db  = window.db || firebase.firestore();
        const uid = (typeof AppAuth !== "undefined")
          ? AppAuth.impersonate.getActingUid(user) : user.uid;
        const snap = await db.collection("users").doc(uid).get();
        const u    = snap.exists ? (snap.data() || {}) : {};
        const email= u.email || user.email || "";
        const role = u.role  || "";
        // 顯示控制交由各頁面的 dashboard.js / 主 JS 呼叫 SidebarShow()
        // 這裡只更新 topbar（非 gate-mode 才有意義）
        if (!document.body.classList.contains("gate-mode")) {
          window.SidebarShow && SidebarShow(email, role);
        }
      } catch (_) {}
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => { inject(); watchAuth(); });
  } else {
    inject(); watchAuth();
  }

})();

</script>
</body>
</html>
