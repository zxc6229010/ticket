<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜平台帳號管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 24px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      text-decoration:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.98); box-shadow:none; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }
    .btn-sm{ height:40px; padding:8px 14px; font-size:15px; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:14px;
      background:#fff;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .warn{ color:#b91c1c; font-weight:900; }
    .ok{ color:#166534; font-weight:900; }

    input[type="text"],
    input[type="date"],
    select{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:12px;
    }
    .item{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
      padding:14px;
    }
    .itemTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .title{
      font-weight:900;
      font-size:16px;
      margin:0;
      line-height:1.4;
    }
    .meta{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    .kvs{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    @media (max-width:720px){ .kvs{ grid-template-columns:1fr; } }

    .kv{
      border:1px dashed var(--line);
      border-radius:14px;
      padding:10px;
      background:#fff;
    }
    .kv .k{ font-size:12px; color:var(--muted); font-weight:900; }
    .kv .v{ margin-top:4px; font-weight:900; font-size:14px; word-break:break-word; }

    .actions{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .edit-box{
      display:none;
      margin-top:12px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }
    .edit-box.show{
      display:block;
    }
    .edit-grid{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }
    @media (max-width:720px){
      .edit-grid{
        grid-template-columns:1fr;
      }
    }

    details{
      margin-top:10px;
      border-top:1px dashed var(--line);
      padding-top:10px;
    }
    summary{
      cursor:pointer;
      font-weight:900;
      user-select:none;
    }
    pre{
      margin:10px 0 0;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      overflow:auto;
      font-size:12px;
      line-height:1.6;
    }

    .page{
      opacity:0;
      transform: translateY(6px);
      transition: opacity .22s ease, transform .22s ease;
    }
    .page.on{ opacity:1; transform: translateY(0); }
    .page.leaving{ opacity:0; transform: translateY(6px); }
  </style>
</head>

<body>
  <div class="wrap page" id="pageRoot">
    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>平台帳號管理</h1>
            <div class="sub">
              查看平台所有會員/成員：學校/不屬於學校、uid、姓名、性別、生日、帳號、註冊時間、驗證資訊等。<br/>
              登入：<span id="meEmail" class="mono">-</span>｜角色：<span id="meRole" class="mono">-</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a class="btn" href="dashboard.html">回主選單</a>
            <button class="btn" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="pill">搜尋 / 篩選</div>
            <div class="sub" style="margin-top:8px;">
              資料來源：<span class="mono" id="sourceCol">-</span>（自動偵測）｜
              載入：<span class="mono" id="countTag">0</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;">
            <button class="btn" id="reloadBtn">重新載入</button>
            <button class="btn btn-sm" id="exportBtn">匯出 CSV</button>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 220px; gap:10px; margin-top:12px;">
          <input id="searchBox" type="text" placeholder="搜尋：email / uid / 姓名 / 性別 / 生日 / orgId / schoolId / verifyKey" />
          <select id="schoolFilter">
            <option value="">全部（含未歸屬學校）</option>
            <option value="__NONE__">只看：未歸屬學校</option>
          </select>
        </div>

        <div class="sub" style="margin-top:10px;" id="hint"></div>
      </div>

      <div class="card">
        <div class="pill">清單</div>
        <div id="list" class="list"></div>
        <div id="empty" class="sub" style="display:none; margin-top:10px;">
          <span class="warn">查無資料</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const pageRoot = document.getElementById("pageRoot");
    requestAnimationFrame(() => pageRoot.classList.add("on"));
    function go(href){
      pageRoot.classList.add("leaving");
      setTimeout(()=> location.href = href, 140);
    }
    document.addEventListener("click", (e)=>{
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http")) return;
      e.preventDefault();
      go(href);
    });

    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const meEmail = document.getElementById("meEmail");
    const meRole  = document.getElementById("meRole");
    const logoutBtn = document.getElementById("logoutBtn");

    const reloadBtn = document.getElementById("reloadBtn");
    const exportBtn = document.getElementById("exportBtn");
    const searchBox = document.getElementById("searchBox");
    const schoolFilter = document.getElementById("schoolFilter");

    const sourceCol = document.getElementById("sourceCol");
    const countTag  = document.getElementById("countTag");
    const hint      = document.getElementById("hint");
    const list      = document.getElementById("list");
    const empty     = document.getElementById("empty");

    const CANDIDATE_COLLECTIONS = [
      "members",
      "platformUsers",
      "users_public",
      "users"
    ];

    let ACTIVE_COL = "";
    let RAW = [];
    let VIEW = [];

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function norm(s){
      return String(s ?? "").trim();
    }

    function tsToText(ts){
      try{
        const d = ts?.toDate ? ts.toDate() : (ts instanceof Date ? ts : null);
        if (!d) return "-";
        const pad = n => String(n).padStart(2,"0");
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }catch{
        return "-";
      }
    }

    function normalizeBirthday(v){
      const s = norm(v);
      if (!s) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

      const d = new Date(s);
      if (isNaN(d.getTime())) return s;

      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    async function copyText(txt){
      try{
        await navigator.clipboard.writeText(String(txt||""));
        alert("已複製");
      }catch{
        alert("複製失敗（可能瀏覽器不支援）");
      }
    }

    function showGate(title, msg, showLogin){
      gate.style.display = "block";
      app.style.display = "none";
      gate.innerHTML = `
        <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
        <div class="sub">${esc(msg)}</div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${showLogin ? `<button class="btn btn-primary" id="loginBtn">使用 Email 登入</button>` : ``}
          ${!showLogin ? `<button class="btn" id="outBtn">登出</button>` : ``}
        </div>
      `;
      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn){
        loginBtn.onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
      }
      const outBtn = document.getElementById("outBtn");
      if (outBtn) outBtn.onclick = doLogout;
    }

    async function doLogout(){
      try{
        await firebase.auth().signOut();
      }catch(e){
        console.error(e);
        alert("登出失敗（請看 Console）");
      }
    }
    logoutBtn.onclick = doLogout;

    async function loadMyRole(uid){
      const doc = await db.collection("users").doc(uid).get();
      if (!doc.exists) return { ok:false, reason:"等待授權（users/{uid} 不存在）" };
      const u = doc.data() || {};
      if (u.enabled !== true) return { ok:false, reason:"帳號已停用" };
      const role = norm(u.role);
      return { ok:true, role, userData:u };
    }

    async function tryCollection(colName){
      const ref = db.collection(colName).limit(1);
      await ref.get();
      return true;
    }

    async function detectCollection(){
      for (const c of CANDIDATE_COLLECTIONS){
        try{
          await tryCollection(c);
          return c;
        }catch(e){}
      }
      throw new Error("找不到可讀取的會員集合（Rules 不允許或集合不存在）");
    }

    function pick(d, keys){
      for (const k of keys){
        if (d && d[k] !== undefined && d[k] !== null && String(d[k]).trim() !== "") return d[k];
      }
      return "";
    }

    function normalizeMember(doc){
      const d = doc.data() || {};
      return {
        uid: doc.id,
        email: pick(d, ["email","accountEmail","mail"]),
        name:  pick(d, ["name","displayName","studentName","fullName"]),
        gender: pick(d, ["gender","sex"]),
        birthday: normalizeBirthday(pick(d, ["birthday","birthdate","birthDate"])),
        orgId: pick(d, ["orgId","organizationId","org"]),
        schoolId: pick(d, ["schoolId","school","campusId"]),
        verifyKey: pick(d, ["verifyKey","verify_code","verificationKey"]),
        verified: (d.verified === true) || (d.isVerified === true) || (d.verifyStatus === "verified"),
        createdAt: d.createdAt || d.created_time || d.created || null,
        updatedAt: d.updatedAt || d.updated_time || d.updated || null,
        raw: d
      };
    }

    async function loadAll(){
      list.innerHTML = "";
      empty.style.display = "none";
      hint.textContent = "載入中…";
      countTag.textContent = "0";
      sourceCol.textContent = "-";
      exportBtn.disabled = true;

      try{
        if (!ACTIVE_COL){
          ACTIVE_COL = await detectCollection();
        }
        sourceCol.textContent = ACTIVE_COL;

        const snap = await db.collection(ACTIVE_COL).orderBy("createdAt","desc").limit(300).get().catch(async () => {
          return await db.collection(ACTIVE_COL).limit(300).get();
        });

        RAW = [];
        snap.forEach(doc => RAW.push(normalizeMember(doc)));

        const schools = Array.from(new Set(RAW.map(x => norm(x.schoolId)).filter(Boolean))).sort();
        const current = schoolFilter.value;
        schoolFilter.innerHTML = `
          <option value="">全部（含未歸屬學校）</option>
          <option value="__NONE__">只看：未歸屬學校</option>
          ${schools.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}
        `;
        if (schools.includes(current) || current === "" || current === "__NONE__") {
          schoolFilter.value = current;
        }

        applyFilter();
        hint.innerHTML = `已載入 <span class="mono">${RAW.length}</span> 筆（最多 300）。`;
        exportBtn.disabled = RAW.length === 0;

      }catch(e){
        console.error(e);
        hint.innerHTML = `<span class="warn">讀取失敗：</span><span class="mono">${esc(e.message || e)}</span>`;
        list.innerHTML = `
          <div class="item">
            <div class="title">⚠️ 無法讀取平台會員清單</div>
            <div class="meta">可能原因：Firestore Rules 不允許讀取、或集合名稱與你目前資料不一致。</div>
          </div>
        `;
      }
    }

    function matches(m, q){
      if (!q) return true;
      const t = q.toLowerCase();
      const hay = [
        m.uid, m.email, m.name, m.gender, m.birthday, m.orgId, m.schoolId, m.verifyKey
      ].map(x => String(x || "").toLowerCase()).join(" | ");
      return hay.includes(t);
    }

    function applyFilter(){
      const q = norm(searchBox.value);
      const sf = schoolFilter.value;

      VIEW = RAW.filter(m => {
        if (!matches(m, q)) return false;
        if (sf === "__NONE__") return !norm(m.schoolId);
        if (sf) return norm(m.schoolId) === sf;
        return true;
      });

      countTag.textContent = String(VIEW.length);
      render();
    }

    function toggleEdit(uid){
      const el = document.getElementById(`edit-${uid}`);
      if (!el) return;
      el.classList.toggle("show");
    }

    async function saveProfile(uid){
      const nameEl = document.getElementById(`edit-name-${uid}`);
      const genderEl = document.getElementById(`edit-gender-${uid}`);
      const birthdayEl = document.getElementById(`edit-birthday-${uid}`);
      const saveBtn = document.getElementById(`save-${uid}`);

      if (!nameEl || !genderEl || !birthdayEl || !saveBtn) return;

      const nextName = norm(nameEl.value);
      const nextGender = norm(genderEl.value);
      const nextBirthday = normalizeBirthday(birthdayEl.value);

      saveBtn.disabled = true;
      const oldText = saveBtn.textContent;
      saveBtn.textContent = "儲存中…";

      try{
        await db.collection(ACTIVE_COL).doc(uid).set({
          name: nextName,
          gender: nextGender,
          birthday: nextBirthday,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge:true });

        const target = RAW.find(item => item.uid === uid);
        if (target) {
          target.name = nextName;
          target.gender = nextGender;
          target.birthday = nextBirthday;
          target.raw = {
            ...(target.raw || {}),
            name: nextName,
            gender: nextGender,
            birthday: nextBirthday
          };
        }

        applyFilter();
        alert("已儲存");
      }catch(e){
        console.error(e);
        alert("儲存失敗：" + (e.message || e));
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = oldText;
      }
    }

    function render(){
      list.innerHTML = "";
      empty.style.display = VIEW.length ? "none" : "block";

      VIEW.forEach(m => {
        const created = tsToText(m.createdAt);
        const updated = tsToText(m.updatedAt);

        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="itemTop">
            <div style="min-width:0;">
              <div class="title">👤 ${esc(m.name || "(未填姓名)")} <span class="mono" style="font-size:12px; color:rgba(17,17,17,.55);">${esc(m.uid)}</span></div>
              <div class="meta">
                Email：<span class="mono">${esc(m.email || "-")}</span><br/>
                註冊：<span class="mono">${esc(created)}</span>${updated !== "-" ? ` ｜ 更新：<span class="mono">${esc(updated)}</span>` : ``}
              </div>
            </div>
            <div class="pill">${m.verified ? "verified" : "unverified"}</div>
          </div>

          <div class="kvs">
            <div class="kv">
              <div class="k">基本資料</div>
              <div class="v">
                姓名：${esc(m.name || "(未填)")}<br/>
                性別：${esc(m.gender || "(未填)")}<br/>
                生日：${esc(m.birthday || "(未填)")}
              </div>
            </div>
            <div class="kv">
              <div class="k">歸屬</div>
              <div class="v">
                schoolId：<span class="mono">${esc(m.schoolId || "(無)")}</span><br/>
                orgId：<span class="mono">${esc(m.orgId || "(無)")}</span>
              </div>
            </div>
            <div class="kv">
              <div class="k">驗證</div>
              <div class="v">
                verifyKey：<span class="mono">${esc(m.verifyKey || "(無)")}</span><br/>
                verified：<span class="mono">${m.verified ? "true" : "false"}</span>
              </div>
            </div>
            <div class="kv">
              <div class="k">帳號</div>
              <div class="v">
                uid：<span class="mono">${esc(m.uid)}</span><br/>
                email：<span class="mono">${esc(m.email || "-")}</span>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-sm" data-copy="uid">複製 UID</button>
            <button class="btn btn-sm" data-copy="email">複製 Email</button>
            <button class="btn btn-sm" data-copy="verifyKey">複製 verifyKey</button>
            <button class="btn btn-sm" data-edit="1">編輯資料</button>
          </div>

          <div class="edit-box" id="edit-${esc(m.uid)}">
            <div class="sub">可修改姓名、性別、生日</div>
            <div class="edit-grid">
              <div>
                <div class="sub" style="margin-bottom:6px;">姓名</div>
                <input type="text" id="edit-name-${esc(m.uid)}" value="${esc(m.name || "")}" placeholder="請輸入姓名" />
              </div>
              <div>
                <div class="sub" style="margin-bottom:6px;">性別</div>
                <select id="edit-gender-${esc(m.uid)}">
                  <option value="" ${!norm(m.gender) ? "selected" : ""}>未填</option>
                  <option value="男" ${norm(m.gender)==="男" ? "selected" : ""}>男</option>
                  <option value="女" ${norm(m.gender)==="女" ? "selected" : ""}>女</option>
                  <option value="其他" ${norm(m.gender)==="其他" ? "selected" : ""}>其他</option>
                </select>
              </div>
              <div>
                <div class="sub" style="margin-bottom:6px;">生日</div>
                <input type="date" id="edit-birthday-${esc(m.uid)}" value="${esc(m.birthday || "")}" />
              </div>
            </div>

            <div class="actions">
              <button class="btn btn-sm" data-cancel="1">取消</button>
              <button class="btn btn-sm" id="save-${esc(m.uid)}" data-save="1">儲存變更</button>
            </div>
          </div>

          <details>
            <summary>查看完整資料（raw）</summary>
            <pre>${esc(JSON.stringify(m.raw || {}, null, 2))}</pre>
          </details>
        `;

        item.querySelectorAll("[data-copy]").forEach(btn => {
          btn.addEventListener("click", () => {
            const kind = btn.getAttribute("data-copy");
            if (kind === "uid") return copyText(m.uid);
            if (kind === "email") return copyText(m.email || "");
            if (kind === "verifyKey") return copyText(m.verifyKey || "");
          });
        });

        const editBtn = item.querySelector('[data-edit]');
        if (editBtn) {
          editBtn.addEventListener("click", () => toggleEdit(m.uid));
        }

        const cancelBtn = item.querySelector('[data-cancel]');
        if (cancelBtn) {
          cancelBtn.addEventListener("click", () => toggleEdit(m.uid));
        }

        const saveBtn = item.querySelector('[data-save]');
        if (saveBtn) {
          saveBtn.addEventListener("click", () => saveProfile(m.uid));
        }

        list.appendChild(item);
      });
    }

    function exportCSV(){
      if (!RAW.length) return;

      const rows = RAW.map(m => ({
        uid: m.uid || "",
        email: m.email || "",
        name: m.name || "",
        gender: m.gender || "",
        birthday: m.birthday || "",
        schoolId: m.schoolId || "",
        orgId: m.orgId || "",
        verifyKey: m.verifyKey || "",
        verified: m.verified ? "true" : "false",
        createdAt: tsToText(m.createdAt),
        updatedAt: tsToText(m.updatedAt)
      }));

      const headers = Object.keys(rows[0]);
      const escCSV = (v) => {
        const s = String(v ?? "");
        if (/[",\n]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
        return s;
      };

      const csv = [
        headers.join(","),
        ...rows.map(r => headers.map(h => escCSV(r[h])).join(","))
      ].join("\n");

      const bom = "﻿";
      const blob = new Blob([bom + csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `platform-users_${ACTIVE_COL || "unknown"}_${Date.now()}.csv`;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
    }

    reloadBtn.onclick = () => loadAll();
    exportBtn.onclick = exportCSV;
    searchBox.addEventListener("input", applyFilter);
    schoolFilter.addEventListener("change", applyFilter);

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        showGate("平台帳號管理", "請先登入管理帳號以繼續。", true);
        return;
      }

      try{
        const r = await loadMyRole(user.uid);
        if (!r.ok){
          showGate("無法進入", r.reason, false);
          return;
        }

        const role = r.role;
        meEmail.textContent = user.email || "-";
        meRole.textContent = role || "-";

        if (!["platform_super","platform_admin"].includes(role)){
          showGate("權限不足", "此頁僅限平台管理員使用。", false);
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";

        await loadAll();

      }catch(e){
        console.error(e);
        showGate("發生錯誤", "無法讀取權限資料，請查看 Console。", false);
      }
    });
  </script>
