<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Passium｜註冊</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --green:#166534;
      --green-bg:#dcfce7;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{ color:inherit; text-decoration:none; }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:40px 22px 88px;
    }

    .wrap{
      max-width:560px;
      margin:0 auto;
    }

    .hero{
      background:#fff;
      border:1px solid rgba(0,0,0,.05);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:28px;
      margin-bottom:18px;
    }

    .hero-title{
      margin:0;
      font-size:42px;
      font-weight:800;
      letter-spacing:-.04em;
    }

    .hero-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .card-body{
      padding:22px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media (max-width:760px){
      .grid{ grid-template-columns:1fr; }
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .label{
      font-size:13px;
      font-weight:800;
    }

    .input{
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      font-size:15px;
    }

    .input:focus{
      border-color:#111;
      outline:none;
    }

    .btn{
      width:100%;
      min-height:46px;
      border-radius:999px;
      background:#111;
      color:#fff;
      font-weight:800;
      border:none;
      cursor:pointer;
      margin-top:18px;
    }

    .notice{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      font-size:13px;
    }

    .info{ background:var(--blue-bg); color:var(--blue); }
    .ok{ background:var(--green-bg); color:var(--green); }
    .warn{ background:var(--red-bg); color:var(--red); }

    .row{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:13px;
      font-weight:700;
    }
  </style>
</head>

<body>
  <div class="nav-wrap">
    <div class="nav">
      <a class="brand" href="index.html">
        <span class="brand-mark">P</span>
        <span>Passium</span>
      </a>
    </div>
  </div>

  <main class="page">
    <div class="wrap">

      <div class="hero">
        <h1 class="hero-title">註冊</h1>
        <div class="hero-sub">建立你的會員帳號</div>
      </div>

      <div class="card">
        <div class="card-body">

          <div class="grid">
            <input id="name" class="input" placeholder="姓名" />
            <input id="gender" class="input" placeholder="性別" />
            <input id="birthday" class="input" type="date" />
            <input id="phone" class="input" placeholder="手機" />

            <input id="email" class="input field full" placeholder="Email" />
            <input id="password" class="input" type="password" placeholder="密碼" />
            <input id="confirmPassword" class="input" type="password" placeholder="確認密碼" />
          </div>

          <div id="msg" class="notice info">請填寫資料</div>

          <button id="registerBtn" class="btn">建立帳號</button>

          <div class="row">
            <span></span>
            <a href="login.html">登入</a>
          </div>

        </div>
      </div>

    </div>
  </main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"concert-1ff7e.firebaseapp.com",
  projectId:"concert-1ff7e"
});

const auth=firebase.auth();
const db=firebase.firestore();

const msg=document.getElementById("msg");

function setMsg(type,text){
  msg.className="notice "+type;
  msg.innerHTML=text;
}

document.getElementById("registerBtn").onclick=async()=>{
  const email=emailEl.value;
  const password=passwordEl.value;

  try{
    const cred=await auth.createUserWithEmailAndPassword(email,password);

    await db.collection("users").doc(cred.user.uid).set({
      email
    });

    setMsg("ok","註冊成功");

    setTimeout(()=>location.href="member.html",500);

  }catch(e){
    setMsg("warn","註冊失敗");
  }
};
</script>

</body>
</html>
