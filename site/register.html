<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Passium｜註冊</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --green:#166534;
      --green-bg:#dcfce7;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{ color:inherit; text-decoration:none; }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:40px 22px 88px;
    }

    .wrap{
      max-width:560px;
      margin:0 auto;
    }

    .hero{
      background:#fff;
      border:1px solid rgba(0,0,0,.05);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:28px;
      margin-bottom:18px;
    }

    .hero-title{
      margin:0;
      font-size:42px;
      font-weight:800;
      letter-spacing:-.04em;
    }

    .hero-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .card-body{
      padding:22px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media (max-width:760px){
      .grid{ grid-template-columns:1fr; }
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .label{
      font-size:13px;
      font-weight:800;
    }

    .input{
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      font-size:15px;
      background:#fff;
      color:#111827;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    .input:focus{
      border-color:#111;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .btn{
      width:100%;
      min-height:46px;
      border-radius:999px;
      background:#111;
      color:#fff;
      font-weight:800;
      border:none;
      cursor:pointer;
      margin-top:18px;
      font-size:14px;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      box-shadow:var(--shadow-soft);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .notice{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
      word-break:break-word;
      border:1px solid transparent;
    }

    .info{
      background:var(--blue-bg);
      color:var(--blue);
      border-color:rgba(29,78,216,.12);
    }

    .ok{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.12);
    }

    .warn{
      background:var(--red-bg);
      color:var(--red);
      border-color:rgba(185,28,28,.12);
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:13px;
      font-weight:700;
      gap:10px;
      flex-wrap:wrap;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
  </style>
</head>

<body>
  <div class="nav-wrap">
    <div class="nav">
      <a class="brand" href="index.html">
        <span class="brand-mark">P</span>
        <span>Passium</span>
      </a>
    </div>
  </div>

  <main class="page">
    <div class="wrap">

      <div class="hero">
        <h1 class="hero-title">註冊</h1>
        <div class="hero-sub">
          建立你的會員帳號。<br>
          註冊完成後，系統會寄送 Email 驗證信到你的信箱。
        </div>
      </div>

      <div class="card">
        <div class="card-body">

          <div class="grid">
            <div class="field">
              <label class="label" for="name">姓名</label>
              <input id="name" class="input" placeholder="姓名" />
            </div>

            <div class="field">
              <label class="label" for="gender">性別</label>
              <input id="gender" class="input" placeholder="性別" />
            </div>

            <div class="field">
              <label class="label" for="birthday">生日</label>
              <input id="birthday" class="input" type="date" />
            </div>

            <div class="field">
              <label class="label" for="phone">手機</label>
              <input id="phone" class="input" placeholder="手機" />
            </div>

            <div class="field full">
              <label class="label" for="email">Email</label>
              <input id="email" class="input" type="email" placeholder="Email" autocomplete="email" />
            </div>

            <div class="field">
              <label class="label" for="password">密碼</label>
              <input id="password" class="input" type="password" placeholder="密碼" autocomplete="new-password" />
            </div>

            <div class="field">
              <label class="label" for="confirmPassword">確認密碼</label>
              <input id="confirmPassword" class="input" type="password" placeholder="確認密碼" autocomplete="new-password" />
            </div>
          </div>

          <div id="msg" class="notice info">請填寫資料</div>

          <button id="registerBtn" class="btn">建立帳號</button>

          <div class="row">
            <span></span>
            <a href="login.html">登入</a>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e",
        storageBucket: "concert-1ff7e.firebasestorage.app",
        messagingSenderId: "704757384914",
        appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const msg = document.getElementById("msg");

    const nameEl = document.getElementById("name");
    const genderEl = document.getElementById("gender");
    const birthdayEl = document.getElementById("birthday");
    const phoneEl = document.getElementById("phone");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const registerBtn = document.getElementById("registerBtn");

    function norm(value){
      return String(value ?? "").trim();
    }

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function setMsg(type,text){
      msg.className = "notice " + type;
      msg.innerHTML = text;
    }

    function isValidEmail(email){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    registerBtn.onclick = async () => {
      const name = norm(nameEl.value);
      const gender = norm(genderEl.value);
      const birthday = norm(birthdayEl.value);
      const phone = norm(phoneEl.value);
      const email = norm(emailEl.value).toLowerCase();
      const password = passwordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      if (!name) {
        setMsg("warn","請輸入姓名");
        return;
      }

      if (!email) {
        setMsg("warn","請輸入 Email");
        return;
      }

      if (!isValidEmail(email)) {
        setMsg("warn","Email 格式不正確");
        return;
      }

      if (!password) {
        setMsg("warn","請輸入密碼");
        return;
      }

      if (password.length < 6) {
        setMsg("warn","密碼至少需要 6 碼");
        return;
      }

      if (password !== confirmPassword) {
        setMsg("warn","兩次密碼不一致");
        return;
      }

      registerBtn.disabled = true;
      const oldText = registerBtn.textContent;
      registerBtn.textContent = "建立中…";
      setMsg("info","正在建立帳號並寄送驗證信…");

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        const user = cred.user;

        if (!user) {
          throw new Error("建立帳號失敗");
        }

        await db.collection("users").doc(user.uid).set({
          uid: user.uid,
          name,
          gender,
          birthday,
          phone,
          email,
          enabled: true,
          role: "member",
          verified: false,
          emailVerified: false,
          verifiedSchoolId: "",
          verifiedSchoolName: "",
          verifyMethod: "",
          schoolEmail: "",
          profileNotice: "姓名、性別、生日為會員固定資料，若需更正請聯絡主辦單位。",
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge:true });

        await user.sendEmailVerification();

        await auth.signOut();

        setMsg(
          "ok",
          `註冊成功，驗證信已寄出。<br>請前往信箱完成驗證後再登入。<br><span class="mono">${esc(email)}</span>`
        );

        setTimeout(() => {
          location.href = "login.html";
        }, 1800);

      } catch (e) {
        console.error(e);

        let text = "註冊失敗，請稍後再試";

        if (String(e.code || "").includes("auth/email-already-in-use")) {
          text = "此 Email 已被註冊";
        } else if (String(e.code || "").includes("auth/invalid-email")) {
          text = "Email 格式不正確";
        } else if (String(e.code || "").includes("auth/weak-password")) {
          text = "密碼強度不足，至少需要 6 碼";
        } else if (String(e.code || "").includes("auth/network-request-failed")) {
          text = "網路連線失敗";
        } else if (e.message) {
          text = e.message;
        }

        setMsg("warn", esc(text));
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = oldText;
      }
    };

    [nameEl, genderEl, birthdayEl, phoneEl, emailEl, passwordEl, confirmPasswordEl].forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter") registerBtn.click();
      });
    });
  </script>
</body>
</html>
