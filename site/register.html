<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Passium｜註冊</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:40px 22px 88px;
    }

    .wrap{
      max-width:640px;
      margin:0 auto;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:32px 28px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 52px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:12px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 22px 14px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .card-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .card-body{
      padding:22px;
    }

    .grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  align-items:start;
}

@media (max-width:760px){
  .grid{
    grid-template-columns:1fr;
  }
}

.field{
  display:grid;
  gap:6px;
  min-width:0;
}

.field.full{
  grid-column:1 / -1;
}

.birthday-grid{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr;
  gap:10px;
  align-items:start;
}

.birthday-grid > *{
  min-width:0;
}

.input,
.select{
  width:100%;
  min-width:0;
  min-height:48px;
  padding:12px 14px;
  border:1px solid rgba(0,0,0,.12);
  border-radius:16px;
  background:#fff;
  color:#111827;
  font-size:15px;
  outline:none;
  transition:border-color .12s ease, box-shadow .12s ease;
}

    .input:focus,
    .select:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .hint{
      font-size:12px;
      line-height:1.8;
      color:var(--muted);
      white-space:pre-wrap;
    }

    .section-divider{
      margin:18px 0 14px;
      padding-top:18px;
      border-top:1px solid rgba(0,0,0,.08);
    }

    .section-divider-title{
      font-size:13px;
      font-weight:800;
      color:#111827;
      margin-bottom:10px;
    }

    .birthday-grid{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr;
      gap:10px;
    }

    @media (max-width:560px){
      .birthday-grid{
        grid-template-columns:1fr;
      }
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-block{
      width:100%;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .text-link{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .notice{
      margin-top:16px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      font-size:13px;
      line-height:1.9;
      color:#4b5563;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.12);
      color:var(--blue);
    }

    .notice.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.12);
      color:var(--green);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.12);
      color:var(--red);
    }

    .notice.pending{
      background:var(--orange-bg);
      border-color:rgba(194,65,12,.12);
      color:var(--orange);
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .copyright{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:24px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }

      .card{
        border-radius:28px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="wrap">
        <div class="hero">
          <h1 class="hero-title">註冊</h1>
          <div class="hero-sub">建立你的 Passium 會員帳號。
完成註冊後，系統會寄送信箱驗證信給你。</div>
        </div>

        <div class="card">
          <div class="card-head">
            <h2 class="card-title">會員資料</h2>
          </div>

          <div class="card-body">
            <div class="grid">
              <div class="field full">
                <label class="label" for="email">電子郵件</label>
                <input id="email" class="input" type="email" placeholder="請輸入 Email" autocomplete="email" />
                <div class="hint">這組 Email 將作為你的登入帳號，也會收到驗證信。</div>
              </div>

              <div class="field">
  <label class="label" for="password">密碼</label>
  <input id="password" class="input" type="password" placeholder="至少 8 碼，需包含大小寫字母與數字" autocomplete="new-password" />
</div>

<div class="field">
  <label class="label" for="confirmPassword">確認密碼</label>
  <input id="confirmPassword" class="input" type="password" placeholder="再次輸入密碼" autocomplete="new-password" />
</div>

<div class="field full">
  <div class="hint">密碼需符合 Firebase 規則：至少 8 碼，且包含大寫字母、小寫字母、數字。</div>
</div>
            </div>

            <div class="section-divider">
              <div class="section-divider-title">基本資料</div>

              <div class="grid">
                <div class="field">
                  <label class="label" for="name">姓名</label>
                  <input id="name" class="input" type="text" placeholder="請輸入姓名" />
                </div>

                <div class="field">
                  <label class="label" for="gender">性別</label>
                  <select id="gender" class="select">
                    <option value="">請選擇性別</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                    <option value="其他">其他</option>
                    <option value="不方便透露">不方便透露</option>
                  </select>
                </div>

                <div class="field full">
                  <label class="label">生日</label>
                  <div class="birthday-grid">
                    <select id="birthYear" class="select"></select>
                    <select id="birthMonth" class="select"></select>
                    <select id="birthDay" class="select"></select>
                  </div>
                  <div class="hint">請依序選擇年、月、日。</div>
                </div>

                <div class="field full">
                  <label class="label" for="phone">手機號碼</label>
                  <input id="phone" class="input" type="text" inputmode="tel" placeholder="請輸入手機號碼" />
                </div>
              </div>
            </div>

            <div id="msg" class="notice info">請填寫完整資料後建立帳號。</div>

            <button id="registerBtn" class="btn btn-primary btn-block" style="margin-top:18px;">建立帳號</button>

            <div class="row">
              <span class="hint">已經有帳號了嗎？</span>
              <a class="text-link" href="login.html">前往登入</a>
            </div>
          </div>
        </div>

        <footer class="footer">
          <div>
            <div class="footer-title">Events</div>
            <a class="footer-link" href="index.html#featured">精選活動</a>
            <a class="footer-link" href="index.html#upcoming">即將開始</a>
          </div>

          <div>
            <div class="footer-title">Account</div>
            <a class="footer-link" href="login.html">登入</a>
            <a class="footer-link" href="member.html">會員中心</a>
          </div>
        </footer>

        <div class="copyright">
          © 2026 Passium. All rights reserved.
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e",
        storageBucket: "concert-1ff7e.firebasestorage.app",
        messagingSenderId: "704757384914",
        appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const accountBtn = document.getElementById("accountBtn");
    const nameEl = document.getElementById("name");
    const genderEl = document.getElementById("gender");
    const birthYearEl = document.getElementById("birthYear");
    const birthMonthEl = document.getElementById("birthMonth");
    const birthDayEl = document.getElementById("birthDay");
    const phoneEl = document.getElementById("phone");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const registerBtn = document.getElementById("registerBtn");
    const msg = document.getElementById("msg");

    let authAccountCreated = false;
    let createdUserEmail = "";
    let createdUid = "";

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function setMsg(type, text){
      msg.className = `notice ${type}`;
      msg.innerHTML = text;
    }

    function isValidEmail(email){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function isValidPhone(phone){
      return /^[0-9+\-\s()]{8,20}$/.test(phone);
    }

    function isStrongPassword(password){
      return (
        password.length >= 8 &&
        /[A-Z]/.test(password) &&
        /[a-z]/.test(password) &&
        /[0-9]/.test(password)
      );
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        accountBtn.href = "login.html";
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    function populateBirthdayOptions(){
      const now = new Date();
      const currentYear = now.getFullYear();
      const startYear = currentYear - 100;
      const endYear = currentYear;

      birthYearEl.innerHTML = `<option value="">請選擇年份</option>`;
      for (let y = endYear; y >= startYear; y--) {
        birthYearEl.insertAdjacentHTML("beforeend", `<option value="${y}">${y} 年</option>`);
      }

      birthMonthEl.innerHTML = `<option value="">請選擇月份</option>`;
      for (let m = 1; m <= 12; m++) {
        birthMonthEl.insertAdjacentHTML("beforeend", `<option value="${m}">${m} 月</option>`);
      }

      renderDayOptions();
    }

    function getDaysInMonth(year, month){
      if (!year || !month) return 31;
      return new Date(year, month, 0).getDate();
    }

    function renderDayOptions(){
      const year = Number(birthYearEl.value || 0);
      const month = Number(birthMonthEl.value || 0);
      const maxDays = getDaysInMonth(year, month);
      const currentDay = Number(birthDayEl.value || 0);

      birthDayEl.innerHTML = `<option value="">請選擇日期</option>`;
      for (let d = 1; d <= maxDays; d++) {
        birthDayEl.insertAdjacentHTML("beforeend", `<option value="${d}">${d} 日</option>`);
      }

      if (currentDay && currentDay <= maxDays) {
        birthDayEl.value = String(currentDay);
      }
    }

    function getBirthdayValue(){
      const year = Number(birthYearEl.value || 0);
      const month = Number(birthMonthEl.value || 0);
      const day = Number(birthDayEl.value || 0);

      if (!year || !month || !day) return "";

      const mm = String(month).padStart(2, "0");
      const dd = String(day).padStart(2, "0");
      return `${year}-${mm}-${dd}`;
    }

    async function createEmailIndex(email, uid){
      const key = lower(email);
      if (!key) return;

      await db.collection("email_index").doc(key).set({
        uid,
        email: key,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    function withTimeout(promise, ms, message){
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(message || "操作逾時")), ms);
        })
      ]);
    }

    async function safeSignOut(){
      try{
        await auth.signOut();
      }catch(e){
        console.warn("signOut failed:", e);
      }
    }

    async function register(){
      const email = lower(emailEl.value);
      const password = passwordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      const name = norm(nameEl.value);
      const gender = norm(genderEl.value);
      const birthday = getBirthdayValue();
      const phone = norm(phoneEl.value);

      authAccountCreated = false;
      createdUserEmail = "";
      createdUid = "";

      if (!email) {
        setMsg("warn", "請輸入電子郵件");
        return;
      }

      if (!isValidEmail(email)) {
        setMsg("warn", "電子郵件格式不正確");
        return;
      }

      if (!password) {
        setMsg("warn", "請輸入密碼");
        return;
      }

      if (!isStrongPassword(password)) {
        setMsg("warn", "密碼需至少 8 碼，且包含大寫字母、小寫字母、數字");
        return;
      }

      if (!confirmPassword) {
        setMsg("warn", "請輸入確認密碼");
        return;
      }

      if (password !== confirmPassword) {
        setMsg("warn", "兩次輸入的密碼不一致");
        return;
      }

      if (!name) {
        setMsg("warn", "請輸入姓名");
        return;
      }

      if (!gender) {
        setMsg("warn", "請選擇性別");
        return;
      }

      if (!birthday) {
        setMsg("warn", "請完整選擇生日");
        return;
      }

      if (!phone) {
        setMsg("warn", "請輸入手機號碼");
        return;
      }

      if (!isValidPhone(phone)) {
        setMsg("warn", "手機號碼格式不正確");
        return;
      }

      registerBtn.disabled = true;
      const oldText = registerBtn.textContent;
      registerBtn.textContent = "建立中…";
      setMsg("info", "正在建立帳號…");

      try {
        const cred = await withTimeout(
          auth.createUserWithEmailAndPassword(email, password),
          20000,
          "建立帳號逾時，請檢查網路或 Firebase 設定"
        );

        const user = cred.user;
        if (!user) {
          throw new Error("帳號建立失敗，沒有取得使用者資料");
        }

        authAccountCreated = true;
        createdUserEmail = email;
        createdUid = user.uid;

        setMsg("info", "帳號已建立，正在寄送驗證信…");

        await withTimeout(
          user.sendEmailVerification(),
          20000,
          "驗證信寄送逾時，請稍後到登入頁重寄"
        );

        setMsg("info", "驗證信已寄出，正在寫入會員資料…");

        await withTimeout(
          db.collection("users").doc(user.uid).set({
            uid: user.uid,
            email,
            name,
            gender,
            birthday,
            phone,

            enabled: true,
            emailVerified: false,

            verifiedSchoolId: "",
            verifiedSchoolName: "",
            verifyMethod: "",
            schoolEmail: "",

            role: "member",

            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true }),
          20000,
          "寫入 users 資料逾時，請檢查 Firestore 規則"
        );

        await withTimeout(
          createEmailIndex(email, user.uid),
          20000,
          "寫入 email_index 逾時，請檢查 Firestore 規則"
        );

        await safeSignOut();

        setMsg(
          "ok",
          `註冊成功，驗證信已寄送到：<span class="mono">${esc(email)}</span><br>請先到信箱完成驗證，再登入。`
        );

        registerBtn.textContent = "已建立帳號";

        setTimeout(() => {
          location.href = `login.html?email=${encodeURIComponent(email)}`;
        }, 1800);

      } catch (e) {
        console.error("register error:", e);

        let text = "註冊失敗";
        const code = String(e.code || "");
        const message = String(e.message || "");

        if (code.includes("auth/email-already-in-use")) {
          text = "這個電子郵件已被註冊";
        } else if (code.includes("auth/invalid-email")) {
          text = "電子郵件格式不正確";
        } else if (code.includes("auth/weak-password")) {
          text = "密碼不符合 Firebase 規則（需 8 碼以上，且包含大小寫字母與數字）";
        } else if (code.includes("auth/network-request-failed")) {
          text = "網路連線失敗";
        } else if (message.includes("建立帳號逾時")) {
          text = "建立帳號逾時，請檢查網路或 Firebase 設定";
        } else if (message.includes("驗證信寄送逾時")) {
          text = "帳號已建立，但驗證信寄送逾時，請稍後到登入頁重寄驗證信";
        } else if (message.includes("寫入 users")) {
          text = "帳號已建立，但會員資料寫入失敗，請檢查 Firestore 規則";
        } else if (message.includes("email_index")) {
          text = "帳號已建立，但 email_index 寫入失敗，請檢查 Firestore 規則";
        }

        if (authAccountCreated) {
          text += `<br><br>目前 Firebase Auth 帳號可能已建立：<span class="mono">${esc(createdUserEmail || email)}</span>`;
        }

        await safeSignOut();

        setMsg("warn", text);
        registerBtn.disabled = false;
        registerBtn.textContent = oldText;
      }
    }

    registerBtn.onclick = register;

    [
      emailEl,
      passwordEl,
      confirmPasswordEl,
      nameEl,
      genderEl,
      birthYearEl,
      birthMonthEl,
      birthDayEl,
      phoneEl
    ].forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter") register();
      });
    });

    birthYearEl.addEventListener("change", renderDayOptions);
    birthMonthEl.addEventListener("change", renderDayOptions);

    auth.onAuthStateChanged(user => {
      updateAccountLinks(user || null);
    });

    populateBirthdayOptions();
  </script>
</body>
</html>
