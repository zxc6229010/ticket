<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>完成校園驗證</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:48px 24px;
    }
    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .ok{ color:#166534; font-weight:900; }
    .warn{ color:#b91c1c; font-weight:900; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>校園驗證結果</h1>
      <div class="sub" id="msg">驗證中，請稍候…</div>
    </div>
  </div>

  <script>
    async function run(){
      const token = new URLSearchParams(location.search).get("token");
      const msg = document.getElementById("msg");

      if (!token) {
        msg.innerHTML = `<span class="warn">缺少 token</span>`;
        return;
      }

      try {
        const response = await fetch("/api/confirmCampusVerification", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "驗證失敗");
        }

        msg.innerHTML = `
          <span class="ok">校園身分綁定成功。</span>
          <br><br>
          之後每一場活動都會自動依照你的綁定資料比對是否具備報名資格。
        `;
      } catch (e) {
        console.error(e);
        msg.innerHTML = `<span class="warn">${e.message || "驗證失敗"}</span>`;
      }
    }

    run();
  </script>
</body>
</html>
