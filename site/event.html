<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>活動詳情</title>

<style>
:root{
  --bg:#f7f7f8;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --line:rgba(17,24,39,.08);
  --shadow:0 10px 30px rgba(0,0,0,.06);
  --black:#111;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
}
a{ color:inherit; text-decoration:none; }

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:24px 16px 48px;
}
.back{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:#374151;
  font-size:14px;
  font-weight:700;
  margin-bottom:16px;
}
.layout{
  display:grid;
  grid-template-columns:1.25fr .9fr;
  gap:18px;
}
@media (max-width:900px){
  .layout{ grid-template-columns:1fr; }
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.cover{
  width:100%;
  aspect-ratio:16/9;
  background:#eceff3;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#9ca3af;
  font-weight:700;
  overflow:hidden;
}
.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.content, .side{
  padding:18px;
}
.status{
  display:inline-flex;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:800;
  margin-bottom:12px;
}
.status-selling{ background:#dcfce7; color:#166534; }
.status-upcoming{ background:#dbeafe; color:#1d4ed8; }
.status-ended{ background:#f3f4f6; color:#6b7280; }
.status-muted{ background:#f3f4f6; color:#6b7280; }

.title{
  font-size:30px;
  line-height:1.35;
  font-weight:900;
  margin:0;
}
.meta{
  margin-top:16px;
  color:#374151;
  line-height:1.9;
  font-size:15px;
}
.section{
  margin-top:22px;
}
.section-title{
  font-size:18px;
  font-weight:900;
  margin-bottom:10px;
}
.desc{
  color:#374151;
  line-height:1.9;
  white-space:pre-wrap;
  word-break:break-word;
}
.infoBox{
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  background:#fff;
}
.infoLine{
  font-size:14px;
  line-height:1.9;
  color:#374151;
}
.btn{
  width:100%;
  margin-top:16px;
  border:none;
  background:var(--black);
  color:#fff;
  border-radius:14px;
  padding:14px 16px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}
.notice{
  margin-top:14px;
  font-size:13px;
  color:var(--muted);
  line-height:1.8;
  white-space:pre-wrap;
}
.loading, .empty{
  max-width:900px;
  margin:32px auto;
  text-align:center;
  color:var(--muted);
}
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 返回活動列表</a>
    <div id="app" class="loading">載入中...</div>
  </div>

  <script type="module">
    import {
      getEventById,
      getEventStatus,
      formatDateTime,
      formatDateOnly,
      esc,
      norm
    } from "./firebase.js";

    const app = document.getElementById("app");
    const params = new URLSearchParams(location.search);
    const eventId = norm(params.get("id"));

    async function loadEvent(){
      if (!eventId){
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      try{
        const event = await getEventById(eventId);

        if (!event){
          app.className = "empty";
          app.innerHTML = "找不到活動。";
          return;
        }

        const status = getEventStatus(event);
        const coverHtml = event.coverImage
          ? `<img src="${esc(event.coverImage)}" alt="${esc(event.title || "活動圖片")}">`
          : `活動圖片`;

        app.className = "";
        app.innerHTML = `
          <div class="layout">
            <div class="card">
              <div class="cover">${coverHtml}</div>
              <div class="content">
                <div class="status ${status.className}">${esc(status.text)}</div>
                <h1 class="title">${esc(event.title || "未命名活動")}</h1>

                <div class="meta">
                  活動開始：${esc(formatDateTime(event.eventStartAt))}<br>
                  活動結束：${esc(formatDateTime(event.eventEndAt))}<br>
                  活動地點：${esc(event.location || "-")}
                </div>

                <div class="section">
                  <div class="section-title">活動介紹</div>
                  <div class="desc">${esc(event.description || "尚無活動介紹")}</div>
                </div>

                <div class="section">
                  <div class="section-title">注意事項</div>
                  <div class="desc">${esc(event.notice || "尚無注意事項")}</div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="side">
                <div class="infoBox">
                  <div class="section-title">活動資訊</div>
                  <div class="infoLine">開賣開始：${esc(formatDateTime(event.saleStartAt))}</div>
                  <div class="infoLine">開賣截止：${esc(formatDateTime(event.saleEndAt))}</div>
                  <div class="infoLine">活動日期：${esc(formatDateOnly(event.eventStartAt))}</div>
                  <div class="infoLine">活動地點：${esc(event.location || "-")}</div>

                  <button class="btn" type="button" id="buyBtn">我要購票 / 報名</button>

                  <div class="notice">之後這裡可以再接票種選擇、驗證流程與購票流程。</div>
                </div>
              </div>
            </div>
          </div>
        `;

        document.getElementById("buyBtn").onclick = () => {
          alert("下一步可接購票 / 驗證流程");
        };
      } catch (e){
        console.error(e);
        app.className = "empty";
        app.innerHTML = "活動載入失敗，請稍後再試。";
      }
    }

    loadEvent();
  </script>
</body>
</html>
