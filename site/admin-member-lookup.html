<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜會員 / 帳號查詢中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);

      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b)*1.5);
      --btn-h:46px;
      --btn-fs:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      max-width:1080px;
      margin:0 auto;
      padding:48px 24px;
    }

    @media (max-width:640px){
      .wrap{ padding:28px 16px; }
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-bottom:18px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }

    h2{
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .small{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }

    label{
      font-weight:900;
      display:block;
      margin-top:10px;
      margin-bottom:6px;
    }

    input[type="text"]{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:var(--btn-h);
      padding:var(--btn-a) var(--btn-x);
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;
      font-size:var(--btn-fs);
      cursor:pointer;
      color:#111;
      text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }

    .btn:hover{
      box-shadow:0 10px 22px rgba(0,0,0,.08);
      transform:translateY(-1px);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-sm{
      height:40px;
      padding:8px calc(var(--btn-b) * 1.25);
      font-size:15px;
    }

    .form-actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
      align-items:start;
    }

    @media (max-width:720px){
      .grid{ grid-template-columns:1fr; }
    }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .kv{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap:10px;
      padding:10px 0;
      border-top:1px solid var(--line);
    }

    .kv:first-child{
      border-top:none;
      padding-top:0;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:#fff;
      font-size:13px;
      font-weight:900;
    }

    .ok{ color:#166534; font-weight:900; }
    .warn{ color:#b91c1c; font-weight:900; }
    .blue{ color:#1d4ed8; font-weight:900; }

    .resultList{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .resultItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .itemTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      flex-wrap:wrap;
    }

    .itemTitle{
      font-weight:900;
      line-height:1.6;
      word-break:break-word;
    }

    .itemMeta{
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      margin-top:6px;
      word-break:break-word;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="loginGate" class="section"></div>

    <div id="adminApp" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>會員 / 帳號查詢中心</h1>
            <div class="sub">
              使用單一欄位查詢 email、uid、學號、姓名、schoolId、orgId、verifyKey 等資訊。
            </div>
          </div>

          <div style="text-align:right;">
            <div class="small" id="who"></div>
            <div class="small" id="scopeText" style="margin-top:4px;"></div>
            <div style="margin-top:8px; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;">
              <a href="dashboard.html" class="btn btn-sm">回主選單</a>
              <button class="btn btn-sm" id="logoutBtn">登出</button>
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label>查詢條件</label>
            <input id="searchInput" type="text" placeholder="可輸入 email / uid / 學號 / 姓名 / schoolId / orgId / verifyKey" />

            <div class="form-actions">
              <button class="btn" id="clearBtn">清除</button>
              <button class="btn btn-primary" id="searchBtn">查詢</button>
            </div>

            <div class="small" style="margin-top:10px;">
              系統會在你有權限的資料範圍內搜尋相符的會員 / 帳號。
            </div>
          </div>

          <div>
            <label>本頁整合內容</label>
            <div class="small" style="line-height:1.8;">
              1. 平台端可查全部帳號與會員<br>
              2. 校方 / 組織方只可查自己範圍<br>
              3. 可檢視後台角色、校園驗證資訊、基本欄位<br>
              4. 後續可再擴充活動報名狀態 / 最近活動資料
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>查詢結果</h2>
        <div id="resultBox" class="small" style="margin-top:10px;">尚未查詢</div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e"
      });
    }

    const db = firebase.firestore();

    const loginGate = document.getElementById("loginGate");
    const adminApp  = document.getElementById("adminApp");
    const whoEl     = document.getElementById("who");
    const scopeText = document.getElementById("scopeText");

    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");

    const clearBtn  = document.getElementById("clearBtn");
    const searchBtn = document.getElementById("searchBtn");

    const resultBox = document.getElementById("resultBox");

    let currentRole = "";
    let mySchoolId = "";
    let myOrgId = "";
    let currentUserEmail = "";

    function norm(s){ return String(s ?? "").trim(); }
    function lower(s){ return norm(s).toLowerCase(); }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function showGate({ title, message, showLogin, showLogout }){
      loginGate.innerHTML = `
        <h1>${escapeHtml(title)}</h1>
        <div class="sub">${escapeHtml(message)}</div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${showLogin ? `<button class="btn btn-primary" id="gateLoginBtn">使用 Email 登入</button>` : ``}
          ${showLogout ? `<button class="btn" id="gateLogoutBtn">登出</button>` : ``}
        </div>
      `;

      const gateLoginBtn = document.getElementById("gateLoginBtn");
      if (gateLoginBtn) {
        gateLoginBtn.onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
      }

      const gateLogoutBtn = document.getElementById("gateLogoutBtn");
      if (gateLogoutBtn) gateLogoutBtn.onclick = doLogout;

      loginGate.style.display = "block";
      adminApp.style.display = "none";
    }

    async function doLogout(){
      try { await firebase.auth().signOut(); }
      catch (e){ console.error(e); alert("登出失敗（看 Console）"); }
    }
    logoutBtn.onclick = doLogout;

    function setResult(html){
      resultBox.innerHTML = html;
    }

    function canAccessUser(u){
      if (["platform_super", "platform_admin"].includes(currentRole)) {
        return true;
      }

      const userSchoolId = norm(u.schoolId || u.orgSchoolId || u.verifiedSchoolId || "");
      const userOrgId = norm(u.orgId || "");

      if (["org_super", "org_admin", "org_staff"].includes(currentRole)) {
        if (mySchoolId && userSchoolId === mySchoolId) return true;
        if (myOrgId && userOrgId === myOrgId) return true;
        return false;
      }

      return false;
    }

    function userMatches(u, q){
      const keyword = lower(q);

      const fields = [
        u.email,
        u.uid,
        u.studentId,
        u.name,
        u.displayName,
        u.schoolId,
        u.orgSchoolId,
        u.orgId,
        u.verifyKey,
        u.role,
        u.verifiedSchoolName,
        u.verifiedSchoolId
      ].map(v => lower(v));

      return fields.some(v => v.includes(keyword));
    }

    function renderUserCard(u, uid){
      const email = norm(u.email);
      const verified = u.verified === true;
      const schoolName = norm(u.verifiedSchoolName);
      const schoolId = norm(u.verifiedSchoolId || u.schoolId || u.orgSchoolId);
      const verifyKey = norm(u.verifyKey);
      const verifiedAt = u.verifiedAt ? u.verifiedAt.toDate?.() : null;
      const timeText = verifiedAt ? verifiedAt.toLocaleString("zh-Hant") : "-";
      const verifyMethod = norm(u.verifyMethod || u.verifiedMethod || "-");
      const role = norm(u.role || "-");
      const enabled = u.enabled === true;
      const orgId = norm(u.orgId || "-");
      const studentId = norm(u.studentId || "-");
      const name = norm(u.name || u.displayName || "-");

      return `
        <div class="resultItem">
          <div class="itemTop">
            <div>
              <div class="itemTitle">
                ${escapeHtml(email || "(無 email)")}
              </div>
              <div class="itemMeta">
                uid：<span class="mono">${escapeHtml(uid || "-")}</span>
              </div>
            </div>

            <div class="row">
              <span class="pill">${enabled ? `<span class="ok">啟用中</span>` : `<span class="warn">已停用</span>`}</span>
              <span class="pill">${verified ? `<span class="ok">已驗證</span>` : `<span class="warn">未驗證</span>`}</span>
              <span class="pill">${escapeHtml(role || "-")}</span>
            </div>
          </div>

          <div class="kv">
            <div class="small">姓名</div>
            <div>${escapeHtml(name)}</div>
          </div>

          <div class="kv">
            <div class="small">學號</div>
            <div><span class="mono">${escapeHtml(studentId)}</span></div>
          </div>

          <div class="kv">
            <div class="small">schoolId</div>
            <div><span class="mono">${escapeHtml(norm(u.schoolId || u.orgSchoolId || "-"))}</span></div>
          </div>

          <div class="kv">
            <div class="small">orgId</div>
            <div><span class="mono">${escapeHtml(orgId)}</span></div>
          </div>

          <div class="kv">
            <div class="small">驗證學校</div>
            <div>
              ${escapeHtml(schoolName || "-")}
              <div class="small"><span class="mono">${escapeHtml(schoolId || "-")}</span></div>
            </div>
          </div>

          <div class="kv">
            <div class="small">驗證方式</div>
            <div>${escapeHtml(verifyMethod || "-")}</div>
          </div>

          <div class="kv">
            <div class="small">verifyKey</div>
            <div><span class="mono">${escapeHtml(verifyKey || "-")}</span></div>
          </div>

          <div class="kv">
            <div class="small">驗證時間</div>
            <div>${escapeHtml(timeText)}</div>
          </div>
        </div>
      `;
    }

    async function doSearch(){
      const q = norm(searchInput.value);

      if (!q) {
        alert("請輸入查詢條件");
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "查詢中…";
      setResult(`<div class="small">查詢中…</div>`);

      try {
        // 為了支援單一欄位多條件查詢，直接載入 users 再於前端依權限與關鍵字過濾
        const snap = await db.collection("users").limit(3000).get();

        const rows = [];
        snap.forEach(doc => {
          const u = { uid: doc.id, ...(doc.data() || {}) };
          if (!canAccessUser(u)) return;
          if (!userMatches(u, q)) return;
          rows.push(u);
        });

        rows.sort((a, b) => {
          return lower(a.email || a.uid).localeCompare(lower(b.email || b.uid), "zh-Hant");
        });

        if (!rows.length) {
          setResult(`
            <div class="warn">查無資料</div>
            <div class="small" style="margin-top:6px;">
              可能原因：查詢值不符、資料尚未建立，或你目前沒有查看該筆資料的權限。
            </div>
          `);
          return;
        }

        const html = `
          <div class="small">共找到 ${rows.length} 筆資料</div>
          <div class="resultList">
            ${rows.map(u => renderUserCard(u, u.uid)).join("")}
          </div>
        `;

        setResult(html);

      } catch (e) {
        console.error(e);
        setResult(
          `<div class="warn">查詢失敗</div>
           <div class="small" style="margin-top:6px;">
             code: <span class="mono">${escapeHtml(e.code || "(no code)")}</span><br>
             message: <span class="mono">${escapeHtml(e.message || String(e))}</span>
           </div>`
        );
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "查詢";
      }
    }

    clearBtn.onclick = () => {
      searchInput.value = "";
      setResult("尚未查詢");
    };

    searchBtn.onclick = doSearch;
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch();
    });

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        whoEl.textContent = "";
        scopeText.textContent = "";
        showGate({
          title: "會員 / 帳號查詢中心",
          message: "請先使用 Email / 密碼登入後台。",
          showLogin: true,
          showLogout: false
        });
        return;
      }

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();

        if (!userDoc.exists) {
          showGate({
            title: "尚未授權",
            message: "你的帳號尚未被授權為後台管理員。",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        const u = userDoc.data() || {};
        if (u.enabled !== true) {
          showGate({
            title: "帳號已停用",
            message: "此帳號已被停用，請聯絡系統管理員。",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        const role = String(u.role || "").trim();
        const allowed = ["platform_super", "platform_admin", "org_super", "org_admin", "org_staff"];

        if (!allowed.includes(role)) {
          showGate({
            title: "權限不足",
            message: "你沒有權限使用會員 / 帳號查詢功能。",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        currentRole = role;
        mySchoolId = norm(u.schoolId || u.orgSchoolId || "");
        myOrgId = norm(u.orgId || "");
        currentUserEmail = lower(user.email || "");

        whoEl.textContent = currentUserEmail || "";
        if (["platform_super", "platform_admin"].includes(currentRole)) {
          scopeText.textContent = "查詢範圍：全部帳號 / 全部會員";
        } else {
          scopeText.textContent = `查詢範圍：schoolId=${mySchoolId || "-"} / orgId=${myOrgId || "-"}`;
        }

        loginGate.style.display = "none";
        adminApp.style.display = "block";
        setResult("尚未查詢");

      } catch (e) {
        console.error(e);
        showGate({
          title: "發生錯誤",
          message: "無法讀取權限資料，請查看 Console。",
          showLogin: false,
          showLogout: true
        });
      }
    });
  </script>
</body>
</html>
