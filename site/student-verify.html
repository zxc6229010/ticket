<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>學生身分驗證</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }

</style>

    .wrap { max-width: 640px; }

    /* Step indicators */
    .steps {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
    }
    .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;

    }
    .step::after {
      content: "";

      height: 2px;
      background: var(--line);
    }
    .step:last-child::after { display: none; }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--line);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      z-index: 1;
      color: var(--muted);
    }
    .step.active .step-dot  { border-color: #111; background: #111; color: #fff; }
    .step.done  .step-dot   { border-color: #166534; background: #166534; color: #fff; }
    .step-label { font-size: 11px; color: var(--muted); text-align: center; }
    .step.active .step-label { color: var(--text); font-weight: 900; }

    /* Already verified card */

      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 18px;
      padding: 20px;
      text-align: center;
    }

    /* Result area */

      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }
    .result-box.ok   { background: #f0fdf4; border: 1px solid #86efac; }
    .result-box.warn { background: #fff5f5; border: 1px solid #fca5a5; }

  <script>
/**
 * shared.js — 校園演唱會購票系統 共用 JS 模組
 *
 * 使用方式：在 HTML <head> 載入 Firebase SDK 後，
 * 再載入此檔案。此檔案會自動初始化 Firebase 並掛載全域工具。
 *
 * 暴露的全域物件：
 *   window.db        — Firestore 實例
 *   window.AppAuth   — 認證輔助工具
 *   window.AppUI     — UI 工具（esc, norm, tsToText, page transition…）
 *   window.AppNav    — 頂部導覽列
 */

(function () {
  "use strict";

  /* ── Firebase 初始化 ── */
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  // 避免重複初始化（多頁面同時引入時安全）
  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }

  window.db = firebase.firestore();

  /* ══════════════════════════════════════════
     AppUI — 共用 UI 工具
  ══════════════════════════════════════════ */
  window.AppUI = {

    /** HTML 跳脫（防 XSS） */
    esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    },

    /** 去頭尾空白 */
    norm(s) {
      return String(s ?? "").trim();
    },

    /** Firestore Timestamp → 本地時間字串 */
    tsToText(ts) {
      try {
        if (!ts) return "-";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleString("zh-Hant", { hour12: false });
      } catch { return "-"; }
    },

    /** 頁面淡入 */
    pageIn(el) {
      if (!el) return;
      requestAnimationFrame(() => el.classList.add("on"));
    },

    /** 頁面淡出後跳轉 */
    go(href, pageEl) {
      const root = pageEl || document.getElementById("pageRoot");
      if (root) root.classList.add("leaving");
      setTimeout(() => { location.href = href; }, 140);
    },

    /** 攔截所有 <a> 的頁面跳轉並套用轉場動畫 */
    initPageLinks(pageEl) {
      document.addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        const href = a.getAttribute("href");
        if (!href || href.startsWith("#") || href.startsWith("http")) return;
        if (a.getAttribute("aria-disabled") === "true") return;
        e.preventDefault();
        AppUI.go(href, pageEl);
      });
    },

    /**
     * 渲染「Gate」錯誤/登入卡片
     * @param {HTMLElement} gateEl
     * @param {HTMLElement} appEl

        el = document.createElement("div");

        el.style.cssText = `
          position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);

          border-radius:999px; font-size:14px; font-weight:900;
          box-shadow:0 10px 30px rgba(0,0,0,.15); z-index:99999;
          opacity:0; transition:opacity .2s ease, transform .2s ease;
          text-align:center; pointer-events:none;
        `;
        document.body.appendChild(el);
      }

      const colors = {
        ok:   { bg: "#166534", color: "#fff" },
        warn: { bg: "#b91c1c", color: "#fff" },
        info: { bg: "#1d4ed8", color: "#fff" },
        neutral: { bg: "#111", color: "#fff" }
      };
      const c = colors[type] || colors.neutral;
      el.style.background = c.bg;
      el.style.color = c.color;
      el.textContent = msg;

      clearTimeout(el._timer);
      requestAnimationFrame(() => {
        el.style.opacity = "1";
        el.style.transform = "translateX(-50%) translateY(0)";
      });

      el._timer = setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(-50%) translateY(10px)";

              // Move to next field or submit
              const idx    = verifyFields.indexOf(f);
              const nextId = `f_${verifyFields[idx + 1]}`;
              const next   = document.getElementById(nextId);
              if (next) next.focus();
              else if (!verifyBtn.disabled) verifyBtn.click();
            }
          });
        }
      });

      updateBtnState(verifyFields);
    }

    function readForm(verifyFields) {
      const out = {};
      verifyFields.forEach(f => {
        const el = document.getElementById(`f_${f}`);
        out[f] = norm(el ? el.value : "");
      });
      return out;
    }

    function updateBtnState(verifyFields) {
      const input = readForm(verifyFields);
      verifyBtn.disabled = !verifyFields.every(f => !!norm(input[f]));
    }

    function makeVerifyKey(input, keyFields) {
      return keyFields.map(f => norm(input[f])).join("｜");
    }

    // ── Check if already verified ──
    async function checkAlreadyVerified(user) {
      try {
        const snap = await db.collection("users").doc(user.uid).get();
        if (!snap.exists) return false;
        const u = snap.data() || {};
        const vsid = norm(u.verifiedSchoolId || "");
        const vkey = norm(u.verifyKey        || "");
        if (!vsid || !vkey) return false;

        // Show already verified card
        let sName = vsid;
        try {
          const ss = await db.collection("partnerSchools").doc(vsid).get();
          if (ss.exists) sName = norm(ss.data()?.name || vsid);
        } catch (_) {}

        const studentNo = vkey.split("｜")[0] || vkey;
        const verifiedAt = u.verifiedAt
          ? (u.verifiedAt.toDate ? u.verifiedAt.toDate() : new Date(u.verifiedAt))
              .toLocaleDateString("zh-Hant")
          : "-";

        verifiedDetailEl.innerHTML = `
          學校：<strong>${esc(sName)}</strong><br/>
          學號：<span class="mono">${esc(studentNo)}</span><br/>
          <span class="small" style="color:var(--muted);">驗證時間：${esc(verifiedAt)}</span>
        `;

        return true;
      } catch (_) {
        return false;
      }
    }

    // ── Load school config ──
    async function loadSchoolConfig() {
      if (!schoolId) {
        showBlock(`
          <div class="warn">缺少 schoolId</div>
          <div class="hint">請從正確的學校連結進入驗證頁面。</div>
        `);
        return false;
      }

      const snap = await db.collection("partnerSchools").doc(schoolId).get();
      if (!snap.exists) {
        showBlock(`<div class="warn">找不到此學校（${esc(schoolId)}）</div>`);
        return false;
      }

      cfg = snap.data() || {};
      schoolTitleEl.textContent = `學校：${cfg.name || schoolId}`;

      if (cfg.enabled !== true) {
        showBlock(`<div class="warn">此校園目前停用，無法驗證。</div>`);
        return false;
      }

      if (cfg.verifyEnabled !== true) {
        showBlock(`
          <div class="warn">目前暫停驗證</div>
          <div class="hint">此校園目前已暫停學生身分驗證，請稍後再試或洽貴校承辦單位。</div>
        `);
        return false;
      }

      const verifyFields    = (cfg.verifyFields    || []).map(norm).filter(Boolean);
      const verifyKeyFields = (cfg.verifyKeyFields || []).map(norm).filter(Boolean);

      if (!verifyFields.length || !verifyKeyFields.length) {
        showBlock(`
          <div class="warn">此校園驗證設定不完整</div>
          <div class="hint">請聯絡系統管理員或貴校承辦單位完成設定後再驗證。</div>
        `);
        return false;
      }

      buildForm(verifyFields);
      return true;
    }

    // ── Verify & bind ──
    async function verifyAndBind() {
      resultArea.innerHTML = "";
      verifyBtn.disabled   = true;
      const oldText        = verifyBtn.textContent;
      verifyBtn.textContent = "驗證中…";
      setStep(2);

      try {
        const verifyFields    = cfg.verifyFields.map(norm).filter(Boolean);
        const verifyKeyFields = cfg.verifyKeyFields.map(norm).filter(Boolean);
        const input           = readForm(verifyFields);

        const verifyKey = makeVerifyKey(input, verifyKeyFields);
        if (!verifyKey || verifyKey.split("｜").every(x => !x)) {
          toast("驗證資料不足", "warn");
          setStep(1);
          return;
        }

        const recRef  = db.collection("partnerSchools").doc(schoolId).collection("records").doc(verifyKey);
        const recSnap = await recRef.get();

        if (!recSnap.exists) {
          setStep(1);
          resultArea.innerHTML = `
            <div class="result-box warn">
              <div class="warn">驗證失敗</div>
              <div class="hint" style="margin-top:6px;">
                1. 請確認輸入的資料無誤（與貴校校務系統一致）。<br/>
                2. 請確認你的身分是否符合貴校所規範的參與資格。<br/>
                如有疑問，請洽貴校承辦單位。
              </div>
            </div>
          `;
          return;
        }

        // Transaction：一筆記錄只能綁一個帳號
        await db.runTransaction(async tx => {
          const nowSnap = await tx.get(recRef);
          if (!nowSnap.exists) throw new Error("資料不存在或被刪除");

          const nowData    = nowSnap.data() || {};
          const usedByUid  = norm(nowData.usedByUid || "");

          if (usedByUid && usedByUid !== currentUser.uid) {
            throw new Error("此資料已被其他帳號認證使用");
          }

          tx.update(recRef, {
            usedByUid: currentUser.uid,
            usedAt:    new Date(),
          });

          tx.set(db.collection("users").doc(currentUser.uid), {
            email:             currentUser.email || "",
            verifiedSchoolId:  schoolId,
            verifyKey,
            verifiedAt:        new Date(),
          }, { merge: true });
        });

        // Success
        setStep(3);
        resultArea.innerHTML = `
          <div class="result-box ok" style="text-align:center;">
            <div style="font-size:36px; margin-bottom:8px;">🎉</div>
            <div class="ok" style="font-size:16px;">驗證成功！</div>
            <div class="sub" style="margin-top:6px;">你的帳號已完成校園認證，可以開始報名活動。</div>
            <div style="margin-top:14px;">
              <a class="btn btn-primary" href="member.html">前往會員中心 →</a>
            </div>
          </div>
        `;
        verifyFormCard.querySelector(".steps").style.display = "none";
        formFieldsEl.innerHTML  = "";
        verifyBtn.style.display = "none";
        toast("驗證成功！", "ok");

      } catch (e) {
        console.error(e);
        setStep(1);
        if ((e.message || "").includes("其他帳號")) {
          resultArea.innerHTML = `
            <div class="result-box warn">
              <div class="warn">驗證失敗</div>
              <div class="hint" style="margin-top:6px;">此資料已被其他帳號認證使用。<br/>如有疑問，請洽貴校承辦單位。</div>
            </div>
          `;
        } else {
          toast("驗證失敗：" + (e.message || e), "warn");
        }
      } finally {
        verifyBtn.textContent = oldText;
        const vf = cfg?.verifyFields?.map(norm).filter(Boolean) || [];
        if (vf.length) updateBtnState(vf);
      }
    }

    verifyBtn.onclick = verifyAndBind;
    reVerifyBtn.onclick = () => {
      alreadyVerifiedCard.style.display = "none";
      verifyFormCard.style.display      = "block";
      setStep(1);
    };

    // ── Auth ──
    firebase.auth().onAuthStateChanged(async user => {
      currentUser = user || null;

      if (!user) {
        whoEl.textContent = "-";
        AppUI.showGate(gate, app, {
          title:          "學生身分驗證",
          msg:            "請先登入帳號後再進行驗證。",
          showEmailLogin: true,
        });
        return;
      }

      whoEl.textContent      = user.email || "";
      gate.style.display     = "none";
      app.style.display      = "block";

      try {
        // Check already verified first
        const alreadyDone = await checkAlreadyVerified(user);

        if (alreadyDone) {
          schoolTitleEl.textContent = `學校：${cfg?.name || schoolId || "-"}`;
          alreadyVerifiedCard.style.display = "block";

          // Still try to load school name if we have schoolId
          if (schoolId) {
            db.collection("partnerSchools").doc(schoolId).get()
              .then(s => { if (s.exists) schoolTitleEl.textContent = `學校：${s.data()?.name || schoolId}`; })
              .catch(() => {});
          }
          return;
        }

        // Load school config and show form
        const ok = await loadSchoolConfig();
        if (ok) {
          verifyFormCard.style.display = "block";
          setStep(1);
        }

      } catch (e) {
        console.error(e);
        showBlock(`<div class="warn">載入失敗：${esc(e.message || e)}</div>`);
      }
    });
  </script>
</body>
</html>
