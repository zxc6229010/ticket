<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜主選單顯示設定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
      --btn-h:44px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:1080px; margin:0 auto; padding:48px 24px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:var(--btn-h);
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      text-decoration:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.98); box-shadow:none; }
    .btn-primary{ background:#111; color:#fff; border-color:#111; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:14px;
      background:#fff;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:860px){ .grid{ grid-template-columns:1fr; } }

    .roleBox{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
      padding:16px;
    }
    .roleTitle{
      margin:0 0 10px;
      font-size:16px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .roleHint{ color:var(--muted); font-size:13px; line-height:1.6; margin-top:-2px; }

    .feat{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px dashed var(--line);
    }
    .feat:first-of-type{ border-top:none; }

    .featName{
      font-weight:900;
      font-size:14px;
      line-height:1.4;
    }
    .featNote{
      color:rgba(17,17,17,.55);
      font-size:12px;
      line-height:1.5;
      margin-top:6px;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      min-width:160px;
      padding-top:2px;
    }
    .check{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 10px;
      font-weight:900;
      font-size:13px;
      background:#fff;
      user-select:none;
      white-space:nowrap;
    }
    .check input{ width:18px; height:18px; margin:0; }

    .pinnedHint{
      margin-top:10px;
      background:#f1f2f6;
      border:1px solid rgba(17,17,17,.12);
      border-radius:14px;
      padding:10px 12px;
      color:rgba(17,17,17,.78);
      font-size:13px;
      line-height:1.6;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>主選單顯示設定</h1>
            <div class="sub">
              在這裡決定各身分在主選單會看到哪些功能，以及哪些要置頂。
            </div>
            <div class="sub" style="margin-top:10px;">
              登入：<span id="email" class="mono">-</span>｜
              身分：<span id="role" class="mono">-</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;">
            <a class="btn" href="dashboard.html">回主選單</a>
            <button class="btn" onclick="doLogout()">登出</button>
          </div>
        </div>

        <div class="pinnedHint">
          勾選「顯示」＝該身分看得到。<br/>
          勾選「置頂」＝顯示在主選單上方。
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <span class="pill">顯示設定</span>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" id="reloadBtn">重新載入</button>
            <button class="btn btn-primary" id="saveBtn">儲存設定</button>
          </div>
        </div>
      </div>

      <div class="grid" id="rolesGrid"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const rolesGrid = document.getElementById("rolesGrid");
    const reloadBtn = document.getElementById("reloadBtn");
    const saveBtn = document.getElementById("saveBtn");

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function showGate(title, msg, showLogin){
      gate.style.display = "block";
      app.style.display = "none";
      gate.innerHTML = `
        <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
        <div class="sub">${esc(msg)}</div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${showLogin ? `<button class="btn btn-primary" id="loginBtn">使用 Email 登入</button>` : ``}
          ${!showLogin ? `<button class="btn" onclick="doLogout()">登出</button>` : ``}
        </div>
      `;
      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn){
        loginBtn.onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
      }
    }

    window.doLogout = async () => {
      try { await firebase.auth().signOut(); }
      catch(e){ console.error(e); alert("登出失敗（請看 Console）"); }
    };

    // 這份一定要和 dashboard.html 的 FEATURES 完全對齊
    const FEATURES = [
      { id:"partner-schools",          title:"🏫 特約校園管理" },
      { id:"import-verify",            title:"📥 名單匯入" },
      { id:"admin-member-lookup",      title:"🔎 會員查詢" },

      { id:"admin-events",             title:"🎟️ 活動管理" },
      { id:"admin-events-overview",    title:"📋 活動總覽" },
      { id:"admin-event-orders",       title:"🧾 訂單管理" },

      { id:"seat-editor",              title:"🪑 座位編輯器" },
      { id:"staff-checkin",            title:"✅ 核銷掃碼" },
      { id:"service-center",           title:"🛠️ 服務中心" },

      { id:"admin-staff-users",        title:"🧑‍💼 後台人員管理" },
      { id:"admin-user-assignment",    title:"🪪 權限細部設定" },
      { id:"org-team",                 title:"👥 組織團隊" },

      { id:"admin-dashboard-settings", title:"⚙️ 主選單設定" },
      { id:"admin-impersonate",        title:"🧪 身分模擬" },
      { id:"admin-platform-users",     title:"🌐 平台使用者" }
    ];

    const FEATURE_MAP = new Map(FEATURES.map(x => [x.id, x]));

    const ROLES = [
      { id:"platform_super", name:"平台超級管理員" },
      { id:"platform_admin", name:"平台管理員" },
      { id:"org_super",      name:"組織超級管理員" },
      { id:"org_admin",      name:"組織管理員" },
      { id:"org_staff",      name:"組織服務人員" }
    ];

    const CFG_REF = db.collection("system").doc("dashboard");

    let cfg = null;

    function ensureCfgSkeleton(){
      if (!cfg) cfg = {};
      if (!cfg.roles) cfg.roles = {};
      ROLES.forEach(r => {
        if (!cfg.roles[r.id]) cfg.roles[r.id] = {};
      });
    }

    function setRoleFeature(roleId, featureId, patch){
      ensureCfgSkeleton();
      if (!cfg.roles[roleId]) cfg.roles[roleId] = {};
      if (!cfg.roles[roleId][featureId]) {
        cfg.roles[roleId][featureId] = { visible:false, pinned:false };
      }
      cfg.roles[roleId][featureId] = {
        ...cfg.roles[roleId][featureId],
        ...patch
      };
    }

    function getRoleCfg(roleId){
      ensureCfgSkeleton();
      const r = cfg.roles[roleId];
      return (r && typeof r === "object") ? r : {};
    }

    function normalizeRoleCfg(){
      ensureCfgSkeleton();

      ROLES.forEach(r => {
        FEATURES.forEach(f => {
          const now = cfg.roles[r.id][f.id] || {};
          cfg.roles[r.id][f.id] = {
            visible: now.visible === true,
            pinned: now.pinned === true
          };
          if (cfg.roles[r.id][f.id].pinned === true && cfg.roles[r.id][f.id].visible !== true) {
            cfg.roles[r.id][f.id].pinned = false;
          }
        });

        // 刪掉舊的無效功能 id
        Object.keys(cfg.roles[r.id]).forEach(fid => {
          if (!FEATURE_MAP.has(fid)) {
            delete cfg.roles[r.id][fid];
          }
        });
      });
    }

    function render(){
      rolesGrid.innerHTML = "";

      ROLES.forEach(r => {
        const roleId = r.id;
        const roleCfg = getRoleCfg(roleId);

        const html = `
          <div class="roleBox" data-role="${esc(roleId)}">
            <div class="roleTitle">
              <span>${esc(r.name)} <span class="mono" style="font-size:12px; font-weight:900; color:rgba(17,17,17,.55);">${esc(roleId)}</span></span>
              <span class="pill">可置頂</span>
            </div>
            <div class="roleHint">
              勾選「顯示」＝該身分看得到；勾選「置頂」＝顯示在主選單上方。
            </div>

            <div style="margin-top:10px;">
              ${FEATURES.map(f => {
                const fc = roleCfg[f.id] || {};
                const visible = fc.visible === true;
                const pinned = fc.pinned === true;

                return `
                  <div class="feat">
                    <div style="min-width:0;">
                      <div class="featName">${esc(f.title)}</div>
                    </div>

                    <div class="controls">
                      <label class="check">
                        <input type="checkbox"
                          data-kind="visible"
                          data-role="${esc(roleId)}"
                          data-fid="${esc(f.id)}"
                          ${visible ? "checked" : ""}>
                        顯示
                      </label>

                      <label class="check">
                        <input type="checkbox"
                          data-kind="pinned"
                          data-role="${esc(roleId)}"
                          data-fid="${esc(f.id)}"
                          ${pinned ? "checked" : ""} ${visible ? "" : "disabled"}>
                        置頂
                      </label>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;

        rolesGrid.insertAdjacentHTML("beforeend", html);
      });

      rolesGrid.querySelectorAll("input[type=checkbox]").forEach(el => {
        el.addEventListener("change", () => {
          const kind = el.dataset.kind;
          const roleId = el.dataset.role;
          const fid = el.dataset.fid;
          const checked = !!el.checked;

          if (kind === "visible") {
            setRoleFeature(roleId, fid, { visible: checked });
            if (!checked) setRoleFeature(roleId, fid, { pinned: false });
            render();
            return;
          }

          if (kind === "pinned") {
            const now = getRoleCfg(roleId)[fid] || {};
            if (now.visible !== true) {
              setRoleFeature(roleId, fid, { pinned: false });
              render();
              return;
            }
            setRoleFeature(roleId, fid, { pinned: checked });
          }
        });
      });
    }

    async function load(){
      const snap = await CFG_REF.get();
      cfg = snap.exists ? (snap.data() || {}) : { roles:{} };
      ensureCfgSkeleton();
      normalizeRoleCfg();
      render();
    }

    async function save(){
      saveBtn.disabled = true;
      const old = saveBtn.textContent;
      saveBtn.textContent = "儲存中…";

      try{
        normalizeRoleCfg();

        await CFG_REF.set({
          roles: cfg.roles,
          updatedAt: new Date()
        }, { merge:true });

        alert("已儲存");
      }catch(e){
        console.error(e);
        alert("儲存失敗（可能是 Rules 權限不足）");
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = old;
      }
    }

    reloadBtn.onclick = load;
    saveBtn.onclick = save;

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        showGate("主選單顯示設定", "請先使用 Email / 密碼登入後台。", true);
        return;
      }

      try{
        const snap = await db.collection("users").doc(user.uid).get();
        if (!snap.exists){
          showGate("等待授權", "你的帳號尚未被系統授權為管理者。", false);
          return;
        }

        const u = snap.data() || {};
        if (u.enabled !== true){
          showGate("已停用", "此帳號已被停用，請聯絡系統管理員。", false);
          return;
        }

        const currentRole = String(u.role || "").trim();
        document.getElementById("email").textContent = (u.email || user.email || "-");
        document.getElementById("role").textContent = currentRole || "-";

        if (currentRole !== "platform_super"){
          showGate("權限不足", "此頁面僅限平台超級管理員使用。", false);
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";

        await load();

      }catch(err){
        console.error(err);
        showGate("發生錯誤", "無法讀取權限資料，請查看 Console。", false);
      }
    });
  </script>
</body>
</html>
