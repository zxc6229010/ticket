<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜主選單設定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f5f5f7;
      --card:rgba(255,255,255,.92);
      --card-strong:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 18px 44px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.045);
      --max:1180px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    button,input{
      font:inherit;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:30px 20px 64px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      margin-bottom:20px;
      padding:28px 26px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:34px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.95), rgba(255,255,255,.88) 42%, rgba(255,255,255,.82) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      box-shadow:0 24px 60px rgba(0,0,0,.06);
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-72px;
      top:-72px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.04), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .hero-title{
      margin:0;
      font-size:clamp(30px,4.4vw,48px);
      line-height:1.04;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .panel{
      margin-bottom:18px;
      padding:18px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:saturate(180%) blur(18px);
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .panel-title{
      margin:0;
      font-size:22px;
      line-height:1.2;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
      box-shadow:var(--shadow-soft);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 26px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:13px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .roleBox{
      border:1px solid rgba(0,0,0,.06);
      border-radius:26px;
      background:var(--card-strong);
      box-shadow:var(--shadow-soft);
      padding:18px;
    }

    .roleTitle{
      margin:0 0 14px;
      font-size:20px;
      line-height:1.2;
      font-weight:800;
      letter-spacing:-.02em;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .feat{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-top:1px solid rgba(0,0,0,.06);
    }

    .feat:first-of-type{
      border-top:none;
      padding-top:0;
    }

    .featName{
      font-weight:800;
      font-size:15px;
      line-height:1.45;
      word-break:break-word;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      min-width:164px;
      padding-top:2px;
    }

    .check{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 10px;
      font-weight:800;
      font-size:13px;
      background:#fff;
      user-select:none;
      white-space:nowrap;
    }

    .check input{
      width:18px;
      height:18px;
      margin:0;
    }

    .gate-box{
      max-width:420px;
      margin:72px auto 0;
      padding:24px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      background:#fff;
      box-shadow:var(--shadow);
    }

    .gate-title{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.12;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .gate-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
    }

    .form-stack{
      display:grid;
      gap:10px;
      margin-top:16px;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111;
      font-size:15px;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    .input:focus{
      border-color:rgba(0,0,0,.24);
      box-shadow:0 0 0 4px rgba(0,0,0,.04);
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:920px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:720px){
      .page{
        padding:20px 14px 52px;
      }

      .hero{
        padding:24px 18px;
        border-radius:28px;
      }

      .panel{
        border-radius:24px;
        padding:16px;
      }

      .roleBox{
        border-radius:22px;
      }

      .feat{
        flex-direction:column;
      }

      .controls{
        min-width:0;
        justify-content:flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="gate" class="hidden"></div>

    <div id="app" class="hidden">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1 class="hero-title">主選單設定</h1>
            <div class="hero-sub">設定不同身分可看到的功能。</div>
            <div class="hero-actions" style="margin-top:16px;">
              <span class="pill mono" id="email">-</span>
              <span class="pill" id="role">-</span>
            </div>
          </div>

          <div class="hero-actions">
            <a class="btn" href="dashboard.html">回主選單</a>
            <button class="btn" onclick="doLogout()">登出</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">設定</h2>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" id="reloadBtn">重新載入</button>
            <button class="btn btn-primary" id="saveBtn">儲存</button>
          </div>
        </div>
      </section>

      <section class="grid" id="rolesGrid"></section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const rolesGrid = document.getElementById("rolesGrid");
    const reloadBtn = document.getElementById("reloadBtn");
    const saveBtn = document.getElementById("saveBtn");

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function showGate(title, msg, showLogin){
      gate.classList.remove("hidden");
      app.classList.add("hidden");

      gate.innerHTML = `
        <div class="gate-box">
          <h1 class="gate-title">${esc(title)}</h1>
          <div class="gate-text">${esc(msg)}</div>

          ${
            showLogin ? `
              <div class="form-stack">
                <input id="loginEmail" class="input" type="text" placeholder="帳號">
                <input id="loginPassword" class="input" type="password" placeholder="密碼">
                <button class="btn btn-primary" id="loginBtn">登入</button>
              </div>
            ` : `
              <div style="margin-top:16px;">
                <button class="btn" onclick="doLogout()">登出</button>
              </div>
            `
          }
        </div>
      `;

      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn){
        loginBtn.onclick = async () => {
          const email = String(document.getElementById("loginEmail")?.value || "").trim();
          const password = String(document.getElementById("loginPassword")?.value || "");

          if (!email || !password){
            alert("請輸入帳號與密碼");
            return;
          }

          loginBtn.disabled = true;
          const oldText = loginBtn.textContent;
          loginBtn.textContent = "登入中…";

          try{
            await firebase.auth().signInWithEmailAndPassword(email, password);
          }catch(e){
            console.error(e);
            alert("登入失敗");
          }finally{
            loginBtn.disabled = false;
            loginBtn.textContent = oldText;
          }
        };
      }
    }

    window.doLogout = async () => {
      try {
        await firebase.auth().signOut();
      } catch(e){
        console.error(e);
        alert("登出失敗");
      }
    };

    const FEATURES = [
      { id:"partner-schools",          title:"特約校園管理" },
      { id:"import-verify",            title:"名單匯入" },
      { id:"admin-member-lookup",      title:"會員查詢" },

      { id:"admin-events",             title:"活動管理" },
      { id:"admin-events-overview",    title:"活動總覽" },
      { id:"admin-event-orders",       title:"訂單管理" },

      { id:"seat-editor",              title:"座位編輯器" },
      { id:"staff-checkin",            title:"核銷掃碼" },
      { id:"service-center",           title:"服務中心" },

      { id:"admin-staff-users",        title:"後台人員管理" },
      { id:"admin-user-assignment",    title:"權限細部設定" },
      { id:"org-team",                 title:"組織團隊" },

      { id:"admin-dashboard-settings", title:"主選單設定" },
      { id:"admin-impersonate",        title:"身分模擬" },
      { id:"admin-platform-users",     title:"平台使用者" }
    ];

    const FEATURE_MAP = new Map(FEATURES.map(x => [x.id, x]));

    const ROLES = [
      { id:"platform_super", name:"平台超級管理員" },
      { id:"platform_admin", name:"平台管理員" },
      { id:"org_super",      name:"組織超級管理員" },
      { id:"org_admin",      name:"組織管理員" },
      { id:"org_staff",      name:"組織服務人員" }
    ];

    const CFG_REF = db.collection("system").doc("dashboard");

    let cfg = null;

    function ensureCfgSkeleton(){
      if (!cfg) cfg = {};
      if (!cfg.roles) cfg.roles = {};
      ROLES.forEach(r => {
        if (!cfg.roles[r.id]) cfg.roles[r.id] = {};
      });
    }

    function setRoleFeature(roleId, featureId, patch){
      ensureCfgSkeleton();
      if (!cfg.roles[roleId]) cfg.roles[roleId] = {};
      if (!cfg.roles[roleId][featureId]) {
        cfg.roles[roleId][featureId] = { visible:false, pinned:false };
      }
      cfg.roles[roleId][featureId] = {
        ...cfg.roles[roleId][featureId],
        ...patch
      };
    }

    function getRoleCfg(roleId){
      ensureCfgSkeleton();
      const r = cfg.roles[roleId];
      return (r && typeof r === "object") ? r : {};
    }

    function normalizeRoleCfg(){
      ensureCfgSkeleton();

      ROLES.forEach(r => {
        FEATURES.forEach(f => {
          const now = cfg.roles[r.id][f.id] || {};
          cfg.roles[r.id][f.id] = {
            visible: now.visible === true,
            pinned: now.pinned === true
          };
          if (cfg.roles[r.id][f.id].pinned === true && cfg.roles[r.id][f.id].visible !== true) {
            cfg.roles[r.id][f.id].pinned = false;
          }
        });

        Object.keys(cfg.roles[r.id]).forEach(fid => {
          if (!FEATURE_MAP.has(fid)) {
            delete cfg.roles[r.id][fid];
          }
        });
      });
    }

    function render(){
      rolesGrid.innerHTML = "";

      ROLES.forEach(r => {
        const roleId = r.id;
        const roleCfg = getRoleCfg(roleId);

        const html = `
          <div class="roleBox" data-role="${esc(roleId)}">
            <div class="roleTitle">
              <span>${esc(r.name)}</span>
              <span class="pill">可置頂</span>
            </div>

            <div>
              ${FEATURES.map(f => {
                const fc = roleCfg[f.id] || {};
                const visible = fc.visible === true;
                const pinned = fc.pinned === true;

                return `
                  <div class="feat">
                    <div style="min-width:0;">
                      <div class="featName">${esc(f.title)}</div>
                    </div>

                    <div class="controls">
                      <label class="check">
                        <input type="checkbox"
                          data-kind="visible"
                          data-role="${esc(roleId)}"
                          data-fid="${esc(f.id)}"
                          ${visible ? "checked" : ""}>
                        顯示
                      </label>

                      <label class="check">
                        <input type="checkbox"
                          data-kind="pinned"
                          data-role="${esc(roleId)}"
                          data-fid="${esc(f.id)}"
                          ${pinned ? "checked" : ""} ${visible ? "" : "disabled"}>
                        置頂
                      </label>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;

        rolesGrid.insertAdjacentHTML("beforeend", html);
      });

      rolesGrid.querySelectorAll("input[type=checkbox]").forEach(el => {
        el.addEventListener("change", () => {
          const kind = el.dataset.kind;
          const roleId = el.dataset.role;
          const fid = el.dataset.fid;
          const checked = !!el.checked;

          if (kind === "visible") {
            setRoleFeature(roleId, fid, { visible: checked });
            if (!checked) setRoleFeature(roleId, fid, { pinned: false });
            render();
            return;
          }

          if (kind === "pinned") {
            const now = getRoleCfg(roleId)[fid] || {};
            if (now.visible !== true) {
              setRoleFeature(roleId, fid, { pinned: false });
              render();
              return;
            }
            setRoleFeature(roleId, fid, { pinned: checked });
          }
        });
      });
    }

    async function load(){
      const snap = await CFG_REF.get();
      cfg = snap.exists ? (snap.data() || {}) : { roles:{} };
      ensureCfgSkeleton();
      normalizeRoleCfg();
      render();
    }

    async function save(){
      saveBtn.disabled = true;
      const old = saveBtn.textContent;
      saveBtn.textContent = "儲存中…";

      try{
        normalizeRoleCfg();

        await CFG_REF.set({
          roles: cfg.roles,
          updatedAt: new Date()
        }, { merge:true });

        alert("已儲存");
      }catch(e){
        console.error(e);
        alert("儲存失敗");
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = old;
      }
    }

    reloadBtn.onclick = load;
    saveBtn.onclick = save;

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        showGate("登入後台", "請先登入", true);
        return;
      }

      try{
        const snap = await db.collection("users").doc(user.uid).get();
        if (!snap.exists){
          showGate("無法進入", "目前無法使用此頁面", false);
          return;
        }

        const u = snap.data() || {};
        if (u.enabled !== true){
          showGate("無法進入", "目前無法使用此頁面", false);
          return;
        }

        const currentRole = String(u.role || "").trim();
        document.getElementById("email").textContent = (u.email || user.email || "-");
        document.getElementById("role").textContent = currentRole || "-";

        if (currentRole !== "platform_super"){
          showGate("無法進入", "目前無法使用此頁面", false);
          return;
        }

        gate.classList.add("hidden");
        app.classList.remove("hidden");

        await load();

      }catch(err){
        console.error(err);
        showGate("發生錯誤", "請稍後再試", false);
      }
    });
  </script>
</body>
</html>
