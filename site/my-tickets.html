<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜我的票券</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;

      --green:#166534;
      --green-bg:#dcfce7;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;

      --radius-xl:34px;
      --radius-lg:28px;
      --radius-md:20px;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    body.auth-pending .page{
      visibility:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 22px 88px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .ghost-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      font-size:14px;
      font-weight:700;
      color:#111827;
      cursor:pointer;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:34px 30px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 56px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:14px;
      max-width:860px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
    }

    .hero-meta{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .toolbar-left,
    .toolbar-right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .input,
    .select{
      min-height:46px;
      padding:10px 14px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:18px;
      background:#fff;
      color:#111827;
      font-size:14px;
      outline:none;
      box-shadow:var(--shadow-soft);
    }

    .input{
      min-width:280px;
    }

    .input:focus,
    .select:focus{
      border-color:rgba(0,0,0,.24);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:18px;
    }

    @media (max-width:980px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    .ticket-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .ticket-head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .ticket-head-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .ticket-title{
      margin:0;
      font-size:22px;
      line-height:1.35;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .ticket-sub{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.9;
      white-space:pre-wrap;
    }

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .status-valid{
      background:var(--blue-bg);
      color:var(--blue);
    }

    .status-used{
      background:var(--gray-bg);
      color:var(--gray);
    }

    .status-invalid{
      background:var(--red-bg);
      color:var(--red);
    }

    .ticket-body{
      padding:20px;
    }

    .ticket-layout{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .info-box{
      border:1px solid rgba(0,0,0,.06);
      border-radius:22px;
      background:#fff;
      padding:16px;
      box-shadow:var(--shadow-soft);
    }

    .kv{
      display:grid;
      grid-template-columns:90px 1fr;
      gap:8px 10px;
      padding:8px 0;
      border-top:1px dashed var(--line);
    }

    .kv:first-child{
      border-top:none;
      padding-top:0;
    }

    .k{
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }

    .v{
      font-size:13px;
      color:#111827;
      font-weight:800;
      line-height:1.9;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .qr-box{
      border:1px solid rgba(0,0,0,.06);
      border-radius:24px;
      background:#fff;
      padding:16px;
      text-align:center;
      box-shadow:var(--shadow-soft);
    }

    .qr-title{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:12px;
      letter-spacing:.04em;
    }

    .qr-canvas-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:220px;
    }

    canvas.qr{
      background:#fff;
      border-radius:14px;
      padding:10px;
      max-width:100%;
      height:auto;
    }

    .ticket-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
      align-items:center;
    }

    .wallet-btn{
      display:inline-flex;
      align-items:center;
      background:none;
      border:none;
      padding:0;
      cursor:pointer;
      transition:opacity .12s ease, transform .12s ease;
    }

    .wallet-btn:hover{
      opacity:.85;
      transform:translateY(-1px);
    }

    .wallet-btn:active{
      opacity:.7;
      transform:translateY(0);
    }

    .wallet-btn:disabled{
      opacity:.4;
      cursor:not-allowed;
      transform:none;
    }

    .notice{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.05);
    }

    .empty,
    .loading{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.95;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .modal-back{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.38);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modal-back.show{
      display:flex;
    }

    .modal{
      width:min(560px, 100%);
      background:#fff;
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:0 28px 80px rgba(15,23,42,.22);
      overflow:hidden;
    }

    .modal-head{
      padding:18px 20px 14px;
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .modal-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .modal-sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.8;
      white-space:pre-wrap;
    }

    .modal-body{
      padding:18px 20px 20px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      margin-top:16px;
    }

    .big-qr-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:8px 0;
    }

    .big-qr-note{
      margin-top:12px;
      font-size:13px;
      color:var(--muted);
      line-height:1.85;
      text-align:center;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }

      .input{
        min-width:unset;
        width:100%;
      }
    }
  </style>
</head>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <h3 class="modal-title" id="modalTitle">票券 QR Code</h3>
        <div class="modal-sub" id="modalSub">-</div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      collectionGroup,
      query,
      where,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const accountBtn = document.getElementById("accountBtn");
    const app = document.getElementById("app");
    const heroUserText = document.getElementById("heroUserText");
    const heroCountText = document.getElementById("heroCountText");

    const modalBack = document.getElementById("modalBack");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    const modalBody = document.getElementById("modalBody");

    let currentUser = null;
    let ticketCache = [];

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input?.toDate === "function") return input.toDate();
      const d = new Date(input);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "-";
      return d.toLocaleString("zh-Hant", {
        hour12:false,
        year:"numeric",
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
      });
    }

    function formatPrice(value){
      const num = Number(value || 0);
      if (!num) return "免費";
      return `NT$ ${num.toLocaleString("zh-Hant")}`;
    }

    function getTicketStatusMeta(ticket){
      const status = lower(ticket.status || "valid");
      const checked = ticket.checkedIn === true || lower(ticket.checkinStatus || "") === "checked_in";

      if (checked) {
        return { text: "已入場", className: "status-used" };
      }

      if (status === "valid") {
        return { text: "可入場", className: "status-valid" };
      }

      return {
        text:
          status === "cancelled" ? "已取消" :
          status === "void" ? "已作廢" :
          status === "refunded" ? "已退款" :
          status === "expired" ? "已逾期" :
          (status || "不可用"),
        className: "status-invalid"
      };
    }

    function getOwnershipText(ticket){
      return ticket.isBuyerTicket === true ? "主購人票" : "同行持票人票";
    }

    function getAccessSourceText(ticket){
      const type = lower(ticket.accessCodeType || "");
      if (type === "pr_code" || type === "promo_code") return "公關代碼票";
      return "一般票";
    }

    function getTicketIndexText(ticket){
      const idx = Number(ticket.orderTicketIndex);
      if (Number.isFinite(idx) && idx >= 0) {
        return `第 ${idx + 1} 張`;
      }
      return "-";
    }

    function getSeatDisplay(ticket){
      const floorName = norm(ticket.floorName || "");
      const areaName = norm(ticket.areaName || "");
      const sectionName = norm(ticket.sectionName || ticket.sectionId || "");
      const seatLabel = norm(ticket.seatLabel || "");

      const parts = [floorName, areaName, sectionName, seatLabel].filter(Boolean);
      return parts.length ? parts.join("｜") : "-";
    }

    function closeModal(){
      modalBack.classList.remove("show");
      modalTitle.textContent = "票券 QR Code";
      modalSub.textContent = "-";
      modalBody.innerHTML = "";
    }

    modalBack.addEventListener("click", (e) => {
      if (e.target === modalBack) closeModal();
    });

    async function showTicketModal(ticketId){
      const ticket = ticketCache.find(item => item.id === ticketId);
      if (!ticket) return;

      modalTitle.textContent = ticket.eventTitle || "票券";
      modalSub.innerHTML = `${esc(ticket.ticketTypeName || "-")}｜${esc(getSeatDisplay(ticket))}`;

      modalBody.innerHTML = `
        <div class="big-qr-wrap">
          <canvas id="bigQrCanvas" class="qr"></canvas>
        </div>
        <div class="big-qr-note">
票券 ID：<span class="mono">${esc(ticket.id)}</span>
訂單 ID：<span class="mono">${esc(ticket.orderId || "-")}</span>
身份：<span class="mono">${esc(getOwnershipText(ticket))}</span>
主購者：<span class="mono">${esc(ticket.buyerEmail || "-")}</span>
QR 內容：<span class="mono">${esc(ticket.qrCodeValue || `${ticket.eventId}::${ticket.id}`)}</span>
        </div>
        <div class="modal-actions">
          <button class="btn" id="closeModalBtn">關閉</button>
        </div>
      `;

      modalBack.classList.add("show");
      document.getElementById("closeModalBtn").onclick = closeModal;

      const canvas = document.getElementById("bigQrCanvas");
      await QRCode.toCanvas(canvas, ticket.qrCodeValue || `${ticket.eventId}::${ticket.id}`, {
        width: 280,
        margin: 2
      });
      canvas.classList.add("qr");
    }

    async function addToWallet(ticketId){
      const ticket = ticketCache.find(item => item.id === ticketId);
      if (!ticket) return;

      const btn = document.querySelector(`[data-add-wallet="${ticketId}"]`);
      const img = btn ? btn.querySelector("img") : null;
      if (btn) { btn.disabled = true; if (img) img.style.opacity = "0.4"; }

      // iOS Safari 只允許在使用者手勢內開新視窗，先開一個空白視窗佔位
      const newWin = window.open("", "_blank");

      try {
        const response = await fetch("/api/createWalletPass", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            barcode: { message: ticket.qrCodeValue || `${ticket.eventId}::${ticket.id}` },
            fields: [
              { key: "ID",   value: norm(ticket.studentId || ticket.studentCode || ticket.promoCode || ticket.email || ticket.id) },
              { key: "Name", value: norm(ticket.holderName || ticket.name || ticket.email || "-") },
              { key: "Type", value: norm(ticket.ticketTypeName || "-") }
            ]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || data.error || "建立票卡失敗");
        }

        const passUrl = data.passUrl || data.url || data.downloadUrl || data.link;
        if (passUrl) {
          if (newWin) {
            newWin.location.href = passUrl;
          } else {
            location.href = passUrl;
          }
        } else {
          if (newWin) newWin.close();
          alert("票卡已建立，但無法取得下載連結，請稍後再試。");
        }
      } catch (e) {
        console.error(e);
        if (newWin) newWin.close();
        alert("加入 Wallet 失敗：" + (e.message || "請稍後再試"));
      } finally {
        if (btn) { btn.disabled = false; if (img) img.style.opacity = "1"; }
      }
    }

    async function drawQrToCanvas(canvasId, value){
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      await QRCode.toCanvas(canvas, value, {
        width: 180,
        margin: 2
      });
      canvas.classList.add("qr");
    }

    function sortTickets(list){
      return list.slice().sort((a, b) => {
        const ta = toDate(a.createdAt)?.getTime() || 0;
        const tb = toDate(b.createdAt)?.getTime() || 0;
        return tb - ta;
      });
    }

    function renderTicketGrid(tickets){
      const ticketGrid = document.getElementById("ticketGrid");

      if (!tickets.length) {
        ticketGrid.innerHTML = `
          <div class="empty" style="grid-column:1/-1;">
            找不到符合條件的票券。
          </div>
        `;
        return;
      }

      ticketGrid.innerHTML = tickets.map((ticket, index) => {
        const meta = getTicketStatusMeta(ticket);
        const qrCanvasId = `qr_${index}_${ticket.id}`;

        const seatDisplay = getSeatDisplay(ticket);

        return `
          <div class="ticket-card">
            <div class="ticket-head">
              <div class="ticket-head-top">
                <div>
                  <h2 class="ticket-title">${esc(ticket.eventTitle || "未命名活動")}</h2>
                  <div class="ticket-sub">${esc(ticket.ticketTypeName || "-")}｜${esc(getOwnershipText(ticket))}</div>
                </div>
                <span class="status ${meta.className}">${esc(meta.text)}</span>
              </div>
            </div>

            <div class="ticket-body">
              <div class="ticket-layout">
                <div class="info-box">
                  ${(ticket.studentId || ticket.studentCode) ? `
                  <div class="kv">
                    <div class="k">學號</div>
                    <div class="v">${esc(ticket.studentId || ticket.studentCode)}</div>
                  </div>` : ""}
                  ${ticket.holderName ? `
                  <div class="kv">
                    <div class="k">姓名</div>
                    <div class="v">${esc(ticket.holderName)}</div>
                  </div>` : ""}
                  <div class="kv">
                    <div class="k">座位</div>
                    <div class="v">${esc(seatDisplay !== "-" ? seatDisplay : "未分配座位")}</div>
                  </div>
                  ${ticket.checkedIn === true ? `
                  <div class="kv">
                    <div class="k">核銷時間</div>
                    <div class="v">${esc(formatDateTime(ticket.checkedInAt))}</div>
                  </div>
                  <div class="kv">
                    <div class="k">核銷入口</div>
                    <div class="v">${esc(ticket.checkedInGate || "-")}</div>
                  </div>` : ""}
                </div>

                <div class="qr-box">
                  <div class="qr-title">入場 QR Code</div>
                  <div class="qr-canvas-wrap">
                    <canvas id="${qrCanvasId}"></canvas>
                  </div>
                </div>
              </div>

              <div style="margin-top:16px;text-align:center;">
                <button class="wallet-btn" data-add-wallet="${esc(ticket.id)}" title="加入 Apple Wallet" style="display:inline-flex;">
                  <img src="US-UK_Add_to_Apple_Wallet_RGB_101421.svg" alt="Add to Apple Wallet" style="height:44px;display:block;" />
                </button>
              </div>

              <div class="notice">
                ${
                  meta.className === "status-valid"
                    ? "此票券目前可正常入場。請在現場出示此 QR Code 給工作人員掃描。"
                    : meta.className === "status-used"
                    ? `此票券已完成入場核銷${ticket.checkedInGate ? `（入口：${ticket.checkedInGate}）` : ""}。`
                    : "此票券目前不可入場，若有問題請洽主辦單位或服務台。"
                }
              </div>
            </div>
          </div>
        `;
      }).join("");

      tickets.forEach(async (ticket, index) => {
        const qrCanvasId = `qr_${index}_${ticket.id}`;
        await drawQrToCanvas(qrCanvasId, ticket.qrCodeValue || `${ticket.eventId}::${ticket.id}`);
      });

      document.querySelectorAll("[data-view-ticket]").forEach(btn => {
        btn.onclick = () => showTicketModal(btn.dataset.viewTicket);
      });

      document.querySelectorAll("[data-add-wallet]").forEach(btn => {
        btn.onclick = () => addToWallet(btn.dataset.addWallet);
      });
    }

    function renderTickets(tickets){
      if (!tickets.length) {
        heroCountText.textContent = "票券數量：0";
        app.className = "empty";
        app.innerHTML = `
          目前沒有任何票券。<br>
          你可以先到活動頁完成報名或購票。
        `;
        return;
      }

      heroCountText.textContent = `票券數量：${tickets.length}`;
      app.className = "";
      app.innerHTML = `
        <div class="toolbar">
          <div class="toolbar-left">
            <input id="searchInput" class="input" placeholder="搜尋活動名稱 / 票種 / 座位 / 訂單 ID / 主購者 / 持票者" />
          </div>
          <div class="toolbar-right">
            <select id="statusFilter" class="select">
              <option value="all">全部狀態</option>
              <option value="valid">可入場</option>
              <option value="used">已入場</option>
              <option value="invalid">不可用</option>
            </select>
            <select id="ownershipFilter" class="select">
              <option value="all">全部身份</option>
              <option value="buyer">主購人票</option>
              <option value="shared">同行票</option>
            </select>
          </div>
        </div>

        <div class="grid" id="ticketGrid"></div>
      `;

      const searchInput = document.getElementById("searchInput");
      const statusFilter = document.getElementById("statusFilter");
      const ownershipFilter = document.getElementById("ownershipFilter");

      function paint(){
        const q = lower(searchInput.value);
        const f = statusFilter.value;
        const of = ownershipFilter.value;

        const filtered = tickets.filter(ticket => {
          const meta = getTicketStatusMeta(ticket);
          const statusKey =
            meta.className === "status-valid" ? "valid" :
            meta.className === "status-used" ? "used" :
            "invalid";

          const ownerKey = ticket.isBuyerTicket === true ? "buyer" : "shared";

          if (f !== "all" && f !== statusKey) return false;
          if (of !== "all" && of !== ownerKey) return false;

          if (!q) return true;

          const hay = [
            ticket.eventTitle,
            ticket.ticketTypeName,
            ticket.seatLabel,
            ticket.sectionName,
            ticket.sectionId,
            ticket.areaName,
            ticket.floorName,
            ticket.id,
            ticket.orderId,
            ticket.email,
            ticket.holderName,
            ticket.name,
            ticket.buyerEmail,
            ticket.accessCodeType,
            ticket.accessCodeName
          ].map(lower).join(" ");

          return hay.includes(q);
        });

        renderTicketGrid(filtered);
      }

      searchInput.addEventListener("input", paint);
      statusFilter.addEventListener("change", paint);
      ownershipFilter.addEventListener("change", paint);

      paint();
    }

    async function loadTickets(uid){
      const q = query(
        collectionGroup(db, "tickets"),
        where("uid", "==", uid)
      );

      const snap = await getDocs(q);
      const rows = [];

      snap.forEach(docSnap => {
        const data = docSnap.data() || {};
        rows.push({
          id: docSnap.id,
          ...data
        });
      });

      ticketCache = sortTickets(rows);
      renderTickets(ticketCache);
    }

    function goLogin(){
      const redirect = encodeURIComponent(location.href);
      location.href = `login.html?redirect=${redirect}`;
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        accountBtn.href = "login.html";
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      updateAccountLinks(currentUser);

      if (!user){
        goLogin();
        return;
      }

      document.body.classList.remove("auth-pending");
      heroUserText.textContent = `登入帳號：${user.email || user.uid}`;
      app.className = "loading";
      app.innerHTML = "載入中…";

      try {
        await loadTickets(user.uid);
      } catch (e) {
        console.error(e);
        app.className = "empty";
        app.innerHTML = "票券載入失敗，請稍後再試。";
      }
    });
  </script>
</body>
</html>
