<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜活動管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b)*1.5);
      --btn-h:46px;
      --btn-fs:16px;
      --r:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      max-width:1080px;
      margin:0 auto;
      padding:48px 16px;
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }

    h2{
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    h3{
      margin:0;
      font-size:14px;
      font-weight:900;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .small{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }

    label{
      font-weight:900;
      display:block;
      margin:12px 0 6px;
    }

    input[type="text"],
    input[type="number"],
    input[type="datetime-local"],
    input[type="file"],
    textarea,
    select{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:var(--btn-h);
      padding:var(--btn-a) var(--btn-x);
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:900;
      font-size:var(--btn-fs);
      cursor:pointer;
      color:#111;
      text-decoration:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }

    .btn:hover{
      box-shadow:0 10px 22px rgba(0,0,0,.08);
      transform:translateY(-1px);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-danger{
      border-color:rgba(239,68,68,.35);
      color:#b91c1c;
      background:#fff;
    }

    .btn-sm{
      height:40px;
      padding:8px calc(var(--btn-b)*1.25);
      font-size:15px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .grid3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    @media (max-width:860px){
      .grid,
      .grid3{
        grid-template-columns:1fr;
      }
    }

    .box{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .pill{
      display:inline-flex;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:13px;
      background:#fff;
    }

    .warn{
      color:#b91c1c;
      font-weight:900;
    }

    .ok{
      color:#166534;
      font-weight:900;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .item-title{
      font-weight:900;
    }

    .item-meta{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      word-break:break-word;
    }

    .right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:16px 0;
    }

    .modeCardWrap{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width:720px){
      .modeCardWrap{
        grid-template-columns:1fr;
      }
    }

    .modeCard{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .modeCard:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .modeCard.active{
      border-color:#111;
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .modeTitle{
      font-size:16px;
      font-weight:900;
    }

    .promoItem,
    .gateItem,
    .ticketItem{
      border:1px dashed var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
      margin-top:10px;
    }

    .promoTop,
    .gateTop,
    .ticketTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .switchRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .hidden{
      display:none !important;
    }

    .inline-editor-host{
      margin-top:12px;
    }

    .quick-links{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .page{
      opacity:0;
      transform:translateY(6px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .page.on{
      opacity:1;
      transform:translateY(0);
    }

    .page.leaving{
      opacity:0;
      transform:translateY(6px);
    }

    .image-preview-wrap{
      margin-top:12px;
    }

    .image-preview-box{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:12px;
      overflow:hidden;
    }

    .image-preview-box img{
      width:100%;
      max-height:240px;
      object-fit:cover;
      border-radius:12px;
      display:block;
      background:#f3f4f6;
    }

    .image-empty{
      border:1px dashed var(--line);
      border-radius:12px;
      min-height:140px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:13px;
      background:#fafafa;
      text-align:center;
      padding:16px;
      line-height:1.8;
    }

    .cover-thumb{
      margin-top:10px;
      width:120px;
      height:72px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#f3f4f6;
    }

    .cover-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .codeBindList{
      display:grid;
      gap:8px;
      margin-top:8px;
    }

    .checkLine{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-height:36px;
    }

    .checkLine input[type="checkbox"]{
      width:18px;
      height:18px;
      margin:0;
      flex:0 0 auto;
    }
  </style>
</head>

<body>
  <div class="wrap page" id="pageRoot">
    <div id="gate" class="section"></div>

    <div id="app" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>活動管理</h1>
            <div class="sub">建立活動、票種、公關代碼與出入口設定。</div>
            <div class="sub small">
              登入：<span id="who" class="mono">-</span>｜
              身分：<span id="roleText" class="mono">-</span>
            </div>
          </div>

          <div class="row" style="justify-content:flex-end;">
            <a class="btn btn-sm" href="dashboard.html">回主選單</a>
            <button class="btn btn-sm" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="modeCardWrap">
          <div class="modeCard active" id="openCreateMode">
            <div class="modeTitle">建立活動</div>
            <div class="sub">新增活動與基本內容。</div>
          </div>

          <div class="modeCard" id="openManageMode">
            <div class="modeTitle">管理活動</div>
            <div class="sub">查看、編輯與刪除既有活動。</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="grid">
          <div>
            <label>目前可管理範圍</label>
            <div class="box">
              <div>校園：<span id="mySchoolText" class="mono">-</span></div>
              <div style="margin-top:8px;">組織：<span id="myOrgText" class="mono">-</span></div>
            </div>
          </div>

          <div>
            <label>目前帳號</label>
            <div class="box">
              <div>身分：<span id="creatorRoleText" class="mono">-</span></div>
              <div style="margin-top:8px;">校園：<span id="creatorSchoolText" class="mono">-</span></div>
              <div style="margin-top:8px;">組織：<span id="creatorOrgText" class="mono">-</span></div>
            </div>
          </div>
        </div>
      </div>

      <div id="editorHome"></div>

      <div class="section" id="editorSection">
        <div class="row" style="justify-content:space-between;">
          <div>
            <h2>活動內容</h2>
            <div class="sub small" id="editingHint">目前：<span class="mono">新增模式</span></div>
          </div>
          <div class="row">
            <button class="btn btn-sm" id="reloadBtn">重新載入</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="grid3">
          <div>
            <label style="margin-top:0;">活動類型</label>
            <select id="publishScope">
              <option value="school">校園活動</option>
              <option value="platform">平台活動</option>
            </select>
          </div>

          <div>
            <label style="margin-top:0;">主辦單位</label>
            <select id="ownerSchoolSel"></select>
            <div class="small" id="ownerHint" style="margin-top:8px;">-</div>
          </div>

          <div>
            <label style="margin-top:0;">審核狀態</label>
            <select id="approvalStatus">
              <option value="pending">審核中</option>
              <option value="approved">已通過</option>
              <option value="rejected">未通過</option>
            </select>
            <div class="small" id="approvalHint" style="margin-top:8px;">-</div>
          </div>
        </div>

        <div class="grid" style="margin-top:12px;">
          <div>
            <label>活動名稱</label>
            <input id="title" type="text" placeholder="例如：校園演唱會" />

            <label>活動地點</label>
            <input id="location" type="text" placeholder="例如：活動中心" />

            <label>活動圖片上傳</label>
            <input id="coverImageFile" type="file" accept="image/*" />
            <div class="small">支援 JPG / PNG / WEBP，建議 5MB 以下</div>

            <div class="image-preview-wrap">
              <div class="small" style="font-weight:900; color:#111; margin-bottom:6px;">圖片預覽</div>
              <div class="image-preview-box" id="coverPreviewBox">
                <div class="image-empty">目前沒有活動圖片</div>
              </div>
            </div>

            <label>活動說明</label>
            <textarea id="description" placeholder="請輸入活動介紹"></textarea>
          </div>

          <div>
            <label>是否公開</label>
            <select id="published">
              <option value="false">不公開</option>
              <option value="true">公開</option>
            </select>

            <label>名額</label>
            <input id="capacity" type="number" min="0" placeholder="例如：500" />
          </div>
        </div>

        <div class="grid" style="margin-top:12px;">
          <div>
            <label>開放時間</label>
            <input id="saleStartAt" type="datetime-local" />

            <label>截止時間</label>
            <input id="saleEndAt" type="datetime-local" />
          </div>

          <div>
            <label>活動開始時間</label>
            <input id="eventStartAt" type="datetime-local" />

            <label>活動結束時間</label>
            <input id="eventEndAt" type="datetime-local" />
          </div>
        </div>

        <div class="divider"></div>

        <h2>公關代碼</h2>

        <div class="box" style="margin-top:12px;">
          <div class="switchRow">
            <span class="pill">公關代碼功能</span>
            <select id="promoCodeEnabled" style="max-width:220px;">
              <option value="false">關閉</option>
              <option value="true">開啟</option>
            </select>
          </div>
        </div>

        <div style="margin-top:12px;">
          <div class="row" style="justify-content:space-between;">
            <label style="margin:0;">公關代碼清單</label>
            <button class="btn btn-sm" id="addPromoBtn" type="button">＋新增公關代碼</button>
          </div>
          <div id="promoList"></div>
        </div>

        <div class="divider"></div>

        <h2>票種設定</h2>
        <div class="sub" style="margin-top:8px;">
          可設定一般票、公關票、不同價格、不同限制，以及哪些公關代碼可以買哪種票。
        </div>

        <div style="margin-top:12px;">
          <div class="row" style="justify-content:space-between;">
            <label style="margin:0;">票種清單</label>
            <button class="btn btn-sm" id="addTicketBtn" type="button">＋新增票種</button>
          </div>
          <div id="ticketList"></div>
        </div>

        <div class="divider"></div>

        <h2>出入口</h2>

        <div style="margin-top:12px;">
          <div class="row" style="justify-content:space-between;">
            <label style="margin:0;">出入口清單</label>
            <button class="btn btn-sm" id="addGateBtn" type="button">＋新增出入口</button>
          </div>
          <div id="gateAssignList"></div>
        </div>

        <div class="row" style="justify-content:flex-end; margin-top:12px;">
          <button class="btn" id="resetBtn">清空 / 取消編輯</button>
          <button class="btn btn-primary" id="saveBtn" disabled>儲存</button>
        </div>

        <div class="small" id="editorMsg" style="margin-top:10px;"></div>
      </div>

      <div class="section hidden" id="manageSection">
        <h2>活動清單</h2>
        <div class="list" id="list"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

  <script>
    const pageRoot = document.getElementById("pageRoot");
    requestAnimationFrame(() => pageRoot.classList.add("on"));

    function go(href){
      pageRoot.classList.add("leaving");
      setTimeout(() => location.href = href, 140);
    }

    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http")) return;
      e.preventDefault();
      go(href);
    });

    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e",
        storageBucket: "concert-1ff7e.firebasestorage.app"
      });
    }

    const db = firebase.firestore();
    const storage = firebase.storage();

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const whoEl = document.getElementById("who");
    const roleText = document.getElementById("roleText");
    const logoutBtn = document.getElementById("logoutBtn");

    const mySchoolText = document.getElementById("mySchoolText");
    const myOrgText = document.getElementById("myOrgText");
    const creatorRoleText = document.getElementById("creatorRoleText");
    const creatorSchoolText = document.getElementById("creatorSchoolText");
    const creatorOrgText = document.getElementById("creatorOrgText");
    const reloadBtn = document.getElementById("reloadBtn");

    const openCreateMode = document.getElementById("openCreateMode");
    const openManageMode = document.getElementById("openManageMode");
    const editorHome = document.getElementById("editorHome");
    const editorSection = document.getElementById("editorSection");
    const manageSection = document.getElementById("manageSection");

    const publishScopeEl = document.getElementById("publishScope");
    const ownerSchoolSel = document.getElementById("ownerSchoolSel");
    const ownerHint = document.getElementById("ownerHint");
    const approvalStatusEl = document.getElementById("approvalStatus");
    const approvalHint = document.getElementById("approvalHint");
    const publishedEl = document.getElementById("published");
    const capacityEl = document.getElementById("capacity");

    const titleEl = document.getElementById("title");
    const locationEl = document.getElementById("location");
    const coverImageFileEl = document.getElementById("coverImageFile");
    const coverPreviewBox = document.getElementById("coverPreviewBox");
    const descriptionEl = document.getElementById("description");

    const saleStartAtEl = document.getElementById("saleStartAt");
    const saleEndAtEl = document.getElementById("saleEndAt");
    const eventStartAtEl = document.getElementById("eventStartAt");
    const eventEndAtEl = document.getElementById("eventEndAt");

    const promoCodeEnabledEl = document.getElementById("promoCodeEnabled");
    const addPromoBtn = document.getElementById("addPromoBtn");
    const promoList = document.getElementById("promoList");

    const addTicketBtn = document.getElementById("addTicketBtn");
    const ticketList = document.getElementById("ticketList");

    const addGateBtn = document.getElementById("addGateBtn");
    const gateAssignList = document.getElementById("gateAssignList");

    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const editorMsg = document.getElementById("editorMsg");
    const editingHint = document.getElementById("editingHint");

    const listEl = document.getElementById("list");

    let currentUser = null;
    let currentRole = "";
    let userData = null;
    let mySchoolId = "";
    let myOrgId = "";
    let editingId = "";
    let currentView = "create";

    let schoolNameMap = {};
    let orgNameMap = {};
    let existingCoverImage = "";
    let selectedCoverFile = null;

    let promoCodesState = [];
    let ticketTypesState = [];
    let gateAssignmentsState = [];

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(v){
      return String(v ?? "").trim();
    }

    function showGate(html){
      gate.innerHTML = html;
      gate.style.display = "block";
      app.style.display = "none";
    }

    function renderCoverPreview(url){
      const value = norm(url);
      if (!value) {
        coverPreviewBox.innerHTML = `<div class="image-empty">目前沒有活動圖片</div>`;
        return;
      }

      coverPreviewBox.innerHTML = `
        <img
          src="${esc(value)}"
          alt="活動圖片預覽"
          onerror="this.outerHTML='<div class=&quot;image-empty&quot;>圖片載入失敗，請重新選擇圖片</div>';"
        />
      `;
    }

    function previewLocalFile(file){
      if (!file) {
        renderCoverPreview(existingCoverImage);
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        renderCoverPreview(e.target.result || "");
      };
      reader.readAsDataURL(file);
    }

    async function uploadCoverImage(file){
      if (!file) return "";

      if (file.size > 5 * 1024 * 1024) {
        throw new Error("圖片不能超過 5MB");
      }

      const safeName = String(file.name || "image").replace(/[^\w.\-]+/g, "_");
      const filePath = `events/${Date.now()}_${safeName}`;
      const ref = storage.ref().child(filePath);

      await ref.put(file);
      return await ref.getDownloadURL();
    }

    async function doLogout(){
      try{
        await firebase.auth().signOut();
      }catch(e){
        console.error(e);
        alert("登出失敗");
      }
    }

    logoutBtn.onclick = doLogout;

    async function loadUserRole(uid){
      const doc = await db.collection("users").doc(uid).get();
      if (!doc.exists) return { ok:false, reason:"尚未授權" };

      const u = doc.data() || {};
      if (u.enabled !== true) return { ok:false, reason:"帳號已停用" };

      return {
        ok:true,
        role:String(u.role || "").trim(),
        userData:u
      };
    }

    function isPlatform(){
      return currentRole === "platform_super" || currentRole === "platform_admin";
    }

    function isPlatformSuper(){
      return currentRole === "platform_super";
    }

    function isOrgRole(){
      return ["org_super", "org_admin", "org_staff"].includes(currentRole);
    }

    function toInputDateTime(ts){
      if (!ts) return "";
      const d = ts.toDate ? ts.toDate() : (ts instanceof Date ? ts : null);
      if (!d) return "";

      const pad = n => String(n).padStart(2, "0");
      const yyyy = d.getFullYear();
      const mm = pad(d.getMonth() + 1);
      const dd = pad(d.getDate());
      const hh = pad(d.getHours());
      const mi = pad(d.getMinutes());

      return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
    }

    function parseInputDateTime(v){
      const s = norm(v);
      if (!s) return null;
      const d = new Date(s);
      if (isNaN(d.getTime())) return null;
      return d;
    }

    function randomPromoCode(length = 8){
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let out = "";
      for (let i = 0; i < length; i++){
        out += chars[Math.floor(Math.random() * chars.length)];
      }
      return out;
    }

    function normalizePromoItem(x){
      const mode = norm(x.mode) === "random" ? "random" : "manual";
      const randomLength = Math.max(4, Math.min(20, Number(x.randomLength || 8) || 8));

      return {
        id: norm(x.id || `promo_${Date.now()}_${Math.random().toString(36).slice(2,7)}`),
        code: norm(x.code || ""),
        note: norm(x.note || ""),
        enabled: x.enabled === true,
        mode,
        randomLength,
        maxUses: Math.max(0, Number(x.maxUses || 0) || 0),
        usedCount: Math.max(0, Number(x.usedCount || 0) || 0)
      };
    }

    function normalizeTicketTypeItem(x){
      return {
        id: norm(x.id || `ticket_${Date.now()}_${Math.random().toString(36).slice(2,7)}`),
        name: norm(x.name || ""),
        description: norm(x.description || ""),
        price: Math.max(0, Number(x.price || 0) || 0),
        maxPerOrder: Math.max(1, Number(x.maxPerOrder || 1) || 1),
        enabled: x.enabled !== false,
        visibility: norm(x.visibility || "public"),
        requiresSeat: x.requiresSeat === true,
        promoCodeIds: Array.isArray(x.promoCodeIds) ? x.promoCodeIds.map(v => norm(v)).filter(Boolean) : []
      };
    }

    function buildGateAssignmentsPayload(){
      return gateAssignmentsState
        .map(item => ({
          name: norm(item.name || "")
        }))
        .filter(item => item.name);
    }

    function buildPromoCodesPayload(){
      const cleaned = promoCodesState
        .map(normalizePromoItem)
        .filter(item => item.code);

      const unique = [];
      const seenId = new Set();
      const seenCode = new Set();

      for (const item of cleaned) {
        const idKey = item.id.toLowerCase();
        const codeKey = item.code.toLowerCase();
        if (seenId.has(idKey) || seenCode.has(codeKey)) continue;
        seenId.add(idKey);
        seenCode.add(codeKey);
        unique.push(item);
      }

      return unique;
    }

    function buildTicketTypesPayload(){
      const promoIds = new Set(buildPromoCodesPayload().map(item => item.id));

      return ticketTypesState
        .map(normalizeTicketTypeItem)
        .filter(item => item.name && item.id)
        .map(item => ({
          ...item,
          promoCodeIds: item.promoCodeIds.filter(id => promoIds.has(id))
        }));
    }

    window.updatePromoCode = (idx, key, value) => {
      if (!promoCodesState[idx]) return;

      if (key === "enabled") {
        promoCodesState[idx][key] = value === "true";
      } else if (key === "maxUses" || key === "usedCount" || key === "randomLength") {
        promoCodesState[idx][key] = Number(value || 0);
      } else if (key === "mode") {
        promoCodesState[idx].mode = value === "random" ? "random" : "manual";
        if (promoCodesState[idx].mode === "random") {
          const len = Math.max(4, Math.min(20, Number(promoCodesState[idx].randomLength || 8) || 8));
          promoCodesState[idx].randomLength = len;
          promoCodesState[idx].code = randomPromoCode(len);
        }
        renderPromoCodes();
        renderTicketTypes();
        return;
      } else {
        promoCodesState[idx][key] = value;
      }

      if (key === "randomLength") {
        const len = Math.max(4, Math.min(20, Number(promoCodesState[idx].randomLength || 8) || 8));
        promoCodesState[idx].randomLength = len;
      }
    };

    window.removePromoCode = idx => {
      const removed = promoCodesState[idx];
      promoCodesState.splice(idx, 1);

      if (removed?.id) {
        ticketTypesState = ticketTypesState.map(ticket => {
          const item = normalizeTicketTypeItem(ticket);
          item.promoCodeIds = item.promoCodeIds.filter(id => id !== removed.id);
          return item;
        });
      }

      renderPromoCodes();
      renderTicketTypes();
    };

    window.regeneratePromoCode = idx => {
      if (!promoCodesState[idx]) return;
      const len = Math.max(4, Math.min(20, Number(promoCodesState[idx].randomLength || 8) || 8));
      promoCodesState[idx].code = randomPromoCode(len);
      renderPromoCodes();
    };

    window.updateTicketType = (idx, key, value) => {
      if (!ticketTypesState[idx]) return;

      if (key === "enabled" || key === "requiresSeat") {
        ticketTypesState[idx][key] = value === "true";
      } else if (key === "price" || key === "maxPerOrder") {
        ticketTypesState[idx][key] = Number(value || 0);
      } else {
        ticketTypesState[idx][key] = value;
      }

      if (key === "visibility" && value !== "promo") {
        ticketTypesState[idx].promoCodeIds = [];
      }

      renderTicketTypes();
    };

    window.removeTicketType = idx => {
      ticketTypesState.splice(idx, 1);
      renderTicketTypes();
    };

    window.toggleTicketPromoBind = (ticketIdx, promoId, checked) => {
      const item = normalizeTicketTypeItem(ticketTypesState[ticketIdx] || {});
      const set = new Set(item.promoCodeIds || []);

      if (checked) set.add(promoId);
      else set.delete(promoId);

      item.promoCodeIds = [...set];
      ticketTypesState[ticketIdx] = item;
    };

    window.updateGateAssign = (idx, key, value) => {
      if (!gateAssignmentsState[idx]) return;
      gateAssignmentsState[idx][key] = value;
    };

    window.removeGateAssign = idx => {
      gateAssignmentsState.splice(idx, 1);
      renderGateAssignments();
    };

    async function loadEvents(){
      listEl.innerHTML = `<div class="small">載入中…</div>`;

      let docs = [];

      if (isPlatform()) {
        const snap = await db.collection("events")
          .orderBy("createdAt", "desc")
          .limit(50)
          .get();

        docs = snap.docs;
      } else {
        const snap = await db.collection("events")
          .where("ownerSchoolId", "==", mySchoolId)
          .limit(100)
          .get();

        docs = snap.docs.sort((a, b) => {
          const ta = a.data()?.createdAt?.toDate ? a.data().createdAt.toDate().getTime() : 0;
          const tb = b.data()?.createdAt?.toDate ? b.data().createdAt.toDate().getTime() : 0;
          return tb - ta;
        });
      }

      if (!docs.length) {
        listEl.innerHTML = `<div class="small">目前沒有活動</div>`;
        moveEditorHome(false);
        return;
      }

      listEl.innerHTML = docs.map(doc => {
        const e = doc.data() || {};
        const id = doc.id;

        const title = e.title || "(未命名)";
        const owner = e.ownerSchoolId || "-";
        const published = e.published === true;
        const approvalStatus = getApprovalText(e.approvalStatus || "pending");
        const saleStart = toInputDateTime(e.saleStartAt);
        const saleEnd = toInputDateTime(e.saleEndAt);
        const eventStart = toInputDateTime(e.eventStartAt);
        const promoEnabled = e.promoCodeEnabled === true;
        const promoCount = Array.isArray(e.promoCodes) ? e.promoCodes.length : 0;
        const ticketCount = Array.isArray(e.ticketTypes) ? e.ticketTypes.length : 0;
        const gateCount = Array.isArray(e.gates) ? e.gates.length : 0;
        const coverImage = norm(e.coverImage || "");

        const tag = owner === "__global__"
          ? `<span class="pill">平台活動</span>`
          : `<span class="pill">校園活動</span>`;

        return `
          <div class="item" id="eventItem-${id}">
            <div class="item-top">
              <div style="min-width:0;">
                <div class="item-title">${esc(title)} ${tag}</div>
                <div class="item-meta">
                  主辦單位：<span class="mono">${esc(formatSchoolLabel(owner))}</span><br>
                  審核狀態：<span class="mono">${esc(approvalStatus)}</span>｜
                  公開：<span class="mono">${published ? "是" : "否"}</span><br>
                  圖片：<span class="mono">${coverImage ? "已設定" : "未設定"}</span><br>
                  開放時間：<span class="mono">${esc(saleStart || "-")}</span> ～ <span class="mono">${esc(saleEnd || "-")}</span><br>
                  活動時間：<span class="mono">${esc(eventStart || "-")}</span><br>
                  公關代碼：<span class="mono">${promoEnabled ? "開啟" : "關閉"}</span>｜
                  數量：<span class="mono">${promoCount}</span><br>
                  票種數量：<span class="mono">${ticketCount}</span>｜
                  出入口數量：<span class="mono">${gateCount}</span>
                </div>

                ${
                  coverImage
                    ? `<div class="cover-thumb"><img src="${esc(coverImage)}" alt="活動縮圖" /></div>`
                    : ``
                }

                <div class="quick-links">
                  <a class="btn btn-sm" href="admin-event-detail.html?eventId=${encodeURIComponent(id)}">活動詳情</a>
                  <a class="btn btn-sm" href="admin-staff-assign.html?eventId=${encodeURIComponent(id)}">工作人員指派</a>
                </div>
              </div>

              <div class="right">
                <button class="btn btn-sm" onclick="editEvent('${esc(id)}')">編輯</button>
                ${isPlatformSuper() ? `<button class="btn btn-sm btn-danger" onclick="deleteEvent('${esc(id)}','${esc(title)}')">刪除</button>` : ``}
              </div>
            </div>

            <div id="inlineEditorHost-${id}" class="inline-editor-host"></div>
          </div>
        `;
      }).join("");

      if (currentView === "manage" && editingId) {
        mountEditorInItem(editingId);
      } else if (currentView === "manage") {
        moveEditorHome(false);
      }
    }

    reloadBtn.onclick = async () => {
      resetEditor();
      if (currentView === "manage") {
        await loadEvents();
      }
    };

    window.editEvent = async eventId => {
      try {
        const doc = await db.collection("events").doc(eventId).get();
        if (!doc.exists) {
          alert("找不到活動");
          return;
        }

        const e = doc.data() || {};
        editingId = eventId;
        existingCoverImage = norm(e.coverImage || "");
        selectedCoverFile = null;
        coverImageFileEl.value = "";

        editingHint.innerHTML = `目前：<span class="mono">編輯模式</span>`;

        titleEl.value = e.title || "";
        locationEl.value = e.location || "";
        descriptionEl.value = e.description || "";
        publishedEl.value = e.published === true ? "true" : "false";
        approvalStatusEl.value = e.approvalStatus || "pending";
        capacityEl.value = (e.capacity ?? "") === "" ? "" : String(e.capacity ?? "");

        saleStartAtEl.value = toInputDateTime(e.saleStartAt);
        saleEndAtEl.value = toInputDateTime(e.saleEndAt);
        eventStartAtEl.value = toInputDateTime(e.eventStartAt);
        eventEndAtEl.value = toInputDateTime(e.eventEndAt);

        promoCodeEnabledEl.value = e.promoCodeEnabled === true ? "true" : "false";
        promoCodesState = Array.isArray(e.promoCodes)
          ? e.promoCodes.map(item => normalizePromoItem(item))
          : [];
        renderPromoCodes();

        ticketTypesState = Array.isArray(e.ticketTypes)
          ? e.ticketTypes.map(item => normalizeTicketTypeItem(item))
          : [];
        renderTicketTypes();

        gateAssignmentsState = Array.isArray(e.gates)
          ? e.gates.map(item => ({
              name: norm(item.name || "")
            }))
          : [];
        renderGateAssignments();

        renderCoverPreview(existingCoverImage);

        const owner = String(e.ownerSchoolId || "");
        publishScopeEl.value = owner === "__global__" ? "platform" : "school";

        refreshApprovalStatusState();
        refreshOwnerSelectState();

        if (publishScopeEl.value === "school") {
          ownerSchoolSel.value = owner || mySchoolId || ownerSchoolSel.value;
        }

        setEditorMessage(`<span class="ok">已載入活動資料</span>`);
        updateSaveBtn();

        setPageMode("manage");
        await loadEvents();
        mountEditorInItem(eventId);

        const targetItem = document.getElementById(`eventItem-${eventId}`);
        if (targetItem) {
          targetItem.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      } catch (err) {
        console.error(err);
        alert("載入失敗");
      }
    };

    window.deleteEvent = async (eventId, title) => {
      const ok = confirm(`確定要刪除活動「${title}」嗎？`);
      if (!ok) return;

      try {
        await db.collection("events").doc(eventId).delete();
        resetEditor();
        await loadEvents();
        alert("已刪除");
      } catch (err) {
        console.error(err);
        alert("刪除失敗");
      }
    };

    async function saveEvent(){
      const isEditing = !!editingId;

      saveBtn.disabled = true;
      const oldText = saveBtn.textContent;
      saveBtn.textContent = "儲存中…";
      setEditorMessage("");

      try {
        const title = norm(titleEl.value);
        const ownerSchoolId = getScopeOwnerSchoolId();
        const publishScope = publishScopeEl.value;
        const promoCodes = buildPromoCodesPayload();
        const ticketTypes = buildTicketTypesPayload();
        const gates = buildGateAssignmentsPayload();

        if (!title) throw new Error("請輸入活動名稱");
        if (!ownerSchoolId) throw new Error("請選擇主辦單位");

        if (!isPlatform() && publishScope === "platform") {
          throw new Error("目前無法建立平台活動");
        }

        if (isOrgRole() && publishScope === "school" && ownerSchoolId !== mySchoolId) {
          throw new Error("目前只能建立自己的校園活動");
        }

        if (ticketTypes.some(item => item.visibility === "promo") && promoCodes.length === 0) {
          throw new Error("你有設定公關限定票種，但目前沒有任何公關代碼");
        }

        let finalCoverImage = existingCoverImage;

        if (selectedCoverFile) {
          finalCoverImage = await uploadCoverImage(selectedCoverFile);
        }

        const payload = {
          title,
          ownerSchoolId,
          publishScope,
          approvalStatus: isPlatform() ? approvalStatusEl.value : "pending",
          published: publishedEl.value === "true",
          location: norm(locationEl.value),
          coverImage: norm(finalCoverImage),
          description: norm(descriptionEl.value),
          capacity: capacityEl.value === "" ? null : Number(capacityEl.value),

          saleStartAt: parseInputDateTime(saleStartAtEl.value),
          saleEndAt: parseInputDateTime(saleEndAtEl.value),
          eventStartAt: parseInputDateTime(eventStartAtEl.value),
          eventEndAt: parseInputDateTime(eventEndAtEl.value),

          promoCodeEnabled: promoCodeEnabledEl.value === "true",
          promoCodes,
          ticketTypes,
          gates,

          creatorRole: currentRole || "",
          creatorSchoolId: mySchoolId || "",
          creatorOrgId: myOrgId || "",

          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""
        };

        Object.keys(payload).forEach(key => {
          if (payload[key] === null) delete payload[key];
        });

        if (!editingId) {
          payload.createdAt = new Date();
          payload.createdBy = currentUser ? currentUser.uid : "";
          await db.collection("events").add(payload);
        } else {
          await db.collection("events").doc(editingId).update(payload);
        }

        if (isEditing) {
          setEditorMessage(`<span class="ok">更新成功</span>`);
          resetEditor();
          setPageMode("manage");
          await loadEvents();
        } else {
          setEditorMessage(`<span class="ok">建立成功</span>`);
          resetEditor();
          setPageMode("create");
        }
      } catch (err) {
        console.error(err);
        alert(err.message || "儲存失敗");
      } finally {
        saveBtn.textContent = oldText;
        updateSaveBtn();
      }
    }

    publishScopeEl.addEventListener("change", refreshOwnerSelectState);
    saveBtn.onclick = saveEvent;

    [titleEl, ownerSchoolSel].forEach(el => {
      el.addEventListener("input", updateSaveBtn);
      el.addEventListener("change", updateSaveBtn);
    });

    coverImageFileEl.addEventListener("change", () => {
      const file = coverImageFileEl.files && coverImageFileEl.files[0]
        ? coverImageFileEl.files[0]
        : null;

      selectedCoverFile = file || null;
      previewLocalFile(selectedCoverFile);
    });

    ownerSchoolSel.addEventListener("change", updateSaveBtn);

    resetBtn.onclick = async () => {
      const wasManage = currentView === "manage";
      resetEditor();

      if (wasManage) {
        await loadEvents();
      }
    };

    firebase.auth().onAuthStateChanged(async user => {
      currentUser = user || null;

      if (!user) {
        showGate(`
          <h1>活動管理</h1>
          <div class="sub">請先使用 Email / 密碼登入後台。</div>
          <div style="margin-top:16px;">
            <button class="btn btn-primary" id="loginBtn">使用 Email 登入</button>
          </div>
        `);

        document.getElementById("loginBtn").onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
        return;
      }

      try {
        const result = await loadUserRole(user.uid);

        if (!result.ok) {
          showGate(`
            <h1>無法進入</h1>
            <div class="sub warn">${esc(result.reason)}</div>
            <div style="margin-top:16px;">
              <button class="btn" id="outBtn">登出</button>
            </div>
          `);

          document.getElementById("outBtn").onclick = doLogout;
          return;
        }

        currentRole = result.role;
        userData = result.userData || {};
        mySchoolId = norm(userData.schoolId || userData.orgSchoolId || "");
        myOrgId = norm(userData.orgId || "");

        whoEl.textContent = user.email || "";
        roleText.textContent = currentRole || "-";
        mySchoolText.textContent = formatSchoolLabel(mySchoolId);
        myOrgText.textContent = formatOrgLabel(myOrgId);
        creatorRoleText.textContent = currentRole || "-";

        const allowed = ["platform_super", "platform_admin", "org_super", "org_admin"];
        if (!allowed.includes(currentRole)) {
          showGate(`
            <h1>權限不足</h1>
            <div class="sub warn">你的角色無法使用此功能。</div>
            <div style="margin-top:16px;">
              <button class="btn" id="outBtn">登出</button>
            </div>
          `);

          document.getElementById("outBtn").onclick = doLogout;
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";

        await loadNameMaps();

        mySchoolText.textContent = formatSchoolLabel(mySchoolId);
        myOrgText.textContent = formatOrgLabel(myOrgId);
        creatorSchoolText.textContent = formatSchoolLabel(mySchoolId);
        creatorOrgText.textContent = formatOrgLabel(myOrgId);

        await loadOwnerSchoolOptions();
        setPageMode("create");
        resetEditor();
      } catch (err) {
        console.error(err);
        showGate(`
          <h1>發生錯誤</h1>
          <div class="sub warn">無法讀取資料，請稍後再試。</div>
          <div style="margin-top:16px;">
            <button class="btn" id="outBtn">登出</button>
          </div>
        `);

        document.getElementById("outBtn").onclick = doLogout;
      }
    });
  </script>
</body>
</html>
