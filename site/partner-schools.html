<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜特約校園管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f5f5f7;
      --card:rgba(255,255,255,.92);
      --card-strong:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 18px 44px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.045);
      --danger:#b91c1c;
      --danger-bg:#fff1f2;
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --max:1100px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    button,input,textarea{
      font:inherit;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:30px 20px 64px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      margin-bottom:20px;
      padding:28px 26px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:34px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.95), rgba(255,255,255,.88) 42%, rgba(255,255,255,.82) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      box-shadow:0 24px 60px rgba(0,0,0,.06);
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-72px;
      top:-72px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.04), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .hero-title{
      margin:0;
      font-size:clamp(30px,4.4vw,48px);
      line-height:1.04;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:13px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }

    .panel{
      margin-bottom:18px;
      padding:18px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:saturate(180%) blur(18px);
    }

    .panel-title{
      margin:0;
      font-size:22px;
      line-height:1.2;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
      box-shadow:var(--shadow-soft);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 26px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-danger{
      color:#fff;
      background:var(--danger);
      border-color:var(--danger);
    }

    .btn-sm{
      min-height:40px;
      padding:8px 14px;
      font-size:13px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:16px;
    }

    label{
      display:block;
      margin:14px 0 8px;
      font-size:13px;
      font-weight:800;
      color:#111;
    }

    input[type="text"],
    textarea{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111;
      font-size:15px;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    textarea{
      min-height:132px;
      resize:vertical;
    }

    input[type="text"]:focus,
    textarea:focus{
      border-color:rgba(0,0,0,.24);
      box-shadow:0 0 0 4px rgba(0,0,0,.04);
    }

    .form-box{
      border:1px solid rgba(0,0,0,.06);
      border-radius:20px;
      background:#fff;
      padding:14px;
      box-shadow:var(--shadow-soft);
    }

    .switch{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
      font-size:14px;
      line-height:1.6;
    }

    .switch:first-child{ margin-top:0; }

    .switch input{
      width:18px;
      height:18px;
      margin:0;
      flex:0 0 auto;
    }

    .form-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .list{
      display:grid;
      gap:14px;
      margin-top:12px;
    }

    .item{
      border:1px solid rgba(0,0,0,.06);
      border-radius:26px;
      background:var(--card-strong);
      padding:18px;
      box-shadow:var(--shadow-soft);
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .item-left{
      display:flex;
      align-items:flex-start;
      gap:14px;
      min-width:0;
      flex:1;
    }

    .logo{
      width:52px;
      height:52px;
      flex:0 0 auto;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      object-fit:cover;
      box-shadow:var(--shadow-soft);
    }

    .logo-fallback{
      width:52px;
      height:52px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .item-name{
      margin:0;
      font-size:22px;
      line-height:1.15;
      font-weight:800;
      letter-spacing:-.02em;
      word-break:break-word;
    }

    .item-meta{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .badge-green{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.12);
      box-shadow:none;
    }

    .badge-orange{
      background:var(--orange-bg);
      color:var(--orange);
      border-color:rgba(194,65,12,.12);
      box-shadow:none;
    }

    .badge-gray{
      background:var(--gray-bg);
      color:var(--gray);
      border-color:rgba(107,114,128,.12);
      box-shadow:none;
    }

    .badge-blue{
      background:var(--blue-bg);
      color:var(--blue);
      border-color:rgba(29,78,216,.12);
      box-shadow:none;
    }

    .right-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:flex-start;
      gap:10px;
    }

    .edit-panel{
      display:none;
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid rgba(0,0,0,.06);
    }

    .edit-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:16px;
      margin-top:8px;
    }

    .helper-note{
      margin-top:12px;
      padding:12px 14px;
      border:1px solid rgba(29,78,216,.12);
      border-radius:16px;
      background:var(--blue-bg);
      color:var(--blue);
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .gate-box{
      max-width:420px;
      margin:72px auto 0;
      padding:24px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      background:#fff;
      box-shadow:var(--shadow);
    }

    .gate-title{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.12;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .gate-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
      white-space:pre-wrap;
    }

    .form-stack{
      display:grid;
      gap:10px;
      margin-top:16px;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111;
      font-size:15px;
      outline:none;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:860px){
      .form-grid,
      .edit-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:720px){
      .page{
        padding:20px 14px 52px;
      }

      .hero{
        padding:24px 18px;
        border-radius:28px;
      }

      .panel{
        border-radius:24px;
        padding:16px;
      }

      .item{
        border-radius:22px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div id="loginGate"></div>

    <div id="adminApp" class="hidden">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1 class="hero-title">特約校園管理</h1>
            <div class="hero-sub">管理校園啟用狀態、驗證開放狀態與可用驗證方式。
名單匯入已改由活動管理，不在此頁處理。</div>
            <div class="hero-actions" style="margin-top:16px;">
              <span class="pill mono" id="who">-</span>
            </div>
          </div>

          <div class="hero-actions">
            <a href="dashboard.html" class="btn">回主選單</a>
            <button id="logoutBtn" class="btn" type="button">登出</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">新增校園</h2>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button id="reloadBtn" class="btn" type="button">重新載入</button>
            <button id="addBtn" class="btn btn-primary" type="button" disabled>新增</button>
          </div>
        </div>

        <div id="editorWrap">
          <div class="form-grid">
            <div>
              <label>學校名稱</label>
              <input id="schoolName" type="text" placeholder="請輸入學校名稱" />

              <label>校徽圖片網址</label>
              <input id="schoolLogoUrl" type="text" placeholder="請貼上圖片網址" />

              <label>允許信箱後綴</label>
              <textarea id="allowedEmailDomains" placeholder="每行一個"></textarea>
            </div>

            <div>
              <label>可用方式</label>
              <div class="form-box">
                <div class="switch">
                  <input id="mStudentId" type="checkbox" />
                  <span>學號</span>
                </div>
                <div class="switch">
                  <input id="mGoogle" type="checkbox" />
                  <span>Google</span>
                </div>
              </div>

              <label>校園驗證</label>
              <div class="form-box">
                <div class="switch">
                  <input id="verificationEnabled" type="checkbox" checked />
                  <span>開放校園驗證</span>
                </div>
              </div>

              <div class="helper-note">新增校園時會預設為「校園啟用」。
只有在「校園啟用」且「開放校園驗證」同時成立時，前台才會真的顯示可驗證。</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">校園清單</h2>
        </div>
        <div id="list" class="list"></div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e"
      });
    }

    const db = firebase.firestore();
    const serverTimestamp = firebase.firestore.FieldValue.serverTimestamp;

    const loginGate = document.getElementById("loginGate");
    const adminApp = document.getElementById("adminApp");
    const whoEl = document.getElementById("who");
    const logoutBtn = document.getElementById("logoutBtn");

    const listEl = document.getElementById("list");
    const nameEl = document.getElementById("schoolName");
    const logoEl = document.getElementById("schoolLogoUrl");
    const allowedEmailDomainsEl = document.getElementById("allowedEmailDomains");
    const verificationEnabledEl = document.getElementById("verificationEnabled");
    const reloadBtn = document.getElementById("reloadBtn");
    const addBtn = document.getElementById("addBtn");

    const mStudentId = document.getElementById("mStudentId");
    const mGoogle = document.getElementById("mGoogle");

    let currentRole = "";
    let currentUser = null;

    function esc(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escAttr(str) {
      return esc(str).replaceAll("\n", " ");
    }

    function parseDomains(text) {
      return String(text || "")
        .split("\n")
        .map(v => String(v || "").trim().toLowerCase())
        .filter(Boolean);
    }

    function domainsToText(arr) {
      return Array.isArray(arr) ? arr.join("\n") : "";
    }

    function buildMethodLabels(methods) {
      if (!Array.isArray(methods) || !methods.length) return ["未設定"];
      return methods.map(method => {
        if (method === "student_id") return "學號";
        if (method === "google") return "Google";
        return method;
      });
    }

    function getActualVerificationOpen(school) {
      return school.enabled === true && school.verificationEnabled === true;
    }

    function getSchoolStatusText(enabled) {
      return enabled ? "啟用中" : "已停用";
    }

    async function doLogout() {
      try {
        await firebase.auth().signOut();
      } catch (e) {
        console.error(e);
        alert("登出失敗");
      }
    }

    logoutBtn.addEventListener("click", doLogout);

    function showGate({ title, message, showLogin, showLogout }) {
      loginGate.innerHTML = `
        <div class="gate-box">
          <h1 class="gate-title">${esc(title)}</h1>
          <div class="gate-text">${esc(message)}</div>

          ${
            showLogin ? `
              <div class="form-stack">
                <button class="btn btn-primary" id="gateLoginBtn" type="button">登入</button>
              </div>
            ` : `
              <div style="margin-top:16px;">
                ${showLogout ? `<button class="btn" id="gateLogoutBtn" type="button">登出</button>` : ``}
              </div>
            `
          }
        </div>
      `;

      const gateLoginBtn = document.getElementById("gateLoginBtn");
      if (gateLoginBtn) {
        gateLoginBtn.onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
      }

      const gateLogoutBtn = document.getElementById("gateLogoutBtn");
      if (gateLogoutBtn) {
        gateLogoutBtn.onclick = doLogout;
      }

      loginGate.classList.remove("hidden");
      adminApp.classList.add("hidden");
    }

    function canDelete() {
      return currentRole === "platform_super";
    }

    function canEdit() {
      return currentRole === "platform_super" || currentRole === "platform_admin";
    }

    function updateAddButtonState() {
      const hasName = (nameEl.value || "").trim().length > 0;
      const hasMethod = mStudentId.checked || mGoogle.checked;
      addBtn.disabled = !(hasName && hasMethod && canEdit());
    }

    nameEl.addEventListener("input", updateAddButtonState);
    logoEl.addEventListener("input", updateAddButtonState);
    allowedEmailDomainsEl.addEventListener("input", updateAddButtonState);
    verificationEnabledEl.addEventListener("change", updateAddButtonState);
    mStudentId.addEventListener("change", updateAddButtonState);
    mGoogle.addEventListener("change", updateAddButtonState);

    function sortSchools(docs) {
      return docs.sort((a, b) => {
        const nameA = String(a.data().name || "").trim().toLowerCase();
        const nameB = String(b.data().name || "").trim().toLowerCase();
        return nameA.localeCompare(nameB, "zh-Hant");
      });
    }

    async function loadList() {
      listEl.innerHTML = `<div style="color:#6e6e73; font-size:14px;">載入中…</div>`;

      try {
        const snap = await db.collection("partnerSchools").get();
        const docs = sortSchools(snap.docs.slice());

        if (!docs.length) {
          listEl.innerHTML = `<div style="color:#6e6e73; font-size:14px;">目前沒有資料</div>`;
          return;
        }

        listEl.innerHTML = docs.map((doc) => {
          const school = doc.data() || {};
          const id = doc.id;

          const name = school.name || "未命名學校";
          const logoUrl = String(school.logoUrl || "").trim();
          const enabled = school.enabled === true;
          const methods = Array.isArray(school.authMethods) ? school.authMethods : [];
          const verificationEnabled = school.verificationEnabled === true;
          const actualVerificationOpen = getActualVerificationOpen(school);
          const allowedEmailDomains = Array.isArray(school.allowedEmailDomains) ? school.allowedEmailDomains : [];
          const fallback = String(name).slice(0, 1);

          return `
            <div class="item" id="row-${escAttr(id)}">
              <div class="item-top">
                <div class="item-left">
                  ${
                    logoUrl
                      ? `<img
                          class="logo"
                          src="${escAttr(logoUrl)}"
                          alt="logo"
                          onerror="this.outerHTML='<div class=\\'logo-fallback\\'>${esc(fallback)}</div>'"
                        >`
                      : `<div class="logo-fallback">${esc(fallback)}</div>`
                  }

                  <div style="min-width:0;">
                    <h3 class="item-name">${esc(name)}</h3>
                    <div class="item-meta">
                      校園狀態：${esc(getSchoolStatusText(enabled))}
                    </div>

                    <div class="badges">
                      ${buildMethodLabels(methods).map(label => `<span class="badge">${esc(label)}</span>`).join("")}
                      <span class="badge ${enabled ? "badge-green" : "badge-gray"}">${enabled ? "校園啟用" : "校園停用"}</span>
                      <span class="badge ${verificationEnabled ? "badge-blue" : "badge-gray"}">${verificationEnabled ? "已勾選開放驗證" : "未勾選開放驗證"}</span>
                      <span class="badge ${actualVerificationOpen ? "badge-green" : "badge-orange"}">${actualVerificationOpen ? "實際可驗證" : "實際不可驗證"}</span>
                    </div>

                    ${
                      allowedEmailDomains.length
                        ? `
                          <div class="item-meta" style="margin-top:10px;">
                            信箱後綴：${esc(allowedEmailDomains.join(", "))}
                          </div>
                        `
                        : `
                          <div class="item-meta" style="margin-top:10px;">
                            尚未設定信箱後綴
                          </div>
                        `
                    }

                    ${
                      !enabled && verificationEnabled
                        ? `
                          <div class="helper-note">目前此校園雖然勾選了「開放驗證」，但因為校園本身是停用狀態，所以前台仍視為不可驗證。</div>
                        `
                        : ``
                    }
                  </div>
                </div>

                <div class="right-actions">
                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEnabled('${escAttr(id)}', ${enabled})"
                    ${canEdit() ? "" : "disabled"}
                  >
                    ${enabled ? "停用" : "啟用"}
                  </button>

                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEdit('${escAttr(id)}')"
                    ${canEdit() ? "" : "disabled"}
                  >
                    編輯
                  </button>

                  <button
                    class="btn btn-sm btn-danger"
                    type="button"
                    onclick="removeSchool('${escAttr(id)}', '${escAttr(name)}')"
                    ${canDelete() ? "" : "disabled"}
                  >
                    移除
                  </button>
                </div>
              </div>

              <div class="edit-panel" id="edit-${escAttr(id)}">
                <div class="edit-grid">
                  <div>
                    <label>學校名稱</label>
                    <input type="text" id="editName-${escAttr(id)}" value="${escAttr(name)}" />

                    <label>校徽圖片網址</label>
                    <input type="text" id="editLogo-${escAttr(id)}" value="${escAttr(logoUrl)}" placeholder="請貼上圖片網址" />

                    <label>允許信箱後綴</label>
                    <textarea id="editDomains-${escAttr(id)}" placeholder="每行一個">${esc(domainsToText(allowedEmailDomains))}</textarea>
                  </div>

                  <div>
                    <label>可用方式</label>
                    <div class="form-box">
                      <div class="switch">
                        <input type="checkbox" id="editMStudent-${escAttr(id)}" ${methods.includes("student_id") ? "checked" : ""} />
                        <span>學號</span>
                      </div>
                      <div class="switch">
                        <input type="checkbox" id="editMGoogle-${escAttr(id)}" ${methods.includes("google") ? "checked" : ""} />
                        <span>Google</span>
                      </div>
                    </div>

                    <label>校園驗證</label>
                    <div class="form-box">
                      <div class="switch">
                        <input type="checkbox" id="editVerification-${escAttr(id)}" ${verificationEnabled ? "checked" : ""} />
                        <span>開放校園驗證</span>
                      </div>
                    </div>

                    ${
                      !enabled
                        ? `<div class="helper-note">這個校園目前是停用狀態。即使這裡勾選「開放校園驗證」，前台仍不會開放驗證，直到你重新啟用校園。</div>`
                        : `<div class="helper-note">只有在校園啟用時，這個勾選才會真正影響前台是否可驗證。</div>`
                    }

                    <div class="form-actions">
                      <button class="btn btn-sm" type="button" onclick="toggleEdit('${escAttr(id)}')">取消</button>
                      <button class="btn btn-sm btn-primary" type="button" onclick="saveEdit('${escAttr(id)}')" ${canEdit() ? "" : "disabled"}>儲存</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (e) {
        console.error(e);
        listEl.innerHTML = `<div style="color:#6e6e73; font-size:14px;">目前無法讀取</div>`;
        alert("讀取失敗");
      }
    }

    async function addSchool() {
      const name = (nameEl.value || "").trim();
      const logoUrl = (logoEl.value || "").trim();
      const allowedEmailDomains = parseDomains(allowedEmailDomainsEl.value);
      const verificationEnabled = !!verificationEnabledEl.checked;

      if (!name) {
        alert("請輸入學校名稱");
        nameEl.focus();
        return;
      }

      const methods = [];
      if (mStudentId.checked) methods.push("student_id");
      if (mGoogle.checked) methods.push("google");

      if (!methods.length) {
        alert("請至少選擇一種方式");
        return;
      }

      addBtn.disabled = true;
      const oldText = addBtn.textContent;
      addBtn.textContent = "新增中…";

      try {
        await db.collection("partnerSchools").add({
          name,
          logoUrl,
          enabled: true,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          createdBy: currentUser ? currentUser.uid : "",
          updatedBy: currentUser ? currentUser.uid : ""
        });

        nameEl.value = "";
        logoEl.value = "";
        allowedEmailDomainsEl.value = "";
        verificationEnabledEl.checked = true;
        mStudentId.checked = false;
        mGoogle.checked = false;

        updateAddButtonState();
        await loadList();
        alert("新增成功");
      } catch (e) {
        console.error(e);
        alert("新增失敗");
      } finally {
        addBtn.textContent = oldText;
        updateAddButtonState();
      }
    }

    window.toggleEnabled = async (id, enabledNow) => {
      if (!canEdit()) return;

      try {
        const payload = {
          enabled: !enabledNow,
          updatedAt: serverTimestamp(),
          updatedBy: currentUser ? currentUser.uid : ""
        };

        if (enabledNow === true) {
          payload.verificationEnabled = false;
        }

        await db.collection("partnerSchools").doc(id).update(payload);
        await loadList();
      } catch (e) {
        console.error(e);
        alert("變更失敗");
      }
    };

    window.toggleEdit = (id) => {
      const panel = document.getElementById(`edit-${id}`);
      if (!panel) return;
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    };

    window.saveEdit = async (id) => {
      if (!canEdit()) return;

      const name = (document.getElementById(`editName-${id}`)?.value || "").trim();
      const logoUrl = (document.getElementById(`editLogo-${id}`)?.value || "").trim();
      const allowedEmailDomains = parseDomains(document.getElementById(`editDomains-${id}`)?.value || "");
      const verificationEnabled = !!document.getElementById(`editVerification-${id}`)?.checked;
      const useStudent = !!document.getElementById(`editMStudent-${id}`)?.checked;
      const useGoogle = !!document.getElementById(`editMGoogle-${id}`)?.checked;

      if (!name) {
        alert("學校名稱不能為空");
        return;
      }

      if (!useStudent && !useGoogle) {
        alert("請至少選擇一種方式");
        return;
      }

      const methods = [];
      if (useStudent) methods.push("student_id");
      if (useGoogle) methods.push("google");

      try {
        await db.collection("partnerSchools").doc(id).update({
          name,
          logoUrl,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          updatedAt: serverTimestamp(),
          updatedBy: currentUser ? currentUser.uid : ""
        });

        await loadList();
      } catch (e) {
        console.error(e);
        alert("儲存失敗");
      }
    };

    window.removeSchool = async (id, name) => {
      if (!canDelete()) return;

      const ok = confirm(`確定要移除「${name}」嗎？`);
      if (!ok) return;

      try {
        await db.collection("partnerSchools").doc(id).delete();
        await loadList();
      } catch (e) {
        console.error(e);
        alert("移除失敗");
      }
    };

    reloadBtn.addEventListener("click", loadList);
    addBtn.addEventListener("click", addSchool);

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        showGate({
          title: "登入後台",
          message: "請先登入",
          showLogin: true,
          showLogout: false
        });
        return;
      }

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();

        if (!userDoc.exists) {
          showGate({
            title: "無法進入",
            message: "目前無法使用此頁面",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        const userData = userDoc.data() || {};

        if (userData.enabled !== true) {
          showGate({
            title: "無法進入",
            message: "目前無法使用此頁面",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        currentRole = String(userData.role || "").trim();

        if (!["platform_super", "platform_admin"].includes(currentRole)) {
          showGate({
            title: "無法進入",
            message: "目前無法使用此頁面",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        whoEl.textContent = `${user.email || ""}`;

        loginGate.classList.add("hidden");
        adminApp.classList.remove("hidden");

        updateAddButtonState();
        await loadList();
      } catch (err) {
        console.error(err);
        showGate({
          title: "發生錯誤",
          message: "請稍後再試",
          showLogin: false,
          showLogout: true
        });
      }
    });
  </script>
</body>
</html>
