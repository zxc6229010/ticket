<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜特約校園設定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:48px 24px;
    }
    .card{
      margin-bottom:18px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:var(--shadow);
    }
    h1{ margin:0 0 6px; font-size:22px; }
    h2{ margin:0; font-size:16px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:44px;
      padding:10px 18px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#111;
      font-size:16px;
      font-weight:900;
      text-decoration:none;
      cursor:pointer;
    }
    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }
    .btn-danger{
      color:#b91c1c;
      border-color:rgba(239,68,68,.35);
    }
    .btn-sm{
      height:40px;
      padding:8px 14px;
      font-size:15px;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:900px){
      .grid2{ grid-template-columns:1fr; }
    }
    label{
      display:block;
      margin:12px 0 6px;
      font-weight:900;
    }
    input[type="text"], select, textarea{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:16px;
      outline:none;
    }
    textarea{
      min-height:120px;
      resize:vertical;
    }
    .list{
      display:grid;
      gap:12px;
    }
    .item{
      padding:14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
    }
    .itemTitle{
      margin:0;
      font-size:15px;
      font-weight:900;
    }
    .meta{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      word-break:break-word;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .ok{ color:#166534; font-weight:900; }
    .warn{ color:#b91c1c; font-weight:900; }
    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>特約校園設定</h1>
            <div class="sub">
              這裡可以新增與編輯特約校園，並設定校園驗證規則。<br>
              驗證規則會被「校園身分驗證」頁讀取。
            </div>
            <div class="sub" style="margin-top:8px;">
              登入：<span id="who" class="mono">-</span>｜
              角色：<span id="myRole" class="mono">-</span>
            </div>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a class="btn" href="dashboard.html">回主選單</a>
            <button class="btn" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <h2>新增 / 編輯校園</h2>
            <div class="sub">
              校園代號就是文件 ID，例如：<span class="mono">kmsh</span>
            </div>
          </div>
        </div>

        <div class="grid2" style="margin-top:12px;">
          <div>
            <label style="margin-top:0;">校園代號（schoolId）</label>
            <input type="text" id="schoolId" placeholder="例如：kmsh" />
          </div>

          <div>
            <label style="margin-top:0;">校園名稱</label>
            <input type="text" id="schoolName" placeholder="例如：高雄某某高中" />
          </div>

          <div>
            <label>啟用（enabled）</label>
            <select id="enabled">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>

          <div>
            <label>開放校園驗證（verificationEnabled）</label>
            <select id="verificationEnabled">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>

          <div style="grid-column:1/-1;">
            <label>允許驗證的信箱後綴（每行一個，不要加 @）</label>
            <textarea id="allowedEmailDomains" placeholder="例如：
gm.tgsh.tn.edu.tw
mail.tgsh.tn.edu.tw"></textarea>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="resetBtn">清空</button>
          <button class="btn btn-primary" id="saveBtn">儲存校園</button>
        </div>

        <div class="sub" id="saveMsg" style="margin-top:10px;">-</div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <h2>校園清單</h2>
            <div class="sub">可點選編輯或刪除。</div>
          </div>
          <div>
            <button class="btn btn-sm" id="reloadBtn">重新載入</button>
          </div>
        </div>

        <div class="list" id="schoolList" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const who = document.getElementById("who");
    const myRole = document.getElementById("myRole");
    const logoutBtn = document.getElementById("logoutBtn");

    const schoolIdEl = document.getElementById("schoolId");
    const schoolNameEl = document.getElementById("schoolName");
    const enabledEl = document.getElementById("enabled");
    const verificationEnabledEl = document.getElementById("verificationEnabled");
    const allowedEmailDomainsEl = document.getElementById("allowedEmailDomains");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const saveMsg = document.getElementById("saveMsg");
    const reloadBtn = document.getElementById("reloadBtn");
    const schoolList = document.getElementById("schoolList");

    let currentUser = null;
    let currentRole = "";
    let schoolCache = [];

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(s){
      return String(s ?? "").trim();
    }

    function showGate(title, text){
      gate.style.display = "block";
      app.style.display = "none";
      gate.innerHTML = `
        <h1>${esc(title)}</h1>
        <div class="sub">${esc(text)}</div>
      `;
    }

    async function doLogout(){
      await firebase.auth().signOut();
    }

    logoutBtn.onclick = doLogout;

    function canManage(role){
      return role === "platform_super" || role === "platform_admin";
    }

    function resetForm(){
      schoolIdEl.value = "";
      schoolNameEl.value = "";
      enabledEl.value = "true";
      verificationEnabledEl.value = "true";
      allowedEmailDomainsEl.value = "";
      saveMsg.textContent = "-";
    }

    function getFormData(){
      return {
        schoolId: norm(schoolIdEl.value),
        name: norm(schoolNameEl.value),
        enabled: enabledEl.value === "true",
        verificationEnabled: verificationEnabledEl.value === "true",
        allowedEmailDomains: allowedEmailDomainsEl.value
          .split("\n")
          .map(v => norm(v).toLowerCase())
          .filter(Boolean)
      };
    }

    async function saveSchool(){
      const payload = getFormData();

      if (!payload.schoolId) return alert("請輸入 schoolId");
      if (!payload.name) return alert("請輸入校園名稱");

      saveBtn.disabled = true;
      const oldText = saveBtn.textContent;
      saveBtn.textContent = "儲存中…";

      try{
        await db.collection("partnerSchools").doc(payload.schoolId).set({
          name: payload.name,
          enabled: payload.enabled,
          verificationEnabled: payload.verificationEnabled,
          allowedEmailDomains: payload.allowedEmailDomains,
          updatedAt: new Date(),
          updatedByUid: currentUser.uid
        }, { merge: true });

        saveMsg.innerHTML = `<span class="ok">已儲存</span>`;
        await loadSchools();
      }catch(e){
        console.error(e);
        saveMsg.innerHTML = `<span class="warn">儲存失敗</span>`;
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = oldText;
      }
    }

    function renderSchools(){
      if (!schoolCache.length) {
        schoolList.innerHTML = `
          <div class="item">
            <div class="itemTitle">目前沒有校園資料</div>
            <div class="meta">請先新增校園。</div>
          </div>
        `;
        return;
      }

      schoolList.innerHTML = schoolCache.map(item => `
        <div class="item">
          <div class="itemTitle">
            ${esc(item.name || item.id)}
            <span class="badge mono">${esc(item.id)}</span>
            ${item.enabled === true ? `<span class="badge ok">enabled</span>` : `<span class="badge warn">disabled</span>`}
            ${item.verificationEnabled === true ? `<span class="badge ok">verification on</span>` : `<span class="badge warn">verification off</span>`}
          </div>
          <div class="meta">
            allowedEmailDomains：<span class="mono">${esc((item.allowedEmailDomains || []).join(", ") || "（未設定）")}</span>
          </div>
          <div class="actions">
            <button class="btn btn-sm" data-edit="${esc(item.id)}">編輯</button>
            <button class="btn btn-danger btn-sm" data-delete="${esc(item.id)}">刪除</button>
          </div>
        </div>
      `).join("");

      schoolList.querySelectorAll("[data-edit]").forEach(btn => {
        btn.onclick = () => {
          const item = schoolCache.find(v => v.id === btn.dataset.edit);
          if (!item) return;

          schoolIdEl.value = item.id || "";
          schoolNameEl.value = item.name || "";
          enabledEl.value = item.enabled === true ? "true" : "false";
          verificationEnabledEl.value = item.verificationEnabled === true ? "true" : "false";
          allowedEmailDomainsEl.value = Array.isArray(item.allowedEmailDomains)
            ? item.allowedEmailDomains.join("\n")
            : "";
          saveMsg.textContent = "已載入可編輯";
          window.scrollTo({ top: 0, behavior: "smooth" });
        };
      });

      schoolList.querySelectorAll("[data-delete]").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.delete;
          if (!confirm(`確定要刪除校園 ${id} 嗎？`)) return;

          try{
            await db.collection("partnerSchools").doc(id).delete();
            await loadSchools();
          }catch(e){
            console.error(e);
            alert("刪除失敗");
          }
        };
      });
    }

    async function loadSchools(){
      schoolList.innerHTML = `<div class="sub">讀取中…</div>`;

      try{
        const snap = await db.collection("partnerSchools").get();
        schoolCache = [];
        snap.forEach(doc => {
          schoolCache.push({ id: doc.id, ...(doc.data() || {}) });
        });

        schoolCache.sort((a, b) => (a.name || a.id).localeCompare((b.name || b.id), "zh-Hant"));
        renderSchools();
      }catch(e){
        console.error(e);
        schoolList.innerHTML = `
          <div class="item">
            <div class="itemTitle warn">讀取失敗</div>
            <div class="meta">請查看 Console。</div>
          </div>
        `;
      }
    }

    resetBtn.onclick = resetForm;
    saveBtn.onclick = saveSchool;
    reloadBtn.onclick = loadSchools;

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        showGate("請先登入", "你需要先登入管理帳號。");
        return;
      }

      try{
        const mySnap = await db.collection("users").doc(user.uid).get();
        const myData = mySnap.exists ? (mySnap.data() || {}) : null;

        if (!myData || myData.enabled !== true) {
          showGate("權限不足", "你的帳號尚未啟用。");
          return;
        }

        currentRole = myData.role || "";
        if (!canManage(currentRole)) {
          showGate("權限不足", "此頁面僅開放平台管理員使用。");
          return;
        }

        gate.style.display = "none";
        app.style.display = "block";
        who.textContent = myData.email || user.email || "-";
        myRole.textContent = currentRole || "-";

        resetForm();
        await loadSchools();
      }catch(e){
        console.error(e);
        showGate("發生錯誤", "無法讀取權限資料。");
      }
    });
  </script>
</body>
</html>
