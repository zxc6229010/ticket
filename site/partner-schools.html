<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜特約校園管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);

      --btn-a:10px;
      --btn-b:14px;
      --btn-x:calc(var(--btn-b) * 1.5);
      --btn-h:46px;
      --btn-fs:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:48px 32px;
    }

    @media (max-width:640px){
      .wrap{ padding:28px 16px; }
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-bottom:22px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }

    h2{
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .small{
      font-size:13px;
      color:var(--muted);
    }

    label{
      display:block;
      margin-top:10px;
      margin-bottom:6px;
      font-weight:900;
    }

    input[type="text"],
    textarea{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:16px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .form-box{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
    }

    @media (max-width:640px){
      .form-grid{ grid-template-columns:1fr; }
    }

    .switch{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }

    .switch:first-child{ margin-top:0; }

    .switch input{
      width:18px;
      height:18px;
      margin:0;
      flex:0 0 auto;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      height:var(--btn-h);
      padding:var(--btn-a) var(--btn-x);
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#111;
      font-size:var(--btn-fs);
      font-weight:900;
      line-height:1;
      text-decoration:none;
      cursor:pointer;
      user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
    }

    .btn-sm{
      height:40px;
      padding:8px calc(var(--btn-b) * 1.25);
      font-size:15px;
    }

    .btn-danger{
      border-color:rgba(239,68,68,.35);
      background:#fff;
      color:#b91c1c;
    }

    .form-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .list{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:14px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .item-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:44px;
      height:44px;
      flex:0 0 auto;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      object-fit:cover;
    }

    .logo-fallback{
      width:44px;
      height:44px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-weight:900;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:6px;
    }

    .badge{
      display:inline-flex;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:13px;
    }

    .right-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:flex-start;
      gap:10px;
    }

    .edit-panel{
      display:none;
      margin-top:12px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .edit-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:12px;
      margin-top:10px;
    }

    @media (max-width:640px){
      .edit-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="loginGate" class="section"></div>

    <div id="adminApp" style="display:none;">
      <div class="section">
        <div class="header">
          <div>
            <h1>特約校園管理</h1>
            <div class="sub">新增、停用、編輯特約校園資料</div>
          </div>

          <div style="text-align:right;">
            <div class="small" id="who"></div>
            <div style="margin-top:8px; display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap;">
              <a href="dashboard.html" class="btn btn-sm">回主選單</a>
              <button id="logoutBtn" class="btn btn-sm" type="button">登出</button>
            </div>
          </div>
        </div>

        <div id="editorWrap">
          <div class="form-grid">
            <div>
              <label>學校名稱（必填）</label>
              <input id="schoolName" type="text" placeholder="例：A學校" />

              <label style="margin-top:12px;">校徽圖片網址（選填）</label>
              <input id="schoolLogoUrl" type="text" placeholder="https://...（貼圖片網址）" />
              <div class="small" style="margin-top:8px;">這裡只會存圖片網址，不會上傳檔案。</div>

              <label style="margin-top:12px;">允許驗證的信箱後綴（每行一個，不要加 @）</label>
              <textarea id="allowedEmailDomains" placeholder="例：
gm.tgsh.tn.edu.tw
mail.tgsh.tn.edu.tw"></textarea>
              <div class="small" style="margin-top:8px;">校園身分驗證時，會用這些後綴檢查學校信箱。</div>
            </div>

            <div>
              <label>允許認證方式（至少選 1 種）</label>
              <div class="form-box">
                <div class="switch">
                  <input id="mStudentId" type="checkbox" />
                  <span>學號（student_id）</span>
                </div>
                <div class="switch">
                  <input id="mGoogle" type="checkbox" />
                  <span>Google（google）</span>
                </div>
              </div>

              <label style="margin-top:12px;">校園驗證設定</label>
              <div class="form-box">
                <div class="switch">
                  <input id="verificationEnabled" type="checkbox" checked />
                  <span>開啟校園身分驗證（verificationEnabled）</span>
                </div>
              </div>

              <div class="sub" style="margin-top:12px;">
                提示：前台只會顯示 enabled = true 的學校。
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button id="reloadBtn" class="btn" type="button">重新載入</button>
            <button id="addBtn" class="btn btn-primary" type="button" disabled>新增校園</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>校園清單</h2>
        <div id="list" class="list"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e"
    });

    const db = firebase.firestore();

    const loginGate = document.getElementById("loginGate");
    const adminApp = document.getElementById("adminApp");
    const whoEl = document.getElementById("who");
    const logoutBtn = document.getElementById("logoutBtn");

    const listEl = document.getElementById("list");
    const nameEl = document.getElementById("schoolName");
    const logoEl = document.getElementById("schoolLogoUrl");
    const allowedEmailDomainsEl = document.getElementById("allowedEmailDomains");
    const verificationEnabledEl = document.getElementById("verificationEnabled");
    const reloadBtn = document.getElementById("reloadBtn");
    const addBtn = document.getElementById("addBtn");

    const mStudentId = document.getElementById("mStudentId");
    const mGoogle = document.getElementById("mGoogle");

    let currentRole = "";
    let currentUser = null;

    function esc(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escAttr(str) {
      return esc(str).replaceAll("\n", " ");
    }

    function parseDomains(text) {
      return String(text || "")
        .split("\n")
        .map(v => String(v || "").trim().toLowerCase())
        .filter(Boolean);
    }

    function domainsToText(arr) {
      return Array.isArray(arr) ? arr.join("\n") : "";
    }

    async function doLogout() {
      try {
        await firebase.auth().signOut();
      } catch (e) {
        console.error(e);
        alert("登出失敗，請看 Console。");
      }
    }

    logoutBtn.addEventListener("click", doLogout);

    function showGate({ title, message, showLogin, showLogout }) {
      loginGate.innerHTML = `
        <h1>${esc(title)}</h1>
        <div class="sub">${esc(message)}</div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${showLogin ? `<button class="btn btn-primary" id="gateLoginBtn" type="button">使用 Email 登入</button>` : ``}
          ${showLogout ? `<button class="btn" id="gateLogoutBtn" type="button">登出</button>` : ``}
        </div>
      `;

      const gateLoginBtn = document.getElementById("gateLoginBtn");
      if (gateLoginBtn) {
        gateLoginBtn.onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
      }

      const gateLogoutBtn = document.getElementById("gateLogoutBtn");
      if (gateLogoutBtn) {
        gateLogoutBtn.onclick = doLogout;
      }

      loginGate.style.display = "block";
      adminApp.style.display = "none";
    }

    function canDelete() {
      return currentRole === "platform_super";
    }

    function canEdit() {
      return currentRole === "platform_super" || currentRole === "platform_admin";
    }

    function updateAddButtonState() {
      const hasName = (nameEl.value || "").trim().length > 0;
      const hasMethod = mStudentId.checked || mGoogle.checked;
      addBtn.disabled = !(hasName && hasMethod && canEdit());
    }

    nameEl.addEventListener("input", updateAddButtonState);
    logoEl.addEventListener("input", updateAddButtonState);
    allowedEmailDomainsEl.addEventListener("input", updateAddButtonState);
    verificationEnabledEl.addEventListener("change", updateAddButtonState);
    mStudentId.addEventListener("change", updateAddButtonState);
    mGoogle.addEventListener("change", updateAddButtonState);

    function sortSchools(docs) {
      return docs.sort((a, b) => {
        const nameA = String(a.data().name || "").trim().toLowerCase();
        const nameB = String(b.data().name || "").trim().toLowerCase();
        return nameA.localeCompare(nameB, "zh-Hant");
      });
    }

    async function loadList() {
      listEl.innerHTML = `<div class="small">載入中…</div>`;

      try {
        const snap = await db.collection("partnerSchools").get();
        const docs = sortSchools(snap.docs.slice());

        if (!docs.length) {
          listEl.innerHTML = `<div class="small">目前沒有資料</div>`;
          return;
        }

        listEl.innerHTML = docs.map((doc) => {
          const school = doc.data() || {};
          const id = doc.id;

          const name = school.name || "未命名學校";
          const logoUrl = String(school.logoUrl || "").trim();
          const enabled = school.enabled === true;
          const methods = Array.isArray(school.authMethods) ? school.authMethods : [];
          const verificationEnabled = school.verificationEnabled === true;
          const allowedEmailDomains = Array.isArray(school.allowedEmailDomains) ? school.allowedEmailDomains : [];
          const fallback = String(name).slice(0, 1);

          return `
            <div class="item" id="row-${escAttr(id)}">
              <div class="item-top">
                <div class="item-left">
                  ${
                    logoUrl
                      ? `<img
                          class="logo"
                          src="${escAttr(logoUrl)}"
                          alt="logo"
                          onerror="this.outerHTML='<div class=\\'logo-fallback\\'>${esc(fallback)}</div>'"
                        >`
                      : `<div class="logo-fallback">${esc(fallback)}</div>`
                  }

                  <div style="min-width:0;">
                    <div style="font-weight:900;">${esc(name)}</div>
                    <div class="small" style="margin-top:4px;">
                      狀態：${enabled ? "啟用" : "停用"}
                    </div>

                    <div class="badges">
                      ${
                        methods.length
                          ? methods.map(method => `<span class="badge">${esc(method)}</span>`).join("")
                          : `<span class="badge">（未設定）</span>`
                      }
                      <span class="badge">${verificationEnabled ? "校園驗證開啟" : "校園驗證關閉"}</span>
                    </div>

                    <div class="small" style="margin-top:8px;">
                      允許信箱後綴：
                      <span class="mono">${esc(allowedEmailDomains.length ? allowedEmailDomains.join(", ") : "（未設定）")}</span>
                    </div>
                  </div>
                </div>

                <div class="right-actions">
                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEnabled('${escAttr(id)}', ${enabled})"
                    ${canEdit() ? "" : "disabled"}
                  >
                    ${enabled ? "停用" : "啟用"}
                  </button>

                  <button
                    class="btn btn-sm"
                    type="button"
                    onclick="toggleEdit('${escAttr(id)}')"
                    ${canEdit() ? "" : "disabled"}
                  >
                    編輯
                  </button>

                  <button
                    class="btn btn-sm btn-danger"
                    type="button"
                    onclick="removeSchool('${escAttr(id)}', '${escAttr(name)}')"
                    ${canDelete() ? "" : "disabled"}
                  >
                    移除
                  </button>

                  <a class="btn btn-sm" href="admin-studentslist-import.html?schoolId=${encodeURIComponent(id)}">
                    匯入名單
                  </a>
                </div>
              </div>

              <div class="edit-panel" id="edit-${escAttr(id)}">
                <div class="small">修改完之後按「儲存」即可。</div>

                <div class="edit-grid">
                  <div>
                    <label>學校名稱</label>
                    <input type="text" id="editName-${escAttr(id)}" value="${escAttr(name)}" />

                    <label style="margin-top:12px;">校徽圖片網址（選填）</label>
                    <input type="text" id="editLogo-${escAttr(id)}" value="${escAttr(logoUrl)}" placeholder="https://..." />

                    <label style="margin-top:12px;">允許驗證的信箱後綴（每行一個，不要加 @）</label>
                    <textarea id="editDomains-${escAttr(id)}" placeholder="例：
gm.tgsh.tn.edu.tw
mail.tgsh.tn.edu.tw">${esc(domainsToText(allowedEmailDomains))}</textarea>
                  </div>

                  <div>
                    <label>允許認證方式</label>
                    <div class="form-box">
                      <div class="switch">
                        <input type="checkbox" id="editMStudent-${escAttr(id)}" ${methods.includes("student_id") ? "checked" : ""} />
                        <span>學號（student_id）</span>
                      </div>
                      <div class="switch">
                        <input type="checkbox" id="editMGoogle-${escAttr(id)}" ${methods.includes("google") ? "checked" : ""} />
                        <span>Google（google）</span>
                      </div>
                    </div>

                    <label style="margin-top:12px;">校園驗證設定</label>
                    <div class="form-box">
                      <div class="switch">
                        <input type="checkbox" id="editVerification-${escAttr(id)}" ${verificationEnabled ? "checked" : ""} />
                        <span>開啟校園身分驗證（verificationEnabled）</span>
                      </div>
                    </div>

                    <div class="form-actions" style="justify-content:flex-end; margin-top:12px;">
                      <button class="btn btn-sm" type="button" onclick="toggleEdit('${escAttr(id)}')">取消</button>
                      <button class="btn btn-sm btn-primary" type="button" onclick="saveEdit('${escAttr(id)}')" ${canEdit() ? "" : "disabled"}>儲存</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (e) {
        console.error(e);
        listEl.innerHTML = `<div class="small">讀取失敗，請查看 Console。</div>`;
        alert(
          "讀取校園清單失敗\n" +
          "code: " + (e.code || "(no code)") + "\n" +
          "message: " + (e.message || e)
        );
      }
    }

    async function addSchool() {
      const name = (nameEl.value || "").trim();
      const logoUrl = (logoEl.value || "").trim();
      const allowedEmailDomains = parseDomains(allowedEmailDomainsEl.value);
      const verificationEnabled = !!verificationEnabledEl.checked;

      if (!name) {
        alert("請輸入學校名稱");
        nameEl.focus();
        return;
      }

      const methods = [];
      if (mStudentId.checked) methods.push("student_id");
      if (mGoogle.checked) methods.push("google");

      if (!methods.length) {
        alert("請至少選擇一種認證方式");
        return;
      }

      addBtn.disabled = true;
      const oldText = addBtn.textContent;
      addBtn.textContent = "新增中…";

      try {
        await db.collection("partnerSchools").add({
          name,
          logoUrl,
          enabled: true,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          createdAt: new Date(),
          createdBy: currentUser ? currentUser.uid : ""
        });

        nameEl.value = "";
        logoEl.value = "";
        allowedEmailDomainsEl.value = "";
        verificationEnabledEl.checked = true;
        mStudentId.checked = false;
        mGoogle.checked = false;

        updateAddButtonState();
        await loadList();
        alert("新增成功");
      } catch (e) {
        console.error(e);
        alert(
          "新增失敗\n" +
          "code: " + (e.code || "(no code)") + "\n" +
          "message: " + (e.message || e)
        );
      } finally {
        addBtn.textContent = oldText;
        updateAddButtonState();
      }
    }

    window.toggleEnabled = async (id, enabledNow) => {
      if (!canEdit()) return;

      try {
        await db.collection("partnerSchools").doc(id).update({
          enabled: !enabledNow,
          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""
        });

        await loadList();
      } catch (e) {
        console.error(e);
        alert(
          "變更失敗\n" +
          "code: " + (e.code || "(no code)") + "\n" +
          "message: " + (e.message || e)
        );
      }
    };

    window.toggleEdit = (id) => {
      const panel = document.getElementById(`edit-${id}`);
      if (!panel) return;
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    };

    window.saveEdit = async (id) => {
      if (!canEdit()) return;

      const name = (document.getElementById(`editName-${id}`)?.value || "").trim();
      const logoUrl = (document.getElementById(`editLogo-${id}`)?.value || "").trim();
      const allowedEmailDomains = parseDomains(document.getElementById(`editDomains-${id}`)?.value || "");
      const verificationEnabled = !!document.getElementById(`editVerification-${id}`)?.checked;
      const useStudent = !!document.getElementById(`editMStudent-${id}`)?.checked;
      const useGoogle = !!document.getElementById(`editMGoogle-${id}`)?.checked;

      if (!name) {
        alert("學校名稱不能為空");
        return;
      }

      if (!useStudent && !useGoogle) {
        alert("請至少選擇一種認證方式");
        return;
      }

      const methods = [];
      if (useStudent) methods.push("student_id");
      if (useGoogle) methods.push("google");

      try {
        await db.collection("partnerSchools").doc(id).update({
          name,
          logoUrl,
          authMethods: methods,
          verificationEnabled,
          allowedEmailDomains,
          updatedAt: new Date(),
          updatedBy: currentUser ? currentUser.uid : ""
        });

        await loadList();
      } catch (e) {
        console.error(e);
        alert(
          "儲存失敗\n" +
          "code: " + (e.code || "(no code)") + "\n" +
          "message: " + (e.message || e)
        );
      }
    };

    window.removeSchool = async (id, name) => {
      if (!canDelete()) return;

      const ok = confirm(`確定要移除「${name}」嗎？\n此動作無法復原。`);
      if (!ok) return;

      try {
        await db.collection("partnerSchools").doc(id).delete();
        await loadList();
      } catch (e) {
        console.error(e);
        alert(
          "移除失敗\n" +
          "code: " + (e.code || "(no code)") + "\n" +
          "message: " + (e.message || e)
        );
      }
    };

    reloadBtn.addEventListener("click", loadList);
    addBtn.addEventListener("click", addSchool);

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        showGate({
          title: "特約校園管理",
          message: "請先登入後台帳號。",
          showLogin: true,
          showLogout: false
        });
        return;
      }

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();

        if (!userDoc.exists) {
          showGate({
            title: "尚未授權",
            message: "你的帳號尚未被授權為後台管理員。",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        const userData = userDoc.data() || {};

        if (userData.enabled !== true) {
          showGate({
            title: "帳號已停用",
            message: "此帳號已被停用，請聯絡系統管理員。",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        currentRole = String(userData.role || "").trim();

        if (!["platform_super", "platform_admin"].includes(currentRole)) {
          showGate({
            title: "權限不足",
            message: "你沒有權限管理特約校園。",
            showLogin: false,
            showLogout: true
          });
          return;
        }

        whoEl.textContent = `${user.email || ""}｜${currentRole}`;

        loginGate.style.display = "none";
        adminApp.style.display = "block";

        updateAddButtonState();
        await loadList();
      } catch (err) {
        console.error(err);
        showGate({
          title: "發生錯誤",
          message: "無法讀取權限資料，請查看 Console。",
          showLogin: false,
          showLogout: true
        });
      }
    });
  </script>
</body>
</html>
