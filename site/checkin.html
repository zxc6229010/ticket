<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>活動入場｜Check-in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --text:#111;
      --muted:rgba(17,17,17,.65); --line:rgba(17,17,17,.10);
      --shadow2:0 14px 40px rgba(0,0,0,.08);
      --btn-a:10px; --btn-b:14px; --btn-x:calc(var(--btn-b)*1.5);
      --btn-h:46px; --btn-fs:16px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif; }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 32px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }
    .section{ background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow2); padding:16px; margin-bottom:22px; }
    .header{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    h1{ margin:0; font-size:22px; letter-spacing:.2px; }
    .sub{ margin-top:6px; color:var(--muted); line-height:1.6; font-size:14px; }
    .small{ font-size:13px; color:var(--muted); }
    label{ font-weight:900; display:block; margin-top:10px; margin-bottom:6px; }
    input[type="text"]{ width:100%; padding:12px; border-radius:14px; border:1px solid var(--line); font-size:16px; background:#fff; }
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      height:var(--btn-h); padding:var(--btn-a) var(--btn-x);
      border-radius:999px; border:1px solid var(--line);
      background:#fff; font-weight:900; font-size:var(--btn-fs);
      cursor:pointer; color:#111; text-decoration:none;
    }
    .btn-primary{ background:#111; color:#fff; border-color:#111; }
    .btn-sm{ height:40px; padding:8px calc(var(--btn-b)*1.25); font-size:15px; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .stats{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .badge{ border:1px solid var(--line); border-radius:999px; padding:8px 12px; font-size:13px; background:#fff; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; }
    .log{ margin-top:12px; display:grid; gap:10px; }
    .card{ border:1px solid var(--line); border-radius:18px; padding:14px; background:#fff; }
    .ok{ border-color: rgba(34,197,94,.25); background: rgba(34,197,94,.06); }
    .warn{ border-color: rgba(239,68,68,.25); background: rgba(239,68,68,.06); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="section">
      <div class="header">
        <div>
          <h1>活動入場 Check-in</h1>
          <div class="sub">活動：<span id="eventName" class="mono">讀取中…</span></div>
          <div class="small">eventId：<span id="eventId" class="mono"></span></div>
        </div>
        <div style="text-align:right;">
          <div class="small" id="who"></div>
          <div class="row" style="justify-content:flex-end; margin-top:8px;">
            <a class="btn btn-sm" href="dashboard.html">回主選單</a>
          </div>
        </div>
      </div>

      <label>票碼 / ticketId</label>
      <input id="code" type="text" placeholder="掃描或貼上票碼（建議就是 ticketId）" />

      <div class="row" style="justify-content:flex-end; margin-top:12px;">
        <button class="btn" id="reloadBtn">重新整理統計</button>
        <button class="btn btn-primary" id="checkinBtn">確認入場</button>
      </div>

      <div class="stats" id="stats"></div>
      <div class="small" style="margin-top:10px;">提示：若顯示「找不到票」，代表 tickets 裡尚未建立這張票。</div>
    </div>

    <div class="section">
      <h2 style="margin:0; font-size:16px; font-weight:900;">最新紀錄</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e"
    });

    const db = firebase.firestore();

    const sp = new URLSearchParams(location.search);
    const eventId = sp.get("eventId") || "";
    document.getElementById("eventId").textContent = eventId;

    const whoEl = document.getElementById("who");
    const eventNameEl = document.getElementById("eventName");
    const codeEl = document.getElementById("code");
    const statsEl = document.getElementById("stats");
    const logEl = document.getElementById("log");

    const checkinBtn = document.getElementById("checkinBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    function esc(s){
      return (s || "").toString()
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function badge(text){ return `<span class="badge">${esc(text)}</span>`; }

    async function loadEvent(){
      if (!eventId) {
        eventNameEl.textContent = "缺少 eventId";
        return;
      }
      const doc = await db.collection("events").doc(eventId).get();
      if (!doc.exists) {
        eventNameEl.textContent = "活動不存在";
        return;
      }
      const e = doc.data() || {};
      eventNameEl.textContent = e.name || "(未命名活動)";
      if (e.enabled !== true) {
        statsEl.innerHTML = `<span class="badge warn">此活動目前為停用</span>`;
      }
    }

    async function loadStats(){
      if (!eventId) return;

      // 以 tickets 直接統計（MVP）
      const snap = await db.collection("tickets").where("eventId", "==", eventId).get();

      let total = 0, checked = 0, voided = 0, issued = 0;
      snap.forEach(d => {
        total++;
        const t = d.data() || {};
        const st = (t.status || "issued");
        if (st === "checked_in") checked++;
        else if (st === "void") voided++;
        else issued++;
      });

      statsEl.innerHTML = [
        badge("總票數：" + total),
        badge("已入場：" + checked),
        badge("未入場：" + issued),
        badge("作廢：" + voided)
      ].join("");
    }

    function pushLog(kind, title, detail){
      const cls = kind === "ok" ? "card ok" : "card warn";
      const html = `
        <div class="${cls}">
          <div style="font-weight:900;">${esc(title)}</div>
          <div class="small" style="margin-top:6px;">${esc(detail)}</div>
        </div>
      `;
      logEl.innerHTML = html + logEl.innerHTML;
    }

    async function checkin(){
      const code = (codeEl.value || "").trim();
      if (!code) { alert("請輸入票碼"); return; }
      if (!eventId) { alert("缺少 eventId"); return; }

      checkinBtn.disabled = true;
      const old = checkinBtn.textContent;
      checkinBtn.textContent = "處理中…";

      try{
        const ref = db.collection("tickets").doc(code);
        const doc = await ref.get();

        if (!doc.exists) {
          pushLog("warn", "找不到票", "ticketId：" + code);
          alert("找不到票（tickets 沒有這個 ticketId）");
          return;
        }

        const t = doc.data() || {};
        if (t.eventId !== eventId) {
          pushLog("warn", "活動不符", `此票屬於 eventId=${t.eventId}，不是目前活動`);
          alert("活動不符：此票不是這個活動");
          return;
        }

        if ((t.status || "issued") === "checked_in") {
          pushLog("warn", "重複入場", "此票已入場，時間：" + (t.checkedInAt?.toDate?.().toLocaleString() || "(未知)"));
          alert("這張票已經入場過了");
          return;
        }

        await ref.update({
          status: "checked_in",
          checkedInAt: new Date(),
          checkedInBy: (firebase.auth().currentUser?.email || "").toLowerCase()
        });

        pushLog("ok", "入場成功", "ticketId：" + code);
        codeEl.value = "";
        await loadStats();

      }catch(e){
        console.error(e);
        pushLog("warn", "入場失敗", e.message || String(e));
        alert("入場失敗\n" + (e.message || e));
      }finally{
        checkinBtn.disabled = false;
        checkinBtn.textContent = old;
      }
    }

    reloadBtn.onclick = async () => { await loadStats(); };
    checkinBtn.onclick = checkin;

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        // checkin 也可以選擇「不登入」給工讀生用
        // 但你要後台控管的話就保留登入限制
        location.href = "dashboard.html";
        return;
      }

      whoEl.textContent = (user.email || "").toLowerCase();

      // （可選）你也可以在這裡檢查 role
      await loadEvent();
      await loadStats();
    });
  </script>
</body>
</html>
