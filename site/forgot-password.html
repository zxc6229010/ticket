<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜重設密碼</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --green:#166534;
      --green-bg:#dcfce7;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:40px 22px 88px;
    }

    .wrap{
      max-width:560px;
      margin:0 auto;
    }

    .hero{
      background:#fff;
      border:1px solid rgba(0,0,0,.05);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:28px;
      margin-bottom:18px;
    }

    .hero-title{
      margin:0;
      font-size:42px;
      line-height:1.04;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .card-body{
      padding:22px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    .input:focus{
      border-color:#111;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .btn{
      width:100%;
      min-height:46px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#111;
      color:#fff;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      margin-top:18px;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .notice{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      font-size:13px;
      line-height:1.9;
      border:1px solid transparent;
      word-break:break-word;
    }

    .notice.info{
      background:var(--blue-bg);
      color:var(--blue);
      border-color:rgba(29,78,216,.10);
    }

    .notice.ok{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.10);
    }

    .notice.warn{
      background:var(--red-bg);
      color:var(--red);
      border-color:rgba(185,28,28,.10);
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin-top:12px;
      font-size:13px;
      font-weight:700;
      gap:12px;
      flex-wrap:wrap;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    @media (max-width:860px){
      .page{
        padding:24px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:24px 20px;
      }

      .hero-title{
        font-size:34px;
      }

      .card{
        border-radius:28px;
      }

      .card-body{
        padding:20px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="nav-wrap">
    <div class="nav">
      <a class="brand" href="index.html">
        <span class="brand-mark">P</span>
        <span>Passium</span>
      </a>
    </div>
  </div>

  <main class="page">
    <div class="wrap">
      <div class="hero">
        <h1 class="hero-title">重設密碼</h1>
        <div class="hero-sub">輸入你的會員 Email</div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="field">
            <label class="label" for="email">Email</label>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="請輸入 Email"
              autocomplete="email"
            />
          </div>

          <div id="msg" class="notice info">
            輸入 Email 後寄送重設密碼信
          </div>

          <button class="btn" id="sendBtn">寄送重設密碼信</button>

          <div class="row">
            <a href="login.html">登入</a>
            <a href="register.html">註冊</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e",
        storageBucket: "concert-1ff7e.firebasestorage.app",
        messagingSenderId: "704757384914",
        appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }

    const auth = firebase.auth();

    const emailEl = document.getElementById("email");
    const sendBtn = document.getElementById("sendBtn");
    const msg = document.getElementById("msg");

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function setMsg(type, text){
      msg.className = `notice ${type}`;
      msg.innerHTML = text;
    }

    function isValidEmail(email){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function sendResetEmail(){
      const email = norm(emailEl.value).toLowerCase();

      if (!email) {
        setMsg("warn", "請輸入 Email");
        return;
      }

      if (!isValidEmail(email)) {
        setMsg("warn", "Email 格式不正確");
        return;
      }

      sendBtn.disabled = true;
      const oldText = sendBtn.textContent;
      sendBtn.textContent = "寄送中…";
      setMsg("info", "正在寄送，請稍候…");

      try {
        await auth.sendPasswordResetEmail(email);
        setMsg(
          "ok",
          `重設密碼信已寄出<br><span class="mono">${esc(email)}</span>`
        );
      } catch (e) {
        console.error(e);

        let text = "寄送失敗";
        const code = String(e.code || "");

        if (code.includes("auth/user-not-found")) {
          text = "查無此帳號";
        } else if (code.includes("auth/invalid-email")) {
          text = "Email 格式不正確";
        } else if (code.includes("auth/network-request-failed")) {
          text = "網路連線失敗";
        } else if (code.includes("auth/too-many-requests")) {
          text = "操作次數過多，請稍後再試";
        }

        setMsg("warn", esc(text));
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = oldText;
      }
    }

    sendBtn.onclick = sendResetEmail;

    emailEl.addEventListener("keydown", e => {
      if (e.key === "Enter") sendResetEmail();
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        location.href = "member.html";
      }
    });
  </script>
</body>
</html>
