<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>忘記密碼</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --text:#111827;
      --muted:#6b7280;
      --line:rgba(17,24,39,.08);
      --line-strong:rgba(17,24,39,.14);
      --shadow:0 18px 50px rgba(15,23,42,.08);
      --shadow-soft:0 10px 30px rgba(15,23,42,.05);
      --black:#111111;
      --ok:#166534;
      --ok-bg:#dcfce7;
      --warn:#b91c1c;
      --warn-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.9), rgba(245,247,251,.95) 36%),
        linear-gradient(180deg, #f8fafc 0%, #f5f7fb 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:28px 18px 64px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#374151;
      font-size:14px;
      font-weight:800;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.8);
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .ghost-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      font-size:14px;
      font-weight:900;
      color:#111827;
      cursor:pointer;
    }

    .hero{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    .hero-title{
      margin:0;
      font-size:30px;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .hero-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
    }

    .hero-pills{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:1000;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 22px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .card-title{
      margin:0;
      font-size:22px;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .card-sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.9;
    }

    .card-body{
      padding:22px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .label{
      font-size:13px;
      font-weight:1000;
      color:#111827;
    }

    .required{
      color:#dc2626;
      margin-left:4px;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }

    .notice{
      margin-top:18px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      font-size:13px;
      line-height:1.9;
      color:#4b5563;
      white-space:pre-wrap;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.12);
      color:var(--blue);
    }

    .notice.ok{
      background:var(--ok-bg);
      border-color:rgba(22,101,52,.12);
      color:var(--ok);
    }

    .notice.warn{
      background:var(--warn-bg);
      border-color:rgba(185,28,28,.12);
      color:var(--warn);
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .btn-primary{
      background:var(--black);
      color:#fff;
      border-color:var(--black);
    }

    .btn-block{
      width:100%;
    }

    .footer-links{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    .footer-links a{
      font-weight:900;
      color:#111827;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="login.html">← 返回登入</a>
      <a class="ghost-btn" href="register.html">前往註冊</a>
    </div>

    <div class="hero">
      <h1 class="hero-title">忘記密碼</h1>
      <div class="hero-sub">
        請輸入你註冊時使用的 Email，系統會寄送重設密碼信到你的信箱。<br>
        收到信件後，依照信中的指示即可重新設定密碼。
      </div>
      <div class="hero-pills">
        <span class="pill">使用 Firebase 密碼重設信</span>
        <span class="pill">寄送到會員註冊信箱</span>
        <span class="pill">完成後可回登入頁重新登入</span>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2 class="card-title">寄送重設密碼信</h2>
        <div class="card-sub">
          請確認你輸入的是會員帳號使用的電子郵件。
        </div>
      </div>

      <div class="card-body">
        <div class="field">
          <label class="label" for="email">電子郵件<span class="required">*</span></label>
          <input id="email" class="input" type="email" placeholder="請輸入你的會員 Email" autocomplete="email" />
          <div class="hint">系統會寄送密碼重設信到這個信箱</div>
        </div>

        <div id="msg" class="notice info">
          輸入完成後，按下下方按鈕即可寄送密碼重設信。
        </div>

        <div class="row">
          <button class="btn btn-primary btn-block" id="sendBtn">寄送重設密碼信</button>
        </div>

        <div class="footer-links">
          <span>想起密碼了？</span>
          <a href="login.html">返回登入</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e",
        storageBucket: "concert-1ff7e.firebasestorage.app",
        messagingSenderId: "704757384914",
        appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }

    const auth = firebase.auth();

    const emailEl = document.getElementById("email");
    const sendBtn = document.getElementById("sendBtn");
    const msg = document.getElementById("msg");

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function setMsg(type, text){
      msg.className = `notice ${type}`;
      msg.innerHTML = text;
    }

    function isValidEmail(email){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function sendResetEmail(){
      const email = norm(emailEl.value).toLowerCase();

      if (!email) {
        setMsg("warn", "請輸入電子郵件");
        return;
      }

      if (!isValidEmail(email)) {
        setMsg("warn", "電子郵件格式不正確");
        return;
      }

      sendBtn.disabled = true;
      const oldText = sendBtn.textContent;
      sendBtn.textContent = "寄送中…";
      setMsg("info", "正在寄送重設密碼信，請稍候…");

      try {
        await auth.sendPasswordResetEmail(email);

        setMsg(
          "ok",
          `重設密碼信已寄出。<br>請到信箱查看：<span class="mono">${esc(email)}</span><br><br>若幾分鐘內沒有收到，請檢查垃圾郵件匣。`
        );
      } catch (e) {
        console.error(e);

        let text = "寄送失敗，請稍後再試";
        const code = String(e.code || "");

        if (code.includes("auth/user-not-found")) {
          text = "查無此帳號，請確認電子郵件是否正確";
        } else if (code.includes("auth/invalid-email")) {
          text = "電子郵件格式不正確";
        } else if (code.includes("auth/network-request-failed")) {
          text = "網路連線失敗，請確認網路後再試";
        } else if (code.includes("auth/too-many-requests")) {
          text = "操作次數過多，請稍後再試";
        } else if (e.message) {
          text = e.message;
        }

        setMsg("warn", esc(text));
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = oldText;
      }
    }

    sendBtn.onclick = sendResetEmail;
    emailEl.addEventListener("keydown", e => {
      if (e.key === "Enter") sendResetEmail();
    });
  </script>
</body>
</html>
