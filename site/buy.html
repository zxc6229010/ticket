<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜選擇票種與座位</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;

      --green:#166534;
      --green-bg:#dcfce7;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;

      --seat-size:32px;
      --max:1380px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 22px 88px;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:34px 30px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 56px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:14px;
      max-width:900px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-meta{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 400px;
      gap:20px;
      align-items:start;
    }

    @media (max-width:1100px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .left-stack{
      display:grid;
      gap:18px;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .card-title{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .card-sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.9;
      white-space:pre-wrap;
    }

    .card-body{
      padding:20px;
    }

    .ticket-list{
      display:grid;
      gap:16px;
    }

    .ticket-card{
      border:1px solid rgba(0,0,0,.06);
      border-radius:22px;
      padding:16px;
      background:#fff;
    }

    .ticket-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .ticket-name{
      margin:0;
      font-size:20px;
      font-weight:800;
      line-height:1.35;
    }

    .ticket-price{
      font-size:20px;
      font-weight:800;
      white-space:nowrap;
    }

    .ticket-desc{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .meta-pills{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:700;
    }

    .ticket-grid{
      display:grid;
      grid-template-columns:1fr 180px;
      gap:14px;
      align-items:end;
      margin-top:14px;
    }

    @media (max-width:680px){
      .ticket-grid{
        grid-template-columns:1fr;
      }
    }

    .field{
      display:grid;
      gap:6px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .select,
    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
    }

    .select:focus,
    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }

    .mode-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .stage-wrap{
      overflow:auto;
      background:
        linear-gradient(rgba(0,0,0,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.025) 1px, transparent 1px),
        #f1f3f8;
      background-size:24px 24px;
      border-radius:24px;
      padding:24px;
      min-height:480px;
    }

    .stage-shell{
      width:max-content;
      min-width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
    }

    .stage-sign{
      min-width:320px;
      max-width:720px;
      text-align:center;
      padding:14px 24px;
      border-radius:22px 22px 40px 40px;
      background:linear-gradient(180deg,#111111 0%,#2c2c2e 100%);
      color:#fff;
      font-size:17px;
      font-weight:800;
      letter-spacing:.16em;
      box-shadow:0 14px 30px rgba(17,17,17,.18);
    }

    .seat-stage{
      position:relative;
      width:1200px;
      height:900px;
      background:
        linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,.25)),
        #f1f1f4;
      border:1px solid rgba(0,0,0,.07);
      border-radius:26px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.4), 0 8px 32px rgba(0,0,0,.06);
      overflow:hidden;
    }

    .seatmap-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      opacity:.96;
    }

    .seat{
      position:absolute;
      width:var(--seat-size);
      height:var(--seat-size);
      border-radius:10px;
      border:1.5px solid #111827;
      background:#fff;
      box-shadow:0 2px 5px rgba(0,0,0,.09);
      cursor:pointer;
      transition:transform .1s ease, box-shadow .1s ease, background .1s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:800;
      user-select:none;
    }

    .seat:hover{
      transform:scale(1.08);
      z-index:10;
      box-shadow:0 4px 12px rgba(0,0,0,.13);
    }

    .seat.selected{
      background:#111827;
      color:#fff;
      border-color:#111827;
      box-shadow:0 0 0 3px rgba(17,24,39,.14);
      z-index:8;
    }

    .seat.disabled{
      background:#d1d5db;
      border-color:#9ca3af;
      color:#6b7280;
      cursor:not-allowed;
    }

    .seat.sold{
      background:#6b7280;
      border-color:#6b7280;
      color:#fff;
      cursor:not-allowed;
    }

    .seat.hold-other{
      background:#f59e0b;
      border-color:#d97706;
      color:#fff;
      cursor:not-allowed;
    }

    .seat.mine{
      background:#2563eb;
      border-color:#2563eb;
      color:#fff;
    }

    .seat.free{
      background:#fff;
    }

    .legend{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:7px;
      font-size:12px;
      font-weight:800;
      color:#374151;
    }

    .legend-dot{
      width:14px;
      height:14px;
      border-radius:4px;
      flex-shrink:0;
    }

    .free-seat-box{
      border:1px dashed var(--line);
      border-radius:20px;
      padding:18px;
      background:#fafafa;
      line-height:1.9;
      color:var(--muted);
      font-size:14px;
    }

    .side-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:20px;
      position:sticky;
      top:82px;
    }

    @media (max-width:1100px){
      .side-card{
        position:static;
      }
    }

    .side-title{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .side-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:18px;
      padding-top:16px;
      border-top:1px solid var(--line);
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .summary-row strong{
      color:#111;
      text-align:right;
    }

    .summary-detail{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .summary-item{
      border:1px solid rgba(0,0,0,.06);
      border-radius:18px;
      background:#fafafa;
      padding:12px 14px;
    }

    .summary-item-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      line-height:1.7;
    }

    .summary-item-sub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
      white-space:pre-wrap;
    }

    .notice{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.05);
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .notice.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.10);
      color:var(--green);
    }

    .action-stack{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .loading,
    .empty{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.95;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a class="back-link" id="backLink" href="ticket.html">← 返回活動頁</a>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="my-orders.html">我的訂單</a>
        </div>
      </footer>

      <div class="bottom-note">
        建立訂單後，系統會暫時保留座位與票券。若未於期限內完成後續流程，系統可釋出保留。
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      getDocs,
      collection,
      query,
      where,
      orderBy,
      runTransaction,
      serverTimestamp,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const accountBtn = document.getElementById("accountBtn");
    const backLink = document.getElementById("backLink");

    const params = new URLSearchParams(location.search);
    const eventId = String(params.get("id") || "").trim();

    let currentUser = null;
    let currentEvent = null;

    let allTicketTypes = [];
    let visibleTicketTypes = [];
    let allSeats = [];
    let selectedSeatIds = [];
    let selectedSeatMode = "manual"; // manual / auto
    let promoState = {
      code: "",
      applied: false,
      loading: false,
      data: null,
      error: ""
    };

    let quantityMap = {};

    const HOLD_MINUTES = 10;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input?.toDate === "function") return input.toDate();
      const d = new Date(input);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "日期未定";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function formatPrice(value){
      const num = Number(value || 0);
      if (!num) return "免費";
      return `NT$ ${num.toLocaleString("zh-Hant")}`;
    }

    function getSafeNumber(value, fallback = 0){
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden" };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended" };
      return { text:"受理中", key:"selling" };
    }

    function getEventVenue(event){
      return norm(
        event.venueName ||
        event.location ||
        event.place ||
        event.eventLocation ||
        ""
      );
    }

    function getEventDescription(event){
      return norm(
        event.summary ||
        event.subtitle ||
        event.description ||
        event.shortDescription ||
        ""
      );
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        const redirect = encodeURIComponent(location.pathname + location.search);
        accountBtn.href = `login.html?redirect=${redirect}`;
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    function buildLoginRedirectUrl(){
      const redirect = encodeURIComponent(location.pathname + location.search);
      return `login.html?redirect=${redirect}`;
    }

    function canCreateOrder(event){
      return getEventStatus(event).key === "selling";
    }

    function getSeatingEnabled(event){
      return event.seatingEnabled === true;
    }

    function getSeatMapEnabled(event){
      if (event.seatMapEnabled === false) return false;
      return true;
    }

    function getSeatingMode(event){
      return lower(event.seatingMode || "assigned"); // assigned / free
    }

    function getMaxSeatsPerOrder(event){
      const n = getSafeNumber(event.maxSeatsPerOrder, 6);
      return n > 0 ? n : 6;
    }

    function normalizeTicketTypeItem(item, index){
      return {
        id: norm(item.id || `ticket_${index + 1}`),
        name: norm(item.name || `票種 ${index + 1}`),
        description: norm(item.description || ""),
        price: getSafeNumber(item.price, 0),
        enabled: item.enabled !== false,
        visibility: lower(item.visibility || "public"), // public / promo
        maxPerOrder: Math.max(1, getSafeNumber(item.maxPerOrder, getMaxSeatsPerOrder(currentEvent))),
        requiresSeat: item.requiresSeat === true,
        sectionIds: Array.isArray(item.sectionIds) ? item.sectionIds.map(v => norm(v)).filter(Boolean) : []
      };
    }

    function getRawTicketTypes(event){
      const raw = Array.isArray(event.ticketTypes) ? event.ticketTypes : [];
      if (!raw.length){
        return [{
          id:"general",
          name:"一般票",
          description:"此活動目前未細分票種。",
          price:0,
          enabled:true,
          visibility:"public",
          maxPerOrder:getMaxSeatsPerOrder(event),
          requiresSeat:getSeatingEnabled(event) && getSeatingMode(event) === "assigned",
          sectionIds:[]
        }];
      }
      return raw.map(normalizeTicketTypeItem).filter(item => item.enabled);
    }

    function getPromoDocTicketTypeId(promo){
      return norm(
        promo.ticketTypeId ||
        promo.bindTicketTypeId ||
        promo.targetTicketTypeId ||
        ""
      );
    }

    function getPromoDocTicketTypeName(promo){
      return norm(
        promo.ticketTypeName ||
        promo.bindTicketTypeName ||
        ""
      );
    }

    function getVisibleTicketTypes(){
      if (!promoState.applied || !promoState.data) {
        return [...allTicketTypes].filter(type => type.visibility !== "promo" || type.visibility === "public");
      }

      const targetTypeId = getPromoDocTicketTypeId(promoState.data);

      return allTicketTypes.filter(type => {
        if (type.visibility === "public") return true;
        if (type.visibility === "promo" && targetTypeId && type.id === targetTypeId) return true;
        return false;
      });
    }

    function initializeQuantityMap(){
      const next = {};
      getVisibleTicketTypes().forEach(type => {
        next[type.id] = Number(quantityMap[type.id] || 0);
      });
      quantityMap = next;
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      return snap.exists() ? { id: snap.id, ...(snap.data() || {}) } : null;
    }

    async function loadSeats(){
      const snap = await getDocs(collection(db, "events", eventId, "seats"));
      const now = Date.now();

      allSeats = snap.docs.map(d => {
        const data = d.data() || {};
        const heldUntilDate = toDate(data.heldUntil);
        const heldUntilMs = heldUntilDate ? heldUntilDate.getTime() : 0;

        const expiredHold = heldUntilMs && heldUntilMs < now;
        let computedStatus = norm(data.status || "available");

        if (computedStatus === "held" && expiredHold) {
          computedStatus = "available";
        }

        return {
          id: d.id,
          ...data,
          x: getSafeNumber(data.x, 0),
          y: getSafeNumber(data.y, 0),
          price: getSafeNumber(data.price, 0),
          rotation: getSafeNumber(data.rotation, 0),
          label: norm(data.label || d.id),
          row: norm(data.row || ""),
          seatNumber: norm(data.seatNumber || ""),
          sectionId: norm(data.sectionId || ""),
          floor: norm(data.floor || "1F"),
          heldBy: norm(data.heldBy || ""),
          soldToUid: norm(data.soldToUid || ""),
          orderId: norm(data.orderId || ""),
          computedStatus,
          heldUntilDate
        };
      });
    }

    function getSectionLabel(sectionId){
      const value = lower(sectionId);
      if (!value) return "未分區";
      if (value === "vip") return "VIP";
      if (value === "a") return "A 區";
      if (value === "b") return "B 區";
      if (value === "c") return "C 區";
      if (value === "d") return "D 區";
      return sectionId;
    }

    function getSectionColor(sectionId){
      const s = lower(sectionId);
      if (s === "vip") return "#ff375f";
      if (s === "a") return "#0071e3";
      if (s === "b") return "#34c759";
      if (s === "c") return "#ff9f0a";
      if (s === "d") return "#af52de";
      return "";
    }

    function getSelectedItems(){
      return visibleTicketTypes
        .map(type => {
          const quantity = getSafeNumber(quantityMap[type.id], 0);
          return {
            ticketTypeId: type.id,
            ticketTypeName: type.name,
            unitPrice: getSafeNumber(type.price, 0),
            quantity,
            subtotal: getSafeNumber(type.price, 0) * quantity,
            requiresSeat: type.requiresSeat === true,
            sectionIds: Array.isArray(type.sectionIds) ? [...type.sectionIds] : [],
            visibility: type.visibility
          };
        })
        .filter(item => item.quantity > 0);
    }

    function getTotalQuantity(){
      return getSelectedItems().reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    }

    function getTotalAmount(){
      return getSelectedItems().reduce((sum, item) => sum + Number(item.subtotal || 0), 0);
    }

    function getRequiredSeatCount(){
      if (!currentEvent) return 0;
      if (!getSeatingEnabled(currentEvent)) return 0;
      if (getSeatingMode(currentEvent) !== "assigned") return 0;
      return getSelectedItems().reduce((sum, item) => {
        return sum + (item.requiresSeat ? Number(item.quantity || 0) : 0);
      }, 0);
    }

    function getAllAllowedSeatSectionIds(){
      const items = getSelectedItems().filter(item => item.requiresSeat);
      const all = new Set();

      items.forEach(item => {
        if (!item.sectionIds || !item.sectionIds.length) return;
        item.sectionIds.forEach(id => all.add(norm(id)));
      });

      return [...all];
    }

    function seatIsSelectable(seat){
      if (!currentEvent) return false;

      const status = seat.computedStatus;
      const myUid = currentUser?.uid || "";

      if (status === "sold") return false;
      if (status === "disabled") return false;

      if (status === "held" && seat.heldBy && seat.heldBy !== myUid) return false;

      const requiredCount = getRequiredSeatCount();
      if (requiredCount <= 0) return false;

      const items = getSelectedItems().filter(item => item.requiresSeat);
      if (!items.length) return false;

      // 若有指定 sectionIds，座位需符合任一選中票種允許的 section
      const hasRestricted = items.some(item => Array.isArray(item.sectionIds) && item.sectionIds.length > 0);
      if (hasRestricted) {
        const allowed = new Set();
        items.forEach(item => {
          (item.sectionIds || []).forEach(id => allowed.add(norm(id)));
        });

        if (allowed.size > 0 && !allowed.has(norm(seat.sectionId || ""))) {
          return false;
        }
      }

      return true;
    }

    function getSeatVisualState(seat){
      const myUid = currentUser?.uid || "";
      const status = seat.computedStatus;

      if (selectedSeatIds.includes(seat.id)) return "selected";
      if (status === "sold") return "sold";
      if (status === "disabled") return "disabled";
      if (status === "held" && seat.heldBy && seat.heldBy === myUid) return "mine";
      if (status === "held" && seat.heldBy && seat.heldBy !== myUid) return "hold-other";
      return "free";
    }

    function getPromoNotice(){
      if (promoState.loading) {
        return { className:"info", text:"公關代碼驗證中…" };
      }
      if (promoState.applied && promoState.data) {
        return {
          className:"ok",
          text:`已套用公關代碼：${promoState.data.code || promoState.data.id}\n對應票種：${getPromoDocTicketTypeName(promoState.data) || getPromoDocTicketTypeId(promoState.data) || "-"}`
        };
      }
      if (promoState.error) {
        return { className:"warn", text:promoState.error };
      }
      return {
        className:"info",
        text:"若你有公關代碼，可在此輸入。\n套用後會開放對應公關票種。"
      };
    }

    function getSummaryNotice(){
      const totalQty = getTotalQuantity();
      const requiredSeats = getRequiredSeatCount();

      if (!canCreateOrder(currentEvent)) {
        return {
          className: "warn",
          text: "目前尚未開放建立訂單，請依活動開賣時間為準。"
        };
      }

      if (!totalQty) {
        return {
          className: "warn",
          text: "請先選擇至少 1 張票。"
        };
      }

      if (requiredSeats > 0 && selectedSeatIds.length !== requiredSeats) {
        return {
          className: "warn",
          text: `目前需選擇 ${requiredSeats} 個座位，你已選 ${selectedSeatIds.length} 個。`
        };
      }

      if (!currentUser) {
        return {
          className: "info",
          text: "你已選好票種，但建立訂單前需要先登入。\n登入後系統會回到這一頁。"
        };
      }

      return {
        className: "ok",
        text: "資料確認後可建立訂單。建立後系統會暫時保留你所選的票券與座位。"
      };
    }

    function renderSelectedSummaryItems(selectedItems){
      if (!selectedItems.length) {
        return `
          <div class="summary-item">
            <div class="summary-item-title">尚未選擇票種</div>
            <div class="summary-item-sub">請從左側選擇票種與張數。</div>
          </div>
        `;
      }

      return selectedItems.map(item => `
        <div class="summary-item">
          <div class="summary-item-title">
            ${esc(item.ticketTypeName)} × ${esc(item.quantity)} 張
          </div>
          <div class="summary-item-sub">
            單價：${esc(formatPrice(item.unitPrice))} ｜ 小計：${esc(formatPrice(item.subtotal))}
            ${item.requiresSeat ? `\n需選位` : `\n不需選位`}
          </div>
        </div>
      `).join("");
    }

    function renderSeatSummary(){
      if (!selectedSeatIds.length) {
        return `
          <div class="summary-item">
            <div class="summary-item-title">尚未選擇座位</div>
            <div class="summary-item-sub">可手動點選，或使用電腦自動選位。</div>
          </div>
        `;
      }

      const picked = allSeats.filter(seat => selectedSeatIds.includes(seat.id));
      return picked.map(seat => `
        <div class="summary-item">
          <div class="summary-item-title">${esc(seat.label || seat.id)}</div>
          <div class="summary-item-sub">
            區域：${esc(getSectionLabel(seat.sectionId || ""))}
            ${seat.floor ? `\n樓層：${esc(seat.floor)}` : ``}
          </div>
        </div>
      `).join("");
    }

    function renderTicketCard(type){
      const maxAllowed = Math.min(type.maxPerOrder, getMaxSeatsPerOrder(currentEvent));
      const currentQty = getSafeNumber(quantityMap[type.id], 0);
      const options = Array.from({ length:maxAllowed + 1 }, (_, i) => i);

      return `
        <div class="ticket-card">
          <div class="ticket-top">
            <div>
              <h3 class="ticket-name">${esc(type.name)}</h3>
            </div>
            <div class="ticket-price">${esc(formatPrice(type.price))}</div>
          </div>

          <div class="ticket-desc">
            ${esc(type.description || "請選擇此票種的購買張數。")}
          </div>

          <div class="meta-pills">
            <span class="meta-pill">票種代碼：${esc(type.id)}</span>
            <span class="meta-pill">單筆上限：${esc(maxAllowed)} 張</span>
            <span class="meta-pill">${esc(type.visibility === "promo" ? "公關票" : "一般票")}</span>
            <span class="meta-pill">${esc(type.requiresSeat ? "需選位" : "免選位")}</span>
            ${
              type.sectionIds && type.sectionIds.length
                ? type.sectionIds.map(id => `<span class="meta-pill">可選 ${esc(getSectionLabel(id))}</span>`).join("")
                : ""
            }
          </div>

          <div class="ticket-grid">
            <div>
              <div class="hint">
                你可以先選擇這個票種的購買張數。
                若此票種需要座位，系統會要求你選擇相同數量的座位。
              </div>
            </div>

            <div class="field">
              <label class="label" for="qty_${esc(type.id)}">購買張數</label>
              <select class="select" id="qty_${esc(type.id)}" data-ticket-id="${esc(type.id)}">
                ${options.map(n => `<option value="${n}" ${currentQty === n ? "selected" : ""}>${n} 張</option>`).join("")}
              </select>
            </div>
          </div>
        </div>
      `;
    }

    function renderAssignedSeatArea(){
      const showMap = getSeatMapEnabled(currentEvent);
      const bg = norm(currentEvent.seatMapImage || currentEvent.seatMapUrl || "");
      const requiredSeatCount = getRequiredSeatCount();

      return `
        <div class="card">
          <div class="card-head">
            <h2 class="card-title">選擇座位</h2>
            <div class="card-sub">你可以手動點選座位，或交給系統自動挑選。需選：${requiredSeatCount} 席</div>
          </div>
          <div class="card-body">
            <div class="mode-row">
              <button class="btn ${selectedSeatMode === "manual" ? "active" : ""}" id="manualSelectBtn">手動選位</button>
              <button class="btn ${selectedSeatMode === "auto" ? "active" : ""}" id="autoSelectBtn">電腦選位</button>
              <button class="btn" id="clearSeatBtn">清除已選</button>
            </div>

            <div class="hint" style="margin-bottom:12px;">
              手動選位：直接點選座位。  
              電腦選位：系統會依目前票數，自動挑出可用座位。
            </div>

            <div class="stage-wrap">
              <div class="stage-shell">
                <div class="stage-sign">STAGE</div>

                <div class="seat-stage" id="seatStage">
                  ${
                    showMap && bg
                      ? `<img class="seatmap-image" src="${esc(bg)}" alt="seat map">`
                      : ""
                  }

                  ${
                    allSeats.map(seat => {
                      const visual = getSeatVisualState(seat);
                      const selectable = seatIsSelectable(seat);
                      const color = getSectionColor(seat.sectionId || "");
                      const extraStyle = visual === "free" && color ? `background:${color};border-color:${color};color:#fff;` : "";
                      return `
                        <button
                          class="seat ${esc(visual)}"
                          data-seat-id="${esc(seat.id)}"
                          style="
                            left:${seat.x}px;
                            top:${seat.y}px;
                            transform:rotate(${getSafeNumber(seat.rotation,0)}deg);
                            ${extraStyle}
                          "
                          ${selectable ? "" : "disabled"}
                          title="${esc(seat.label || seat.id)}"
                        >
                          ${esc((seat.label || seat.id).slice(0,5))}
                        </button>
                      `;
                    }).join("")
                  }
                </div>
              </div>
            </div>

            <div class="legend">
              <div class="legend-item"><span class="legend-dot" style="background:#fff;border:1.5px solid #111827;"></span>可選</div>
              <div class="legend-item"><span class="legend-dot" style="background:#111827;border:1.5px solid #111827;"></span>已選</div>
              <div class="legend-item"><span class="legend-dot" style="background:#2563eb;border:1.5px solid #2563eb;"></span>你保留中</div>
              <div class="legend-item"><span class="legend-dot" style="background:#f59e0b;border:1.5px solid #d97706;"></span>他人保留中</div>
              <div class="legend-item"><span class="legend-dot" style="background:#6b7280;border:1.5px solid #6b7280;"></span>已售</div>
              <div class="legend-item"><span class="legend-dot" style="background:#d1d5db;border:1.5px solid #9ca3af;"></span>停用</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderFreeSeatArea(){
      return `
        <div class="card">
          <div class="card-head">
            <h2 class="card-title">入場方式</h2>
            <div class="card-sub">此活動為自由座，不需要在這一頁挑選實際座位。</div>
          </div>
          <div class="card-body">
            <div class="free-seat-box">
              你目前選擇的是自由座活動。  
              只要確認票種與張數即可建立訂單。  
              若主辦單位後續有入場分流或現場安排，請依活動公告為準。
            </div>
          </div>
        </div>
      `;
    }

    function renderPage(){
      const status = getEventStatus(currentEvent);
      const desc = getEventDescription(currentEvent) || "請先選擇你要的票種與張數。";
      const venue = getEventVenue(currentEvent) || "活動地點將依主辦單位公告為準";
      const saleStartText = formatDateTime(currentEvent.saleStartAt);
      const saleEndText = formatDateTime(currentEvent.saleEndAt);
      const selectedItems = getSelectedItems();
      const totalQty = getTotalQuantity();
      const totalAmount = getTotalAmount();
      const requiredSeatCount = getRequiredSeatCount();
      const canOrder = canCreateOrder(currentEvent);
      const notice = getSummaryNotice();
      const promoNotice = getPromoNotice();

      backLink.href = `ticket.html?id=${encodeURIComponent(currentEvent.id)}`;

      const seatSectionHtml = !getSeatingEnabled(currentEvent)
        ? ""
        : getSeatingMode(currentEvent) === "assigned"
          ? renderAssignedSeatArea()
          : renderFreeSeatArea();

      app.className = "";
      app.innerHTML = `
        <section class="hero">
          <h1 class="hero-title">選擇票種與座位</h1>
          <div class="hero-sub">
活動：${esc(currentEvent.title || "未命名活動")}
${esc(desc)}
          </div>
          <div class="hero-meta">
            <span class="pill">狀態：${esc(status.text)}</span>
            <span class="pill">地點：${esc(venue)}</span>
            <span class="pill">開賣：${esc(saleStartText)}</span>
            <span class="pill">截止：${esc(saleEndText)}</span>
            <span class="pill">${getSeatingEnabled(currentEvent) ? (getSeatingMode(currentEvent) === "assigned" ? "對號座" : "自由座") : "不開放選位"}</span>
          </div>
        </section>

        <div class="layout">
          <section class="left-stack">
            <div class="card">
              <div class="card-head">
                <h2 class="card-title">票種選擇</h2>
                <div class="card-sub">請先選擇每個票種要買幾張，系統會依你的選擇同步更新摘要。</div>
              </div>
              <div class="card-body">
                <div class="ticket-list">
                  ${
                    visibleTicketTypes.length
                      ? visibleTicketTypes.map(type => renderTicketCard(type)).join("")
                      : `<div class="empty">目前沒有可購買票種。若你持有公關代碼，請先在右側輸入並套用。</div>`
                  }
                </div>
              </div>
            </div>

            ${seatSectionHtml}
          </section>

          <aside class="side-card">
            <h2 class="side-title">訂單摘要</h2>
            <div class="side-sub">
              先選票種與張數，再視活動需求選位。  
              確認後即可建立訂單。
            </div>

            <div class="field" style="margin-top:16px;">
              <label class="label" for="promoCodeInput">公關代碼</label>
              <input
                id="promoCodeInput"
                class="input"
                type="text"
                placeholder="請輸入公關代碼"
                value="${esc(promoState.code || "")}"
              />
            </div>

            <div class="action-stack" style="margin-top:10px;">
              <button class="btn" id="applyPromoBtn" ${promoState.loading ? "disabled" : ""}>套用公關代碼</button>
              <button class="btn" id="clearPromoBtn" ${promoState.applied ? "" : "disabled"}>清除公關代碼</button>
            </div>

            <div class="notice ${promoNotice.className}">
              ${esc(promoNotice.text)}
            </div>

            <div class="summary">
              <div class="summary-row">
                <span>活動</span>
                <strong>${esc(currentEvent.title || "-")}</strong>
              </div>
              <div class="summary-row">
                <span>票種數量</span>
                <strong>${esc(selectedItems.length)}</strong>
              </div>
              <div class="summary-row">
                <span>總張數</span>
                <strong>${esc(totalQty)}</strong>
              </div>
              <div class="summary-row">
                <span>總金額</span>
                <strong>${esc(formatPrice(totalAmount))}</strong>
              </div>
              <div class="summary-row">
                <span>需選座位</span>
                <strong>${esc(requiredSeatCount)}</strong>
              </div>
              <div class="summary-row">
                <span>已選座位</span>
                <strong>${esc(selectedSeatIds.length)}</strong>
              </div>
            </div>

            <div class="summary-detail">
              ${renderSelectedSummaryItems(selectedItems)}
              ${getSeatingEnabled(currentEvent) ? renderSeatSummary() : ""}
            </div>

            <div class="notice ${notice.className}">
              ${esc(notice.text)}
            </div>

            <div class="action-stack">
              <button class="btn btn-primary" id="createOrderBtn" ${canOrder ? "" : "disabled"}>
                建立訂單
              </button>
              <a class="btn" href="ticket.html?id=${encodeURIComponent(currentEvent.id)}">返回活動資訊</a>
            </div>
          </aside>
        </div>
      `;

      document.querySelectorAll("[data-ticket-id]").forEach(select => {
        select.addEventListener("change", e => {
          const ticketId = e.target.dataset.ticketId || "";
          quantityMap[ticketId] = Number(e.target.value || 0);

          // 張數減少時，若已選座位超過需求，自動裁掉多餘座位
          const required = getRequiredSeatCount();
          if (selectedSeatIds.length > required) {
            selectedSeatIds = selectedSeatIds.slice(0, required);
          }

          renderPage();
        });
      });

      document.querySelectorAll("[data-seat-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (selectedSeatMode !== "manual") return;
          const seatId = btn.dataset.seatId || "";
          toggleSeatSelect(seatId);
        });
      });

      const manualSelectBtn = document.getElementById("manualSelectBtn");
      const autoSelectBtn = document.getElementById("autoSelectBtn");
      const clearSeatBtn = document.getElementById("clearSeatBtn");
      const promoCodeInput = document.getElementById("promoCodeInput");
      const applyPromoBtn = document.getElementById("applyPromoBtn");
      const clearPromoBtn = document.getElementById("clearPromoBtn");
      const createOrderBtn = document.getElementById("createOrderBtn");

      if (manualSelectBtn) {
        manualSelectBtn.onclick = () => {
          selectedSeatMode = "manual";
          renderPage();
        };
      }

      if (autoSelectBtn) {
        autoSelectBtn.onclick = () => {
          selectedSeatMode = "auto";
          autoPickSeats();
        };
      }

      if (clearSeatBtn) {
        clearSeatBtn.onclick = () => {
          selectedSeatIds = [];
          selectedSeatMode = "manual";
          renderPage();
        };
      }

      if (promoCodeInput) {
        promoCodeInput.addEventListener("input", e => {
          promoState.code = e.target.value || "";
        });

        promoCodeInput.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            applyPromoCode();
          }
        });
      }

      if (applyPromoBtn) {
        applyPromoBtn.onclick = applyPromoCode;
      }

      if (clearPromoBtn) {
        clearPromoBtn.onclick = clearPromoCode;
      }

      if (createOrderBtn) {
        createOrderBtn.onclick = createOrder;
      }
    }

    function toggleSeatSelect(seatId){
      const seat = allSeats.find(s => s.id === seatId);
      if (!seat) return;
      if (!seatIsSelectable(seat)) return;

      const required = getRequiredSeatCount();
      if (required <= 0) return;

      if (selectedSeatIds.includes(seatId)) {
        selectedSeatIds = selectedSeatIds.filter(id => id !== seatId);
        renderPage();
        return;
      }

      if (selectedSeatIds.length >= required) {
        alert(`目前最多只能選 ${required} 個座位。`);
        return;
      }

      selectedSeatIds = [...selectedSeatIds, seatId];
      renderPage();
    }

    function autoPickSeats(){
      const need = getRequiredSeatCount();

      if (need <= 0) {
        selectedSeatIds = [];
        renderPage();
        return;
      }

      const selectable = allSeats.filter(seat => seatIsSelectable(seat));

      if (selectable.length < need) {
        alert("可選座位不足。");
        selectedSeatMode = "manual";
        renderPage();
        return;
      }

      // 簡單策略：依樓層、y、x 排序，抓最前面連續可用座位
      selectable.sort((a, b) => {
        const fa = norm(a.floor || "");
        const fb = norm(b.floor || "");
        if (fa !== fb) return fa.localeCompare(fb, "zh-Hant");
        if (a.y !== b.y) return a.y - b.y;
        return a.x - b.x;
      });

      selectedSeatIds = selectable.slice(0, need).map(seat => seat.id);
      renderPage();
    }

    async function getPromoCodeDataFromSubcollection(cleanCode){
      const ref = doc(db, "events", eventId, "promoCodes", cleanCode);
      const snap = await getDoc(ref);

      if (!snap.exists()) return null;

      const data = snap.data() || {};
      const enabled = data.enabled === true;
      const maxUse = getSafeNumber(data.maxUse ?? data.maxUses ?? 0, 0);
      const usedCount = getSafeNumber(data.usedCount ?? 0, 0);

      if (!enabled) throw new Error("此公關代碼未啟用");
      if (maxUse > 0 && usedCount >= maxUse) throw new Error("此公關代碼已達使用上限");

      return {
        id: snap.id,
        code: cleanCode,
        ...data
      };
    }

    function getPromoCodeDataFromEventArray(cleanCode){
      const arr = Array.isArray(currentEvent?.promoCodes) ? currentEvent.promoCodes : [];
      const hit = arr.find(item => lower(item.code || item.id || "") === lower(cleanCode));
      if (!hit) return null;

      const enabled = hit.enabled === true;
      const maxUse = getSafeNumber(hit.maxUse ?? hit.maxUses ?? 0, 0);
      const usedCount = getSafeNumber(hit.usedCount ?? 0, 0);

      if (!enabled) throw new Error("此公關代碼未啟用");
      if (maxUse > 0 && usedCount >= maxUse) throw new Error("此公關代碼已達使用上限");

      return {
        id: norm(hit.id || hit.code || cleanCode),
        code: norm(hit.code || cleanCode),
        ...hit
      };
    }

    async function applyPromoCode(){
      const code = norm(promoState.code || "").toUpperCase();

      if (!code) {
        promoState.error = "請輸入公關代碼";
        promoState.applied = false;
        promoState.data = null;
        renderPage();
        return;
      }

      promoState.loading = true;
      promoState.error = "";
      renderPage();

      try {
        let promo = null;

        try {
          promo = await getPromoCodeDataFromSubcollection(code);
        } catch (err) {
          // 如果子集合讀到但報錯，就直接丟出
          if (String(err?.message || "").includes("未啟用") || String(err?.message || "").includes("上限")) {
            throw err;
          }
        }

        if (!promo) {
          promo = getPromoCodeDataFromEventArray(code);
        }

        if (!promo) {
          throw new Error("查無此公關代碼");
        }

        const targetTypeId = getPromoDocTicketTypeId(promo);
        if (!targetTypeId) {
          throw new Error("此公關代碼尚未綁定票種");
        }

        const ticketTypeExists = allTicketTypes.some(type => type.id === targetTypeId);
        if (!ticketTypeExists) {
          throw new Error("此公關代碼綁定的票種不存在");
        }

        promoState.applied = true;
        promoState.data = promo;
        promoState.error = "";

        // 重新初始化可見票種後，清空張數與座位
        visibleTicketTypes = getVisibleTicketTypes();
        initializeQuantityMap();
        Object.keys(quantityMap).forEach(key => quantityMap[key] = 0);
        selectedSeatIds = [];
        selectedSeatMode = "manual";

        renderPage();
      } catch (err) {
        console.error(err);
        promoState.applied = false;
        promoState.data = null;
        promoState.error = err?.message || "公關代碼驗證失敗";
        renderPage();
      } finally {
        promoState.loading = false;
        renderPage();
      }
    }

    function clearPromoCode(){
      promoState = {
        code: "",
        applied: false,
        loading: false,
        data: null,
        error: ""
      };

      visibleTicketTypes = getVisibleTicketTypes();
      initializeQuantityMap();
      Object.keys(quantityMap).forEach(key => quantityMap[key] = 0);
      selectedSeatIds = [];
      selectedSeatMode = "manual";
      renderPage();
    }

    function buildOrderItems(){
      return getSelectedItems().map(item => ({
        ticketTypeId: item.ticketTypeId,
        ticketTypeName: item.ticketTypeName,
        quantity: Number(item.quantity || 0),
        unitPrice: Number(item.unitPrice || 0),
        subtotal: Number(item.subtotal || 0),
        requiresSeat: item.requiresSeat === true,
        sectionIds: Array.isArray(item.sectionIds) ? item.sectionIds : [],
        visibility: item.visibility || "public"
      }));
    }

    function getExpiresAtDate(){
      return new Date(Date.now() + HOLD_MINUTES * 60 * 1000);
    }

    async function createOrder(){
      if (!currentEvent) return;

      if (!currentUser) {
        location.href = buildLoginRedirectUrl();
        return;
      }

      if (!canCreateOrder(currentEvent)) {
        alert("目前尚未開放建立訂單。");
        return;
      }

      const selectedItems = getSelectedItems();
      const totalQty = getTotalQuantity();
      const totalAmount = getTotalAmount();
      const requiredSeats = getRequiredSeatCount();

      if (!selectedItems.length || totalQty <= 0) {
        alert("請先選擇至少 1 張票。");
        return;
      }

      if (requiredSeats > 0 && selectedSeatIds.length !== requiredSeats) {
        alert(`目前需要選擇 ${requiredSeats} 個座位。`);
        return;
      }

      if (promoState.applied && promoState.data) {
        const allowedTypeId = getPromoDocTicketTypeId(promoState.data);
        const wrongSelection = selectedItems.some(item => item.visibility === "promo" ? item.ticketTypeId !== allowedTypeId : false);
        if (wrongSelection) {
          alert("目前公關代碼只允許購買指定公關票種。");
          return;
        }
      }

      const btn = document.getElementById("createOrderBtn");
      const oldText = btn ? btn.textContent : "";
      if (btn) {
        btn.disabled = true;
        btn.textContent = "建立中…";
      }

      try {
        const eventRef = doc(db, "events", eventId);
        const orderRef = doc(collection(db, "events", eventId, "orders"));
        const promoRef = promoState.applied && promoState.data
          ? doc(db, "events", eventId, "promoCodes", promoState.data.code || promoState.data.id)
          : null;

        const seatRefs = selectedSeatIds.map(id => doc(db, "events", eventId, "seats", id));
        const expiresAtDate = getExpiresAtDate();
        const expiresAt = Timestamp.fromDate(expiresAtDate);

        await runTransaction(db, async (tx) => {
          const freshEventSnap = await tx.get(eventRef);
          if (!freshEventSnap.exists()) throw new Error("活動不存在");

          const freshEvent = freshEventSnap.data() || {};
          const freshStatus = getEventStatus(freshEvent);
          if (freshStatus.key !== "selling") throw new Error("目前不能建立訂單");

          const seatPayloads = [];
          for (const ref of seatRefs) {
            const snap = await tx.get(ref);
            if (!snap.exists()) throw new Error("有座位不存在，請重新整理");

            const seat = snap.data() || {};
            const heldUntilDate = toDate(seat.heldUntil);
            const holdExpired = heldUntilDate ? heldUntilDate.getTime() < Date.now() : true;
            const status = norm(seat.status || "available");
            const heldBy = norm(seat.heldBy || "");

            if (status === "sold") {
              throw new Error("部分座位已售出，請重新選位");
            }

            if (status === "disabled") {
              throw new Error("部分座位不可使用，請重新選位");
            }

            if (status === "held" && heldBy && heldBy !== currentUser.uid && !holdExpired) {
              throw new Error("部分座位已被其他人保留，請重新選位");
            }

            seatPayloads.push({ ref, seat });
          }

          let promoPayload = null;
          if (promoRef) {
            const promoSnap = await tx.get(promoRef);
            if (!promoSnap.exists()) throw new Error("公關代碼不存在或已失效");

            promoPayload = promoSnap.data() || {};
            if (promoPayload.enabled !== true) throw new Error("此公關代碼未啟用");

            const maxUse = getSafeNumber(promoPayload.maxUse ?? promoPayload.maxUses ?? 0, 0);
            const usedCount = getSafeNumber(promoPayload.usedCount ?? 0, 0);

            if (maxUse > 0 && usedCount >= maxUse) {
              throw new Error("此公關代碼已達使用上限");
            }
          }

          // hold seats
          seatPayloads.forEach(({ ref }) => {
            tx.update(ref, {
              status: "held",
              heldBy: currentUser.uid,
              heldUntil: expiresAt,
              orderId: orderRef.id,
              updatedAt: serverTimestamp()
            });
          });

          // order
          tx.set(orderRef, {
            uid: currentUser.uid,
            buyerUid: currentUser.uid,
            buyerEmail: lower(currentUser.email || ""),
            eventId,
            eventTitle: norm(currentEvent.title || ""),

            status: "pending_payment",
            paymentStatus: "unpaid",
            fillStatus: "pending",

            seatingEnabled: getSeatingEnabled(currentEvent),
            seatingMode: getSeatingMode(currentEvent),

            totalQuantity: totalQty,
            totalAmount,

            items: buildOrderItems(),
            selectedSeatIds: [...selectedSeatIds],
            selectedSeats: allSeats
              .filter(seat => selectedSeatIds.includes(seat.id))
              .map(seat => ({
                seatId: seat.id,
                label: norm(seat.label || seat.id),
                row: norm(seat.row || ""),
                seatNumber: norm(seat.seatNumber || ""),
                sectionId: norm(seat.sectionId || ""),
                sectionName: getSectionLabel(seat.sectionId || ""),
                floor: norm(seat.floor || "")
              })),

            promoCode: promoState.applied ? norm(promoState.data.code || promoState.data.id || "") : "",
            promoTicketTypeId: promoState.applied ? getPromoDocTicketTypeId(promoState.data) : "",
            promoTicketTypeName: promoState.applied ? getPromoDocTicketTypeName(promoState.data) : "",

            expiresAt,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });

          if (promoRef) {
            tx.update(promoRef, {
              usedCount: getSafeNumber(promoPayload.usedCount ?? 0, 0) + 1,
              updatedAt: serverTimestamp()
            });
          }
        });

        location.href = `order-fill.html?id=${encodeURIComponent(eventId)}&orderId=${encodeURIComponent(orderRef.id)}`;
      } catch (err) {
        console.error(err);
        alert(err?.message || "建立訂單失敗，請稍後再試。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = oldText || "建立訂單";
        }
      }
    }

    async function initPage(){
      if (!eventId) {
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      currentEvent = await getEventById(eventId);

      if (!currentEvent) {
        app.className = "empty";
        app.innerHTML = "找不到活動。";
        return;
      }

      allTicketTypes = getRawTicketTypes(currentEvent);
      visibleTicketTypes = getVisibleTicketTypes();
      initializeQuantityMap();

      if (getSeatingEnabled(currentEvent) && getSeatingMode(currentEvent) === "assigned") {
        await loadSeats();
      } else {
        allSeats = [];
        selectedSeatIds = [];
      }

      renderPage();
    }

    onAuthStateChanged(auth, async user => {
      currentUser = user || null;
      updateAccountLinks(currentUser);
      await initPage();
    });
  </script>
