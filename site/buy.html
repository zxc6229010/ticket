<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜選擇票種與座位</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;

      --green:#166534;
      --green-bg:#dcfce7;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;

      --seat-size:34px;
      --max:1380px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 22px 88px;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:34px 30px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 56px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:14px;
      max-width:900px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-meta{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 400px;
      gap:20px;
      align-items:start;
    }

    @media (max-width:1100px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .left-stack{
      display:grid;
      gap:18px;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .card-title{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .card-sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.9;
      white-space:pre-wrap;
    }

    .card-body{
      padding:20px;
    }

    .steps{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .step-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .step-pill.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .step-pill.done{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.08);
    }

    .ticket-list{
      display:grid;
      gap:16px;
    }

    .ticket-card{
      border:1px solid rgba(0,0,0,.06);
      border-radius:22px;
      padding:16px;
      background:#fff;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .ticket-card:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .ticket-card.selected{
      border-color:#111;
      box-shadow:0 0 0 3px rgba(17,17,17,.08);
    }

    .ticket-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .ticket-name{
      margin:0;
      font-size:20px;
      font-weight:800;
      line-height:1.35;
    }

    .ticket-price{
      font-size:20px;
      font-weight:800;
      white-space:nowrap;
    }

    .ticket-desc{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .meta-pills{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:700;
    }

    .mode-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    @media (max-width:720px){
      .mode-grid{
        grid-template-columns:1fr;
      }
    }

    .mode-card{
      border:1px solid rgba(0,0,0,.06);
      border-radius:24px;
      padding:18px;
      background:#fff;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .mode-card:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .mode-card.active{
      border-color:#111;
      box-shadow:0 0 0 3px rgba(17,17,17,.08);
    }

    .mode-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .mode-desc{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .select,
    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
    }

    .select:focus,
    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
      white-space:pre-wrap;
    }

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .stage-wrap{
      overflow:auto;
      background:
        linear-gradient(rgba(0,0,0,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.025) 1px, transparent 1px),
        #f1f3f8;
      background-size:24px 24px;
      border-radius:24px;
      padding:24px;
      min-height:480px;
    }

    .stage-shell{
      width:max-content;
      min-width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
    }

    .stage-sign{
      min-width:320px;
      max-width:720px;
      text-align:center;
      padding:14px 24px;
      border-radius:22px 22px 40px 40px;
      background:linear-gradient(180deg,#111111 0%,#2c2c2e 100%);
      color:#fff;
      font-size:17px;
      font-weight:800;
      letter-spacing:.16em;
      box-shadow:0 14px 30px rgba(17,17,17,.18);
    }

    .seat-stage{
      position:relative;
      width:1200px;
      height:900px;
      background:
        linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,.25)),
        #f1f1f4;
      border:1px solid rgba(0,0,0,.07);
      border-radius:26px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.4), 0 8px 32px rgba(0,0,0,.06);
      overflow:hidden;
    }

    .seatmap-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      opacity:.96;
    }

    .seat{
      position:absolute;
      width:var(--seat-size);
      height:var(--seat-size);
      border-radius:10px;
      border:1.5px solid #111827;
      background:#fff;
      box-shadow:0 2px 5px rgba(0,0,0,.09);
      cursor:pointer;
      transition:transform .1s ease, box-shadow .1s ease, background .1s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:800;
      user-select:none;
      color:#111;
    }

    .seat:hover{
      transform:scale(1.08);
      z-index:10;
      box-shadow:0 4px 12px rgba(0,0,0,.13);
    }

    .seat.selected{
      background:#111827 !important;
      color:#fff !important;
      border-color:#111827 !important;
      box-shadow:0 0 0 3px rgba(17,24,39,.14);
      z-index:8;
    }

    .seat.disabled{
      background:#d1d5db !important;
      border-color:#9ca3af !important;
      color:#6b7280 !important;
      cursor:not-allowed;
    }

    .seat.sold{
      background:#6b7280 !important;
      border-color:#6b7280 !important;
      color:#fff !important;
      cursor:not-allowed;
    }

    .seat.hold-other{
      background:#f59e0b !important;
      border-color:#d97706 !important;
      color:#fff !important;
      cursor:not-allowed;
    }

    .seat.mine{
      background:#2563eb !important;
      border-color:#2563eb !important;
      color:#fff !important;
    }

    .seat.free{
      background:#fff;
    }

    .legend{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:7px;
      font-size:12px;
      font-weight:800;
      color:#374151;
    }

    .legend-dot{
      width:14px;
      height:14px;
      border-radius:4px;
      flex-shrink:0;
    }

    .free-seat-box{
      border:1px dashed var(--line);
      border-radius:20px;
      padding:18px;
      background:#fafafa;
      line-height:1.9;
      color:var(--muted);
      font-size:14px;
      white-space:pre-wrap;
    }

    .side-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:20px;
      position:sticky;
      top:82px;
    }

    @media (max-width:1100px){
      .side-card{
        position:static;
      }
    }

    .side-title{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .side-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:18px;
      padding-top:16px;
      border-top:1px solid var(--line);
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .summary-row strong{
      color:#111;
      text-align:right;
    }

    .summary-detail{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .summary-item{
      border:1px solid rgba(0,0,0,.06);
      border-radius:18px;
      background:#fafafa;
      padding:12px 14px;
    }

    .summary-item-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      line-height:1.7;
    }

    .summary-item-sub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
      white-space:pre-wrap;
    }

    .notice{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.05);
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .notice.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.10);
      color:var(--green);
    }

    .action-stack{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .hidden{
      display:none !important;
    }

    .loading,
    .empty{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.95;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a class="back-link" id="backLink" href="ticket.html">← 返回活動頁</a>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="my-orders.html">我的訂單</a>
        </div>
      </footer>

      <div class="bottom-note">
        建立訂單後，系統會暫時保留座位與票券。若未於期限內完成後續流程，系統可釋出保留。
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      getDocs,
      collection,
      query,
      where,
      limit,
      onSnapshot,
      runTransaction,
      Timestamp,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function getSafeNumber(value, fallback = 0){
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input?.toDate === "function") return input.toDate();
      const d = new Date(input);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "日期未定";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function formatPrice(value){
      const num = Number(value || 0);
      if (!num) return "免費";
      return `NT$ ${num.toLocaleString("zh-Hant")}`;
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden" };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended" };
      return { text:"受理中", key:"selling" };
    }

    function canCreateOrder(event){
      return getEventStatus(event).key === "selling";
    }

    function getEventVenue(event){

      );
    }

    function getSeatingEnabled(event){
      if (event?.seatingEnabled === true) return true;
      const ticketTypes = Array.isArray(event?.ticketTypes) ? event.ticketTypes : [];
      return ticketTypes.some(t => t?.requiresSeat === true);
    }

    function getSeatingMode(event){
      const mode = lower(event?.seatingMode || "");
      if (mode) return mode;

      const ticketTypes = Array.isArray(event?.ticketTypes) ? event.ticketTypes : [];
      const hasSeat = ticketTypes.some(t => t?.requiresSeat === true);
      return hasSeat ? "assigned" : "free";
    }

    function getSeatMapEnabled(event){

    function getMaxSeatsPerOrder(event){

    function getSectionLabel(sectionId){
      const value = lower(sectionId);
      if (!value) return "未分區";
      if (value === "vip") return "VIP";
      if (value === "a") return "A 區";
      if (value === "b") return "B 區";
      if (value === "c") return "C 區";
      if (value === "d") return "D 區";
      return sectionId || "未分區";
    }

    function getSectionColor(sectionId){
      const s = lower(sectionId);
      if (s === "vip") return "#ff375f";
      if (s === "a") return "#0071e3";

    function getEventSchoolId(event){

        event?.ownerSchoolId ||
        event?.schoolId ||

        event?.campusSchoolId ||

    function getEventSchoolName(event){

    function buildEligibilityReason({
      loggedIn,
      eventSchoolName,
      matchedSchool,
      restrictedByList,
      matchedWhitelist,
      restrictedListHint
    }){
      if (!loggedIn) {
        return "請先登入後再報名，或輸入有效公關代碼。";
      }

      if (!matchedSchool) {
        return `你尚未完成此活動所屬學校${eventSchoolName ? `「${eventSchoolName}」` : ""}的校園驗證，因此目前不能報名。若你有公關代碼，可輸入公關代碼略過限制。`;
      }

      if (restrictedByList && !matchedWhitelist) {
        return restrictedListHint || "這場活動有匯入限制名單，你目前不在名單內，因此不能報名。若你有公關代碼，可輸入公關代碼略過限制。";
      }

      return "目前無法確認報名資格，請稍後再試。";
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      if (!snap.exists()) return null;
      const event = { id: snap.id, ...(snap.data() || {}) };

      // 如果活動沒有 ownerSchoolName，從 partnerSchools 查
      if (!event.ownerSchoolName && event.ownerSchoolId) {
        try {
          const schoolSnap = await getDoc(doc(db, "partnerSchools", event.ownerSchoolId));
          if (schoolSnap.exists()) {
            const schoolData = schoolSnap.data() || {};
            event.ownerSchoolName = norm(schoolData.name || "");
            event.ownerSchoolRestrictedHint = norm(schoolData.restrictedListHint || "");
          }
        } catch (_) {}
      }

      return event;
    }

    async function loadCurrentUserProfile(){
      if (!currentUser) {
        currentUserProfile = null;
        return null;
      }

      try {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        currentUserProfile = snap.exists() ? (snap.data() || {}) : {};

        // 若 users 裡沒有 verifiedSchoolId，從 email_index 補
        if (!currentUserProfile.verifiedSchoolId && currentUser.email) {

            if (eiSnap.exists()) {
              const eiData = eiSnap.data() || {};

    async function loadWhitelistInfo(){
      try {
        const metaRef = doc(db, "events", eventId, "allowedUsers", "meta");
        const metaSnap = await getDoc(metaRef).catch(() => null);

        const listQuery = query(collection(db, "events", eventId, "allowedUsers"), limit(10));
        const listSnap = await getDocs(listQuery).catch(() => null);

        const hasImportedDocs = !!(listSnap && listSnap.docs.some(d => d.id !== "meta"));
        const metaEnabled = !!(metaSnap && metaSnap.exists() && metaSnap.data()?.enabled === true);

        return {
          restrictedByList: metaEnabled || hasImportedDocs
        };
      } catch (err) {
        console.error("loadWhitelistInfo failed:", err);
        return { restrictedByList:false };
      }
    }

    async function checkWhitelistMatchForUser(){
      if (!currentUser) return false;

      const emailKey = lower(currentUser.email || "");
      const matchFields = Array.isArray(currentEvent?.allowedUserMatchFields)
        ? currentEvent.allowedUserMatchFields
        : [];

      // 取得學號與學校信箱（從已載入的 currentUserProfile 取，不需要額外查詢）
      const studentId = norm(currentUserProfile?.studentId || currentUserProfile?.studentCode || "");
      const schoolEmail = lower(currentUserProfile?.schoolEmail || "");

      // 欄位對應值
      const fieldValueMap = {
        email: emailKey,
        schoolEmail: schoolEmail,
        std_id: studentId,
        studentId: studentId,
        uid: currentUser.uid
      };

      const keysToCheck = new Set();

      // 單欄位 fallback
      keysToCheck.add(currentUser.uid);
      if (emailKey) keysToCheck.add(emailKey);
      if (schoolEmail && schoolEmail !== emailKey) keysToCheck.add(schoolEmail);
      if (studentId) keysToCheck.add(studentId);

      // 依照活動 matchFields 組合 key（例如 std_id｜email）
      if (matchFields.length >= 2) {
        const compositeKey = matchFields
          .map(f => norm(fieldValueMap[f] || ""))
          .join("｜");
        if (compositeKey && !compositeKey.split("｜").every(p => !p)) {
          keysToCheck.add(compositeKey);
        }
      }

      try {
        const snaps = await Promise.all(
          [...keysToCheck].map(key =>
            getDoc(doc(db, "events", eventId, "allowedUsers", key)).catch(() => null)
          )
        );

        const matchedDoc = snaps.find(s => s && s.exists());
        if (!matchedDoc) return false;

        const data = matchedDoc.data() || {};
        if ("canRegister" in data && data.canRegister === false) return false;

        return true;
      } catch (err) {
        console.error("checkWhitelistMatchForUser failed:", err);
        return false;
      }
    }

    async function loadSignupEligibility(){
      eligibilityState = {
        loading: true,
        checked: false,
        eligible: false,
        restrictedByList: false,
        matchedWhitelist: false,
        matchedSchool: false,
        eventSchoolId: "",
        eventSchoolName: "",
        reason: "資格檢查中…"
      };

      if (!currentEvent) {
        eligibilityState.loading = false;
        eligibilityState.checked = true;
        eligibilityState.reason = "找不到活動資料。";
        return eligibilityState;
      }

      const eventSchoolId = getEventSchoolId(currentEvent);
      const eventSchoolName = getEventSchoolName(currentEvent);

      if (hasPromoOverride()) {
        eligibilityState = {
          loading: false,
          checked: true,
          eligible: true,
          restrictedByList: false,
          matchedWhitelist: false,
          matchedSchool: false,
          eventSchoolId,
          eventSchoolName,
          reason: "已套用有效公關代碼，可略過名單與校園驗證限制。"
        };
        return eligibilityState;
      }

      const loggedIn = !!currentUser;

      if (!loggedIn) {
        eligibilityState = {
          loading: false,
          checked: true,
          eligible: false,
          restrictedByList: false,
          matchedWhitelist: false,
          matchedSchool: false,
          eventSchoolId,
          eventSchoolName,
          reason: buildEligibilityReason({
            loggedIn:false,
            eventSchoolName,
            matchedSchool:false,
            restrictedByList:false,
            matchedWhitelist:false,
            restrictedListHint: norm(currentEvent?.ownerSchoolRestrictedHint || "")
          })
        };
        return eligibilityState;
      }

      if (!currentUserProfile) {
        await loadCurrentUserProfile();
      }

      const verifiedSchoolId = norm(currentUserProfile?.verifiedSchoolId || "");
      const matchedSchool = !!eventSchoolId && verifiedSchoolId === eventSchoolId;

      const whitelistInfo = await loadWhitelistInfo();
      const restrictedByList = whitelistInfo.restrictedByList;
      const matchedWhitelist = restrictedByList ? await checkWhitelistMatchForUser() : false;

      const eligible = restrictedByList
        ? (matchedSchool && matchedWhitelist)
        : matchedSchool;

      eligibilityState = {
        loading:false,
        checked:true,
        eligible,
        restrictedByList,
        matchedWhitelist,
        matchedSchool,
        eventSchoolId,
        eventSchoolName,
        reason: eligible
          ? (
              restrictedByList
                ? `你已完成${eventSchoolName ? `「${eventSchoolName}」` : "本活動學校"}校園驗證，且在允許名單內，可以報名。`
                : `你已完成${eventSchoolName ? `「${eventSchoolName}」` : "本活動學校"}校園驗證，可以報名。`
            )
          : buildEligibilityReason({
              loggedIn:true,
              eventSchoolName,
              matchedSchool,
              restrictedByList,
              matchedWhitelist,
              restrictedListHint: norm(currentEvent?.ownerSchoolRestrictedHint || "")
            })
      };

      return eligibilityState;
    }

    function parseSeatDoc(d){
      const now = Date.now();
      const data = d.data() || {};
      const heldUntilDate = toDate(data.heldUntil);
      const heldUntilMs = heldUntilDate ? heldUntilDate.getTime() : 0;

      let computedStatus = norm(data.status || "available");
      if (computedStatus === "held" && heldUntilMs && heldUntilMs < now) {
        computedStatus = "available";
      }

      return {
        id: d.id,
        ...data,
        x: getSafeNumber(data.x, 0),
        y: getSafeNumber(data.y, 0),
        price: getSafeNumber(data.price, 0),
        rotation: getSafeNumber(data.rotation, 0),
        label: norm(data.label || d.id),
        row: norm(data.row || ""),
        seatNumber: norm(data.seatNumber || ""),
        sectionId: norm(data.sectionId || ""),
        floor: norm(data.floor || "1F"),
        heldBy: norm(data.heldBy || ""),
        soldToUid: norm(data.soldToUid || ""),
        orderId: norm(data.orderId || ""),
        computedStatus,
        heldUntilDate
      };
    }

    async function loadSeats(){
      const snap = await getDocs(collection(db, "events", eventId, "seats"));
      allSeats = snap.docs.map(parseSeatDoc);
    }

    function startSeatListener(){
      if (seatUnsubscribe) seatUnsubscribe();
      seatUnsubscribe = onSnapshot(
        collection(db, "events", eventId, "seats"),
        (snap) => {
          allSeats = snap.docs.map(parseSeatDoc);
          renderPage();
        },
        (err) => console.warn("seat listener error:", err)
      );
    }

    function normalizeTicketTypeItem(item, index){
      const requiresSeat = item?.requiresSeat === true;

      const promoCodeIds = [
        ...(Array.isArray(item?.promoCodeIds) ? item.promoCodeIds : []),
        ...(Array.isArray(item?.promoCodes) ? item.promoCodes : []),
        ...(Array.isArray(item?.bindPromoCodeIds) ? item.bindPromoCodeIds : []),
        ...(Array.isArray(item?.bindCodes) ? item.bindCodes : []),
        ...(item?.promoCodeId ? [item.promoCodeId] : []),
        ...(item?.promoCode ? [item.promoCode] : []),
        ...(item?.bindPromoCodeId ? [item.bindPromoCodeId] : []),
        ...(item?.bindCode ? [item.bindCode] : [])
      ]
        .map(v => norm(v))
        .filter(Boolean);

      return {
        id: norm(item?.id || `ticket_${index + 1}`),
        name: norm(item?.name || `票種 ${index + 1}`),
        description: norm(item?.description || ""),
        price: getSafeNumber(item?.price, 0),
        enabled: item?.enabled !== false,
        visibility: lower(item?.visibility || item?.type || "public"),
        maxPerOrder: Math.max(1, getSafeNumber(item?.maxPerOrder, getMaxSeatsPerOrder(currentEvent))),
        requiresSeat,
        promoCodeIds,
        sectionIds: Array.isArray(item?.sectionIds) ? item.sectionIds.map(v => norm(v)).filter(Boolean) : []
      };
    }

    function getRawTicketTypes(event){
      const raw = Array.isArray(event?.ticketTypes) ? event.ticketTypes : [];
      if (!raw.length){
        return [{
          id:"general",
          name:"一般票",
          description:"此活動目前未細分票種。",
          price:0,
          enabled:true,
          visibility:"public",
          maxPerOrder:getMaxSeatsPerOrder(event),
          requiresSeat:getSeatingEnabled(event) && getSeatingMode(event) === "assigned",
          promoCodeIds:[],
          sectionIds:[]
        }];
      }
      return raw.map(normalizeTicketTypeItem).filter(item => item.enabled);
    }

    function getPromoDocTicketTypeId(promo){
      return norm(
        promo?.ticketTypeId ||
        promo?.bindTicketTypeId ||
        promo?.targetTicketTypeId ||
        promo?.targetTypeId ||
        promo?.typeId ||
        promo?.bindTypeId ||
        promo?.ticketType?.id ||
        ""
      );
    }

    function getPromoDocTicketTypeName(promo){
      return norm(
        promo?.ticketTypeName ||
        promo?.bindTicketTypeName ||
        promo?.targetTicketTypeName ||
        promo?.targetTypeName ||
        promo?.typeName ||
        promo?.bindTypeName ||
        promo?.ticketType?.name ||
        ""
      );
    }

    function findPromoBoundTicketType(promo){
      const directId = lower(getPromoDocTicketTypeId(promo));
      const directName = lower(getPromoDocTicketTypeName(promo));
      const promoId = lower(norm(promo?.id || ""));
      const promoCode = lower(norm(promo?.code || ""));

      if (directId) {
        const hitById = allTicketTypes.find(type => lower(type.id) === directId);
        if (hitById) return hitById;
      }

      if (directName) {
        const hitByName = allTicketTypes.find(type => lower(type.name) === directName);
        if (hitByName) return hitByName;
      }

      const hitByPromoBinding = allTicketTypes.find(type => {
        const ids = Array.isArray(type.promoCodeIds) ? type.promoCodeIds.map(v => lower(v)) : [];
        return (promoId && ids.includes(promoId)) || (promoCode && ids.includes(promoCode));
      });
      if (hitByPromoBinding) return hitByPromoBinding;

      return null;
    }

    function getPromoAllowsPublic(){
      // 後台設定：公關代碼持有者是否也可以買一般票
      return currentEvent?.promoAllowsPublic === true;
    }

    function getVisibleTicketTypes(){
      if (hasPromoOverride()) {
        const boundType = findPromoBoundTicketType(promoState.data);
        const allowPublic = getPromoAllowsPublic();

        return allTicketTypes.filter(type => {
          if (type.visibility === "promo") {
            return !!boundType && type.id === boundType.id;
          }
          // 一般票：只有後台開啟「公關代碼可買一般票」才顯示
          return allowPublic;
        });
      }

      if (!canPassEligibility()) {
        return [];
      }

      return allTicketTypes.filter(type => type.visibility !== "promo");
    }

    function getSelectedTicketType(){
      return visibleTicketTypes.find(t => t.id === selectedTicketTypeId) || null;
    }

    function selectedTicketNeedsSeat(){
      const type = getSelectedTicketType();
      return !!type && type.requiresSeat === true;
    }

    function getRequiredSeatCount(){
      if (!selectedTicketNeedsSeat()) return 0;
      return Number(selectedQty || 0);
    }

    function getTotalQuantity(){
      return Number(selectedQty || 0);
    }

    function getTotalAmount(){
      const type = getSelectedTicketType();
      if (!type) return 0;
      return Number(type.price || 0) * Number(selectedQty || 0);
    }

    function getSelectedItems(){
      const type = getSelectedTicketType();
      if (!type || !selectedQty) return [];
      return [{
        ticketTypeId: type.id,
        ticketTypeName: type.name,
        unitPrice: Number(type.price || 0),
        quantity: Number(selectedQty || 0),
        subtotal: Number(type.price || 0) * Number(selectedQty || 0),
        requiresSeat: type.requiresSeat === true,
        sectionIds: Array.isArray(type.sectionIds) ? [...type.sectionIds] : [],
        visibility: type.visibility
      }];
    }

    function goStep(step){
      if (!canPassEligibility()) return;
      selectedStep = step;
      renderPage();
    }

    function selectSeatMode(mode){
      if (!canPassEligibility()) return;
      selectedSeatMode = mode;
      if (selectedStep < 2) {
        selectedStep = 2;
      }
      renderPage();
    }

    function selectTicketType(typeId){
      if (!canPassEligibility()) return;
      selectedTicketTypeId = typeId;
      selectedQty = 0;
      selectedSeatIds = [];
      selectedStep = 3;
      renderPage();
    }

    function setQuantity(qty){
      if (!canPassEligibility()) return;
      selectedQty = Number(qty || 0);
      const need = getRequiredSeatCount();
      if (selectedSeatIds.length > need) {
        selectedSeatIds = selectedSeatIds.slice(0, need);
      }
      renderPage();
    }

    function seatIsSelectable(seat){
      if (!canPassEligibility()) return false;

      if (!seat) return false;

      const myUid = currentUser?.uid || "";
      const status = seat.computedStatus;

      if (status === "sold") return false;
      if (status === "disabled") return false;
      if (status === "held" && seat.heldBy && seat.heldBy !== myUid) return false;

      const need = getRequiredSeatCount();
      if (need <= 0) return false;

      const type = getSelectedTicketType();
      if (!type) return false;

      if (Array.isArray(type.sectionIds) && type.sectionIds.length) {
        const allowed = type.sectionIds.map(v => norm(v));
        if (!allowed.includes(norm(seat.sectionId || ""))) return false;
      }

      return true;
    }

    function getSeatVisualState(seat){
      const myUid = currentUser?.uid || "";
      const status = seat.computedStatus;

      if (selectedSeatIds.includes(seat.id)) return "selected";
      if (status === "sold") return "sold";
      if (status === "disabled") return "disabled";
      if (status === "held" && seat.heldBy && seat.heldBy === myUid) return "mine";
      if (status === "held" && seat.heldBy && seat.heldBy !== myUid) return "hold-other";
      return "free";
    }

    function toggleSeatSelect(seatId){
      if (!canPassEligibility()) return;

      const seat = allSeats.find(s => s.id === seatId);
      if (!seat) return;
      if (!seatIsSelectable(seat)) return;

      const need = getRequiredSeatCount();
      if (need <= 0) return;

      if (selectedSeatIds.includes(seatId)) {
        selectedSeatIds = selectedSeatIds.filter(id => id !== seatId);
        // 釋放 hold
        releaseSeat(seatId).catch(e => console.warn("releaseSeat error", e));
        renderPage();
        return;
      }

      if (selectedSeatIds.length >= need) {
        alert(`目前最多只能選 ${need} 個座位。`);
        return;
      }

      selectedSeatIds = [...selectedSeatIds, seatId];
      renderPage();
      // 寫入 hold
      holdSeat(seatId).catch(e => {
        console.warn("holdSeat error", e);
        selectedSeatIds = selectedSeatIds.filter(id => id !== seatId);
        renderPage();
        alert("座位暫時無法保留，請重新選擇。");
      });

    async function holdSeat(seatId){
      if (!currentUser) return;
      const ref = doc(db, "events", eventId, "seats", seatId);
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(ref);
        if (!snap.exists()) throw new Error("座位不存在");
        const data = snap.data() || {};
        const status = norm(data.status || "available");
        const heldBy = norm(data.heldBy || "");
        const heldUntilMs = data.heldUntil?.toMillis ? data.heldUntil.toMillis() : 0;
        const holdExpired = heldUntilMs && heldUntilMs < Date.now();

        if (status === "sold") throw new Error("此座位已售出");
        if (status === "disabled") throw new Error("此座位不可使用");
        if (heldBy && heldBy !== currentUser.uid && !holdExpired) throw new Error("此座位已被他人保留");

        tx.update(ref, {
          status: "held",
          heldBy: currentUser.uid,
          heldUntil: Timestamp.fromDate(new Date(Date.now() + HOLD_MINUTES * 60000)),
          updatedAt: serverTimestamp()
        });
      });
    }

    async function releaseSeat(seatId){
      if (!currentUser) return;
      const ref = doc(db, "events", eventId, "seats", seatId);
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(ref);
        if (!snap.exists()) return;
        const data = snap.data() || {};
        if (norm(data.heldBy || "") !== currentUser.uid) return;
        if (norm(data.status || "") === "sold") return;
        tx.update(ref, {
          status: "available",
          heldBy: "",
          heldUntil: null,
          updatedAt: serverTimestamp()
        });
      });
    }

    function autoPickSeats(){
      if (!canPassEligibility()) return;

      const need = getRequiredSeatCount();
      if (need <= 0) {
        selectedSeatIds = [];
        renderPage();
        return;
      }

      const selectable = allSeats.filter(seat => seatIsSelectable(seat));
      if (selectable.length < need) {
        alert("可選座位不足。");
        return;
      }

      selectable.sort((a, b) => {
        const fa = norm(a.floor || "");
        const fb = norm(b.floor || "");
        if (fa !== fb) return fa.localeCompare(fb, "zh-Hant");
        if (a.y !== b.y) return a.y - b.y;
        return a.x - b.x;
      });

      selectedSeatIds = selectable.slice(0, need).map(seat => seat.id);
      renderPage();
    }

                <span>需選座位</span>
                <strong>${esc(requiredSeatCount)}</strong>
              </div>
              <div class="summary-row">
                <span>已選座位</span>
                <strong>${esc(selectedSeatIds.length)}</strong>
              </div>
            </div>

            <div class="summary-detail">
              ${renderSelectedSummaryItems()}
              ${selectedTicketNeedsSeat() ? renderSeatSummary() : ""}
            </div>

            <div class="notice ${notice.className}">${esc(notice.text)}</div>

            <div class="action-stack">
              <button class="btn btn-primary" id="createOrderBtn" ${canOrder ? "" : "disabled"}>建立訂單</button>
              <a class="btn" href="ticket.html?id=${encodeURIComponent(currentEvent.id)}">返回活動資訊</a>
            </div>
          </aside>
        </div>
      `;

      bindEvents();
    }

    function bindEvents(){
      const goStep2DirectBtn = document.getElementById("goStep2DirectBtn");
      const goStep2Btn = document.getElementById("goStep2Btn");
      const goStep3Btn = document.getElementById("goStep3Btn");
      const backToStep1Btn = document.getElementById("backToStep1Btn");
      const backToStep2Btn = document.getElementById("backToStep2Btn");
      const completeStepBtn = document.getElementById("completeStepBtn");

      if (goStep2DirectBtn) goStep2DirectBtn.onclick = () => goStep(2);
      if (goStep2Btn) goStep2Btn.onclick = () => goStep(2);
      if (goStep3Btn) goStep3Btn.onclick = () => goStep(3);
      if (backToStep1Btn) backToStep1Btn.onclick = () => goStep(1);
      if (backToStep2Btn) backToStep2Btn.onclick = () => goStep(2);

      document.querySelectorAll("[data-mode-card]").forEach(el => {
        el.addEventListener("click", () => {
          if (!canPassEligibility()) return;
          selectSeatMode(el.dataset.modeCard || "");
        });
      });

      document.querySelectorAll("[data-select-ticket]").forEach(el => {
        el.addEventListener("click", () => {
          if (!canPassEligibility()) return;
          selectTicketType(el.dataset.selectTicket || "");
        });
      });

      const qtySelect = document.getElementById("qtySelect");
      if (qtySelect) {
        qtySelect.addEventListener("change", e => {
          if (!canPassEligibility()) return;
          setQuantity(e.target.value);
        });
      }

      if (completeStepBtn) {
        completeStepBtn.addEventListener("click", () => {
          if (!canPassEligibility()) {
            alert(eligibilityState.reason || "你目前沒有報名資格。");
            return;
          }

          const type = getSelectedTicketType();

          if (!type) {
            alert("請先選擇票種。");
            return;
          }

          if (!selectedQty || selectedQty <= 0) {
            alert("請先選擇購買張數。");
            return;
          }

          if (type.requiresSeat === true) {
            if (!selectedSeatMode) {
              alert("請先選擇手動選位或電腦選位。");
              goStep(1);
              return;
            }

            if (selectedSeatMode === "auto") {
              autoPickSeats();
            }

            const need = getRequiredSeatCount();
            if (selectedSeatIds.length !== need) {
              alert("請先完成座位選擇。");
              return;
            }
          }

          alert("已完成本次選擇，可以直接建立訂單。");
        });
      }

      document.querySelectorAll("[data-seat-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (!canPassEligibility()) return;
          if (selectedSeatMode !== "manual") return;
          const seatId = btn.dataset.seatId || "";
          toggleSeatSelect(seatId);
        });
      });

      const manualSelectBtn = document.getElementById("manualSelectBtn");
      const autoSelectBtn = document.getElementById("autoSelectBtn");
      const clearSeatBtn = document.getElementById("clearSeatBtn");

      if (manualSelectBtn) {
        manualSelectBtn.onclick = () => {
          if (!canPassEligibility()) return;
          selectedSeatMode = "manual";
          renderPage();
        };
      }

      if (autoSelectBtn) {
        autoSelectBtn.onclick = () => {
          if (!canPassEligibility()) return;
          selectedSeatMode = "auto";
          autoPickSeats();
        };
      }

      if (clearSeatBtn) {
        clearSeatBtn.onclick = () => {
          if (!canPassEligibility()) return;
          clearSeats();
        };
      }

      const promoCodeInput = document.getElementById("promoCodeInput");
      const applyPromoBtn = document.getElementById("applyPromoBtn");
      const clearPromoBtn = document.getElementById("clearPromoBtn");

      if (promoCodeInput) {
        promoCodeInput.addEventListener("input", e => {
          promoState.code = e.target.value || "";
        });

        promoCodeInput.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            applyPromoCode();
          }
        });
      }

      if (applyPromoBtn) applyPromoBtn.onclick = applyPromoCode;
      if (clearPromoBtn) clearPromoBtn.onclick = clearPromoCode;

      const createOrderBtn = document.getElementById("createOrderBtn");
      if (createOrderBtn) {
        createOrderBtn.onclick = createOrder;
      }
    }

    async function getPromoCodeDataFromSubcollection(cleanCode){
      const ref = doc(db, "events", eventId, "promoCodes", cleanCode);
      const snap = await getDoc(ref);

      if (!snap.exists()) return null;

      const data = snap.data() || {};
      const enabled = data.enabled === true;
      const maxUse = getSafeNumber(data.maxUse ?? data.maxUses ?? 0, 0);
      const usedCount = getSafeNumber(data.usedCount ?? 0, 0);

      if (!enabled) throw new Error("此公關代碼未啟用");
      if (maxUse > 0 && usedCount >= maxUse) throw new Error("此公關代碼已達使用上限");

      return {
        id: snap.id,
        code: cleanCode,
        source: "subcollection",
        ...data
      };
    }

    function getPromoCodeDataFromEventArray(cleanCode){
      const arr = Array.isArray(currentEvent?.promoCodes) ? currentEvent.promoCodes : [];
      const hit = arr.find(item => lower(item.code || item.id || "") === lower(cleanCode));
      if (!hit) return null;

      const enabled = hit.enabled === true;
      const maxUse = getSafeNumber(hit.maxUse ?? hit.maxUses ?? 0, 0);
      const usedCount = getSafeNumber(hit.usedCount ?? 0, 0);

      if (!enabled) throw new Error("此公關代碼未啟用");
      if (maxUse > 0 && usedCount >= maxUse) throw new Error("此公關代碼已達使用上限");

      return {
        id: norm(hit.id || hit.code || cleanCode),
        code: norm(hit.code || cleanCode),
        source: "event_array",
        ...hit
      };
    }

    async function applyPromoCode(){
      const code = norm(promoState.code || "").toUpperCase();

      if (!code) {
        promoState.error = "請輸入公關代碼";
        promoState.applied = false;
        promoState.data = null;
        visibleTicketTypes = getVisibleTicketTypes();
        renderPage();
        return;
      }

      promoState.loading = true;
      promoState.error = "";
      renderPage();

      try {
        let promo = null;
        let subcollectionError = null;

        try {
          promo = await getPromoCodeDataFromSubcollection(code);
        } catch (err) {
          subcollectionError = err;
        }

        if (!promo && !subcollectionError) {
          promo = getPromoCodeDataFromEventArray(code);
        }

        if (!promo && subcollectionError) {
          throw subcollectionError;
        }

        if (!promo) {
          promo = getPromoCodeDataFromEventArray(code);
        }

        if (!promo) {
          throw new Error("查無此公關代碼");
        }

        const boundType = findPromoBoundTicketType(promo);
        if (!boundType) {
          throw new Error("此公關代碼尚未綁定票種");
        }

        promoState.applied = true;
        promoState.data = {
          ...promo,
          ticketTypeId: boundType.id,
          ticketTypeName: boundType.name || "",
          source: promo?.source || "event_array"
        };
        promoState.error = "";

        await loadSignupEligibility();

        visibleTicketTypes = getVisibleTicketTypes();
        selectedTicketTypeId = "";
        selectedQty = 0;
        selectedSeatIds = [];
        selectedStep = 2;
      } catch (err) {
        console.error(err);
        promoState.applied = false;
        promoState.data = null;
        promoState.error = err?.message || "公關代碼驗證失敗";
        await loadSignupEligibility();
      } finally {
        promoState.loading = false;
        renderPage();
      }
    }

    async function clearPromoCode(){
      promoState = {
        code: "",
        applied: false,
        loading: false,
        data: null,
        error: ""
      };

      await loadSignupEligibility();

      visibleTicketTypes = getVisibleTicketTypes();
      selectedTicketTypeId = "";
      selectedQty = 0;
      selectedSeatIds = [];
      selectedStep = 1;
      renderPage();
    }

    function buildOrderItems(){
      const items = getSelectedItems();
      return items.map(item => ({
        ticketTypeId: item.ticketTypeId,
        ticketTypeName: item.ticketTypeName,
        quantity: Number(item.quantity || 0),
        unitPrice: Number(item.unitPrice || 0),
        subtotal: Number(item.subtotal || 0),
        requiresSeat: item.requiresSeat === true,
        sectionIds: Array.isArray(item.sectionIds) ? item.sectionIds : [],
        visibility: item.visibility || "public"
      }));
    }

    function getExpiresAtDate(){
      return new Date(Date.now() + HOLD_MINUTES * 60 * 1000);
    }

    async function createOrder(){
      if (!currentEvent) return;

      if (!currentUser) {
        location.href = buildLoginRedirectUrl();
        return;
      }

      await loadCurrentUserProfile();
      await loadSignupEligibility();

      if (!canPassEligibility()) {
        alert(eligibilityState.reason || "你目前沒有報名資格。");
        return;
      }

      if (!canCreateOrder(currentEvent)) {
        alert("目前尚未開放建立訂單。");
        return;
      }

      const type = getSelectedTicketType();
      const totalQty = getTotalQuantity();
      const totalAmount = getTotalAmount();
      const requiredSeats = getRequiredSeatCount();

      if (!type) {
        alert("請先選擇票種。");
        return;
      }

      if (!totalQty || totalQty <= 0) {
        alert("請先選擇至少 1 張票。");
        return;
      }

      if (type.requiresSeat === true) {
        if (!selectedSeatMode) {
          alert("請先選擇手動選位或電腦選位。");
          return;
        }

        if (selectedSeatIds.length !== requiredSeats) {
          alert(`目前需要選擇 ${requiredSeats} 個座位。`);
          return;
        }
      }

      if (promoState.applied && promoState.data) {
        const allowedTypeId = lower(getPromoDocTicketTypeId(promoState.data) || promoState.data.ticketTypeId || "");
        const wrongSelection = getSelectedItems().some(item => item.visibility === "promo" && lower(item.ticketTypeId) !== allowedTypeId);
        if (wrongSelection) {
          alert("目前公關代碼只允許購買指定公關票種。");
          return;
        }
      }

      const btn = document.getElementById("createOrderBtn");
      const oldText = btn ? btn.textContent : "";
      if (btn) {
        btn.disabled = true;
        btn.textContent = "建立中…";
      }

      try {
        const eventRef = doc(db, "events", eventId);
        const orderRef = doc(collection(db, "events", eventId, "orders"));
        const seatRefs = selectedSeatIds.map(id => doc(db, "events", eventId, "seats", id));
        const expiresAtDate = getExpiresAtDate();
        const expiresAt = Timestamp.fromDate(expiresAtDate);

        const promoCodeValue = promoState.applied ? norm(promoState.data?.code || promoState.data?.id || "") : "";
        const promoSource = promoState.applied ? norm(promoState.data?.source || "") : "";
        const promoRef = (promoState.applied && promoSource === "subcollection" && promoCodeValue)
          ? doc(db, "events", eventId, "promoCodes", promoCodeValue)
          : null;

        await runTransaction(db, async (tx) => {
          const freshEventSnap = await tx.get(eventRef);
          if (!freshEventSnap.exists()) throw new Error("活動不存在");

          const freshEvent = freshEventSnap.data() || {};
          const freshStatus = getEventStatus(freshEvent);
          if (freshStatus.key !== "selling") throw new Error("目前不能建立訂單");

          // 每人訂單數限制
          const maxOrdersPerUser = parseInt(freshEvent.maxOrdersPerUser || "0", 10) || 0;
          if (maxOrdersPerUser > 0) {
            const existingOrdersSnap = await getDocs(query(
              collection(db, "events", eventId, "orders"),
              where("buyerUid", "==", currentUser.uid)
            ));
            const validOrders = existingOrdersSnap.docs.filter(d => {
              const s = norm(d.data().status || "");
              return !["cancelled", "expired", "failed", "void"].includes(s);
            });
            if (validOrders.length >= maxOrdersPerUser) {
              throw new Error(`每人最多只能建立 ${maxOrdersPerUser} 筆訂單，你已達上限。`);
            }
          }

          const eventSchoolId = getEventSchoolId(freshEvent);

          if (!promoState.applied) {
            const verifiedSchoolId = norm(currentUserProfile?.verifiedSchoolId || "");
            if (!eventSchoolId || verifiedSchoolId !== eventSchoolId) {
              throw new Error("你尚未完成此活動所屬學校的校園驗證。");
            }

            const emailKey = lower(currentUser.email || "");
            const studentId = norm(currentUserProfile?.studentId || currentUserProfile?.studentCode || "");
            const schoolEmail = lower(currentUserProfile?.schoolEmail || "");

            const keysToCheck = new Set([currentUser.uid]);
            if (emailKey) keysToCheck.add(emailKey);
            if (schoolEmail && schoolEmail !== emailKey) keysToCheck.add(schoolEmail);
            if (studentId) keysToCheck.add(studentId);

            const metaRef = doc(db, "events", eventId, "allowedUsers", "meta");
            const allowedRefs = [...keysToCheck].map(key =>
              doc(db, "events", eventId, "allowedUsers", key)
            );

            const [metaSnap, listSnap, ...allowedSnaps] = await Promise.all([
              tx.get(metaRef),
              getDocs(query(collection(db, "events", eventId, "allowedUsers"), limit(10))),
              ...allowedRefs.map(ref => tx.get(ref))
            ]);

            const metaEnabled = metaSnap.exists() && metaSnap.data()?.enabled === true;
            const hasImportedDocs = listSnap.docs.some(d => d.id !== "meta");
            const restrictedByList = metaEnabled || hasImportedDocs;

            const matchedDoc = allowedSnaps.find(s => s.exists());
            const matchedWhitelist = !!matchedDoc && (
              !("canRegister" in (matchedDoc.data() || {})) ||
              matchedDoc.data().canRegister !== false
            );

            if (restrictedByList && !matchedWhitelist) {
              throw new Error("你不在此活動允許的報名名單中。");
            }
          }

          const seatPayloads = [];
          for (const ref of seatRefs) {
            const snap = await tx.get(ref);
            if (!snap.exists()) throw new Error("有座位不存在，請重新整理");

            const seat = snap.data() || {};
            const heldUntilDate = toDate(seat.heldUntil);
            const holdExpired = heldUntilDate ? heldUntilDate.getTime() < Date.now() : true;
            const status = norm(seat.status || "available");
            const heldBy = norm(seat.heldBy || "");

            if (status === "sold") throw new Error("部分座位已售出，請重新選位");
            if (status === "disabled") throw new Error("部分座位不可使用，請重新選位");
            // 座位被他人 hold 且未過期 → 擋住
            if (heldBy && heldBy !== currentUser.uid && !holdExpired) {
              throw new Error("部分座位已被其他人保留，請重新選位");
            }
            // 座位必須是本人 hold 或未被 hold
            if (heldBy && heldBy !== currentUser.uid) {
              throw new Error("部分座位保留已過期或已被他人取得，請重新選位");
            }
            // 座位已有其他訂單綁定 → 擋住
            const seatOrderId = norm(seat.orderId || "");
            if (seatOrderId && seatOrderId !== orderRef.id) {
              // 確認那筆訂單是否還有效
              const existingOrderRef = doc(db, "events", eventId, "orders", seatOrderId);
              const existingOrderSnap = await tx.get(existingOrderRef);
              if (existingOrderSnap.exists()) {
                const existingOrder = existingOrderSnap.data() || {};
                const existingStatus = norm(existingOrder.status || "");
                if (!["cancelled", "expired", "failed"].includes(existingStatus)) {
                  throw new Error("部分座位已被其他訂單佔用，請重新選位");
                }
              }
            }

            seatPayloads.push({ ref, seat });
          }

          let promoPayload = null;

          if (promoState.applied && promoState.data) {
            if (promoSource === "subcollection" && promoRef) {
              const promoSnap = await tx.get(promoRef);
              if (!promoSnap.exists()) throw new Error("公關代碼不存在或已失效");

              promoPayload = promoSnap.data() || {};
              if (promoPayload.enabled !== true) throw new Error("此公關代碼未啟用");

              const maxUse = getSafeNumber(promoPayload.maxUse ?? promoPayload.maxUses ?? 0, 0);
              const usedCount = getSafeNumber(promoPayload.usedCount ?? 0, 0);

              if (maxUse > 0 && usedCount >= maxUse) {
                throw new Error("此公關代碼已達使用上限");
              }
            } else if (promoSource === "event_array") {
              const arr = Array.isArray(freshEvent?.promoCodes) ? freshEvent.promoCodes : [];
              const hit = arr.find(item => lower(item.code || item.id || "") === lower(promoCodeValue));

              if (!hit) throw new Error("公關代碼不存在或已失效");
              if (hit.enabled !== true) throw new Error("此公關代碼未啟用");

              const maxUse = getSafeNumber(hit.maxUse ?? hit.maxUses ?? 0, 0);
              const usedCount = getSafeNumber(hit.usedCount ?? 0, 0);

              if (maxUse > 0 && usedCount >= maxUse) {
                throw new Error("此公關代碼已達使用上限");
              }

              promoPayload = hit;
            }
          }

          // 座位維持 held 狀態，等 order-fill.html 確認完成後才改成 sold
          // heldUntil 延長到訂單過期時間，確保填寫期間座位不會被釋放
          seatPayloads.forEach(({ ref }) => {
            tx.update(ref, {
              heldBy: currentUser.uid,
              heldUntil: expiresAt,
              orderId: orderRef.id,
              updatedAt: serverTimestamp()
            });
          });

          tx.set(orderRef, {
            uid: currentUser.uid,
            buyerUid: currentUser.uid,
            buyerEmail: lower(currentUser.email || ""),
            eventId,
            eventTitle: norm(currentEvent.title || ""),
            status: "pending_payment",
            paymentStatus: "unpaid",
            fillStatus: "pending",
            seatingEnabled: getSeatingEnabled(currentEvent),
            seatingMode: type.requiresSeat ? "assigned" : "free",
            selectedSeatMode: norm(selectedSeatMode || ""),
            totalQuantity: totalQty,
            totalAmount,
            items: buildOrderItems(),
            selectedSeatIds: [...selectedSeatIds],
            selectedSeats: allSeats
              .filter(seat => selectedSeatIds.includes(seat.id))
              .map(seat => ({
                seatId: seat.id,
                label: norm(seat.label || seat.id),
                row: norm(seat.row || ""),
                seatNumber: norm(seat.seatNumber || ""),
                sectionId: norm(seat.sectionId || ""),
                sectionName: getSectionLabel(seat.sectionId || ""),
                floor: norm(seat.floor || "")
              })),
            promoCode: promoState.applied ? promoCodeValue : "",
            promoTicketTypeId: promoState.applied ? norm(promoState.data.ticketTypeId || getPromoDocTicketTypeId(promoState.data)) : "",
            promoTicketTypeName: promoState.applied ? norm(promoState.data.ticketTypeName || getPromoDocTicketTypeName(promoState.data)) : "",
            promoSource: promoState.applied ? promoSource : "",
            signupEligibilityChecked: true,
            signupEligibleBySchool: hasPromoOverride() ? false : eligibilityState.matchedSchool,
            signupEligibleByWhitelist: hasPromoOverride() ? false : eligibilityState.matchedWhitelist,
            signupEligibilityBypassPromo: hasPromoOverride(),
            eventSchoolId: getEventSchoolId(currentEvent),
            eventSchoolName: getEventSchoolName(currentEvent),
            expiresAt,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });

          if (promoState.applied && promoPayload) {
            if (promoSource === "subcollection" && promoRef) {
              tx.update(promoRef, {
                usedCount: getSafeNumber(promoPayload.usedCount ?? 0, 0) + 1,
                updatedAt: serverTimestamp()
              });
            } else if (promoSource === "event_array") {
              const arr = Array.isArray(freshEvent.promoCodes) ? [...freshEvent.promoCodes] : [];
              const idx = arr.findIndex(item => lower(item.code || item.id || "") === lower(promoCodeValue));

              if (idx >= 0) {
                arr[idx] = {
                  ...arr[idx],
                  usedCount: getSafeNumber(arr[idx].usedCount ?? 0, 0) + 1
                };

                tx.update(eventRef, {
                  promoCodes: arr,
                  updatedAt: serverTimestamp()
                });
              }
            }
          }
        });

        location.href = `order-fill.html?id=${encodeURIComponent(eventId)}&orderId=${encodeURIComponent(orderRef.id)}`;
      } catch (err) {
        console.error(err);
        alert(err?.message || "建立訂單失敗，請稍後再試。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = oldText || "建立訂單";
        }
      }
    }

    async function initPage(){
      if (!eventId) {
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      currentEvent = await getEventById(eventId);

      if (!currentEvent) {
        app.className = "empty";
        app.innerHTML = "找不到活動。";
        return;
      }

      if (currentUser) {
        await loadCurrentUserProfile();
      } else {
        currentUserProfile = null;
      }

      allTicketTypes = getRawTicketTypes(currentEvent);

      if (getSeatingEnabled(currentEvent) && getSeatingMode(currentEvent) === "assigned") {
        await loadSeats();
        startSeatListener();
      } else {
        allSeats = [];
      }

      await loadSignupEligibility();

      visibleTicketTypes = getVisibleTicketTypes();

      selectedStep = 1;
      selectedSeatMode = "";
      selectedTicketTypeId = "";
      selectedQty = 0;
      selectedSeatIds = [];

      renderPage();
    }

    onAuthStateChanged(auth, async user => {
      currentUser = user || null;
      updateAccountLinks(currentUser);

      try {
        await initPage();
      } catch (err) {
        console.error(err);
        app.className = "empty";
        app.innerHTML = "頁面載入失敗，請稍後再試。";
      }
    });
  </script>
