<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜選擇票種</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;

      --green:#166534;
      --green-bg:#dcfce7;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;

      --radius-xl:34px;
      --radius-lg:28px;
      --radius-md:20px;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 22px 88px;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:34px 30px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 56px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:14px;
      max-width:900px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-meta{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 390px;
      gap:20px;
      align-items:start;
    }

    @media (max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .ticket-list{
      display:grid;
      gap:16px;
    }

    .ticket-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .ticket-head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .ticket-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .ticket-title{
      margin:0;
      font-size:24px;
      line-height:1.3;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .ticket-price{
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
      white-space:nowrap;
    }

    .ticket-sub{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.9;
      white-space:pre-wrap;
    }

    .ticket-body{
      padding:20px;
    }

    .ticket-grid{
      display:grid;
      grid-template-columns:1fr 180px;
      gap:14px;
      align-items:end;
    }

    @media (max-width:680px){
      .ticket-grid{
        grid-template-columns:1fr;
      }
    }

    .meta-pills{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:700;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .select,
    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
    }

    .select:focus,
    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }

    .side-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:20px;
      position:sticky;
      top:82px;
    }

    @media (max-width:980px){
      .side-card{
        position:static;
      }
    }

    .side-title{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .side-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:18px;
      padding-top:16px;
      border-top:1px solid var(--line);
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .summary-row strong{
      color:#111;
      text-align:right;
    }

    .summary-detail{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .summary-item{
      border:1px solid rgba(0,0,0,.06);
      border-radius:18px;
      background:#fafafa;
      padding:12px 14px;
    }

    .summary-item-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      line-height:1.7;
    }

    .summary-item-sub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }

    .notice{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.05);
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .notice.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.10);
      color:var(--green);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .action-stack{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .loading,
    .empty{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.95;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    .seat-map-wrap{
      margin-top:16px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:20px;
      background:#fafafa;
      padding:14px;
    }

    .seat-map-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .seat-map-title{
      font-size:13px;
      font-weight:800;
      color:#111;
    }

    .seat-legend{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .seat-legend-item{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      color:var(--muted);
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
    }

    .seat-legend-dot{
      width:12px;
      height:12px;
      border-radius:4px;
      border:1px solid rgba(0,0,0,.12);
      flex:0 0 auto;
    }

    .seat-map{
      display:grid;
      gap:8px;
      overflow:auto;
      padding-bottom:4px;
    }

    .seat-row{
      display:flex;
      gap:6px;
      align-items:center;
      min-width:max-content;
    }

    .seat-row-label{
      width:28px;
      font-size:12px;
      font-weight:800;
      color:#6b7280;
      text-align:center;
      flex:0 0 auto;
    }

    .seat{
      min-width:34px;
      height:34px;
      padding:0 6px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:700;
      cursor:pointer;
      user-select:none;
      background:#fff;
      color:#111;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, color .12s ease, border-color .12s ease;
    }

    .seat:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(0,0,0,.05);
    }

    .seat.available{ background:#fff; }
    .seat.selected{
      background:#111;
      color:#fff;
      border-color:#111;
    }
    .seat.locked{
      background:#e5e7eb;
      color:#6b7280;
      cursor:not-allowed;
    }
    .seat.sold{
      background:#9ca3af;
      color:#fff;
      cursor:not-allowed;
      border-color:#9ca3af;
    }
    .seat.disabled{
      background:#f3f4f6;
      color:#9ca3af;
      cursor:not-allowed;
    }

    .seat-empty{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
      background:#fff;
      border:1px dashed var(--line);
      border-radius:16px;
      padding:16px;
      text-align:center;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a class="back-link" id="backLink" href="ticket.html">← 返回活動頁</a>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="my-orders.html">我的訂單</a>
        </div>
      </footer>

      <div class="bottom-note">
        建立訂單後，需在期限內完成持票人資料填寫。未完成的訂單會失效釋出。
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      getDocs,
      collection,
      serverTimestamp,
      Timestamp,
      runTransaction,
      increment
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const accountBtn = document.getElementById("accountBtn");
    const backLink = document.getElementById("backLink");

    const params = new URLSearchParams(location.search);
    const eventId = String(params.get("id") || "").trim();

    let currentUser = null;
    let currentEvent = null;
    let quantityMap = {};
    let allSeats = [];
    let selectedSeatIdsByType = {};
    let promoState = {
      code: "",
      applied: false,
      loading: false,
      data: null,
      error: ""
    };

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input?.toDate === "function") return input.toDate();
      const d = new Date(input);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "日期未定";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function formatPrice(value){
      const num = Number(value || 0);
      if (!num) return "免費";
      return `NT$ ${num.toLocaleString("zh-Hant")}`;
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden" };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended" };
      return { text:"受理中", key:"selling" };
    }

    function getEventVenue(event){
      return norm(
        event.venueName ||
        event.location ||
        event.place ||
        event.eventLocation ||
        ""
      );
    }

    function getEventDescription(event){
      return norm(
        event.summary ||
        event.subtitle ||
        event.description ||
        event.shortDescription ||
        ""
      );
    }

    function getRawTicketTypes(event){
      const raw = Array.isArray(event.ticketTypes) ? event.ticketTypes : [];
      if (!raw.length) {
        return [{
          id:"general",
          name:"一般報名",
          price:0,
          description:"此活動目前未細分票種。",
          enabled:true,
          maxPerOrder:6,
          visibility:"public",
          seatType:"free"
        }];
      }

      return raw
        .map((item, index) => ({
          id: norm(item.id || `ticket_${index + 1}`),
          name: norm(item.name || `票種 ${index + 1}`),
          price: Number(item.price || 0),
          description: norm(item.description || ""),
          enabled: item.enabled !== false,
          maxPerOrder: Math.max(0, Number(item.maxPerOrder || item.maxPerUser || 6) || 6),
          visibility: lower(item.visibility || item.type || "public"),
          seatType: lower(item.seatType || (item.requiresSeat ? "assigned" : "free"))
        }))
        .filter(item => item.enabled !== false);
    }

    function getVisibleTicketTypes(event){
      const raw = getRawTicketTypes(event);
      const promoTicketTypeId = promoState?.data?.ticketTypeId || "";

      return raw.filter(type => {
        const visibility = lower(type.visibility || "public");
        if (visibility === "pr" || visibility === "promo") {
          return promoState.applied && promoTicketTypeId === type.id;
        }
        return true;
      });
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      return snap.exists() ? { id: snap.id, ...(snap.data() || {}) } : null;
    }

    async function getPromoCodeData(eventId, code){
      const cleanCode = norm(code);
      if (!cleanCode) throw new Error("請輸入公關代碼");

      const ref = doc(db, "events", eventId, "promoCodes", cleanCode);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        throw new Error("查無此公關代碼");
      }

      const data = snap.data() || {};
      const enabled = data.enabled === true;
      const maxUse = Number(data.maxUse || data.maxUses || 0);
      const usedCount = Number(data.usedCount || 0);

      if (!enabled) {
        throw new Error("此公關代碼未啟用");
      }

      if (maxUse > 0 && usedCount >= maxUse) {
        throw new Error("此公關代碼已達使用上限");
      }

      return {
        id: snap.id,
        code: data.code || snap.id,
        ...data
      };
    }

    async function loadSeats(){
      if (!currentEvent?.id) {
        allSeats = [];
        return;
      }

      const snap = await getDocs(collection(db, "events", currentEvent.id, "seats"));
      allSeats = snap.docs.map(d => {
        const data = d.data() || {};
        return {
          id: d.id,
          seatId: d.id,
          label: norm(data.label || ""),
          row: norm(data.row || ""),
          seatNumber: norm(data.seatNumber || data.number || ""),
          status: norm(data.status || "available").toLowerCase(),
          enabled: data.enabled !== false,
          price: Number(data.price || 0),
          floor: norm(data.floor || "1F"),
          sectionId: norm(data.sectionId || ""),
          allowedTicketTypes: Array.isArray(data.allowedTicketTypes) ? data.allowedTicketTypes.map(v => norm(v)).filter(Boolean) : []
        };
      });
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        const redirect = encodeURIComponent(location.pathname + location.search);
        accountBtn.href = `login.html?redirect=${redirect}`;
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    function buildLoginRedirectUrl(){
      const redirect = encodeURIComponent(location.pathname + location.search);
      return `login.html?redirect=${redirect}`;
    }

    function canCreateOrder(event){
      return getEventStatus(event).key === "selling";
    }

    function getSeatLabel(seat){
      return norm(seat.label || `${seat.row}${seat.seatNumber}`);
    }

    function getSeatsForTicketType(ticketTypeId){
      return allSeats
        .filter(seat => {
          if (seat.enabled === false) return false;

          if (seat.allowedTicketTypes.length > 0) {
            return seat.allowedTicketTypes.includes(ticketTypeId);
          }
          return true;
        })
        .sort((a, b) => {
          const rowA = norm(a.row);
          const rowB = norm(b.row);
          if (rowA !== rowB) return rowA.localeCompare(rowB, "zh-Hant");
          return Number(a.seatNumber || 0) - Number(b.seatNumber || 0);
        });
    }

    function getSelectedSeatIds(ticketTypeId){
      return Array.isArray(selectedSeatIdsByType[ticketTypeId]) ? selectedSeatIdsByType[ticketTypeId] : [];
    }

    function getSelectedItems(){
      const types = getVisibleTicketTypes(currentEvent);

      return types
        .map(type => {
          const quantity = type.seatType === "assigned"
            ? getSelectedSeatIds(type.id).length
            : Number(quantityMap[type.id] || 0);

          const selectedSeatIds = type.seatType === "assigned" ? getSelectedSeatIds(type.id) : [];
          const selectedSeats = type.seatType === "assigned"
            ? getSeatsForTicketType(type.id).filter(seat => selectedSeatIds.includes(seat.id))
            : [];

          return {
            ticketTypeId: type.id,
            ticketTypeName: type.name,
            unitPrice: Number(type.price || 0),
            quantity,
            subtotal: Number(type.price || 0) * quantity,
            visibility: type.visibility || "public",
            seatType: type.seatType || "free",
            seatIds: selectedSeatIds,
            seatLabels: selectedSeats.map(seat => getSeatLabel(seat))
          };
        })
        .filter(item => item.quantity > 0);
    }

    function getTotalQuantity(){
      return getSelectedItems().reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    }

    function getTotalAmount(){
      return getSelectedItems().reduce((sum, item) => sum + Number(item.subtotal || 0), 0);
    }

    function getExpiresAtDate(){
      const minutes = 10;
      return new Date(Date.now() + minutes * 60 * 1000);
    }

    function getSummaryNotice(){
      const totalQty = getTotalQuantity();

      if (!canCreateOrder(currentEvent)) {
        return {
          className: "warn",
          text: "目前尚未開放建立訂單，請依活動開賣時間為準。"
        };
      }

      if (!totalQty) {
        return {
          className: "warn",
          text: "請先選擇至少 1 張票。\n自由座請選張數，對號座請直接點座位。"
        };
      }

      if (!currentUser) {
        return {
          className: "info",
          text: "你已選好票種，但建立訂單前需要先登入。\n登入後系統會回到這一頁。"
        };
      }

      return {
        className: "ok",
        text: "建立訂單後，系統會先保留這批票。\n至少會有 1 張票自動帶入主購人資料，其餘票券再於下一步填寫持票人資訊。"
      };
    }

    function getPromoNotice(){
      if (promoState.loading) {
        return { className:"info", text:"公關代碼驗證中…" };
      }

      if (promoState.applied && promoState.data) {
        return {
          className:"ok",
          text:`已套用公關代碼：${promoState.data.code || promoState.data.id}\n對應票種：${promoState.data.ticketTypeName || promoState.data.ticketTypeId || "-"}`
        };
      }

      if (promoState.error) {
        return {
          className:"warn",
          text:promoState.error
        };
      }

      return {
        className:"info",
        text:"若你有公關代碼，可在此輸入。\n套用後只會顯示該代碼對應的票種。"
      };
    }

    function renderSelectedSummaryItems(selectedItems){
      if (!selectedItems.length) {
        return `
          <div class="summary-item">
            <div class="summary-item-title">尚未選擇票種</div>
            <div class="summary-item-sub">請從左側票種卡片選擇你要的張數或座位。</div>
          </div>
        `;
      }

      return selectedItems.map(item => `
        <div class="summary-item">
          <div class="summary-item-title">
            ${esc(item.ticketTypeName)} × ${esc(item.quantity)} 張
          </div>
          <div class="summary-item-sub">
            單價：${esc(formatPrice(item.unitPrice))} ｜ 小計：${esc(formatPrice(item.subtotal))}
            ${item.seatType === "assigned" && item.seatLabels.length ? `<br>座位：${esc(item.seatLabels.join("、"))}` : ``}
          </div>
        </div>
      `).join("");
    }

    function groupSeatsByRow(seats){
      const grouped = {};
      seats.forEach(seat => {
        const rowKey = norm(seat.row || "未分排");
        if (!grouped[rowKey]) grouped[rowKey] = [];
        grouped[rowKey].push(seat);
      });
      return grouped;
    }

    function renderSeatMap(ticketType){
      const seats = getSeatsForTicketType(ticketType.id);
      const selectedIds = getSelectedSeatIds(ticketType.id);
      const maxSelectable = Math.max(1, Number(ticketType.maxPerOrder || 1) || 1);

      if (!seats.length) {
        return `
          <div class="seat-map-wrap">
            <div class="seat-empty">此票種目前沒有可用座位。</div>
          </div>
        `;
      }

      const grouped = groupSeatsByRow(seats);
      const rowKeys = Object.keys(grouped).sort((a, b) => a.localeCompare(b, "zh-Hant"));

      return `
        <div class="seat-map-wrap">
          <div class="seat-map-head">
            <div class="seat-map-title">選擇座位（上限 ${esc(maxSelectable)} 席）</div>
            <div class="seat-legend">
              <span class="seat-legend-item"><span class="seat-legend-dot" style="background:#fff;"></span>可選</span>
              <span class="seat-legend-item"><span class="seat-legend-dot" style="background:#111;border-color:#111;"></span>已選</span>
              <span class="seat-legend-item"><span class="seat-legend-dot" style="background:#e5e7eb;"></span>保留中</span>
              <span class="seat-legend-item"><span class="seat-legend-dot" style="background:#9ca3af;border-color:#9ca3af;"></span>已售</span>
            </div>
          </div>

          <div class="seat-map">
            ${rowKeys.map(rowKey => `
              <div class="seat-row">
                <div class="seat-row-label">${esc(rowKey)}</div>
                ${grouped[rowKey]
                  .sort((a,b) => Number(a.seatNumber || 0) - Number(b.seatNumber || 0))
                  .map(seat => {
                    const status = norm(seat.status || "available").toLowerCase();
                    const isSelected = selectedIds.includes(seat.id);
                    const displayClass = isSelected ? "selected" : (status === "sold" ? "sold" : status === "locked" ? "locked" : status === "disabled" ? "disabled" : "available");
                    return `
                      <button
                        type="button"
                        class="seat ${displayClass}"
                        data-seat-id="${esc(seat.id)}"
                        data-ticket-type-id="${esc(ticketType.id)}"
                        title="${esc(getSeatLabel(seat))}"
                        ${displayClass !== "available" && !isSelected ? "disabled" : ""}
                      >
                        ${esc(seat.seatNumber || seat.label || "?")}
                      </button>
                    `;
                  }).join("")}
              </div>
            `).join("")}
          </div>

          <div class="hint" style="margin-top:10px;">
            已選 ${selectedIds.length} 席
            ${selectedIds.length ? `：${esc(
              seats
                .filter(seat => selectedIds.includes(seat.id))
                .map(seat => getSeatLabel(seat))
                .join("、")
            )}` : ""}
          </div>
        </div>
      `;
    }

    function renderTicketCard(type){
      const max = Math.max(0, Number(type.maxPerOrder || 6) || 6);
      const currentQty = Number(quantityMap[type.id] || 0);
      const options = Array.from({ length: max + 1 }, (_, i) => i);
      const promoLocked = promoState.applied && promoState.data && promoState.data.ticketTypeId === type.id;
      const assignedSelectedCount = getSelectedSeatIds(type.id).length;

      return `
        <div class="ticket-card">
          <div class="ticket-head">
            <div class="ticket-top">
              <div>
                <h3 class="ticket-title">${esc(type.name)}</h3>
              </div>
              <div class="ticket-price">${esc(formatPrice(type.price))}</div>
            </div>

            <div class="ticket-sub">
              ${esc(type.description || "請選擇此票種的張數。")}
            </div>

            <div class="meta-pills">
              <span class="meta-pill">票種代碼：${esc(type.id)}</span>
              <span class="meta-pill">單筆上限：${esc(max)} 張</span>
              <span class="meta-pill">${esc(type.visibility === "pr" || type.visibility === "promo" ? "公關票" : "一般票")}</span>
              <span class="meta-pill">${esc(type.seatType === "assigned" ? "指定座位" : "自由座")}</span>
              ${promoLocked ? `<span class="meta-pill">已由公關代碼解鎖</span>` : ``}
            </div>
          </div>

          <div class="ticket-body">
            ${type.seatType === "assigned" ? `
              <div class="hint">
                這個票種需要直接選位。點選下方座位即可加入訂單。
              </div>
              ${renderSeatMap(type)}
            ` : `
              <div class="ticket-grid">
                <div>
                  <div class="hint">
                    若要幫朋友一起購買，可以先把多張票放進同一筆訂單，
                    下一步再逐張填寫持票人資料。
                  </div>
                </div>

                <div class="field">
                  <label class="label" for="qty_${esc(type.id)}">選擇張數</label>
                  <select class="select" id="qty_${esc(type.id)}" data-ticket-id="${esc(type.id)}">
                    ${options.map(n => `
                      <option value="${n}" ${currentQty === n ? "selected" : ""}>${n} 張</option>
                    `).join("")}
                  </select>
                </div>
              </div>
            `}

            ${type.seatType === "assigned" ? `
              <div class="hint" style="margin-top:12px;">
                目前已選 ${assignedSelectedCount} 席。
              </div>
            ` : ``}
          </div>
        </div>
      `;
    }

    function renderPage(){
      const status = getEventStatus(currentEvent);
      const desc = getEventDescription(currentEvent) || "請先選擇你要的票種與張數。";
      const venue = getEventVenue(currentEvent) || "活動地點將依主辦單位公告為準";
      const saleStartText = formatDateTime(currentEvent.saleStartAt);
      const saleEndText = formatDateTime(currentEvent.saleEndAt);
      const ticketTypes = getVisibleTicketTypes(currentEvent);
      const selectedItems = getSelectedItems();
      const totalQty = getTotalQuantity();
      const totalAmount = getTotalAmount();
      const canOrder = canCreateOrder(currentEvent);
      const notice = getSummaryNotice();
      const promoNotice = getPromoNotice();

      backLink.href = `ticket.html?id=${encodeURIComponent(currentEvent.id)}`;

      app.className = "";
      app.innerHTML = `
        <section class="hero">
          <h1 class="hero-title">選擇票種</h1>
          <div class="hero-sub">
活動：${esc(currentEvent.title || "未命名活動")}
${esc(desc)}
          </div>
          <div class="hero-meta">
            <span class="pill">狀態：${esc(status.text)}</span>
            <span class="pill">地點：${esc(venue)}</span>
            <span class="pill">開賣：${esc(saleStartText)}</span>
            <span class="pill">截止：${esc(saleEndText)}</span>
          </div>
        </section>

        <div class="layout">
          <section class="ticket-list">
            ${ticketTypes.length
              ? ticketTypes.map(type => renderTicketCard(type)).join("")
              : `<div class="empty">目前沒有可選擇的票種。若你持有公關代碼，請先於右側輸入並套用。</div>`
            }
          </section>

          <aside class="side-card">
            <h2 class="side-title">訂單摘要</h2>
            <div class="side-sub">
              先選票種與張數，再建立訂單。
              建立後會進入持票人資料填寫頁面。
            </div>

            <div class="field" style="margin-top:16px;">
              <label class="label" for="promoCodeInput">公關代碼</label>
              <input
                id="promoCodeInput"
                class="input"
                type="text"
                placeholder="請輸入公關代碼"
                value="${esc(promoState.code || "")}"
              />
            </div>

            <div class="action-stack" style="margin-top:10px;">
              <button class="btn" id="applyPromoBtn" ${promoState.loading ? "disabled" : ""}>套用公關代碼</button>
              <button class="btn" id="clearPromoBtn" ${promoState.applied ? "" : "disabled"}>清除公關代碼</button>
            </div>

            <div class="notice ${promoNotice.className}">
              ${esc(promoNotice.text)}
            </div>

            <div class="summary">
              <div class="summary-row">
                <span>活動</span>
                <strong>${esc(currentEvent.title || "-")}</strong>
              </div>
              <div class="summary-row">
                <span>已選票種</span>
                <strong>${esc(selectedItems.length)}</strong>
              </div>
              <div class="summary-row">
                <span>總張數</span>
                <strong>${esc(totalQty)}</strong>
              </div>
              <div class="summary-row">
                <span>總金額</span>
                <strong>${esc(formatPrice(totalAmount))}</strong>
              </div>
              <div class="summary-row">
                <span>主購人票</span>
                <strong>${totalQty > 0 ? "至少 1 張" : "尚未建立"}</strong>
              </div>
            </div>

            <div class="summary-detail">
              ${renderSelectedSummaryItems(selectedItems)}
            </div>

            <div class="notice ${notice.className}">
              ${esc(notice.text)}
            </div>

            <div class="action-stack">
              <button class="btn btn-primary" id="createOrderBtn" ${canOrder ? "" : "disabled"}>
                建立訂單並填寫持票人資料
              </button>
              <a class="btn" href="ticket.html?id=${encodeURIComponent(currentEvent.id)}">返回活動資訊</a>
            </div>
          </aside>
        </div>
      `;

      document.querySelectorAll("[data-ticket-id]").forEach(select => {
        if (select.matches("select")) {
          select.addEventListener("change", e => {
            const ticketId = e.target.dataset.ticketId || "";
            quantityMap[ticketId] = Number(e.target.value || 0);
            renderPage();
          });
        } else if (select.classList.contains("seat")) {
          select.addEventListener("click", e => {
            const seatId = e.currentTarget.dataset.seatId || "";
            const ticketTypeId = e.currentTarget.dataset.ticketTypeId || "";
            toggleSeatSelection(ticketTypeId, seatId);
          });
        }
      });

      const promoCodeInput = document.getElementById("promoCodeInput");
      const applyPromoBtn = document.getElementById("applyPromoBtn");
      const clearPromoBtn = document.getElementById("clearPromoBtn");
      const createOrderBtn = document.getElementById("createOrderBtn");

      if (applyPromoBtn) applyPromoBtn.onclick = applyPromoCode;
      if (clearPromoBtn) clearPromoBtn.onclick = clearPromoCode;

      if (promoCodeInput) {
        promoCodeInput.addEventListener("input", e => {
          promoState.code = e.target.value || "";
        });

        promoCodeInput.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            applyPromoCode();
          }
        });
      }

      if (createOrderBtn) createOrderBtn.onclick = createOrder;
    }

    function toggleSeatSelection(ticketTypeId, seatId){
      const types = getVisibleTicketTypes(currentEvent);
      const ticketType = types.find(type => type.id === ticketTypeId);
      if (!ticketType) return;

      const seat = getSeatsForTicketType(ticketTypeId).find(item => item.id === seatId);
      if (!seat) return;

      const seatStatus = norm(seat.status || "available").toLowerCase();
      const currentSelected = [...getSelectedSeatIds(ticketTypeId)];
      const idx = currentSelected.indexOf(seatId);

      if (idx >= 0) {
        currentSelected.splice(idx, 1);
        selectedSeatIdsByType[ticketTypeId] = currentSelected;
        renderPage();
        return;
      }

      if (seatStatus !== "available") return;

      const maxSelectable = Math.max(1, Number(ticketType.maxPerOrder || 1) || 1);
      if (currentSelected.length >= maxSelectable) {
        alert(`此票種單筆最多可選 ${maxSelectable} 席。`);
        return;
      }

      currentSelected.push(seatId);
      selectedSeatIdsByType[ticketTypeId] = currentSelected;
      renderPage();
    }

    async function applyPromoCode(){
      if (!currentEvent) return;

      const input = document.getElementById("promoCodeInput");
      const code = norm(input?.value || promoState.code || "");

      promoState.loading = true;
      promoState.error = "";
      promoState.code = code;
      renderPage();

      try {
        const promoData = await getPromoCodeData(currentEvent.id, code);
        const allTypes = getRawTicketTypes(currentEvent);
        const matchedType = allTypes.find(item => item.id === promoData.ticketTypeId);

        if (!matchedType) {
          throw new Error("此公關代碼對應的票種不存在");
        }

        promoState.applied = true;
        promoState.data = promoData;
        promoState.error = "";

        const newMap = {};
        allTypes.forEach(type => {
          newMap[type.id] = 0;
        });
        quantityMap = newMap;
        selectedSeatIdsByType = {};

        renderPage();
      } catch (err) {
        console.error(err);
        promoState.applied = false;
        promoState.data = null;
        promoState.error = err?.message || "公關代碼驗證失敗";
        renderPage();
      } finally {
        promoState.loading = false;
        renderPage();
      }
    }

    function clearPromoCode(){
      promoState = {
        code: "",
        applied: false,
        loading: false,
        data: null,
        error: ""
      };

      const allTypes = getRawTicketTypes(currentEvent);
      const newMap = {};
      allTypes.forEach(type => {
        newMap[type.id] = 0;
      });
      quantityMap = newMap;
      selectedSeatIdsByType = {};
      renderPage();
    }

    async function createOrder(){
      if (!currentEvent) return;

      if (!canCreateOrder(currentEvent)) {
        alert("目前尚未開放建立訂單。");
        return;
      }

      if (!currentUser) {
        location.href = buildLoginRedirectUrl();
        return;
      }

      const selectedItems = getSelectedItems();
      const totalQty = getTotalQuantity();
      const totalAmount = getTotalAmount();

      if (!selectedItems.length || totalQty <= 0) {
        alert("請先選擇至少 1 張票。");
        return;
      }

      if (promoState.applied && promoState.data) {
        const allowedTypeId = promoState.data.ticketTypeId;
        const wrongSelection = selectedItems.some(item => item.ticketTypeId !== allowedTypeId);
        if (wrongSelection) {
          alert("目前公關代碼只允許購買指定票種。");
          return;
        }
      }

      const btn = document.getElementById("createOrderBtn");
      const oldText = btn ? btn.textContent : "";
      if (btn) {
        btn.disabled = true;
        btn.textContent = "建立中…";
      }

      try {
        const expiresAtDate = getExpiresAtDate();
        const expiresAt = Timestamp.fromDate(expiresAtDate);
        const buyerEmail = lower(currentUser.email || "");
        let holderIndex = 0;
        let buyerAssigned = false;
        const holderAssignments = [];

        selectedItems.forEach(item => {
          if (item.seatType === "assigned") {
            item.seatIds.forEach((seatId, seatIndex) => {
              const seat = allSeats.find(s => s.id === seatId);
              const isBuyerTicket = !buyerAssigned;

              holderAssignments.push({
                holderIndex,
                ticketTypeId: item.ticketTypeId,
                ticketTypeName: item.ticketTypeName,
                price: Number(item.unitPrice || 0),
                seatType: item.seatType || "assigned",
                seatId,
                seatLabel: seat ? getSeatLabel(seat) : "",

                isBuyerTicket,
                email: isBuyerTicket ? buyerEmail : "",
                name: "",
                uid: isBuyerTicket ? currentUser.uid : "",
                verifiedSchoolId: "",
                verifiedSchoolName: "",
                verifyMethod: "",

                status: isBuyerTicket ? "buyer_prefilled" : "",
                message: isBuyerTicket ? "此票已自動帶入主購人資料" : ""
              });

              if (isBuyerTicket) buyerAssigned = true;
              holderIndex += 1;
            });
          } else {
            for (let i = 0; i < item.quantity; i++) {
              const isBuyerTicket = !buyerAssigned;

              holderAssignments.push({
                holderIndex,
                ticketTypeId: item.ticketTypeId,
                ticketTypeName: item.ticketTypeName,
                price: Number(item.unitPrice || 0),
                seatType: item.seatType || "free",
                seatId: "",
                seatLabel: "",

                isBuyerTicket,
                email: isBuyerTicket ? buyerEmail : "",
                name: "",
                uid: isBuyerTicket ? currentUser.uid : "",
                verifiedSchoolId: "",
                verifiedSchoolName: "",
                verifyMethod: "",

                status: isBuyerTicket ? "buyer_prefilled" : "",
                message: isBuyerTicket ? "此票已自動帶入主購人資料" : ""
              });

              if (isBuyerTicket) buyerAssigned = true;
              holderIndex += 1;
            }
          }
        });

        const orderRef = doc(collection(db, "events", currentEvent.id, "orders"));
        const promoRef = promoState.applied && promoState.data
          ? doc(db, "events", currentEvent.id, "promoCodes", promoState.data.id || promoState.data.code)
          : null;

        const selectedAssignedSeatIds = selectedItems
          .filter(item => item.seatType === "assigned")
          .flatMap(item => item.seatIds);

        await runTransaction(db, async (tx) => {
          let promoPayload = null;

          if (promoRef) {
            const promoSnap = await tx.get(promoRef);

            if (!promoSnap.exists()) {
              throw new Error("公關代碼不存在或已失效");
            }

            promoPayload = promoSnap.data() || {};

            if (promoPayload.enabled !== true) {
              throw new Error("此公關代碼未啟用");
            }

            const maxUse = Number(promoPayload.maxUse || promoPayload.maxUses || 0);
            const usedCount = Number(promoPayload.usedCount || 0);

            if (maxUse > 0 && usedCount >= maxUse) {
              throw new Error("此公關代碼已達使用上限");
            }

            const promoTypeId = norm(promoPayload.ticketTypeId || "");
            const bad = selectedItems.some(item => item.ticketTypeId !== promoTypeId);
            if (bad) {
              throw new Error("公關代碼與目前所選票種不一致");
            }
          }

          for (const seatId of selectedAssignedSeatIds) {
            const seatRef = doc(db, "events", currentEvent.id, "seats", seatId);
            const seatSnap = await tx.get(seatRef);

            if (!seatSnap.exists()) {
              throw new Error("你選擇的座位不存在");
            }

            const seatData = seatSnap.data() || {};
            const status = norm(seatData.status || "available").toLowerCase();
            const enabled = seatData.enabled !== false;

            if (!enabled || status !== "available") {
              throw new Error(`座位 ${seatData.label || seatId} 已不可使用，請重新選位`);
            }

            tx.update(seatRef, {
              status: "locked",
              heldBy: currentUser.uid,
              orderId: orderRef.id,
              heldUntil: expiresAt,
              updatedAt: serverTimestamp()
            });
          }

          const orderPayload = {
            uid: currentUser.uid,
            buyerUid: currentUser.uid,
            buyerEmail,
            eventId: currentEvent.id,
            eventTitle: currentEvent.title || "",

            status: "pending_holder_info",
            paymentStatus: "unpaid",
            fillStatus: "pending",

            totalQuantity: totalQty,
            totalAmount,

            itemSummary: selectedItems,
            holderAssignments,

            participantEmails: buyerEmail ? [buyerEmail] : [],
            participantUids: [currentUser.uid],
            sharedOrderRefs: [],

            fillDeadlineMinutes: 10,
            promoCode: promoPayload?.code || "",
            promoTicketTypeId: promoPayload?.ticketTypeId || "",
            promoTicketTypeName: promoPayload?.ticketTypeName || "",

            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
            expiresAt
          };

          tx.set(orderRef, orderPayload);

          if (promoRef) {
            tx.update(promoRef, {
              usedCount: increment(1),
              updatedAt: serverTimestamp()
            });
          }
        });

        location.href = `order-fill.html?id=${encodeURIComponent(currentEvent.id)}&orderId=${encodeURIComponent(orderRef.id)}`;
      } catch (err) {
        console.error(err);
        alert(err?.message || "建立訂單失敗，請稍後再試。");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = oldText || "建立訂單並填寫持票人資料";
        }
      }
    }

    async function initPage(){
      if (!eventId) {
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      currentEvent = await getEventById(eventId);

      if (!currentEvent) {
        app.className = "empty";
        app.innerHTML = "找不到活動。";
        return;
      }

      await loadSeats();

      const ticketTypes = getRawTicketTypes(currentEvent);
      quantityMap = {};
      selectedSeatIdsByType = {};

      ticketTypes.forEach(type => {
        quantityMap[type.id] = 0;
        selectedSeatIdsByType[type.id] = [];
      });

      renderPage();
    }

    onAuthStateChanged(auth, async user => {
      currentUser = user || null;
      updateAccountLinks(currentUser);
      await initPage();
    });
  </script>
</body>
</html>
