<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>會員中心</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --line:rgba(17,24,39,.08);
  --line-strong:rgba(17,24,39,.14);
  --shadow:0 18px 50px rgba(15,23,42,.06);
  --shadow-soft:0 10px 30px rgba(15,23,42,.05);
  --ok:#166534;
  --warn:#b91c1c;
  --blue:#1d4ed8;
  --blue-bg:#dbeafe;
  --red-bg:#fee2e2;
  --gray-bg:#f8fafc;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.92), rgba(246,247,251,.98) 36%),
    linear-gradient(180deg, #f8fafc 0%, #f6f7fb 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:34px 18px 56px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:18px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:26px;
  font-weight:1000;
  letter-spacing:-.02em;
}

h2{
  margin:0;
  font-size:18px;
  font-weight:1000;
  letter-spacing:-.01em;
}

.sub{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
  line-height:1.8;
}

.small{
  font-size:13px;
  color:var(--muted);
  line-height:1.8;
}

.mono{
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.ok{ color:var(--ok); font-weight:900; }
.warn{ color:var(--warn); font-weight:900; }

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

@media (max-width:900px){
  .grid{ grid-template-columns:1fr; }
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  font-weight:1000;
  cursor:pointer;
  text-decoration:none;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(0,0,0,.08);
}

.btn:active{
  transform:translateY(0) scale(.98);
  box-shadow:none;
}

.btn[disabled]{
  opacity:.55;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

.btn-secondary{
  background:#fff;
  color:#111827;
}

.btn-danger{
  background:#fff;
  color:#b91c1c;
  border-color:rgba(185,28,28,.18);
}

.notice{
  margin-top:14px;
  border:1px solid rgba(185,28,28,.12);
  background:var(--red-bg);
  color:#b91c1c;
  border-radius:16px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.8;
}

.notice-blue{
  margin-top:12px;
  border:1px solid rgba(29,78,216,.12);
  background:var(--blue-bg);
  color:#1d4ed8;
  border-radius:16px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.8;
}

.kv{
  display:grid;
  grid-template-columns:130px 1fr;
  gap:8px 12px;
  padding:12px 0;
  border-top:1px dashed var(--line);
}

.kv:first-child{
  border-top:none;
  padding-top:0;
}

.k{
  font-size:13px;
  color:var(--muted);
  line-height:1.7;
}

.v{
  font-size:14px;
  font-weight:900;
  line-height:1.8;
  word-break:break-word;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media (max-width:700px){
  .form-grid{ grid-template-columns:1fr; }
}

label{
  display:block;
  margin:12px 0 6px;
  font-size:13px;
  font-weight:1000;
  color:#111827;
}

input, select{
  width:100%;
  padding:13px 14px;
  border:1px solid var(--line-strong);
  border-radius:16px;
  background:#fff;
  color:#111827;
  font-size:15px;
  outline:none;
}

input[readonly]{
  background:var(--gray-bg);
  color:#4b5563;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  margin-top:14px;
}

.order{
  border-top:1px solid var(--line);
  padding:16px 0;
}

.order:first-child{
  border-top:none;
  padding-top:0;
}

.order-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}

.order-title{
  font-size:16px;
  font-weight:1000;
  line-height:1.6;
}

.order-badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.badge{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  font-size:12px;
  font-weight:1000;
}

.badge.ok{
  background:#dcfce7;
  border-color:rgba(22,101,52,.12);
}

.badge.warn{
  background:#fee2e2;
  border-color:rgba(185,28,28,.12);
}

.loading{
  text-align:center;
  color:var(--muted);
  margin-top:30px;
}

.hidden{
  display:none !important;
}
</style>
</head>

<body>
<div class="wrap">

  <div id="gate" class="card"></div>

  <div id="app" style="display:none;">

    <div class="card">
      <div class="hero">
        <div>
          <h1>會員中心</h1>
          <div class="sub">
            登入帳號：<span id="who" class="mono">-</span>
          </div>
        </div>

        <div class="row">
          <a class="btn btn-secondary" href="index.html">回首頁</a>
          <a class="btn btn-secondary" href="campus-verify.html">校園驗證</a>
          <button class="btn btn-secondary" id="logoutBtn">登出</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <!-- 左邊：基本資料 -->
      <div>
        <div class="card">
          <h2>會員基本資料</h2>
          <div id="profileReadonlyNotice" class="notice">
            以下資料一經確認送出，即不可自行修改，請務必填寫正確真實資料。
          </div>
          <div id="profileUsageNotice" class="notice-blue">
            以下資料將作為活動報名、票券核對、通知聯繫或現場身份查驗之用，請務必填寫正確且完整的資料。
          </div>

          <div class="form-grid" style="margin-top:14px;">
            <div>
              <label>姓名</label>
              <input id="nameInput" type="text" readonly placeholder="未提供" />
            </div>

            <div>
              <label>性別</label>
              <input id="genderInput" type="text" readonly placeholder="未提供" />
            </div>

            <div>
              <label>生日</label>
              <input id="birthdayInput" type="text" readonly placeholder="未提供" />
            </div>

            <div>
              <label>電子郵件</label>
              <input id="emailInput" type="email" placeholder="請輸入電子郵件" />
            </div>

            <div>
              <label>手機號碼</label>
              <input id="phoneInput" type="text" placeholder="請輸入手機號碼" />
            </div>
          </div>

          <div class="actions">
            <button class="btn" id="saveProfileBtn">儲存聯絡資料</button>
          </div>

          <div id="profileMsg" class="small" style="margin-top:10px;"></div>
        </div>

        <div class="card">
          <h2>帳號安全</h2>
          <div class="sub">你可以在這裡修改密碼。</div>

          <label>目前密碼</label>
          <input id="currentPasswordInput" type="password" placeholder="請輸入目前密碼" />

          <label>新密碼</label>
          <input id="newPasswordInput" type="password" placeholder="請輸入新密碼（至少 6 碼）" />

          <label>確認新密碼</label>
          <input id="confirmPasswordInput" type="password" placeholder="請再次輸入新密碼" />

          <div class="actions">
            <button class="btn" id="changePasswordBtn">修改密碼</button>
          </div>

          <div id="passwordMsg" class="small" style="margin-top:10px;"></div>
        </div>
      </div>

      <!-- 右邊：驗證狀態 -->
      <div>
        <div class="card">
          <h2>校園驗證狀態</h2>
          <div id="verifyBlock" class="sub" style="margin-top:12px;">載入中…</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>我的報名 / 訂單</h2>
      <div id="orders" class="sub" style="margin-top:12px;">載入中…</div>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
  authDomain: "concert-1ff7e.firebaseapp.com",
  projectId: "concert-1ff7e"
});

const db = firebase.firestore();

const gate = document.getElementById("gate");
const app = document.getElementById("app");

const who = document.getElementById("who");
const logoutBtn = document.getElementById("logoutBtn");

const profileReadonlyNotice = document.getElementById("profileReadonlyNotice");
const profileUsageNotice = document.getElementById("profileUsageNotice");

const nameInput = document.getElementById("nameInput");
const genderInput = document.getElementById("genderInput");
const birthdayInput = document.getElementById("birthdayInput");
const emailInput = document.getElementById("emailInput");
const phoneInput = document.getElementById("phoneInput");
const saveProfileBtn = document.getElementById("saveProfileBtn");
const profileMsg = document.getElementById("profileMsg");

const currentPasswordInput = document.getElementById("currentPasswordInput");
const newPasswordInput = document.getElementById("newPasswordInput");
const confirmPasswordInput = document.getElementById("confirmPasswordInput");
const changePasswordBtn = document.getElementById("changePasswordBtn");
const passwordMsg = document.getElementById("passwordMsg");

const verifyBlock = document.getElementById("verifyBlock");
const ordersEl = document.getElementById("orders");

let currentUser = null;
let currentUserData = null;

logoutBtn.onclick = () => firebase.auth().signOut();

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

function norm(v){
  return String(v ?? "").trim();
}

function formatGender(value){
  const v = norm(value).toLowerCase();
  if (v === "male") return "男性";
  if (v === "female") return "女性";
  if (v === "other") return "其他";
  if (v === "undisclosed") return "不透露";
  return norm(value) || "未提供";
}

function formatDateValue(value){
  const v = norm(value);
  if (!v) return "未提供";
  return v;
}

function showGate(text){
  gate.style.display = "block";
  app.style.display = "none";
  gate.innerHTML = `<div class="warn">${esc(text)}</div>`;
}

async function loadUserData(uid){
  const doc = await db.collection("users").doc(uid).get();
  return doc.exists ? (doc.data() || {}) : null;
}

async function loadProfileNotices(){
  try{
    const snap = await db.collection("settings").doc("memberProfile").get();
    if (!snap.exists) return;

    const data = snap.data() || {};
    const readonlyText = norm(data.profileReadonlyNotice);
    const usageText = norm(data.profileUsageNotice);

    if (readonlyText) {
      profileReadonlyNotice.innerHTML = esc(readonlyText).replace(/\n/g, "<br>");
    }
    if (usageText) {
      profileUsageNotice.innerHTML = esc(usageText).replace(/\n/g, "<br>");
    }
  }catch(e){
    console.warn("讀取 memberProfile 設定失敗：", e);
  }
}

function fillProfile(user, userData){
  nameInput.value = norm(userData?.name || "");
  genderInput.value = formatGender(userData?.gender || "");
  birthdayInput.value = formatDateValue(userData?.birthday || "");
  emailInput.value = norm(userData?.email || user?.email || "");
  phoneInput.value = norm(userData?.phone || "");
}

async function saveProfile(){
  if (!currentUser) return;

  const email = norm(emailInput.value);
  const phone = norm(phoneInput.value);

  if (!email) {
    profileMsg.innerHTML = `<span class="warn">請輸入電子郵件</span>`;
    return;
  }

  saveProfileBtn.disabled = true;
  const oldText = saveProfileBtn.textContent;
  saveProfileBtn.textContent = "儲存中…";
  profileMsg.innerHTML = "";

  try{
    await db.collection("users").doc(currentUser.uid).set({
      email,
      phone,
      updatedAt: new Date()
    }, { merge:true });

    // 若 Auth email 不同，可一併提示，但先不直接改 Firebase Auth email
    if (norm(currentUser.email) !== email) {
      profileMsg.innerHTML = `<span class="ok">聯絡資料已儲存。</span><br><span class="small">注意：目前僅已更新會員資料中的 Email；若要同步登入帳號 Email，之後可再接 Firebase Auth Email 修改流程。</span>`;
    } else {
      profileMsg.innerHTML = `<span class="ok">聯絡資料已儲存。</span>`;
    }

    currentUserData = await loadUserData(currentUser.uid);
    fillProfile(currentUser, currentUserData);
  }catch(e){
    console.error(e);
    profileMsg.innerHTML = `<span class="warn">儲存失敗：${esc(e.message || e)}</span>`;
  }finally{
    saveProfileBtn.disabled = false;
    saveProfileBtn.textContent = oldText;
  }
}

saveProfileBtn.onclick = saveProfile;

async function changePassword(){
  const user = firebase.auth().currentUser;
  if (!user) return;

  const currentPassword = norm(currentPasswordInput.value);
  const newPassword = norm(newPasswordInput.value);
  const confirmPassword = norm(confirmPasswordInput.value);

  if (!currentPassword) {
    passwordMsg.innerHTML = `<span class="warn">請輸入目前密碼</span>`;
    return;
  }
  if (!newPassword || newPassword.length < 6) {
    passwordMsg.innerHTML = `<span class="warn">新密碼至少需要 6 碼</span>`;
    return;
  }
  if (newPassword !== confirmPassword) {
    passwordMsg.innerHTML = `<span class="warn">兩次輸入的新密碼不一致</span>`;
    return;
  }

  changePasswordBtn.disabled = true;
  const oldText = changePasswordBtn.textContent;
  changePasswordBtn.textContent = "處理中…";
  passwordMsg.innerHTML = "";

  try{
    const credential = firebase.auth.EmailAuthProvider.credential(
      user.email,
      currentPassword
    );

    await user.reauthenticateWithCredential(credential);
    await user.updatePassword(newPassword);

    currentPasswordInput.value = "";
    newPasswordInput.value = "";
    confirmPasswordInput.value = "";

    passwordMsg.innerHTML = `<span class="ok">密碼修改成功。</span>`;
  }catch(e){
    console.error(e);

    let message = "修改失敗，請稍後再試。";
    if (e.code === "auth/wrong-password") {
      message = "目前密碼錯誤。";
    } else if (e.code === "auth/too-many-requests") {
      message = "嘗試次數過多，請稍後再試。";
    } else if (e.code === "auth/requires-recent-login") {
      message = "登入狀態已過期，請重新登入後再試。";
    }

    passwordMsg.innerHTML = `<span class="warn">${esc(message)}</span>`;
  }finally{
    changePasswordBtn.disabled = false;
    changePasswordBtn.textContent = oldText;
  }
}

changePasswordBtn.onclick = changePassword;

function renderVerifyBlock(userData){
  if (!userData || !userData.verifiedSchoolId){
    verifyBlock.innerHTML = `
      <div class="warn">尚未完成校園驗證</div>
      <div class="small" style="margin-top:8px;">
        你目前尚未綁定校園身分，部分校園活動可能無法直接判斷資格。
      </div>
      <div class="row" style="margin-top:12px;">
        <a href="campus-verify.html" class="btn">前往驗證</a>
      </div>
    `;
    return;
  }

  let verifiedAtText = "-";
  try{
    if (userData.verifiedAt?.toDate) {
      verifiedAtText = userData.verifiedAt.toDate().toLocaleString("zh-Hant", { hour12:false });
    }
  }catch(_){}

  verifyBlock.innerHTML = `
    <div class="ok">已完成校園驗證</div>
    <div class="kv" style="margin-top:12px;">
      <div class="k">學校</div>
      <div class="v">${esc(userData.verifiedSchoolName || userData.verifiedSchoolId || "-")}</div>

      <div class="k">學校信箱</div>
      <div class="v mono">${esc(userData.schoolEmail || userData.email || "-")}</div>

      <div class="k">驗證方式</div>
      <div class="v">${esc(userData.verifyMethod || "-")}</div>

      <div class="k">驗證時間</div>
      <div class="v">${esc(verifiedAtText)}</div>
    </div>
  `;
}

async function loadOrders(uid){
  try{
    const snap = await db.collectionGroup("orders")
      .where("uid","==",uid)
      .get();

    if (snap.empty){
      ordersEl.innerHTML = `<div class="small">目前沒有任何報名紀錄。</div>`;
      return;
    }

    const rows = [];
    snap.forEach(docSnap => {
      const d = docSnap.data() || {};
      rows.push({
        id: docSnap.id,
        ...d
      });
    });

    rows.sort((a, b) => {
      const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
      const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
      return tb - ta;
    });

    let html = "";

    rows.forEach(d => {
      let createdAtText = "-";
      try{
        if (d.createdAt?.toDate) {
          createdAtText = d.createdAt.toDate().toLocaleString("zh-Hant", { hour12:false });
        }
      }catch(_){}

      const statusText = norm(d.status || "-");
      const paymentStatusText = norm(d.paymentStatus || "-");
      const quantity = Number(d.quantity || 1);
      const totalAmount = Number(d.totalAmount || 0);

      html += `
        <div class="order">
          <div class="order-top">
            <div>
              <div class="order-title">${esc(d.eventTitle || "未命名活動")}</div>
              <div class="small" style="margin-top:6px;">
                票種：${esc(d.ticketTypeName || d.ticketTypeId || "-")}<br>
                建立時間：${esc(createdAtText)}
              </div>
            </div>

            <div class="order-badges">
              <span class="badge">${esc(statusText)}</span>
              <span class="badge">${esc(paymentStatusText)}</span>
              ${norm(d.inviteCode) ? `<span class="badge ok">邀請碼</span>` : ``}
            </div>
          </div>

          <div class="kv" style="margin-top:12px;">
            <div class="k">張數</div>
            <div class="v">${esc(quantity)}</div>

            <div class="k">金額</div>
            <div class="v">${esc(totalAmount ? `NT$ ${totalAmount.toLocaleString("zh-Hant")}` : "免費")}</div>

            <div class="k">驗證學校</div>
            <div class="v">${esc(d.verifiedSchoolName || d.verifiedSchoolId || "-")}</div>

            <div class="k">邀請碼</div>
            <div class="v mono">${esc(d.inviteCode || "-")}</div>
          </div>
        </div>
      `;
    });

    ordersEl.innerHTML = html;
  }catch(e){
    console.error(e);
    ordersEl.innerHTML = `<div class="warn">讀取訂單失敗，請稍後再試。</div>`;
  }
}

firebase.auth().onAuthStateChanged(async user => {
  if (!user){
    showGate("請先登入");
    return;
  }

  currentUser = user;

  gate.style.display = "none";
  app.style.display = "block";

  who.textContent = user.email || user.uid;

  await loadProfileNotices();

  currentUserData = await loadUserData(user.uid) || {};
  fillProfile(user, currentUserData);
  renderVerifyBlock(currentUserData);
  await loadOrders(user.uid);
});
</script>
</body>
</html>
