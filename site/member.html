<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>會員中心</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#111;
  --muted:rgba(17,17,17,.65);
  --line:rgba(17,17,17,.08);
  --shadow:0 14px 40px rgba(0,0,0,.06);
  --ok:#166534;
  --warn:#b91c1c;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:40px 18px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:18px;
}

h1{
  margin:0;
  font-size:22px;
}

.sub{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
}

.label{
  font-weight:900;
  margin-top:14px;
}

.mono{
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
}

.ok{ color:var(--ok); font-weight:900; }
.warn{ color:var(--warn); font-weight:900; }

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:44px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#111;
  color:#fff;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
}

.btn-secondary{
  background:#fff;
  color:#111;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.order{
  border-top:1px solid var(--line);
  padding:12px 0;
}

.order:first-child{
  border-top:none;
}

.loading{
  text-align:center;
  color:var(--muted);
  margin-top:30px;
}
</style>
</head>

<body>
<div class="wrap">

  <div id="gate" class="card"></div>

  <div id="app" style="display:none;">

    <!-- 使用者 -->
    <div class="card">
      <h1>會員中心</h1>
      <div class="sub">
        登入帳號：<span id="who" class="mono">-</span>
      </div>

      <div class="row" style="margin-top:12px;">
        <a class="btn btn-secondary" href="index.html">回首頁</a>
        <a class="btn btn-secondary" href="campus-verify.html">校園驗證</a>
        <button class="btn btn-secondary" id="logoutBtn">登出</button>
      </div>
    </div>

    <!-- 校園驗證 -->
    <div class="card">
      <h1>校園驗證狀態</h1>
      <div id="verifyBlock" class="sub">載入中…</div>
    </div>

    <!-- 訂單 -->
    <div class="card">
      <h1>我的報名 / 訂單</h1>
      <div id="orders">載入中…</div>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
  authDomain: "concert-1ff7e.firebaseapp.com",
  projectId: "concert-1ff7e"
});

const db = firebase.firestore();

const gate = document.getElementById("gate");
const app = document.getElementById("app");
const who = document.getElementById("who");
const verifyBlock = document.getElementById("verifyBlock");
const ordersEl = document.getElementById("orders");
const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.onclick = () => firebase.auth().signOut();

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[m]));
}

function showGate(text){
  gate.style.display = "block";
  app.style.display = "none";
  gate.innerHTML = `<div class="warn">${text}</div>`;
}

async function loadUserData(uid){
  const doc = await db.collection("users").doc(uid).get();
  return doc.exists ? doc.data() : null;
}

async function loadOrders(uid){
  const snap = await db.collection("orders")
    .where("uid","==",uid)
    .orderBy("createdAt","desc")
    .get();

  if (snap.empty){
    ordersEl.innerHTML = `<div class="sub">目前沒有任何報名紀錄。</div>`;
    return;
  }

  let html = "";

  snap.forEach(doc=>{
    const d = doc.data() || {};

    html += `
      <div class="order">
        <div><b>${esc(d.eventTitle || "活動")}</b></div>
        <div class="sub">
          狀態：${esc(d.status || "-")}<br>
          張數：${esc(d.quantity || 1)}<br>
          建立時間：${d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleString() : "-"}
        </div>
      </div>
    `;
  });

  ordersEl.innerHTML = html;
}

firebase.auth().onAuthStateChanged(async user=>{
  if (!user){
    showGate("請先登入");
    return;
  }

  gate.style.display = "none";
  app.style.display = "block";

  who.textContent = user.email || user.uid;

  const userData = await loadUserData(user.uid);

  if (!userData || !userData.verifiedSchoolId){
    verifyBlock.innerHTML = `
      <span class="warn">尚未完成校園驗證</span><br>
      <a href="campus-verify.html" class="btn" style="margin-top:10px;">前往驗證</a>
    `;
  }else{
    verifyBlock.innerHTML = `
      <span class="ok">已完成校園驗證</span><br>
      學校：${esc(userData.verifiedSchoolName || userData.verifiedSchoolId)}<br>
      信箱：${esc(userData.schoolEmail || userData.email || "-")}<br>
      驗證方式：${esc(userData.verifyMethod || "-")}
    `;
  }

  await loadOrders(user.uid);
});
</script>
</body>
</html>
