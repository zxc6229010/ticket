<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜填寫持票人資料</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;

      --green:#166534;
      --green-bg:#dcfce7;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;

      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 22px 88px;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:34px 30px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(32px, 5vw, 52px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:14px;
      max-width:900px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-meta{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .countdown{
      font-weight:900;
      font-variant-numeric:tabular-nums;
      letter-spacing:.05em;
      margin-left:4px;
    }

    .countdown-normal{ color:#111; }
    .countdown-warn{ color:#c2410c; }
    .countdown-danger{
      color:#b91c1c;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{ opacity:1; }
      50%{ opacity:.5; }
      100%{ opacity:1; }
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 360px;
      gap:20px;
      align-items:start;
    }

    @media (max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .main-card,
    .side-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .main-card{
      padding:22px;
    }

    .side-card{
      padding:20px;
      position:sticky;
      top:82px;
    }

    @media (max-width:980px){
      .side-card{
        position:static;
      }
    }

    .section-title{
      margin:0;
      font-size:24px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .section-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .holder-list{
      display:grid;
      gap:16px;
      margin-top:20px;
    }

    .holder-card{
      border:1px solid rgba(0,0,0,.06);
      border-radius:26px;
      background:#fff;
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }

    .holder-head{
      padding:18px 18px 14px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .holder-title{
      margin:0;
      font-size:18px;
      line-height:1.4;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .holder-sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.85;
      word-break:break-word;
    }

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      border:1px solid transparent;
    }

    .status-ok{ background:var(--green-bg); color:var(--green); }
    .status-warn{ background:var(--red-bg); color:var(--red); }
    .status-gray{ background:var(--gray-bg); color:var(--gray); }
    .status-blue{ background:var(--blue-bg); color:var(--blue); }

    .holder-body{
      padding:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media (max-width:760px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .input[disabled]{
      background:#f9fafb;
      color:#6b7280;
      cursor:not-allowed;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }

    .notice{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.05);
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .notice.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.10);
      color:var(--green);
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:16px;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .summary-row strong{
      color:#111;
      text-align:right;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .action-stack{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .loading,
    .empty{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.95;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a class="back-link" id="backLink" href="my-orders.html">← 返回我的訂單</a>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="my-orders.html">我的訂單</a>
        </div>
      </footer>

      <div class="bottom-note">
        持票人資料需於期限內完成填寫。所有持票人皆需具備符合資格的會員帳號；若活動有匯入資格名單，亦必須在該名單內。
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      getDocs,
      collection,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const accountBtn = document.getElementById("accountBtn");
    const backLink = document.getElementById("backLink");

    const params = new URLSearchParams(location.search);
    const eventId = String(params.get("id") || "").trim();
    const orderId = String(params.get("orderId") || "").trim();

    let currentUser = null;
    let currentOrder = null;
    let holderState = [];
    let checkingMap = {};
    let userDocCache = new Map();
    let expireTimer = null;

    let allowedUsersCache = [];
    let allowedUsersLoaded = false;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input?.toDate === "function") return input.toDate();
      const d = new Date(input);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "-";
      return d.toLocaleString("zh-Hant", {
        hour12:false,
        year:"numeric",
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
      });
    }

    function formatPrice(v){
      const n = Number(v || 0);
      if (!n) return "免費";
      return "NT$ " + n.toLocaleString("zh-Hant");
    }

    function getOrderStatusText(status){
      const s = lower(status);
      if (s === "pending_holder_info") return "待填持票人資料";
      if (s === "ready_for_checkout") return "可進入下一步";
      if (s === "registered") return "已建立";
      if (s === "paid") return "已付款";
      if (s === "completed") return "已完成";
      if (s === "pending_payment") return "待付款";
      if (s === "pending") return "待處理";
      if (s === "processing") return "處理中";
      if (s === "cancelled") return "已取消";
      if (s === "void") return "已作廢";
      if (s === "refunded") return "已退款";
      if (s === "expired") return "已逾期";
      return status || "-";
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        accountBtn.href = buildLoginRedirectUrl();
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    function buildLoginRedirectUrl(){
      const url = new URL("login.html", location.href);
      url.searchParams.set("redirect", location.pathname + location.search);
      return url.pathname + url.search;
    }

    function goLogin(){
      location.href = buildLoginRedirectUrl();
    }

    function getOrderRef(){
      return doc(db, "events", eventId, "orders", orderId);
    }

    async function getOrder(){
      const ref = getOrderRef();
      const snap = await getDoc(ref);
      return snap.exists() ? { id: snap.id, ref, ...(snap.data() || {}) } : null;
    }

    async function loadAllowedUsers(){
      const snap = await getDocs(collection(db, "events", eventId, "allowedUsers"));

      allowedUsersCache = snap.docs.map(d => {
        const data = d.data() || {};
        return {
          id: d.id,
          enabled: data.enabled !== false,
          uid: norm(data.uid || data.userUid || data.memberUid || ""),
          email: lower(data.email || data.memberEmail || data.userEmail || ""),
          studentCode: norm(data.studentCode || data.schoolStudentId || data.studentId || ""),
          name: norm(data.name || "")
        };
      }).filter(item => item.enabled);

      allowedUsersLoaded = true;
    }

    function hasAllowedUserRestriction(){
      return allowedUsersLoaded && Array.isArray(allowedUsersCache) && allowedUsersCache.length > 0;
    }

    function isAllowedHolderUser(user){
      if (!hasAllowedUserRestriction()) return true;
      if (!user) return false;

      const uid = norm(user.uid || "");
      const email = lower(user.email || "");

      return allowedUsersCache.some(item => {
        return (uid && norm(item.uid) === uid) || (email && lower(item.email) === email);
      });
    }

    function isBuyerAllowedByOrder(order){
      if (!hasAllowedUserRestriction()) return true;

      const buyerUid = norm(order?.buyerUid || order?.uid || "");
      const buyerEmail = lower(order?.buyerEmail || order?.email || "");

      return allowedUsersCache.some(item => {
        return (buyerUid && norm(item.uid) === buyerUid) || (buyerEmail && lower(item.email) === buyerEmail);
      });
    }

    async function getUserDocByEmail(email){
      const key = lower(email);
      if (!key) return null;
      if (userDocCache.has(key)) return userDocCache.get(key);

      let userResult = null;

      try {
        const indexSnap = await getDoc(doc(db, "email_index", key));
        if (indexSnap.exists()) {
          const indexData = indexSnap.data() || {};
          const uid = norm(indexData.uid || "");
          if (uid) {
            const userSnap = await getDoc(doc(db, "users", uid));
            if (userSnap.exists()) {
              const data = userSnap.data() || {};
              userResult = { uid, ...data };
            }
          }
        }
      } catch (err) {
        console.error("getUserDocByEmail failed", err);
      }

      userDocCache.set(key, userResult);
      return userResult;
    }

    function getOrderItems(order){
      if (Array.isArray(order?.items) && order.items.length) return order.items;
      if (Array.isArray(order?.itemSummary) && order.itemSummary.length) return order.itemSummary;
      return [];
    }

    function getOrderTotalQuantity(order){
      const direct = Number(order?.totalQuantity || 0);
      if (direct > 0) return direct;
      const items = getOrderItems(order);
      return items.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    }

    function getBuyerTicketCount(order){
      return getOrderTotalQuantity(order) > 0 ? 1 : 0;
    }

    function getExtraHolderCount(order){
      return Math.max(0, getOrderTotalQuantity(order) - getBuyerTicketCount(order));
    }

    function flattenItems(order){
      const sourceItems = getOrderItems(order);
      const existingAssignments = Array.isArray(order?.holderAssignments) ? order.holderAssignments : [];
      const flat = [];

      let pointer = 0;
      const buyerEmail = lower(order?.buyerEmail || currentUser?.email || "");
      const buyerUid = norm(order?.buyerUid || order?.uid || currentUser?.uid || "");

      sourceItems.forEach((item, groupIndex) => {
        const qty = Number(item?.quantity || 0);
        for (let i = 0; i < qty; i++) {
          const existing = existingAssignments[pointer] || {};
          const isBuyerTicket = pointer === 0 || existing.isBuyerTicket === true;

          flat.push({
            holderIndex: pointer,
            groupIndex,
            ticketTypeId: norm(item?.ticketTypeId || existing.ticketTypeId || ""),
            ticketTypeName: norm(item?.ticketTypeName || existing.ticketTypeName || `票種 ${groupIndex + 1}`),
            price: Number(item?.unitPrice || item?.price || existing.price || 0),

            isBuyerTicket,

            email: isBuyerTicket ? buyerEmail : lower(existing.email || ""),
            name: norm(existing.name || ""),
            uid: isBuyerTicket ? buyerUid : norm(existing.uid || ""),

            verifiedSchoolId: norm(existing.verifiedSchoolId || ""),
            verifiedSchoolName: norm(existing.verifiedSchoolName || ""),
            verifyMethod: norm(existing.verifyMethod || ""),
            status: norm(existing.status || ""),
            message: norm(existing.message || "")
          });

          pointer += 1;
        }
      });

      if (flat.length > 0) {
        flat[0].isBuyerTicket = true;
        flat[0].email = buyerEmail;
        flat[0].uid = buyerUid;

        const buyerAllowed = !hasAllowedUserRestriction() || isBuyerAllowedByOrder(order);

        if (buyerAllowed) {
          flat[0].status = "valid";
          flat[0].message = "主購人票已自動視為主購者本人使用，無需另外填寫。";
        } else {
          flat[0].status = "invalid";
          flat[0].message = "主購者不在本活動允許參加名單內。";
        }
      }

      return flat;
    }

    function isOrderExpired(order){
      const expiresAt = toDate(order?.expiresAt);
      if (!expiresAt) return false;
      return Date.now() > expiresAt.getTime();
    }

    function isOrderLocked(order){
      const status = lower(order?.status);
      const fillStatus = lower(order?.fillStatus);
      if (fillStatus === "completed") return true;
      if (["paid","completed","cancelled","void","refunded","expired","ready_for_checkout"].includes(status)) return true;
      if (isOrderExpired(order)) return true;
      return false;
    }

    function holderStatusMeta(item){
      if (checkingMap[item.holderIndex]) {
        return { text: "檢查中", className: "status-blue" };
      }
      if (item.status === "valid") {
        return { text: "已通過", className: "status-ok" };
      }
      if (!item.email && !item.isBuyerTicket) {
        return { text: "尚未填寫", className: "status-gray" };
      }
      return { text: "未通過", className: "status-warn" };
    }

    async function validateOneHolder(index){
      const item = holderState[index];
      if (!item) return;

      if (item.isBuyerTicket) {
        const buyerAllowed = !hasAllowedUserRestriction() || isBuyerAllowedByOrder(currentOrder);
        item.status = buyerAllowed ? "valid" : "invalid";
        item.message = buyerAllowed
          ? "主購人票已自動視為主購者本人使用，無需驗證。"
          : "主購者不在本活動允許參加名單內。";
        renderPage();
        return;
      }

      const email = lower(item.email);
      const name = norm(item.name);

      item.uid = "";
      item.verifiedSchoolId = "";
      item.verifiedSchoolName = "";
      item.verifyMethod = "";

      if (!email) {
        item.status = "";
        item.message = "請先填寫持票人 Email。";
        renderPage();
        return;
      }

      checkingMap[index] = true;
      renderPage();

      try {
        const user = await getUserDocByEmail(email);

        if (!user) {
          item.status = "invalid";
          item.message = "查無對應會員資料，請確認對方是否已完成註冊，或是否使用正確 Email。";
          return;
        }

        const verifiedSchoolId = norm(user.verifiedSchoolId || "");
        const verifiedSchoolName = norm(user.verifiedSchoolName || "");
        const verifyMethod = norm(user.verifyMethod || "");

        item.uid = norm(user.uid || "");
        item.verifiedSchoolId = verifiedSchoolId;
        item.verifiedSchoolName = verifiedSchoolName;
        item.verifyMethod = verifyMethod;

        if (!verifiedSchoolId) {
          item.status = "invalid";
          item.message = "此會員尚未完成校園驗證。";
          return;
        }

        if (hasAllowedUserRestriction() && !isAllowedHolderUser(user)) {
          item.status = "invalid";
          item.message = "此會員不在本活動允許參加名單內。";
          return;
        }

        item.status = "valid";
        item.message = name ? "資料檢查通過。" : "帳號與資格已通過，建議補上持票人姓名。";
      } catch (err) {
        console.error(err);
        item.status = "invalid";
        item.message = "檢查失敗，請稍後再試。";
      } finally {
        delete checkingMap[index];
        renderPage();
      }
    }

    async function validateAllHolders(){
      for (let i = 0; i < holderState.length; i++) {
        await validateOneHolder(i);
      }
    }

    function allHoldersReady(){
      return holderState.every(item => {
        if (item.isBuyerTicket) {
          return item.status === "valid";
        }
        return lower(item.email) && item.status === "valid";
      });
    }

    function buildAssignmentsPayload(){
      return holderState.map(item => ({
        holderIndex: item.holderIndex,
        ticketTypeId: item.ticketTypeId,
        ticketTypeName: item.ticketTypeName,
        price: Number(item.price || 0),
        isBuyerTicket: item.isBuyerTicket === true,
        email: lower(item.email),
        name: norm(item.name),
        uid: norm(item.uid),
        verifiedSchoolId: norm(item.verifiedSchoolId),
        verifiedSchoolName: norm(item.verifiedSchoolName),
        verifyMethod: norm(item.verifyMethod),
        status: item.isBuyerTicket ? (item.status === "valid" ? "valid" : "invalid") : (item.status === "valid" ? "valid" : "invalid"),
        message: norm(item.message)
      }));
    }

    function buildParticipantEmails(){
      const emails = holderState.map(item => lower(item.email)).filter(Boolean);
      return [...new Set(emails)];
    }

    function buildParticipantUids(){
      const uids = holderState.map(item => norm(item.uid)).filter(Boolean);
      return [...new Set(uids)];
    }

    function buildSharedOrderRefs(){
      const refs = holderState
        .map(item => norm(item.uid))
        .filter(Boolean)
        .map(uid => ({ uid, eventId, orderId }));

      const seen = new Set();
      return refs.filter(ref => {
        const key = `${ref.uid}__${ref.eventId}__${ref.orderId}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function buildTicketId(order, assignment){
      const holderKey = assignment.uid || lower(assignment.email) || `holder_${assignment.holderIndex}`;
      return `${order.id}_${assignment.holderIndex}_${holderKey}`.replace(/[^\w\-@.]/g, "_");
    }

    async function createTicketsForOrder(order, assignments){
      const myUid = norm(currentUser?.uid || "");
      const myEmail = lower(currentUser?.email || "");

      for (const assignment of assignments) {
        const ticketId = buildTicketId(order, assignment);
        const ticketRef = doc(db, "events", eventId, "tickets", ticketId);
        const ticketSnap = await getDoc(ticketRef);
        if (ticketSnap.exists()) continue;

        // uid 欄位存持票人 uid，若沒有則用主購者 uid（確保 my-tickets 能查到）
        const holderUid = norm(assignment.uid) || myUid;

        await setDoc(ticketRef, {
          eventId,
          eventTitle: norm(order.eventTitle || ""),
          orderId: order.id,
          uid: holderUid,
          buyerUid: myUid,
          buyerEmail: myEmail,
          email: lower(assignment.email),
          holderEmail: lower(assignment.email),
          holderName: norm(assignment.name),
          isBuyerTicket: assignment.isBuyerTicket === true,
          ticketTypeId: norm(assignment.ticketTypeId),
          ticketTypeName: norm(assignment.ticketTypeName),
          ticketPrice: Number(assignment.price || 0),
          orderTicketIndex: assignment.holderIndex,
          seatLabel: "",
          sectionId: "",
          qrCodeValue: `${eventId}::${order.id}::${assignment.holderIndex}::${holderUid || lower(assignment.email)}`,
          status: "valid",
          checkedIn: false,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }
    }

    function stopExpireCountdown(){
      if (expireTimer) {
        clearInterval(expireTimer);
        expireTimer = null;
      }
    }

    function startExpireCountdown(order){
      stopExpireCountdown();

      const expiresDate = toDate(order?.expiresAt);
      const el = document.getElementById("countdownText");

      if (!expiresDate || !el) {
        if (el) el.textContent = "--:--";
        return;
      }

      const updateCountdown = () => {
        const diff = expiresDate.getTime() - Date.now();

        if (diff <= 0) {
          el.textContent = "已逾時";
          el.className = "countdown countdown-danger";
          stopExpireCountdown();

          if (currentOrder) {
            currentOrder.status = "expired";
            renderPage();
          }
          return;
        }

        const totalSec = Math.floor(diff / 1000);
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;

        el.textContent = `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;

        if (totalSec <= 60) {
          el.className = "countdown countdown-danger";
        } else if (totalSec <= 300) {
          el.className = "countdown countdown-warn";
        } else {
          el.className = "countdown countdown-normal";
        }
      };

      updateCountdown();
      expireTimer = setInterval(updateCountdown, 1000);
    }

    async function saveAssignments(asFinalSubmit = false){
      if (!currentOrder?.ref) return;

      if (isOrderLocked(currentOrder)) {
        alert("此訂單目前不可修改。");
        return;
      }

      try {
        const freshOrder = await getOrder();
        if (!freshOrder) {
          alert("找不到最新訂單資料。");
          return;
        }

        currentOrder = freshOrder;

        const buyerUid = norm(currentOrder.buyerUid || currentOrder.uid || "");
        const buyerEmail = lower(currentOrder.buyerEmail || currentOrder.email || "");
        const myUid = norm(currentUser?.uid || "");
        const myEmail = lower(currentUser?.email || "");

        if (!currentUser || (buyerUid !== myUid && buyerEmail !== myEmail)) {
          alert("只有主購者可以修改這筆訂單。");
          return;
        }

        if (isOrderLocked(currentOrder)) {
          alert("此訂單目前不可修改。");
          renderPage();
          return;
        }

        const assignments = buildAssignmentsPayload();
        const participantEmails = buildParticipantEmails();
        const participantUids = buildParticipantUids();
        const sharedOrderRefs = buildSharedOrderRefs();
        const ready = allHoldersReady();

        if (asFinalSubmit && !ready) {
          alert("尚有持票人資料未完成或未通過驗證。");
          return;
        }

        let payload = {
          updatedAt: serverTimestamp(),
          holderAssignments: assignments,
          participantEmails,
          participantUids,
          sharedOrderRefs
        };

        if (asFinalSubmit) {
          payload.status = "ready_for_checkout";
          payload.fillStatus = "completed";
          payload.holderInfoCompletedAt = serverTimestamp();
        } else {
          payload.fillStatus = "draft";
        }

        await setDoc(currentOrder.ref, payload, { merge:true });

        if (asFinalSubmit) {
          await createTicketsForOrder(currentOrder, assignments);
        }

        currentOrder = await getOrder();
        holderState = flattenItems(currentOrder);
        renderPage();

        alert(asFinalSubmit ? "持票人資料已完成，訂單已正式成立。" : "已儲存目前資料。");
      } catch (err) {
        console.error("saveAssignments failed:", err);
        alert(err?.message || "儲存失敗，請查看 Console");
      }
    }

      const buyerTicketCount = getBuyerTicketCount(currentOrder);

          <div class="hero-sub">
活動：${esc(currentOrder.eventTitle || "未命名活動")}
主購者：${esc(currentUser?.email || "-")}
${expired ? "此訂單已超過填寫期限。" : ""}
          </div>

        if (emailEl) {
          emailEl.addEventListener("input", e => {
            const idx = item.holderIndex;
            holderState[idx].email = lower(e.target.value);
            holderState[idx].status = "";
            holderState[idx].message = "尚未檢查。";
            holderState[idx].uid = "";
            holderState[idx].verifiedSchoolId = "";
            holderState[idx].verifiedSchoolName = "";
            holderState[idx].verifyMethod = "";
            renderPage();
          });
        }

        if (nameEl) {

      const saveBtn = document.getElementById("saveBtn");
      const submitBtn = document.getElementById("submitBtn");

      if (checkAllBtn) {
        checkAllBtn.addEventListener("click", async () => {

          const old = checkAllBtn.textContent;
          checkAllBtn.textContent = "檢查中…";
          try {
            await validateAllHolders();
          } finally {
            checkAllBtn.disabled = false;
            checkAllBtn.textContent = old;
          }
        });
      }

      if (saveBtn) {
        saveBtn.addEventListener("click", async () => {
          saveBtn.disabled = true;
          const old = saveBtn.textContent;
          saveBtn.textContent = "儲存中…";
          try {
            await saveAssignments(false);
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = old;
          }
        });
      }

      if (submitBtn) {
        submitBtn.addEventListener("click", async () => {
          submitBtn.disabled = true;
          const old = submitBtn.textContent;
          submitBtn.textContent = "送出中…";
          try {
            await saveAssignments(true);
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = old;
          }
        });
      }

      startExpireCountdown(currentOrder);
    }

    async function initPage(){
      if (!eventId || !orderId) {
        app.className = "empty";
        app.innerHTML = "缺少訂單資訊。";
        return;
      }

      currentOrder = await getOrder();

      if (!currentOrder) {
        app.className = "empty";
        app.innerHTML = "找不到訂單。";
        return;
      }

      await loadAllowedUsers();

      const buyerUid = norm(currentOrder.buyerUid || currentOrder.uid || "");
      const buyerEmail = lower(currentOrder.buyerEmail || currentOrder.email || "");
      const myUid = norm(currentUser?.uid || "");
      const myEmail = lower(currentUser?.email || "");

      if (!currentUser || (buyerUid !== myUid && buyerEmail !== myEmail)) {
        app.className = "empty";
        app.innerHTML = "只有主購者可以填寫這筆訂單的持票人資料。";
        return;
      }

      holderState = flattenItems(currentOrder);
      renderPage();
    }

    onAuthStateChanged(auth, async user => {
      currentUser = user || null;
      updateAccountLinks(currentUser);

      if (!user) {
        goLogin();
        return;
      }

      try {
        await initPage();
      } catch (err) {
        console.error(err);
        app.className = "empty";
        app.innerHTML = "頁面載入失敗，請稍後再試。";
      }
    });

    window.addEventListener("beforeunload", () => {
      stopExpireCountdown();
    });
  </script>
</body>
</html
