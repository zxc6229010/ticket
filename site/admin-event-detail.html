<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>後台｜活動詳情</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root{
    --bg:#f6f7fb;
    --card:#fff;
    --text:#111827;
    --muted:#6b7280;
    --line:rgba(17,24,39,.08);
    --shadow:0 12px 28px rgba(0,0,0,.06);
    --ok:#16a34a;
    --warn:#dc2626;
    --blue:#2563eb;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .wrap{
    max-width:1100px;
    margin:auto;
    padding:24px 16px 40px;
  }

  .card{
    background:#fff;
    border-radius:18px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
  }

  h1{
    margin:0;
    font-size:24px;
    font-weight:900;
  }

  h2{
    margin:0;
    font-size:18px;
    font-weight:900;
  }

  .sub{
    color:var(--muted);
    margin-top:6px;
    font-size:14px;
    line-height:1.7;
  }

  .small{
    color:var(--muted);
    font-size:13px;
    line-height:1.7;
  }

  .mono{
    font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    flex-wrap:wrap;
  }

  .grid4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:12px;
  }

  @media (max-width:980px){
    .grid4{ grid-template-columns:repeat(2,1fr); }
  }

  @media (max-width:620px){
    .grid4{ grid-template-columns:1fr; }
  }

  .stat{
    background:#fafafa;
    border:1px solid #eef0f3;
    border-radius:14px;
    padding:14px;
  }

  .stat span{
    display:block;
    font-size:12px;
    color:var(--muted);
    line-height:1.6;
  }

  .stat b{
    display:block;
    margin-top:6px;
    font-size:26px;
    line-height:1.1;
  }

  .list{
    margin-top:12px;
    display:grid;
    gap:10px;
  }

  .item{
    border:1px solid #eee;
    border-radius:14px;
    padding:12px;
    background:#fff;
  }

  .itemTitle{
    font-weight:900;
    line-height:1.6;
  }

  .itemMeta{
    margin-top:6px;
    color:var(--muted);
    font-size:13px;
    line-height:1.7;
    word-break:break-word;
  }

  .tag{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    padding:4px 8px;
    border-radius:999px;
    background:#eee;
    margin-left:6px;
    font-weight:800;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    padding:6px 10px;
    font-size:12px;
    font-weight:900;
    border:1px solid var(--line);
    background:#fff;
  }

  .pill.ok{
    color:var(--ok);
    background:rgba(22,163,74,.06);
    border-color:rgba(22,163,74,.16);
  }

  .pill.warn{
    color:var(--warn);
    background:rgba(220,38,38,.06);
    border-color:rgba(220,38,38,.16);
  }

  .pill.blue{
    color:var(--blue);
    background:rgba(37,99,235,.06);
    border-color:rgba(37,99,235,.16);
  }

  .btn{
    padding:10px 14px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:#fff;
    font-weight:900;
    cursor:pointer;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }

  .btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(0,0,0,.08);
  }

  .btn.secondary{
    background:#fff;
    color:#111827;
    border:1px solid #ddd;
  }

  .btn[disabled]{
    opacity:.55;
    cursor:not-allowed;
    box-shadow:none;
    transform:none;
  }

  .empty{
    color:var(--muted);
    padding:8px 0;
    line-height:1.8;
  }

  .divider{
    height:1px;
    background:#eceff3;
    margin:16px 0;
  }

  .page{
    opacity:0;
    transform:translateY(6px);
    transition:opacity .22s ease, transform .22s ease;
  }

  .page.on{
    opacity:1;
    transform:translateY(0);
  }

  .page.leaving{
    opacity:0;
    transform:translateY(6px);
  }
</style>
</head>

<body>
<div class="wrap page" id="pageRoot">

  <div id="gate" class="card" style="display:none;"></div>

  <div id="app" style="display:none;">
    <div class="card">
      <div class="topbar">
        <div>
          <h1>活動詳情</h1>
          <div class="sub">查看這場活動的內容、現況與相關資料。</div>
          <div class="sub" style="margin-top:8px;">
            登入：<span id="who" class="mono">-</span>｜
            身分：<span id="roleText" class="mono">-</span>
          </div>
        </div>

        <div class="row">
          <a class="btn secondary" href="admin-events-overview.html">← 返回活動總覽</a>
          <a class="btn secondary" href="admin-events.html">活動管理</a>
          <a class="btn" id="staffAssignBtn" href="#">人員安排</a>
          <button class="btn secondary" id="logoutBtn">登出</button>
        </div>
      </div>
    </div>

    <div class="card" id="eventInfo">
      載入中…
    </div>

    <div class="card">
      <h2>統計</h2>
      <div class="grid4" id="stats"></div>
    </div>

    <div class="card">
      <h2>活動人員</h2>
      <div class="list" id="staff"></div>
    </div>

    <div class="card">
      <h2>驗票人員</h2>
      <div class="list" id="checkin"></div>
    </div>

    <div class="card">
      <h2>訂單</h2>
      <div class="list" id="orders"></div>
    </div>

    <div class="card">
      <h2>票券</h2>
      <div class="list" id="tickets"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const pageRoot = document.getElementById("pageRoot");
requestAnimationFrame(() => pageRoot.classList.add("on"));

function go(href){
  pageRoot.classList.add("leaving");
  setTimeout(() => location.href = href, 140);
}

document.addEventListener("click", (e) => {
  const a = e.target.closest("a");
  if (!a) return;
  const href = a.getAttribute("href");
  if (!href || href.startsWith("#") || href.startsWith("http")) return;
  e.preventDefault();
  go(href);
});

if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey:"AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain:"concert-1ff7e.firebaseapp.com",
    projectId:"concert-1ff7e"
  });
}

const db = firebase.firestore();
const auth = firebase.auth();

const gate = document.getElementById("gate");
const app = document.getElementById("app");
const whoEl = document.getElementById("who");
const roleText = document.getElementById("roleText");
const logoutBtn = document.getElementById("logoutBtn");

const eventInfoEl = document.getElementById("eventInfo");
const statsEl = document.getElementById("stats");
const staffEl = document.getElementById("staff");
const checkinEl = document.getElementById("checkin");
const ordersEl = document.getElementById("orders");
const ticketsEl = document.getElementById("tickets");
const staffAssignBtn = document.getElementById("staffAssignBtn");

const url = new URL(location.href);
const eventId = url.searchParams.get("eventId");

let currentUser = null;
let currentRole = "";
let currentUserData = null;

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[m]));
}

function norm(v){
  return String(v ?? "").trim();
}

function showGate(title, text, showLogin){
  gate.style.display = "block";
  app.style.display = "none";
  gate.innerHTML = `
    <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
    <div class="sub">${esc(text)}</div>
    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
      ${showLogin ? `<button class="btn" id="loginBtn">使用 Email 登入</button>` : `<button class="btn" id="logoutGateBtn">登出</button>`}
    </div>
  `;

  const loginBtn = document.getElementById("loginBtn");
  if (loginBtn) {
    loginBtn.onclick = async () => {
      const email = window.prompt("請輸入 Email");
      if (!email) return;
      const password = window.prompt("請輸入密碼");
      if (!password) return;
      await auth.signInWithEmailAndPassword(email.trim(), password);
    };
  }

  const logoutGateBtn = document.getElementById("logoutGateBtn");
  if (logoutGateBtn) {
    logoutGateBtn.onclick = doLogout;
  }
}

async function doLogout(){
  try{
    await auth.signOut();
  }catch(e){
    console.error(e);
    alert("登出失敗");
  }
}

logoutBtn.onclick = doLogout;

function toMillis(t){
  if(!t) return null;
  if(t.toDate) return t.toDate().getTime();
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d.getTime();
}

function formatTime(t){
  const ms = toMillis(t);
  if(!ms) return "-";
  return new Date(ms).toLocaleString("zh-Hant",{hour12:false});
}

function formatMoney(n){
  const num = Number(n || 0);
  return num.toLocaleString("zh-Hant");
}

function getStatus(event){
  const now = Date.now();
  const saleStart = toMillis(event.saleStartAt);
  const saleEnd = toMillis(event.saleEndAt);
  const start = toMillis(event.eventStartAt);
  const end = toMillis(event.eventEndAt);

  if (start && now < start) {
    if (saleStart && now < saleStart) return { text:"尚未開始", className:"blue" };
    return { text:"即將開始", className:"blue" };
  }

  if (start && end && now >= start && now <= end) {
    return { text:"進行中", className:"ok" };
  }

  if ((saleEnd && now > saleEnd) || (end && now > end)) {
    return { text:"已結束", className:"warn" };
  }

  return { text:"活動資訊", className:"blue" };
}

function getPublicTypeText(event){
  return event.published === true ? "已公開" : "未公開";
}

function getSimpleApprovalText(value){
  const v = norm(value).toLowerCase();
  if (v === "approved") return "已核准";
  if (v === "rejected") return "未核准";
  if (v === "pending") return "審核中";
  return "未設定";
}

function getInviteText(event){
  return event.inviteCodeEnabled === true ? "已開啟" : "未開啟";
}

function getTicketFlowText(ticket){
  const status = norm(ticket.status).toLowerCase();
  if (status === "inside") return "在場";
  if (status === "exited") return "已離場";
  if (status === "not_entered") return "未入場";
  if (!status) return ticket.checkedIn === true ? "已入場" : "未入場";
  return "處理中";
}

function getPaymentText(value){
  const v = norm(value).toLowerCase();
  if (v === "paid") return "已付款";
  if (v === "pending") return "待付款";
  if (v === "failed") return "付款失敗";
  if (v === "refunded") return "已退款";
  return "未標記";
}

async function loadUserRole(uid){
  const doc = await db.collection("users").doc(uid).get();
  if (!doc.exists) return { ok:false, reason:"尚未授權" };

  const userData = doc.data() || {};
  if (userData.enabled !== true) return { ok:false, reason:"帳號已停用" };

  return {
    ok: true,
    role: String(userData.role || "").trim(),
    userData
  };
}

function isAllowedRole(role){
  return [
    "platform_super",
    "platform_admin",
    "org_super",
    "org_admin",
    "org_staff"
  ].includes(role);
}

function canManageEvent(eventData){
  if (!eventData) return false;

  if (currentRole === "platform_super" || currentRole === "platform_admin") {
    return true;
  }

  const mySchoolId = norm(currentUserData?.schoolId || currentUserData?.orgSchoolId || "");
  const myOrgId = norm(currentUserData?.orgId || currentUserData?.organizationId || "");

  const eventSchoolId = norm(eventData.ownerSchoolId || "");
  const eventOrgId = norm(eventData.orgId || eventData.ownerOrgId || "");

  if (mySchoolId && eventSchoolId && mySchoolId === eventSchoolId) return true;
  if (myOrgId && eventOrgId && myOrgId === eventOrgId) return true;

  return false;
}

async function loadEventPage(){
  if(!eventId){
    eventInfoEl.innerHTML = `<div class="empty">缺少活動資料，無法載入。</div>`;
    statsEl.innerHTML = "";
    staffEl.innerHTML = `<div class="empty">無資料</div>`;
    checkinEl.innerHTML = `<div class="empty">無資料</div>`;
    ordersEl.innerHTML = `<div class="empty">無資料</div>`;
    ticketsEl.innerHTML = `<div class="empty">無資料</div>`;
    return;
  }

  staffAssignBtn.href = `admin-staff-assign.html?eventId=${encodeURIComponent(eventId)}`;

  const eventSnap = await db.doc(`events/${eventId}`).get();
  if (!eventSnap.exists) {
    eventInfoEl.innerHTML = `<div class="empty">找不到此活動。</div>`;
    return;
  }

  const event = eventSnap.data() || {};

  if (!canManageEvent(event)) {
    showGate("權限不足", "你沒有權限查看這場活動。", false);
    return;
  }

  const status = getStatus(event);

  eventInfoEl.innerHTML = `
    <div class="topbar">
      <div>
        <h1>${esc(event.title || "未命名活動")}</h1>
        <div class="sub">
          地點：${esc(event.location || "-")}<br>
          活動時間：${esc(formatTime(event.eventStartAt))} ～ ${esc(formatTime(event.eventEndAt))}<br>
          受理時間：${esc(formatTime(event.saleStartAt))} ～ ${esc(formatTime(event.saleEndAt))}
        </div>
        <div class="row" style="margin-top:10px;">
          <span class="pill ${status.className}">${esc(status.text)}</span>
          <span class="pill">${esc(getPublicTypeText(event))}</span>
          <span class="pill">${esc(getSimpleApprovalText(event.approvalStatus))}</span>
        </div>
      </div>

      <div style="min-width:260px;">
        <div class="small">
          名額：<span>${esc(event.capacity ?? "-")}</span><br>
          邀請碼：<span>${esc(getInviteText(event))}</span><br>
          入口數量：<span>${Array.isArray(event.gates) ? event.gates.length : 0}</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="small" style="font-weight:900;color:#111827;">活動說明</div>
      <div class="sub">${esc(event.description || "尚無活動說明").replace(/\n/g, "<br>")}</div>
    </div>
  `;

  const [ordersSnap, ticketsSnap, staffSnap, checkinSnap] = await Promise.all([
    db.collection(`events/${eventId}/orders`).get(),
    db.collection(`events/${eventId}/tickets`).get(),
    db.collection(`events/${eventId}/staffAssignments`).get(),
    db.collection(`events/${eventId}/checkinAssignments`).get()
  ]);

  const orders = ordersSnap.docs.map(d => ({ id:d.id, ...(d.data() || {}) }));
  const tickets = ticketsSnap.docs.map(d => ({ id:d.id, ...(d.data() || {}) }));
  const staffAssignments = staffSnap.docs.map(d => ({ id:d.id, ...(d.data() || {}) }));
  const checkinAssignments = checkinSnap.docs.map(d => ({ id:d.id, ...(d.data() || {}) }));

  const checked = tickets.filter(t => t.checkedIn === true).length;
  const notChecked = tickets.length - checked;
  const inside = tickets.filter(t => t.status === "inside").length;
  const orderTotalAmount = orders.reduce((sum, o) => sum + Number(o.total || 0), 0);

  const nonCheckinStaff = staffAssignments.filter(s => {
    const roleInEvent = norm(s.roleInEvent);
    const canCheckin = s?.permissions?.canCheckin === true;
    return !(roleInEvent === "checkin" || canCheckin);
  });

  statsEl.innerHTML = `
    <div class="stat">
      <span>訂單數</span>
      <b>${orders.length}</b>
    </div>
    <div class="stat">
      <span>票券數</span>
      <b>${tickets.length}</b>
    </div>
    <div class="stat">
      <span>已使用</span>
      <b>${checked}</b>
    </div>
    <div class="stat">
      <span>未使用</span>
      <b>${notChecked}</b>
    </div>
    <div class="stat">
      <span>活動人員</span>
      <b>${nonCheckinStaff.length}</b>
    </div>
    <div class="stat">
      <span>驗票人員</span>
      <b>${checkinAssignments.length}</b>
    </div>
    <div class="stat">
      <span>在場人數</span>
      <b>${inside}</b>
    </div>
    <div class="stat">
      <span>訂單總額</span>
      <b>${formatMoney(orderTotalAmount)}</b>
    </div>
  `;

  staffEl.innerHTML = nonCheckinStaff.length
    ? nonCheckinStaff.map(s => `
        <div class="item">
          <div class="itemTitle">
            ${esc(s.email || "-")}
            <span class="tag">${esc(s.roleInEvent || "活動人員")}</span>
          </div>
          <div class="itemMeta">
            分組：${esc(s.groupName || "-")}<br>
            備註：${esc(s.note || "-")}
          </div>
        </div>
      `).join("")
    : `<div class="empty">目前沒有活動人員資料。</div>`;

  checkinEl.innerHTML = checkinAssignments.length
    ? checkinAssignments.map(c => `
        <div class="item">
          <div class="itemTitle">
            ${esc(c.email || "-")}
            <span class="tag">${esc(c.gateName || "未指定入口")}</span>
          </div>
          <div class="itemMeta">
            分組：${esc(c.groupName || "-")}<br>
            身分：${esc(c.role || "驗票人員")}<br>
            安排時間：${esc(formatTime(c.assignedAt))}
          </div>
        </div>
      `).join("")
    : `<div class="empty">目前沒有驗票人員資料。</div>`;

  ordersEl.innerHTML = orders.length
    ? orders
        .sort((a,b) => (toMillis(b.createdAt) || 0) - (toMillis(a.createdAt) || 0))
        .slice(0, 30)
        .map(o => `
          <div class="item">
            <div class="itemTitle">
              ${esc(o.email || o.userEmail || "-")}
              <span class="tag">${esc(getPaymentText(o.paymentStatus))}</span>
            </div>
            <div class="itemMeta">
              姓名：${esc(o.name || "-")}<br>
              金額：${formatMoney(o.total || 0)}<br>
              建立時間：${esc(formatTime(o.createdAt))}
            </div>
          </div>
        `).join("")
    : `<div class="empty">目前沒有訂單資料。</div>`;

  ticketsEl.innerHTML = tickets.length
    ? tickets
        .sort((a,b) => {
          const aa = a.checkedIn === true ? 0 : 1;
          const bb = b.checkedIn === true ? 0 : 1;
          if (aa !== bb) return aa - bb;
          return (toMillis(b.checkedInAt) || 0) - (toMillis(a.checkedInAt) || 0);
        })
        .slice(0, 50)
        .map(t => `
          <div class="item">
            <div class="itemTitle">
              ${esc(t.name || "-")}
              <span class="tag">${t.checkedIn ? '已使用' : '未使用'}</span>
            </div>
            <div class="itemMeta">
              Email：${esc(t.email || "-")}<br>
              狀態：${esc(getTicketFlowText(t))}<br>
              入口：${esc(t.checkedInGate || "-")}<br>
              入場時間：${esc(formatTime(t.checkedInAt))}<br>
              離場時間：${esc(formatTime(t.checkedOutAt))}
            </div>
          </div>
        `).join("")
    : `<div class="empty">目前沒有票券資料。</div>`;
}

auth.onAuthStateChanged(async (user) => {
  currentUser = user || null;

  if (!user) {
    showGate("活動詳情", "請先登入後台帳號。", true);
    return;
  }

  try{
    const result = await loadUserRole(user.uid);

    if (!result.ok) {
      showGate("無法進入", result.reason, false);
      return;
    }

    currentRole = result.role;
    currentUserData = result.userData || {};

    if (!isAllowedRole(currentRole)) {
      showGate("權限不足", "你沒有權限查看此頁面。", false);
      return;
    }

    whoEl.textContent = user.email || "-";
    roleText.textContent = currentRole || "-";

    gate.style.display = "none";
    app.style.display = "block";

    await loadEventPage();
  }catch(e){
    console.error(e);
    showGate("發生錯誤", "無法讀取資料，請稍後再試。", false);
  }
});
</script>
</body>
</html>
