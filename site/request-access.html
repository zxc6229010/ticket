<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜後台帳號申請</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }
    .wrap{ max-width:960px; margin:0 auto; padding:48px 24px; }
    @media (max-width:640px){ .wrap{ padding:28px 16px; } }

    .card{
      background:var(--card); border:1px solid var(--line); border-radius:18px;
      box-shadow:var(--shadow); padding:18px; margin-bottom:18px;
    }
    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ color:var(--muted); font-size:14px; line-height:1.7; }
    .row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      height:44px; padding:10px 18px; border-radius:999px;
      border:1px solid var(--line); background:#fff; color:#111;
      font-weight:900; font-size:16px; cursor:pointer;
      text-decoration:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:hover{ box-shadow:0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.98); box-shadow:none; }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; box-shadow:none; transform:none; }

    label{ font-weight:900; display:block; margin:12px 0 6px; }
    input[type="text"], textarea, select{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      background:#fff;
      outline:none;
    }
    textarea{ min-height:110px; resize:vertical; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--line); border-radius:999px;
      padding:8px 12px; font-weight:900; font-size:14px; background:#fff;
    }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .warn{ color:#b91c1c; font-weight:900; }
    .ok{ color:#166534; font-weight:900; }

    .page{ opacity:0; transform: translateY(6px); transition: opacity .22s ease, transform .22s ease; }
    .page.on{ opacity:1; transform: translateY(0); }
    .page.leaving{ opacity:0; transform: translateY(6px); }
  </style>
</head>

<body>
  <div class="wrap page" id="pageRoot">

    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>後台帳號申請</h1>
            <div class="sub">
              填寫申請後會進入審核流程。<br/>
              <span class="mono">申請資料會永久留存</span>，審核結果也會記錄。
            </div>
            <div class="sub" style="margin-top:8px;">
              登入：<span id="email" class="mono">-</span>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start;">
            <a class="btn" href="dashboard.html">回主選單</a>
            <button class="btn" onclick="doLogout()">登出</button>
          </div>
        </div>
      </div>

      <div class="card" id="statusCard" style="display:none;"></div>

      <div class="card" id="formCard" style="display:none;">
        <div class="row">
          <div>
            <div class="pill">申請資料</div>
            <div class="sub" style="margin-top:8px;">
              你可以先選擇想申請的身分，並回答平台管理員設定的提問。
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" id="reloadBtn">重新載入題目</button>
            <button class="btn" id="submitBtn">送出申請</button>
          </div>
        </div>

        <label>想申請的角色</label>
        <select id="desiredRole">
          <option value="org_admin">組織管理員（org_admin）</option>
          <option value="org_staff">組織服務人員（org_staff）</option>
          <option value="org_super">組織超級管理員（org_super）</option>
        </select>
        <div class="sub" style="margin-top:6px;">※ 是否通過與角色分派以平台審核結果為準。</div>

        <label style="margin-top:14px;">希望加入的組織 / 校園（可不填）</label>
        <input id="desiredOrg" type="text" placeholder="例如：KMHS / 你們組織代號（選填）" />
        <div class="sub" style="margin-top:6px;">你也可以先不填，讓平台管理員在審核時分派。</div>

        <div id="questions"></div>

        <div class="sub" style="margin-top:12px;">
          <span class="ok">提醒：</span>送出後可再次申請（每次申請都會留存紀錄）。
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const pageRoot = document.getElementById("pageRoot");
    requestAnimationFrame(() => pageRoot.classList.add("on"));

    function go(href){
      pageRoot.classList.add("leaving");
      setTimeout(()=> location.href = href, 140);
    }

    document.addEventListener("click", (e)=>{
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http")) return;
      e.preventDefault();
      go(href);
    });

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");
    const statusCard = document.getElementById("statusCard");
    const formCard = document.getElementById("formCard");

    const emailEl = document.getElementById("email");
    const reloadBtn = document.getElementById("reloadBtn");
    const submitBtn = document.getElementById("submitBtn");
    const desiredRoleEl = document.getElementById("desiredRole");
    const desiredOrgEl = document.getElementById("desiredOrg");
    const questionsEl = document.getElementById("questions");

    let currentQuestions = [];

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function norm(v){
      return String(v ?? "").trim();
    }

    function showGate(title, msg, showLogin){
      gate.style.display = "block";
      app.style.display = "none";
      gate.innerHTML = `
        <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
        <div class="sub">${esc(msg)}</div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${showLogin ? `<button class="btn" id="loginBtn">使用 Google 登入</button>` : ``}
          ${!showLogin ? `<button class="btn" onclick="doLogout()">登出</button>` : ``}
        </div>
      `;
      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn){
        loginBtn.onclick = async () => {
          const provider = new firebase.auth.GoogleAuthProvider();
          await firebase.auth().signInWithPopup(provider);
        };
      }
    }

    window.doLogout = async () => {
      try { await firebase.auth().signOut(); }
      catch(e){ console.error(e); alert("登出失敗（請看 Console）"); }
    };

    const DEFAULT_Q = [
      {
        id: "default_q1",
        label: "你是誰？（姓名 / 單位）",
        type: "text",
        placeholder: "例如：王小明／公關組",
        required: true,
        enabled: true,
        sort: 10
      },
      {
        id: "default_q2",
        label: "你為什麼需要後台權限？",
        type: "textarea",
        placeholder: "請簡述用途",
        required: true,
        enabled: true,
        sort: 20
      },
      {
        id: "default_q3",
        label: "你希望負責的工作內容",
        type: "textarea",
        placeholder: "例如：核銷、服務台、名單管理…",
        required: false,
        enabled: true,
        sort: 30
      }
    ];

    function normalizeQuestion(docId, raw){
      const q = raw || {};
      return {
        id: norm(docId || q.id),
        label: norm(q.label),
        type: norm(q.type) === "textarea" ? "textarea" : "text",
        placeholder: norm(q.placeholder),
        required: q.required === true,
        enabled: q.enabled !== false,
        sort: Number(q.sort || 0) || 0
      };
    }

    async function loadQuestions(){
      try{
        let snap;
        try{
          snap = await db.collection("system")
            .doc("adminAccessForm")
            .collection("questions")
            .orderBy("sort", "asc")
            .get();
        }catch(orderErr){
          console.warn("questions orderBy failed, fallback to unsorted get:", orderErr);
          snap = await db.collection("system")
            .doc("adminAccessForm")
            .collection("questions")
            .get();
        }

        const list = [];
        snap.forEach(doc => {
          const q = normalizeQuestion(doc.id, doc.data());
          if (!q.enabled) return;
          if (!q.label) return;
          list.push(q);
        });

        list.sort((a, b) => a.sort - b.sort || a.label.localeCompare(b.label, "zh-Hant"));

        return list.length ? list : DEFAULT_Q;
      }catch(e){
        console.warn("load questions failed:", e);
        return DEFAULT_Q;
      }
    }

    function renderQuestions(qs){
      currentQuestions = qs.slice();

      questionsEl.innerHTML = `<div class="sub" style="margin-top:14px;"><span class="pill">提問</span></div>`;

      qs.forEach(q => {
        const fieldHtml = q.type === "textarea"
          ? `<textarea data-qid="${esc(q.id)}" placeholder="${esc(q.placeholder || "")}"></textarea>`
          : `<input type="text" data-qid="${esc(q.id)}" placeholder="${esc(q.placeholder || "")}" />`;

        questionsEl.insertAdjacentHTML("beforeend", `
          <label>${esc(q.label)}${q.required ? ' <span class="warn">*</span>' : ''}</label>
          ${fieldHtml}
        `);
      });
    }

    function getAnswerElement(qid){
      return questionsEl.querySelector(`[data-qid="${CSS.escape(qid)}"]`);
    }

    function readAnswers(qs){
      const answers = {};
      for (const q of qs){
        const el = getAnswerElement(q.id);
        answers[q.id] = norm(el ? el.value : "");
      }
      return answers;
    }

    function validate(qs, answers){
      for (const q of qs){
        if (q.required && !norm(answers[q.id])) {
          return `請填寫：${q.label}`;
        }
      }
      return "";
    }

    function clearAnswers(qs){
      qs.forEach(q => {
        const el = getAnswerElement(q.id);
        if (el) el.value = "";
      });
    }

    function showStatusBox(html){
      statusCard.style.display = "block";
      statusCard.innerHTML = html;
    }

    async function submitRequest(user){
  const qs = currentQuestions || [];
  const answers = readAnswers(qs);
  const err = validate(qs, answers);
  if (err) return alert(err);

  submitBtn.disabled = true;
  const old = submitBtn.textContent;
  submitBtn.textContent = "送出中…";

  try{
    // 先檢查是否已有待審核申請
    let pendingSnap;
    try{
      pendingSnap = await db.collection("adminAccessRequests")
        .where("uid", "==", user.uid)
        .where("status", "==", "pending")
        .limit(1)
        .get();
    }catch(queryErr){
      console.error("pending query failed:", queryErr);
      throw new Error("目前無法檢查待審核申請，請稍後再試");
    }

    if (!pendingSnap.empty) {
      alert("你目前已有待審核的申請，請先等待平台管理員審核。");
      return;
    }

    const payload = {
      uid: user.uid,
      email: user.email || "",
      createdAt: new Date(),
      status: "pending",
      desiredRole: norm(desiredRoleEl.value),
      desiredOrg: norm(desiredOrgEl.value),
      answers
    };

    const ref = await db.collection("adminAccessRequests").add(payload);

    showStatusBox(`
      <h1 style="margin:0 0 6px; font-size:22px;">已送出申請</h1>
      <div class="sub">
        狀態：<span class="pill">pending</span><br/>
        申請編號：<span class="mono">${esc(ref.id)}</span><br/>
        你可以回主選單，等待平台管理員審核。
      </div>
    `);

    clearAnswers(qs);

  }catch(e){
    console.error(e);
    alert(e.message || "送出失敗（可能是 Firestore Rules 權限不足）");
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = old;
  }
}

        showStatusBox(`
          <h1 style="margin:0 0 6px; font-size:22px;">已送出申請</h1>
          <div class="sub">
            狀態：<span class="pill">pending</span><br/>
            申請編號：<span class="mono">${esc(ref.id)}</span><br/>
            你可以回主選單，等待平台管理員審核。
          </div>
        `);

        clearAnswers(qs);

      }catch(e){
        console.error(e);
        alert("送出失敗（可能是 Firestore Rules 權限不足）");
      }finally{
        submitBtn.disabled = false;
        submitBtn.textContent = old;
      }
    }

    async function reloadQuestionsAndRender(){
      reloadBtn.disabled = true;
      const old = reloadBtn.textContent;
      reloadBtn.textContent = "載入中…";
      try{
        const qs = await loadQuestions();
        renderQuestions(qs);
      }finally{
        reloadBtn.disabled = false;
        reloadBtn.textContent = old;
      }
    }

    async function boot(){
      const user = firebase.auth().currentUser;
      if (!user) return;

      emailEl.textContent = user.email || "-";
      formCard.style.display = "block";

      await reloadQuestionsAndRender();

      reloadBtn.onclick = reloadQuestionsAndRender;
      submitBtn.onclick = () => submitRequest(user);

      showStatusBox(`
        <h1 style="margin:0 0 6px; font-size:22px;">申請說明</h1>
        <div class="sub">
          送出後會進入審核。審核紀錄與申請內容都會留存。<br/>
          題目內容由平台管理員動態設定，重新載入可取得最新版本。
        </div>
      `);
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        showGate("後台帳號申請", "請先登入後再填寫申請。", true);
        return;
      }
      gate.style.display = "none";
      app.style.display = "block";
      await boot();
    });
  </script>
</body>
</html>
