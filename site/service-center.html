<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>服務中心｜活動控台</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#111;
  --muted:#6b7280;
  --line:rgba(17,17,17,.10);
  --shadow:0 10px 25px rgba(0,0,0,.06);
  --danger:#dc2626;
  --ok:#16a34a;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.wrap{
  max-width:980px;
  margin:auto;
  padding:24px 16px 40px;
}
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
h1{ margin:0 0 10px; font-size:24px; }
h2{ margin:0 0 10px; font-size:18px; }
.sub{ color:var(--muted); font-size:14px; line-height:1.6; }
.small{ font-size:13px; color:var(--muted); }
.mono{ font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace; }

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media (max-width:780px){
  .grid{ grid-template-columns:1fr; }
}

input,button,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:8px;
  font-size:15px;
}
button{
  background:#111;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:hover{ opacity:.95; }
.btn-secondary{
  background:#fff;
  color:#111;
}
.btn-danger{
  background:var(--danger);
  border-color:var(--danger);
}
.btn-ok{
  background:var(--ok);
  border-color:var(--ok);
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.row > *{
  flex:1;
  min-width:140px;
}

.statsTop{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:12px;
}
@media (max-width:780px){
  .statsTop{ grid-template-columns:repeat(2,1fr); }
}
.statBox{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  background:#fff;
}
.statNum{
  font-size:28px;
  font-weight:900;
}
.statLabel{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
}

.result-item{
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
  transition:all .12s ease;
  background:#fff;
}
.result-item:hover{
  border-color:#111;
  transform:translateY(-1px);
}
.result-item.active{
  border-color:#111;
  box-shadow:0 8px 18px rgba(0,0,0,.05);
}

.info-line{
  margin-top:8px;
  line-height:1.7;
  word-break:break-word;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:14px;
}
@media (max-width:780px){
  .actions{ grid-template-columns:1fr; }
}

.log-item{
  border-top:1px dashed #e5e7eb;
  padding:10px 0;
  font-size:14px;
  line-height:1.6;
}
.empty{
  color:var(--muted);
  padding:8px 0;
}
.bad{
  color:var(--danger);
  font-weight:bold;
}
.ok{
  color:var(--ok);
  font-weight:bold;
}
.toolbar{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:end;
}
@media (max-width:780px){
  .toolbar{ grid-template-columns:1fr; }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <h1>服務中心</h1>
    <div class="sub">選擇活動後，可查詢票券、處理例外狀況，並查看即時活動狀態。</div>

    <div class="toolbar">
      <div>
        <div class="small">選擇活動</div>
        <select id="eventSelect">
          <option value="">載入中...</option>
        </select>
      </div>
      <button class="btn-secondary" id="reloadEventsBtn">重新載入活動</button>
    </div>

    <div style="margin-top:12px;">
      <div><b>目前活動：</b><span id="currentEventTitle">尚未選擇</span></div>
      <div class="small" style="margin-top:4px;">活動ID：<span id="currentEventId" class="mono">-</span></div>
    </div>

    <div class="statsTop" id="topStats">
      <div class="statBox">
        <div class="statNum" id="sTotal">-</div>
        <div class="statLabel">總票數</div>
      </div>
      <div class="statBox">
        <div class="statNum" id="sInside">-</div>
        <div class="statLabel">在場中</div>
      </div>
      <div class="statBox">
        <div class="statNum" id="sExited">-</div>
        <div class="statLabel">已出場</div>
      </div>
      <div class="statBox">
        <div class="statNum" id="sNotEntered">-</div>
        <div class="statLabel">未入場</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>查詢票券</h2>
    <div class="sub">可直接使用條碼槍掃描，或輸入 ticketId、文件ID、email、姓名。</div>
    <input id="query" placeholder="請掃描條碼或輸入 ticketId / 文件ID / email / 姓名">
    <div class="row">
      <button id="searchBtn">查詢</button>
      <button class="btn-secondary" id="clearBtn">清空</button>
    </div>
    <div id="searchResults" class="empty">尚未查詢</div>
  </div>

  <div class="card">
    <h2>票券資訊</h2>
    <div id="result" class="empty">請先查詢並選擇一張票券</div>
  </div>

  <div class="card">
    <h2>服務中心紀錄</h2>
    <div id="serviceLogs" class="empty">請先選擇活動</div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey:"AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain:"concert-1ff7e.firebaseapp.com",
    projectId:"concert-1ff7e"
  });
}
const db = firebase.firestore();

let currentTicket = null;
let ticketsCache = [];
let unsubStats = null;
let unsubLogs = null;
let barcodeTimer = null;

const eventSelectEl = document.getElementById("eventSelect");
const reloadEventsBtn = document.getElementById("reloadEventsBtn");
const currentEventTitleEl = document.getElementById("currentEventTitle");
const currentEventIdEl = document.getElementById("currentEventId");

const queryEl = document.getElementById("query");
const searchBtn = document.getElementById("searchBtn");
const clearBtn = document.getElementById("clearBtn");

const searchResultsDiv = document.getElementById("searchResults");
const resultDiv = document.getElementById("result");
const serviceLogsDiv = document.getElementById("serviceLogs");

const sTotalEl = document.getElementById("sTotal");
const sInsideEl = document.getElementById("sInside");
const sExitedEl = document.getElementById("sExited");
const sNotEnteredEl = document.getElementById("sNotEntered");

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[m]));
}
function norm(s){ return String(s ?? "").trim(); }

function fmtTime(v){
  if (!v) return "-";
  const d = typeof v.toDate === "function" ? v.toDate() : new Date(v);
  if (isNaN(d.getTime())) return "-";
  return d.toLocaleString("zh-Hant", { hour12:false });
}

function statusText(s){
  if (s === "not_entered") return "未入場";
  if (s === "inside") return "在場中";
  if (s === "exited") return "已出場";
  return "-";
}

function checkedInText(t){
  return t.checkedIn === true ? "true" : "false";
}

function getEventId(){
  return norm(eventSelectEl.value);
}

async function loadEvents(){
  eventSelectEl.innerHTML = `<option value="">載入中...</option>`;

  try{
    const snap = await db.collection("events").orderBy("createdAt", "desc").limit(100).get();

    if (snap.empty){
      eventSelectEl.innerHTML = `<option value="">目前沒有活動</option>`;
      return;
    }

    const oldValue = eventSelectEl.value;

    eventSelectEl.innerHTML = `<option value="">請選擇活動</option>` + snap.docs.map(doc => {
      const d = doc.data() || {};
      return `<option value="${esc(doc.id)}">${esc(d.title || doc.id)}</option>`;
    }).join("");

    if (oldValue && Array.from(eventSelectEl.options).some(o => o.value === oldValue)) {
      eventSelectEl.value = oldValue;
    }
  }catch(e){
    console.error(e);
    eventSelectEl.innerHTML = `<option value="">活動載入失敗</option>`;
  }
}

async function onEventChange(){
  const eventId = getEventId();

  currentTicket = null;
  ticketsCache = [];
  searchResultsDiv.innerHTML = `<div class="empty">尚未查詢</div>`;
  resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;

  if (unsubStats) { unsubStats(); unsubStats = null; }
  if (unsubLogs) { unsubLogs(); unsubLogs = null; }

  if (!eventId){
    currentEventTitleEl.textContent = "尚未選擇";
    currentEventIdEl.textContent = "-";
    sTotalEl.textContent = "-";
    sInsideEl.textContent = "-";
    sExitedEl.textContent = "-";
    sNotEnteredEl.textContent = "-";
    serviceLogsDiv.innerHTML = `<div class="empty">請先選擇活動</div>`;
    return;
  }

  try{
    const snap = await db.collection("events").doc(eventId).get();
    if (!snap.exists){
      currentEventTitleEl.textContent = "找不到活動";
      currentEventIdEl.textContent = eventId;
      return;
    }

    const d = snap.data() || {};
    currentEventTitleEl.textContent = d.title || eventId;
    currentEventIdEl.textContent = eventId;

    watchStats();
    watchServiceLogs();
  }catch(e){
    console.error(e);
    currentEventTitleEl.textContent = "載入失敗";
    currentEventIdEl.textContent = eventId;
  }
}

function renderTicketDetail(ticket){
  if (!ticket){
    resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
    return;
  }

  resultDiv.innerHTML = `
    <div class="info-line"><b>ticketId：</b><span class="mono">${esc(ticket.ticketId || "-")}</span></div>
    <div class="info-line"><b>文件ID：</b><span class="mono">${esc(ticket.id || "-")}</span></div>
    <div class="info-line"><b>姓名：</b>${esc(ticket.name || "-")}</div>
    <div class="info-line"><b>Email：</b>${esc(ticket.email || "-")}</div>
    <div class="info-line"><b>狀態：</b><b>${esc(statusText(ticket.status))}</b></div>
    <div class="info-line"><b>checkedIn：</b>${esc(checkedInText(ticket))}</div>
    <div class="info-line"><b>入口：</b>${esc(ticket.checkedInGate || "-")}</div>
    <div class="info-line"><b>入場時間：</b>${esc(fmtTime(ticket.checkedInAt))}</div>
    <div class="info-line"><b>出場時間：</b>${esc(fmtTime(ticket.checkedOutAt))}</div>
    <div class="info-line"><b>最後更新：</b>${esc(fmtTime(ticket.updatedAt))}</div>

    <div class="actions">
      <button class="btn-ok" onclick="forceCheckin()">強制入場</button>
      <button class="btn-secondary" onclick="forceCheckout()">強制出場</button>
      <button class="btn-danger" onclick="resetTicket()">重設狀態</button>
    </div>
  `;
}

function renderSearchResults(rows){
  if (!rows.length){
    searchResultsDiv.innerHTML = `<span class="bad">查無資料</span>`;
    resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
    currentTicket = null;
    return;
  }

  searchResultsDiv.innerHTML = rows.map(t => `
    <div class="result-item ${currentTicket && currentTicket.id === t.id ? "active" : ""}" onclick="selectTicket('${esc(t.id)}')">
      <div><b>${esc(t.name || "-")}</b>｜${esc(t.email || "-")}</div>
      <div class="small" style="margin-top:4px;">
        ticketId：<span class="mono">${esc(t.ticketId || "-")}</span>｜
        狀態：${esc(statusText(t.status))}
      </div>
    </div>
  `).join("");

  if (!currentTicket && rows.length) {
    currentTicket = rows[0];
    renderTicketDetail(currentTicket);
  }
}

function selectTicket(ticketDocId){
  const found = ticketsCache.find(t => t.id === ticketDocId);
  if (!found) return;
  currentTicket = found;
  renderSearchResults(ticketsCache);
  renderTicketDetail(currentTicket);
}
window.selectTicket = selectTicket;

async function searchTickets(){
  const eventId = getEventId();
  const q = norm(queryEl.value);

  if (!eventId){
    alert("請先選擇活動");
    return;
  }
  if (!q){
    alert("請輸入查詢內容");
    return;
  }

  searchResultsDiv.innerHTML = "載入中...";
  resultDiv.innerHTML = `<div class="empty">載入中...</div>`;
  currentTicket = null;
  ticketsCache = [];

  try{
    const col = db.collection("events").doc(eventId).collection("tickets");
    const resultsMap = new Map();

    const directDoc = await col.doc(q).get();
    if (directDoc.exists) {
      resultsMap.set(directDoc.id, { id: directDoc.id, ...(directDoc.data() || {}) });
    }

    const [ticketIdSnap, emailSnap, nameSnap] = await Promise.all([
      col.where("ticketId", "==", q).get(),
      col.where("email", "==", q).get(),
      col.where("name", "==", q).get()
    ]);

    [ticketIdSnap, emailSnap, nameSnap].forEach(snap => {
      snap.forEach(doc => {
        resultsMap.set(doc.id, { id: doc.id, ...(doc.data() || {}) });
      });
    });

    ticketsCache = Array.from(resultsMap.values());
    renderSearchResults(ticketsCache);
  }catch(e){
    console.error(e);
    searchResultsDiv.innerHTML = `<span class="bad">查詢失敗：${esc(e.message || e)}</span>`;
    resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
  }
}

function clearSearch(){
  queryEl.value = "";
  currentTicket = null;
  ticketsCache = [];
  searchResultsDiv.innerHTML = `<div class="empty">尚未查詢</div>`;
  resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
}

async function writeServiceLog(action, ticket){
  const eventId = getEventId();
  if (!eventId || !ticket) return;

  try{
    await db.collection("events")
      .doc(eventId)
      .collection("serviceLogs")
      .add({
        action,
        ticketDocId: ticket.id || "",
        ticketId: ticket.ticketId || "",
        name: ticket.name || "",
        email: ticket.email || "",
        status: ticket.status || "",
        gate: ticket.checkedInGate || "",
        createdAt: new Date()
      });
  }catch(e){
    console.warn("service log failed:", e);
  }
}

async function forceCheckin(){
  if (!currentTicket) return;
  const eventId = getEventId();
  if (!eventId) return;

  try{
    await db.doc(`events/${eventId}/tickets/${currentTicket.id}`).update({
      status: "inside",
      checkedIn: true,
      checkedInAt: new Date(),
      checkedOutAt: null,
      updatedAt: new Date(),
      checkedInGate: "服務中心"
    });

    await writeServiceLog("force_checkin", {
      ...currentTicket,
      status: "inside",
      checkedInGate: "服務中心"
    });

    alert("已強制入場");
    await searchTickets();
  }catch(e){
    console.error(e);
    alert("操作失敗：" + (e.message || e));
  }
}
window.forceCheckin = forceCheckin;

async function forceCheckout(){
  if (!currentTicket) return;
  const eventId = getEventId();
  if (!eventId) return;

  try{
    await db.doc(`events/${eventId}/tickets/${currentTicket.id}`).update({
      status: "exited",
      checkedOutAt: new Date(),
      updatedAt: new Date()
    });

    await writeServiceLog("force_checkout", {
      ...currentTicket,
      status: "exited"
    });

    alert("已強制出場");
    await searchTickets();
  }catch(e){
    console.error(e);
    alert("操作失敗：" + (e.message || e));
  }
}
window.forceCheckout = forceCheckout;

async function resetTicket(){
  if (!currentTicket) return;
  const eventId = getEventId();
  if (!eventId) return;

  try{
    await db.doc(`events/${eventId}/tickets/${currentTicket.id}`).update({
      status: "not_entered",
      checkedIn: false,
      checkedInAt: null,
      checkedOutAt: null,
      checkedInGate: "",
      checkedInBy: "",
      checkedInByEmail: "",
      updatedAt: new Date()
    });

    await writeServiceLog("reset_ticket", {
      ...currentTicket,
      status: "not_entered"
    });

    alert("已重設狀態");
    await searchTickets();
  }catch(e){
    console.error(e);
    alert("操作失敗：" + (e.message || e));
  }
}
window.resetTicket = resetTicket;

function watchStats(){
  const eventId = getEventId();
  if (!eventId) return;

  if (unsubStats) {
    unsubStats();
    unsubStats = null;
  }

  unsubStats = db.collection("events")
    .doc(eventId)
    .collection("tickets")
    .onSnapshot(snap => {
      let total = 0, inside = 0, exited = 0, notEntered = 0;

      snap.forEach(doc => {
        total++;
        const t = doc.data() || {};
        const s = t.status;
        if (s === "inside") inside++;
        else if (s === "exited") exited++;
        else notEntered++;
      });

      sTotalEl.textContent = total;
      sInsideEl.textContent = inside;
      sExitedEl.textContent = exited;
      sNotEnteredEl.textContent = notEntered;
    }, err => {
      console.error(err);
      sTotalEl.textContent = "-";
      sInsideEl.textContent = "-";
      sExitedEl.textContent = "-";
      sNotEnteredEl.textContent = "-";
    });
}

function watchServiceLogs(){
  const eventId = getEventId();
  if (!eventId) return;

  if (unsubLogs) {
    unsubLogs();
    unsubLogs = null;
  }

  serviceLogsDiv.innerHTML = "載入中...";

  unsubLogs = db.collection("events")
    .doc(eventId)
    .collection("serviceLogs")
    .orderBy("createdAt", "desc")
    .limit(20)
    .onSnapshot(snap => {
      if (snap.empty) {
        serviceLogsDiv.innerHTML = `<div class="empty">目前沒有紀錄</div>`;
        return;
      }

      serviceLogsDiv.innerHTML = snap.docs.map(doc => {
        const d = doc.data() || {};
        return `
          <div class="log-item">
            <div><b>${esc(d.action || "-")}</b></div>
            <div class="small">
              ticketId：<span class="mono">${esc(d.ticketId || "-")}</span>｜
              姓名：${esc(d.name || "-")}｜
              Email：${esc(d.email || "-")}
            </div>
            <div class="small">
              時間：${esc(fmtTime(d.createdAt))}
            </div>
          </div>
        `;
      }).join("");
    }, err => {
      console.error(err);
      serviceLogsDiv.innerHTML = `<span class="bad">紀錄讀取失敗：${esc(err.message || err)}</span>`;
    });
}

eventSelectEl.addEventListener("change", onEventChange);
reloadEventsBtn.addEventListener("click", loadEvents);
searchBtn.addEventListener("click", searchTickets);
clearBtn.addEventListener("click", clearSearch);

queryEl.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    searchTickets();
    return;
  }

  clearTimeout(barcodeTimer);
  barcodeTimer = setTimeout(() => {
    const q = norm(queryEl.value);
    if (q.length >= 6) {
      searchTickets();
    }
  }, 120);
});

loadEvents();
</script>
</body>
</html>
