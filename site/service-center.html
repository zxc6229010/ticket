<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>服務中心｜活動控台</title>

<style>
  :root{
    --bg:#f6f7fb;
    --card:#fff;
    --text:#111827;
    --muted:#6b7280;
    --line:rgba(17,24,39,.08);
    --shadow:0 12px 28px rgba(0,0,0,.06);
    --ok:#16a34a;
    --warn:#dc2626;
    --blue:#2563eb;
    --dark:#111827;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .wrap{
    max-width:1100px;
    margin:auto;
    padding:24px 16px 40px;
  }

  .card{
    background:#fff;
    border-radius:18px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
  }

  h1{
    margin:0 0 10px;
    font-size:24px;
    font-weight:900;
  }

  h2{
    margin:0 0 10px;
    font-size:18px;
    font-weight:900;
  }

  .sub{
    color:var(--muted);
    font-size:14px;
    line-height:1.7;
  }

  .small{
    font-size:13px;
    color:var(--muted);
    line-height:1.7;
  }

  .mono{
    font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .grid3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  .grid4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
  }

  @media (max-width:980px){
    .grid4{ grid-template-columns:repeat(2,1fr); }
  }

  @media (max-width:780px){
    .grid, .grid3{ grid-template-columns:1fr; }
  }

  @media (max-width:620px){
    .grid4{ grid-template-columns:1fr; }
  }

  input,button,select{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-top:8px;
    font-size:15px;
  }

  button{
    background:#111827;
    color:#fff;
    font-weight:900;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease;
  }

  button:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(0,0,0,.08);
  }

  button:disabled{
    opacity:.5;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }

  .btn-secondary{
    background:#fff;
    color:#111827;
  }

  .btn-danger{
    background:var(--warn);
    border-color:var(--warn);
  }

  .btn-ok{
    background:var(--ok);
    border-color:var(--ok);
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .row > *{
    flex:1;
    min-width:140px;
  }

  .stat{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
    padding:10px 0;
    border-bottom:1px dashed #e5e7eb;
  }

  .bad{
    color:var(--warn);
    font-weight:900;
  }

  .ok{
    color:var(--ok);
    font-weight:900;
  }

  .blue{
    color:var(--blue);
    font-weight:900;
  }

  .muted{
    color:var(--muted);
  }

  .pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    padding:6px 10px;
    font-size:12px;
    font-weight:900;
    border:1px solid var(--line);
    background:#fff;
  }

  .pill.ok{
    color:var(--ok);
    background:rgba(22,163,74,.06);
    border-color:rgba(22,163,74,.16);
  }

  .pill.warn{
    color:var(--warn);
    background:rgba(220,38,38,.06);
    border-color:rgba(220,38,38,.16);
  }

  .pill.blue{
    color:var(--blue);
    background:rgba(37,99,235,.06);
    border-color:rgba(37,99,235,.16);
  }

  .result-item{
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    transition:all .12s ease;
    background:#fff;
  }

  .result-item:hover{
    border-color:#111827;
    transform:translateY(-1px);
  }

  .result-item.active{
    border-color:#111827;
    box-shadow:0 8px 18px rgba(0,0,0,.05);
  }

  .info-line{
    margin-top:8px;
    line-height:1.8;
    word-break:break-word;
    font-size:14px;
  }

  .actions{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:14px;
  }

  @media (max-width:780px){
    .actions{
      grid-template-columns:1fr;
    }
  }

  .log-item{
    border-top:1px dashed #e5e7eb;
    padding:10px 0;
    font-size:14px;
    line-height:1.6;
  }

  .empty{
    color:var(--muted);
    padding:8px 0;
    line-height:1.8;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    flex-wrap:wrap;
  }

  .schedule-item{
    border:1px solid #eceff3;
    border-radius:14px;
    padding:10px 12px;
    margin-top:10px;
    background:#fff;
  }

  .schedule-main{
    font-weight:900;
    line-height:1.6;
  }

  .schedule-sub{
    margin-top:4px;
    color:var(--muted);
    font-size:13px;
    line-height:1.7;
  }
</style>
</head>

function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[m]));
}

function norm(s){
  return String(s ?? "").trim();
}

function toMillis(ts){
  if (!ts) return null;
  if (typeof ts.toDate === "function") return ts.toDate().getTime();
  if (ts instanceof Date) return ts.getTime();
  const d = new Date(ts);
  return isNaN(d.getTime()) ? null : d.getTime();
}

function fmtTime(v){
  const ms = toMillis(v);
  if (!ms) return "-";
  return new Date(ms).toLocaleString("zh-Hant", { hour12:false });
}

function fmtOnlyTime(v){
  const ms = toMillis(v);
  if (!ms) return "-";
  return new Date(ms).toLocaleTimeString("zh-Hant", {
    hour:"2-digit",
    minute:"2-digit",
    hour12:false
  });
}

function isTodayTs(ts){
  const ms = toMillis(ts);
  if (!ms) return false;
  const d = new Date(ms);
  const now = new Date();
  return d.getFullYear() === now.getFullYear()
    && d.getMonth() === now.getMonth()
    && d.getDate() === now.getDate();
}

function getEventTimeState(eventData){
  const now = Date.now();
  const startMs = toMillis(eventData?.eventStartAt);
  const endMs = toMillis(eventData?.eventEndAt);

  if (!startMs || !endMs) {
    return { state:"invalid", ok:false, reason:"活動時間未設定完整" };
  }
  if (now < startMs) {
    return { state:"upcoming", ok:false, reason:"活動尚未開始，目前不可操作" };
  }
  if (now > endMs) {
    return { state:"ended", ok:false, reason:"活動已結束，目前不可操作" };
  }
  return { state:"active", ok:true, reason:"" };
}

function statusText(s){
  if (s === "not_entered") return "未入場";
  if (s === "inside") return "在場中";
  if (s === "exited") return "已出場";
  return "-";
}

function checkedInText(t){
  return t.checkedIn === true ? "true" : "false";
}

async function doLogin(){
  const email = norm(loginEmail.value);
  const password = loginPassword.value;
  loginErr.style.display = "none";

  if (!email || !password) {
    loginErr.textContent = "請輸入帳號與密碼";
    loginErr.style.display = "block";
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "登入中…";

  try{
    await auth.signInWithEmailAndPassword(email, password);
  }catch(e){
    loginErr.textContent = "帳號或密碼錯誤，請再試一次";
    loginErr.style.display = "block";
    loginBtn.disabled = false;
    loginBtn.textContent = "登入";
  }
}

loginBtn.onclick = doLogin;

loginPassword.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

logoutBtn.onclick = async () => {

};

async function getMyServiceAssignments(uid){
  const eventsSnap = await db.collection("events").get();
  const rows = [];

  for (const eventDoc of eventsSnap.docs) {
    const eventId = eventDoc.id;
    const eventData = eventDoc.data() || {};

    try{
      const staffDoc = await db.collection("events")
        .doc(eventId)
        .collection("staffAssignments")
        .doc(uid)
        .get();

      if (!staffDoc.exists) continue;

      const a = staffDoc.data() || {};
      const canService =
        a?.permissions?.canService === true ||
        norm(a.roleInEvent) === "service_center" ||
        norm(a.roleInEvent) === "manager";

      if (!canService) continue;

      rows.push({
        eventId,
        eventData,
        ...a
      });
    }catch(_){}
  }

  return rows;
}

function pickBestAssignment(assignments){
  if (!assignments.length) return null;

  const todayOnly = assignments.filter(a => isTodayTs(a.eventData?.eventStartAt));
  const rows = todayOnly.length ? todayOnly : assignments.slice();

  rows.sort((a, b) => {
    const ta = toMillis(a.eventData?.eventStartAt) || 0;
    const tb = toMillis(b.eventData?.eventStartAt) || 0;
    return ta - tb;
  });

  const active = rows.find(a => getEventTimeState(a.eventData).state === "active");
  if (active) return active;

  const upcoming = rows.find(a => getEventTimeState(a.eventData).state === "upcoming");
  if (upcoming) return upcoming;

  return rows[rows.length - 1];
}

function renderSchedule(assignments){
  if (!assignments.length) {
    scheduleListEl.innerHTML = `<div class="empty">今天沒有可操作的服務中心活動，或你尚未被指派服務中心身份。</div>`;
    return;
  }

  const todayOnly = assignments.filter(a => isTodayTs(a.eventData?.eventStartAt));
  const rows = todayOnly.length ? todayOnly : assignments.slice();

  rows.sort((a, b) => {
    const ta = toMillis(a.eventData?.eventStartAt) || 0;
    const tb = toMillis(b.eventData?.eventStartAt) || 0;
    return ta - tb;
  });

  scheduleListEl.innerHTML = rows.map(a => {
    const ts = getEventTimeState(a.eventData);
    let badge = `<span class="pill blue">活動資訊</span>`;
    if (ts.state === "active") badge = `<span class="pill ok">目前可操作</span>`;
    if (ts.state === "upcoming") badge = `<span class="pill blue">尚未開始</span>`;
    if (ts.state === "ended") badge = `<span class="pill warn">已結束</span>`;
    if (ts.state === "invalid") badge = `<span class="pill warn">時間未設定</span>`;

    return `
      <div class="schedule-item">
        <div class="schedule-main">${esc(a.eventData?.title || a.eventId)} ${badge}</div>
        <div class="schedule-sub">
          ${esc(fmtOnlyTime(a.eventData?.eventStartAt))} - ${esc(fmtOnlyTime(a.eventData?.eventEndAt))}
          ｜入口：${esc(a.gateName || "未指定")}
          ｜身份：${esc(a.roleInEvent || "-")}
        </div>
      </div>
    `;
  }).join("");
}

function renderCurrentAssignmentInfo(){
  currentEventData = currentSelectedAssignment?.eventData || null;

  if (!currentSelectedAssignment) {
    currentEventTitleEl.textContent = "沒有可用活動";
    currentEventIdEl.textContent = "-";

    eventTimeTextEl.textContent = "-";
    statsDiv.innerHTML = `<div class="empty">沒有可用活動</div>`;
    serviceLogsDiv.innerHTML = `<div class="empty">沒有可用活動</div>`;
    return;
  }

  currentEventTitleEl.textContent = norm(currentEventData?.title || currentSelectedAssignment.eventId || "未命名活動");
  currentEventIdEl.textContent = currentSelectedAssignment.eventId;
  currentRoleInEventEl.textContent = norm(currentSelectedAssignment.roleInEvent || "-");
  currentGateNameEl.textContent = norm(currentSelectedAssignment.gateName || "未指定");

  const ts = getEventTimeState(currentEventData);
  eventTimeTextEl.textContent = `${fmtTime(currentEventData?.eventStartAt)} ～ ${fmtTime(currentEventData?.eventEndAt)}`;

  if (ts.state === "active") {
    eventStatusTextEl.className = "ok";
    eventStatusTextEl.textContent = "目前可操作";
  } else if (ts.state === "upcoming") {
    eventStatusTextEl.className = "blue";
    eventStatusTextEl.textContent = "活動尚未開始";
  } else if (ts.state === "ended") {
    eventStatusTextEl.className = "bad";
    eventStatusTextEl.textContent = "活動已結束";
  } else {
    eventStatusTextEl.className = "bad";
    eventStatusTextEl.textContent = "活動時間未設定完整";
  }
}

async function searchTickets(){
  const q = norm(queryEl.value);

  if (!currentSelectedAssignment) {
    alert("目前沒有可操作的活動");
    return;
  }
  if (!q) {
    alert("請輸入查詢內容");
    return;
  }

  searchResultsDiv.innerHTML = "載入中...";
  resultDiv.innerHTML = `<div class="empty">載入中...</div>`;
  currentTicket = null;
  ticketsCache = [];

  try{
    const col = db.collection("events")
      .doc(currentSelectedAssignment.eventId)
      .collection("tickets");

    const resultsMap = new Map();

    const directDoc = await col.doc(q).get();
    if (directDoc.exists) {
      resultsMap.set(directDoc.id, { id: directDoc.id, ...(directDoc.data() || {}) });
    }

    const [ticketIdSnap, emailSnap, nameSnap] = await Promise.all([
      col.where("ticketId", "==", q).get(),
      col.where("email", "==", q).get(),
      col.where("name", "==", q).get()
    ]);

    [ticketIdSnap, emailSnap, nameSnap].forEach(snap => {
      snap.forEach(doc => {
        resultsMap.set(doc.id, { id: doc.id, ...(doc.data() || {}) });
      });
    });

    ticketsCache = Array.from(resultsMap.values());
    renderSearchResults(ticketsCache);
  }catch(e){
    console.error(e);
    searchResultsDiv.innerHTML = `<span class="bad">查詢失敗：${esc(e.message || e)}</span>`;
    resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
  }
}

function renderSearchResults(rows){
  if (!rows.length){
    searchResultsDiv.innerHTML = `<span class="bad">查無資料</span>`;
    resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
    currentTicket = null;
    return;
  }

  searchResultsDiv.innerHTML = rows.map(t => `
    <div class="result-item ${currentTicket && currentTicket.id === t.id ? "active" : ""}" onclick="selectTicket('${esc(t.id)}')">
      <div><b>${esc(t.name || "-")}</b>｜${esc(t.email || "-")}</div>
      <div class="small" style="margin-top:4px;">
        ticketId：<span class="mono">${esc(t.ticketId || "-")}</span>｜
        狀態：${esc(statusText(t.status))}
      </div>
    </div>
  `).join("");

  if (!currentTicket && rows.length) {
    currentTicket = rows[0];
    renderTicketDetail(currentTicket);
  }
}

function renderTicketDetail(ticket){
  if (!ticket){
    resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
    return;
  }

  resultDiv.innerHTML = `
    <div class="info-line"><b>ticketId：</b><span class="mono">${esc(ticket.ticketId || "-")}</span></div>
    <div class="info-line"><b>文件ID：</b><span class="mono">${esc(ticket.id || "-")}</span></div>
    <div class="info-line"><b>姓名：</b>${esc(ticket.name || "-")}</div>
    <div class="info-line"><b>Email：</b>${esc(ticket.email || "-")}</div>
    <div class="info-line"><b>狀態：</b><b>${esc(statusText(ticket.status))}</b></div>
    <div class="info-line"><b>checkedIn：</b>${esc(checkedInText(ticket))}</div>
    <div class="info-line"><b>入口：</b>${esc(ticket.checkedInGate || "-")}</div>
    <div class="info-line"><b>入場時間：</b>${esc(fmtTime(ticket.checkedInAt))}</div>
    <div class="info-line"><b>出場時間：</b>${esc(fmtTime(ticket.checkedOutAt))}</div>
    <div class="info-line"><b>最後更新：</b>${esc(fmtTime(ticket.updatedAt))}</div>

    <div class="actions">
      <button class="btn-ok" onclick="forceCheckin()">強制入場</button>
      <button class="btn-secondary" onclick="forceCheckout()">強制出場</button>
      <button class="btn-danger" onclick="resetTicket()">重設狀態</button>
    </div>
  `;
}

window.selectTicket = function(ticketDocId){
  const found = ticketsCache.find(t => t.id === ticketDocId);
  if (!found) return;
  currentTicket = found;
  renderSearchResults(ticketsCache);
  renderTicketDetail(currentTicket);
};

function clearSearch(){
  queryEl.value = "";
  currentTicket = null;
  ticketsCache = [];
  searchResultsDiv.innerHTML = `<div class="empty">尚未查詢</div>`;
  resultDiv.innerHTML = `<div class="empty">請先查詢並選擇一張票券</div>`;
}

async function writeServiceLog(action, ticket, extra = {}){
  if (!currentSelectedAssignment || !ticket) return;

  try{
    await db.collection("events")
      .doc(currentSelectedAssignment.eventId)
      .collection("serviceLogs")
      .add({
        action,
        ticketDocId: ticket.id || "",
        ticketId: ticket.ticketId || "",
        name: ticket.name || "",
        email: ticket.email || "",
        status: ticket.status || "",
        gate: ticket.checkedInGate || "",
        actorUid: currentUser ? currentUser.uid : "",
        actorEmail: currentUser ? (currentUser.email || "") : "",
        actorRoleInEvent: currentSelectedAssignment.roleInEvent || "",
        createdAt: new Date(),
        ...extra
      });
  }catch(e){
    console.warn("service log failed:", e);
  }
}

async function forceCheckin(){
  if (!currentTicket) return;
  if (!currentSelectedAssignment) return;

  const ts = getEventTimeState(currentEventData);
  if (!ts.ok) {
    alert(ts.reason);
    return;
  }

  try{
    await db.doc(`events/${currentSelectedAssignment.eventId}/tickets/${currentTicket.id}`).update({
      status: "inside",
      checkedIn: true,
      checkedInAt: new Date(),
      checkedOutAt: null,
      updatedAt: new Date(),
      checkedInGate: norm(currentSelectedAssignment.gateName || "服務中心"),
      checkedInBy: currentUser.uid,
      checkedInByEmail: currentUser.email || "",
      checkedInEventId: currentSelectedAssignment.eventId
    });

    await writeServiceLog("force_checkin", {
      ...currentTicket,
      status: "inside",
      checkedInGate: norm(currentSelectedAssignment.gateName || "服務中心")
    });

    alert("已強制入場");
    await searchTickets();
  }catch(e){
    console.error(e);
    alert("操作失敗：" + (e.message || e));
  }
}
window.forceCheckin = forceCheckin;

async function forceCheckout(){
  if (!currentTicket) return;
  if (!currentSelectedAssignment) return;

  const ts = getEventTimeState(currentEventData);
  if (!ts.ok) {
    alert(ts.reason);
    return;
  }

  try{
    await db.doc(`events/${currentSelectedAssignment.eventId}/tickets/${currentTicket.id}`).update({
      status: "exited",
      checkedOutAt: new Date(),
      updatedAt: new Date()
    });

    await writeServiceLog("force_checkout", {
      ...currentTicket,
      status: "exited"
    });

    alert("已強制出場");
    await searchTickets();
  }catch(e){
    console.error(e);
    alert("操作失敗：" + (e.message || e));
  }
}
window.forceCheckout = forceCheckout;

async function resetTicket(){
  if (!currentTicket) return;
  if (!currentSelectedAssignment) return;

  try{
    await db.doc(`events/${currentSelectedAssignment.eventId}/tickets/${currentTicket.id}`).update({
      status: "not_entered",
      checkedIn: false,
      checkedInAt: null,
      checkedOutAt: null,
      checkedInGate: "",
      checkedInBy: "",
      checkedInByEmail: "",
      updatedAt: new Date()
    });

    await writeServiceLog("reset_ticket", {
      ...currentTicket,
      status: "not_entered"
    });

    alert("已重設狀態");
    await searchTickets();
  }catch(e){
    console.error(e);
    alert("操作失敗：" + (e.message || e));
  }
}
window.resetTicket = resetTicket;

function watchStats(){
  if (!currentSelectedAssignment) return;

  if (unsubStats) {
    unsubStats();
    unsubStats = null;
  }

  statsDiv.innerHTML = "載入中...";

  unsubStats = db.collection("events")
    .doc(currentSelectedAssignment.eventId)
    .collection("tickets")
    .onSnapshot(snap => {
      let total = 0, inside = 0, exited = 0, notEntered = 0;

      snap.forEach(doc => {
        total++;
        const t = doc.data() || {};
        const s = t.status;

        if (s === "inside") inside++;
        else if (s === "exited") exited++;
        else notEntered++;
      });

      statsDiv.innerHTML = `
        <div class="stat"><span>總票數</span><span>${total}</span></div>
        <div class="stat"><span>在場中</span><span>${inside}</span></div>
        <div class="stat"><span>已出場</span><span>${exited}</span></div>
        <div class="stat"><span>未入場</span><span>${notEntered}</span></div>
      `;
    }, err => {
      console.error(err);
      statsDiv.innerHTML = `<span class="bad">統計讀取失敗：${esc(err.message || err)}</span>`;
    });
}

function watchServiceLogs(){
  if (!currentSelectedAssignment) return;

  if (unsubLogs) {
    unsubLogs();
    unsubLogs = null;
  }

  serviceLogsDiv.innerHTML = "載入中...";

  unsubLogs = db.collection("events")
    .doc(currentSelectedAssignment.eventId)
    .collection("serviceLogs")
    .orderBy("createdAt", "desc")
    .limit(20)
    .onSnapshot(snap => {
      if (snap.empty) {
        serviceLogsDiv.innerHTML = `<div class="empty">目前沒有紀錄</div>`;
        return;
      }

      serviceLogsDiv.innerHTML = snap.docs.map(doc => {
        const d = doc.data() || {};
        return `
          <div class="log-item">
            <div><b>${esc(d.action || "-")}</b></div>
            <div class="small muted">
              ticketId：<span class="mono">${esc(d.ticketId || "-")}</span>｜
              姓名：${esc(d.name || "-")}｜
              Email：${esc(d.email || "-")}
            </div>
            <div class="small muted">
              執行者：${esc(d.actorEmail || "-")}｜
              時間：${esc(fmtTime(d.createdAt))}
            </div>
          </div>
        `;
      }).join("");
    }, err => {
      console.error(err);
      serviceLogsDiv.innerHTML = `<span class="bad">紀錄讀取失敗：${esc(err.message || err)}</span>`;
    });
}

searchBtn.addEventListener("click", searchTickets);
clearBtn.addEventListener("click", clearSearch);
queryEl.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    searchTickets();
  }
});

auth.onAuthStateChanged(async user => {
  currentUser = user || null;

  if (!user) {
    if (unsubStats) { unsubStats(); unsubStats = null; }
    if (unsubLogs) { unsubLogs(); unsubLogs = null; }
    myAssignments = [];
    currentSelectedAssignment = null;
    currentEventData = null;
    showLoginCard();
    return;
  }

  try{
    const snap = await db.collection("users").doc(user.uid).get();

    if (!snap.exists) {
      showLoginCard();
      loginErr.textContent = "此帳號尚未被授權，請聯絡管理員。";
      loginErr.style.display = "block";
      await auth.signOut();
      return;
    }

    const u = snap.data() || {};
    const role = norm(u.role);
    const VALID = ["platform_super", "platform_admin", "org_super", "org_admin", "org_staff"];

    if (u.enabled !== true) {
      showLoginCard();
      loginErr.textContent = "此帳號已被停用，請聯絡管理員。";
      loginErr.style.display = "block";
      await auth.signOut();
      return;
    }

    if (!VALID.includes(role)) {
      showLoginCard();
      loginErr.textContent = `角色「${role}」沒有後台登入資格。`;
      loginErr.style.display = "block";
      await auth.signOut();
      return;
    }

    myAssignments = await getMyServiceAssignments(user.uid);
    currentSelectedAssignment = pickBestAssignment(myAssignments);

    renderSchedule(myAssignments);
    renderCurrentAssignmentInfo();
    showApp();

    if (currentSelectedAssignment) {
      watchStats();
      watchServiceLogs();

      const ts = getEventTimeState(currentEventData);
      if (!ts.ok) {
        // 服務中心頁可看，但會告知目前不可操作
        searchResultsDiv.innerHTML = `<div class="empty">${esc(ts.reason)}</div>`;
        resultDiv.innerHTML = `<div class="empty">${esc(ts.reason)}</div>`;
      }
    } else {
      statsDiv.innerHTML = `<div class="empty">今天沒有可操作的服務中心活動，或你尚未被指派服務中心身份。</div>`;
      serviceLogsDiv.innerHTML = `<div class="empty">今天沒有可操作的服務中心活動，或你尚未被指派服務中心身份。</div>`;
      searchResultsDiv.innerHTML = `<div class="empty">目前無可操作活動</div>`;
      resultDiv.innerHTML = `<div class="empty">目前無可操作活動</div>`;
    }

  }catch(e){
    console.error(e);
    showLoginCard();
    loginErr.textContent = "讀取失敗：" + (e.message || e);
    loginErr.style.display = "block";
  }
});
</script>
</body>
</html>
