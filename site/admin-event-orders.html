<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜活動訂單管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111;
      --muted:rgba(17,17,17,.65);
      --line:rgba(17,17,17,.10);
      --shadow:0 14px 40px rgba(0,0,0,.08);
      --ok:#166534;
      --warn:#b91c1c;
      --orange:#c2410c;
      --blue:#1d4ed8;
      --soft:#f1f2f6;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:48px 24px;
    }

    @media (max-width:640px){
      .wrap{ padding:28px 16px; }
    }

    .card{
      margin-bottom:18px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--card);
      box-shadow:var(--shadow);
    }

    .soft{
      background:var(--soft);
      border:1px solid rgba(17,17,17,.12);
    }

    h1{
      margin:0 0 6px;
      font-size:22px;
    }

    h2{
      margin:0;
      font-size:16px;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      white-space:pre-wrap;
    }

    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
      white-space:pre-wrap;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .grid2{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:14px;
    }

    .grid4{
      display:grid;
      grid-template-columns:1.1fr .9fr .9fr .8fr;
      gap:14px;
    }

    @media (max-width:900px){
      .grid2,.grid4{ grid-template-columns:1fr; }
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:44px;
      padding:10px 18px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#111;
      font-size:15px;
      font-weight:900;
      text-decoration:none;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-danger{
      background:#fff;
      color:var(--warn);
      border-color:rgba(185,28,28,.24);
    }

    .btn-sm{
      height:38px;
      padding:8px 14px;
      font-size:14px;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:900;
      font-size:14px;
    }

    input[type="text"],
    textarea,
    select{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:96px;
      resize:vertical;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .ok{ color:var(--ok); font-weight:900; }
    .warn{ color:var(--warn); font-weight:900; }
    .orange{ color:var(--orange); font-weight:900; }
    .blue{ color:var(--blue); font-weight:900; }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .item{
      padding:16px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
    }

    .itemTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .itemTitle{
      margin:0;
      font-size:16px;
      font-weight:1000;
      line-height:1.5;
    }

    .meta{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .badges{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .detail{
      display:none;
      margin-top:14px;
      padding-top:14px;
      border-top:1px dashed var(--line);
    }

    .detail.show{
      display:block;
    }

    .kv{
      display:grid;
      grid-template-columns:130px 1fr;
      gap:8px 12px;
      padding:10px 0;
      border-top:1px dashed var(--line);
    }

    .kv:first-child{
      border-top:none;
      padding-top:0;
    }

    .k{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .v{
      font-size:13px;
      font-weight:900;
      line-height:1.7;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .ticketBox{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fafafa;
      padding:12px;
    }

    .ticketItem{
      padding:10px 0;
      border-top:1px dashed var(--line);
      font-size:13px;
      line-height:1.8;
    }

    .ticketItem:first-child{
      border-top:none;
      padding-top:0;
    }

    .empty{
      padding:24px 8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
      white-space:pre-wrap;
    }

    .page{
      opacity:0;
      transform:translateY(6px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .page.on{
      opacity:1;
      transform:translateY(0);
    }

    .page.leaving{
      opacity:0;
      transform:translateY(6px);
    }
  </style>
</head>

<body>
  <div class="wrap page" id="pageRoot">
    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">
      <div class="card">
        <div class="row">
          <div>
            <h1>活動訂單管理</h1>
            <div class="sub">可查詢活動訂單、查看對應票券、修改訂單狀態、填寫後台備註。
此頁會先讀取你可管理的活動，再分別讀取各活動底下的訂單，避免 collectionGroup 權限問題。</div>
            <div class="sub" style="margin-top:8px;">
              登入：<span id="who" class="mono">-</span>｜
              角色：<span id="myRole" class="mono">-</span>
            </div>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a class="btn" href="dashboard.html">回主選單</a>
            <button class="btn" id="logoutBtn">登出</button>
          </div>
        </div>
      </div>

      <div class="card soft">
        <div class="grid4">
          <div>
            <label style="margin-top:0;">活動篩選</label>
            <select id="eventFilter">
              <option value="all">全部活動</option>
            </select>
          </div>

          <div>
            <label style="margin-top:0;">搜尋</label>
            <input type="text" id="searchInput" placeholder="搜尋 訂單ID / email / uid / 活動名稱 / 票種 / 座位" />
          </div>

          <div>
            <label style="margin-top:0;">訂單狀態</label>
            <select id="statusFilter">
              <option value="all">全部狀態</option>
              <option value="registered">已建立</option>
              <option value="pending">待處理</option>
              <option value="pending_holder_info">待填資料</option>
              <option value="ready_for_checkout">可進下一步</option>
              <option value="paid">已付款</option>
              <option value="processing">處理中</option>
              <option value="completed">已完成</option>
              <option value="cancelled">已取消</option>
              <option value="refunded">已退款</option>
              <option value="void">已作廢</option>
            </select>
          </div>

          <div>
            <label style="margin-top:0;">操作</label>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <button class="btn" id="reloadBtn">重新載入</button>
            <button class="btn" id="exportCsvBtn">匯出 CSV</button>
            </div>
          </div>
        </div>

        <div class="small" id="summaryText" style="margin-top:12px;">讀取中…</div>
      </div>

      <div class="list" id="orderList"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();

    const pageRoot = document.getElementById("pageRoot");
    requestAnimationFrame(() => pageRoot.classList.add("on"));

    function go(href){
      pageRoot.classList.add("leaving");
      setTimeout(() => location.href = href, 140);
    }

    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http")) return;
      e.preventDefault();
      go(href);
    });

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const whoEl = document.getElementById("who");
    const myRoleEl = document.getElementById("myRole");
    const logoutBtn = document.getElementById("logoutBtn");

    const eventFilter = document.getElementById("eventFilter");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const reloadBtn = document.getElementById("reloadBtn");
    const summaryText = document.getElementById("summaryText");
    const orderList = document.getElementById("orderList");

    let currentUser = null;
    let myRole = "";
    let myUserDoc = null;
    let eventOptions = [];
    let orderCache = [];
    let ticketCacheMap = new Map();

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(v){
      return String(v ?? "").trim();
    }

    function lower(v){
      return norm(v).toLowerCase();
    }

    function tsToText(ts){
      try{
        if (!ts) return "-";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleString("zh-Hant", { hour12:false });
      }catch(e){
        return "-";
      }
    }

    function formatPrice(v){
      const n = Number(v || 0);
      if (!n) return "免費";
      return "NT$ " + n.toLocaleString("zh-Hant");
    }

    function showGate(title, msg, showLogin){
      gate.style.display = "block";
      app.style.display = "none";

      gate.innerHTML = `
        <h1 style="margin:0 0 6px; font-size:22px;">${esc(title)}</h1>
        <div class="sub">${esc(msg)}</div>
        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${showLogin ? `<button class="btn" id="loginBtn">使用 Email 登入</button>` : ``}
          ${!showLogin ? `<button class="btn" id="logoutGateBtn">登出</button>` : ``}
        </div>
      `;

      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn) {
        loginBtn.onclick = async () => {
          const email = window.prompt("請輸入 Email");
          if (!email) return;
          const password = window.prompt("請輸入密碼");
          if (!password) return;
          await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
        };
      }

      const logoutGateBtn = document.getElementById("logoutGateBtn");
      if (logoutGateBtn) logoutGateBtn.onclick = doLogout;
    }

    async function doLogout(){
      try{
        await firebase.auth().signOut();
      }catch(e){
        console.error(e);
        alert("登出失敗（請看 Console）");
      }
    }

    logoutBtn.onclick = doLogout;

    async function loadMyUser(uid){
      const snap = await db.collection("users").doc(uid).get();
      if (!snap.exists) return null;
      return snap.data() || null;
    }

    function canUsePage(role){
      return ["platform_super","platform_admin","org_super","org_admin","org_staff"].includes(role);
    }

    function isPlatform(role){
      return ["platform_super","platform_admin"].includes(role);
    }

    function canManageEvent(eventData){
      if (!eventData) return false;
      if (isPlatform(myRole)) return true;

      const mySchoolId = norm(myUserDoc?.schoolId || myUserDoc?.orgSchoolId || "");
      const myOrgId = norm(myUserDoc?.orgId || "");

      const eventSchoolId = norm(eventData.ownerSchoolId || eventData.schoolId || "");
      const eventOrgId = norm(eventData.ownerOrgId || eventData.orgId || "");

      if (mySchoolId && eventSchoolId && mySchoolId === eventSchoolId) return true;
      if (myOrgId && eventOrgId && myOrgId === eventOrgId) return true;

      return false;
    }

    async function loadManageableEvents(){
      const snap = await db.collection("events").get();
      const rows = snap.docs
        .map(doc => ({ id: doc.id, ...(doc.data() || {}) }))
        .filter(canManageEvent)
        .sort((a, b) => {
          const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
          return tb - ta;
        });

      eventOptions = rows;

      eventFilter.innerHTML = `<option value="all">全部活動</option>` + rows.map(event => `
        <option value="${esc(event.id)}">${esc(event.title || event.id)}</option>
      `).join("");
    }

    function getStatusClass(status){
      status = lower(status);
      if (["paid","completed","ready_for_checkout"].includes(status)) return "ok";
      if (["pending","processing","registered","pending_holder_info"].includes(status)) return "orange";
      if (["cancelled","refunded","void"].includes(status)) return "warn";
      return "blue";
    }

    function getStatusText(status){
      status = lower(status);
      if (status === "registered") return "已建立";
      if (status === "pending") return "待處理";
      if (status === "pending_holder_info") return "待填資料";
      if (status === "ready_for_checkout") return "可進下一步";
      if (status === "processing") return "處理中";
      if (status === "paid") return "已付款";
      if (status === "completed") return "已完成";
      if (status === "cancelled") return "已取消";
      if (status === "refunded") return "已退款";
      if (status === "void") return "已作廢";
      return status || "-";
    }

    function getOrderSearchText(order){
      const itemSummary = Array.isArray(order.itemSummary) ? order.itemSummary : [];
      const holderAssignments = Array.isArray(order.holderAssignments) ? order.holderAssignments : [];
      const seatLabels = Array.isArray(order.seatLabels) ? order.seatLabels : [];
      const sectionIds = Array.isArray(order.sectionIds) ? order.sectionIds : [];
      const participantEmails = Array.isArray(order.participantEmails) ? order.participantEmails : [];
      const inlineTickets = Array.isArray(order.tickets) ? order.tickets : [];

      return [
        order.id,
        order.eventId,
        order.eventTitle,
        order.email,
        order.buyerEmail,
        order.uid,
        order.buyerUid,
        order.ticketTypeName,
        order.paymentStatus,
        order.status,
        order.verifiedSchoolName,
        order.verifiedSchoolId,
        order.matchedRole,
        order.note,
        order.adminNote,
        ...seatLabels,
        ...sectionIds,
        ...participantEmails,
        ...itemSummary.map(item => `${item.ticketTypeName || ""} ${item.ticketTypeId || ""}`),
        ...holderAssignments.map(item => `${item.email || ""} ${item.name || ""} ${item.ticketTypeName || ""}`),
        ...inlineTickets.map(t => t.ticketId || ""),
        ...inlineTickets.map(t => t.seatLabel || ""),
        ...inlineTickets.map(t => t.ticketTypeName || "")
      ].map(lower).join(" ");
    }

    function renderSummary(){
      const filtered = getFilteredOrders();
      const selectedEventId = eventFilter.value;
      const selectedEventText = selectedEventId === "all"
        ? "全部活動"
        : (eventOptions.find(e => e.id === selectedEventId)?.title || selectedEventId);

      summaryText.textContent = `目前篩選活動：${selectedEventText}｜顯示 ${filtered.length} 筆訂單｜已載入總資料 ${orderCache.length} 筆。`;
    }

    function getFilteredOrders(){
      const q = lower(searchInput.value);
      const sf = statusFilter.value;
      const ef = eventFilter.value;

      return orderCache.filter(order => {
        if (ef !== "all" && norm(order.eventId) !== ef) return false;
        if (sf !== "all" && lower(order.status) !== sf) return false;
        if (!q) return true;
        return getOrderSearchText(order).includes(q);
      });
    }

    function toggleDetail(orderId){
      const box = document.getElementById(`detail-${orderId}`);
      if (!box) return;
      box.classList.toggle("show");
    }

    async function ensureTicketsLoaded(order){
      const cacheKey = `${order.eventId}__${order.id}`;
      if (ticketCacheMap.has(cacheKey)) return ticketCacheMap.get(cacheKey);

      try{
        const snap = await db.collection("events")
          .doc(order.eventId)
          .collection("tickets")
          .where("orderId", "==", order.id)
          .get();

        const rows = snap.docs.map(doc => ({
          id: doc.id,
          ...(doc.data() || {})
        }));

        ticketCacheMap.set(cacheKey, rows);
        return rows;
      }catch(e){
        console.error("load tickets error", e);
        ticketCacheMap.set(cacheKey, []);
        return [];
      }
    }

    function buildTicketHtml(ticket){
      const checkedIn = ticket.checkedIn === true || lower(ticket.checkinStatus) === "checked_in";
      return `
        <div class="ticketItem">
          票券 ID：<span class="mono">${esc(ticket.id || "-")}</span><br>
          票種：<span class="mono">${esc(ticket.ticketTypeName || "-")}</span><br>
          座位：<span class="mono">${esc(ticket.seatLabel || "-")}</span><br>
          狀態：<span class="${checkedIn ? "ok" : "blue"}">${checkedIn ? "已入場" : "未入場"}</span><br>
          核銷入口：<span class="mono">${esc(ticket.checkedInGate || "-")}</span><br>
          核銷時間：<span class="mono">${esc(tsToText(ticket.checkedInAt))}</span>
        </div>
      `;
    }

    async function exportCsv(){
      const filtered = getFilteredOrders();
      if (!filtered.length) { alert("沒有可匯出的資料"); return; }

      const btn = document.getElementById("exportCsvBtn");
      const oldTxt = btn.textContent;
      btn.disabled = true;
      btn.textContent = "匯出中…";

      function csvCell(v){
        const s = String(v ?? "").replace(/"/g, '""');
        return `"${s}"`;
      }

      function tsToLocal(ts){
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return isNaN(d) ? "" : d.toLocaleString("zh-TW", { timeZone: "Asia/Taipei" });
      }

      try {
        const uidToUser = {};
        const uids = [...new Set(filtered.map(o => norm(o.buyerUid || o.uid || "")).filter(Boolean))];
        for (let i = 0; i < uids.length; i += 30) {
          const chunk = uids.slice(i, i + 30);
          const snap = await db.collection("users").where(firebase.firestore.FieldPath.documentId(), "in", chunk).get();
          snap.docs.forEach(d => { uidToUser[d.id] = d.data() || {}; });
        }

        const headers = [
          "訂單ID","活動","主購Email","主購UID",
          "主購姓名","主購手機",
          "票種","張數","金額","訂單狀態","付款狀態",
          "座位","區域","學號","學校",
          "公關代碼","建立時間","備註"
        ];

        const rows = filtered.map(order => {
          const uid = norm(order.buyerUid || order.uid || "");
          const userDoc = uidToUser[uid] || {};
          const seatLabels = Array.isArray(order.seatLabels) ? order.seatLabels.join("、") : "";
          const sectionIds = Array.isArray(order.sectionIds) ? order.sectionIds.join("、") : "";
          return [
            order.id,
            norm(order.eventTitle || order.eventId || ""),
            norm(order.buyerEmail || order.email || ""),
            uid,
            norm(userDoc.name || order.holderName || ""),
            norm(userDoc.phone || ""),
            norm(order.ticketTypeName || ""),
            String(order.totalQuantity || order.quantity || ""),
            String(order.totalAmount ?? ""),
            norm(order.status || ""),
            norm(order.paymentStatus || ""),
            seatLabels,
            sectionIds,
            norm(order.studentId || order.studentCode || userDoc.studentId || userDoc.studentCode || ""),
            norm(order.verifiedSchoolName || userDoc.verifiedSchoolName || ""),
            norm(order.promoCode || order.inviteCode || ""),
            tsToLocal(order.createdAt),
            norm(order.adminNote || order.note || "")
          ].map(csvCell).join(",");
        });

        const bom = "\uFEFF";
        const csv = bom + [headers.map(csvCell).join(","), ...rows].join("\r\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `orders_${new Date().toISOString().slice(0,10)}.csv`;
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
      } catch(e) {
        console.error(e);
        alert("匯出失敗：" + (e.message || "請稍後再試"));
      } finally {
        btn.disabled = false;
        btn.textContent = oldTxt;
      }
    }

    function renderOrders(){
      const filtered = getFilteredOrders();
      renderSummary();

      if (!filtered.length){
        orderList.innerHTML = `<div class="card empty">目前沒有符合條件的訂單資料。</div>`;
        return;
      }

      orderList.innerHTML = filtered.map(order => {
        const statusText = getStatusText(order.status);
        const statusClass = getStatusClass(order.status);

        const seatLabels = Array.isArray(order.seatLabels) ? order.seatLabels : [];
        const sectionIds = Array.isArray(order.sectionIds) ? order.sectionIds : [];
        const inlineTickets = Array.isArray(order.tickets) ? order.tickets : [];
        const notes = norm(order.adminNote || order.note || "");
        const itemSummary = Array.isArray(order.itemSummary) ? order.itemSummary : [];
        const holderAssignments = Array.isArray(order.holderAssignments) ? order.holderAssignments : [];

        return `
          <div class="item">
            <div class="itemTop">
              <div style="min-width:280px; flex:1;">
                <div class="itemTitle">
                  ${esc(order.eventTitle || "未命名活動")}
                  <span class="pill mono">${esc(order.id)}</span>
                </div>

                <div class="badges">
                  <span class="pill ${statusClass}">${esc(statusText)}</span>
                  <span class="pill">付款：${esc(order.paymentStatus || "-")}</span>
                  <span class="pill">張數：${esc(order.totalQuantity ?? order.quantity ?? 0)}</span>
                  <span class="pill">金額：${esc(formatPrice(order.totalAmount ?? order.total ?? 0))}</span>
                </div>

                <div class="meta">
                  eventId：<span class="mono">${esc(order.eventId || "-")}</span>
                  ${order.buyerEmail ? `\n主購 Email：${esc(order.buyerEmail)}` : ""}
                  ${order.email ? `\nEmail：${esc(order.email)}` : ""}
                  ${order.buyerUid ? `\n主購 UID：${esc(order.buyerUid)}` : ""}
                  ${order.uid ? `\nUID：${esc(order.uid)}` : ""}
                  \n建立時間：<span class="mono">${esc(tsToText(order.createdAt))}</span>
                  ${itemSummary.length ? `\n票種摘要：${esc(itemSummary.map(item => `${item.ticketTypeName || item.ticketTypeId || "票種"} × ${item.quantity || 0}`).join("、"))}` : ""}
                  \n座位：<span class="mono">${esc(seatLabels.length ? seatLabels.join("、") : "-")}</span>
                  \n區域：<span class="mono">${esc(sectionIds.length ? sectionIds.join("、") : "-")}</span>
                </div>
              </div>

              <div class="actions">
                <button class="btn btn-sm" data-toggle="${esc(order.id)}">查看詳情</button>
              </div>
            </div>

            <div class="detail" id="detail-${esc(order.id)}">
              <div class="grid2">
                <div>
                  <div class="kv">
                    <div class="k">訂單 ID</div>
                    <div class="v mono">${esc(order.id)}</div>

                    <div class="k">活動 ID</div>
                    <div class="v mono">${esc(order.eventId || "-")}</div>

                    <div class="k">活動名稱</div>
                    <div class="v">${esc(order.eventTitle || "-")}</div>

                    <div class="k">主購 UID</div>
                    <div class="v mono">${esc(order.buyerUid || order.uid || "-")}</div>

                    <div class="k">主購 Email</div>
                    <div class="v mono">${esc(order.buyerEmail || order.email || "-")}</div>

                    <div class="k">總張數</div>
                    <div class="v">${esc(order.totalQuantity ?? order.quantity ?? 0)}</div>

                    <div class="k">總金額</div>
                    <div class="v">${esc(formatPrice(order.totalAmount ?? order.total ?? 0))}</div>

                    <div class="k">付款狀態</div>
                    <div class="v">${esc(order.paymentStatus || "-")}</div>

                    <div class="k">訂單狀態</div>
                    <div class="v ${statusClass}">${esc(statusText)}</div>

                    <div class="k">驗證學校</div>
                    <div class="v">${esc(order.verifiedSchoolName || order.verifiedSchoolId || "-")}</div>

                    <div class="k">購買身份</div>
                    <div class="v">${esc(order.matchedRole || "-")}</div>

                    <div class="k">建立時間</div>
                    <div class="v">${esc(tsToText(order.createdAt))}</div>

                    <div class="k">更新時間</div>
                    <div class="v">${esc(tsToText(order.updatedAt))}</div>

                    <div class="k">持票人資料</div>
                    <div class="v">${holderAssignments.length ? esc(holderAssignments.map(item => `${item.name || "-"}｜${item.email || "-"}｜${item.ticketTypeName || "-"}`).join("\n")) : "-"}</div>
                  </div>

                  <div class="ticketBox" id="ticketBox-${esc(order.id)}">
                    <div style="font-weight:900; margin-bottom:8px;">關聯票券</div>
                    ${
                      inlineTickets.length
                        ? inlineTickets.map(buildTicketHtml).join("")
                        : `<div class="small">尚未展開讀取票券，點下面的「讀取票券」即可查看。</div>`
                    }

                    <div style="margin-top:10px;">
                      <button class="btn btn-sm" data-load-tickets="${esc(order.id)}">讀取票券</button>
                    </div>
                  </div>
                </div>

                <div>
                  <label style="margin-top:0;">修改訂單狀態</label>
                  <select id="statusSel-${esc(order.id)}">
                    <option value="registered" ${lower(order.status)==="registered" ? "selected" : ""}>已建立</option>
                    <option value="pending" ${lower(order.status)==="pending" ? "selected" : ""}>待處理</option>
                    <option value="pending_holder_info" ${lower(order.status)==="pending_holder_info" ? "selected" : ""}>待填資料</option>
                    <option value="ready_for_checkout" ${lower(order.status)==="ready_for_checkout" ? "selected" : ""}>可進下一步</option>
                    <option value="processing" ${lower(order.status)==="processing" ? "selected" : ""}>處理中</option>
                    <option value="paid" ${lower(order.status)==="paid" ? "selected" : ""}>已付款</option>
                    <option value="completed" ${lower(order.status)==="completed" ? "selected" : ""}>已完成</option>
                    <option value="cancelled" ${lower(order.status)==="cancelled" ? "selected" : ""}>已取消</option>
                    <option value="refunded" ${lower(order.status)==="refunded" ? "selected" : ""}>已退款</option>
                    <option value="void" ${lower(order.status)==="void" ? "selected" : ""}>已作廢</option>
                  </select>

                  <label>後台備註</label>
                  <textarea id="note-${esc(order.id)}" placeholder="輸入客服備註 / 補發說明 / 退款說明">${esc(notes)}</textarea>

                  <div class="small" style="margin-top:8px;">
                    備註只建議後台內部使用。
                  </div>

                  <div class="actions" style="margin-top:14px;">
                    <button class="btn btn-primary btn-sm" data-save="${esc(order.id)}">儲存變更</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      orderList.querySelectorAll("[data-toggle]").forEach(btn => {
        btn.onclick = () => toggleDetail(btn.dataset.toggle);
      });

      orderList.querySelectorAll("[data-load-tickets]").forEach(btn => {
        btn.onclick = async () => {
          const order = orderCache.find(item => item.id === btn.dataset.loadTickets);
          if (!order) return;

          btn.disabled = true;
          const oldText = btn.textContent;
          btn.textContent = "讀取中…";

          try{
            const tickets = await ensureTicketsLoaded(order);
            const box = document.getElementById(`ticketBox-${order.id}`);
            if (!box) return;

            box.innerHTML = `
              <div style="font-weight:900; margin-bottom:8px;">關聯票券</div>
              ${
                tickets.length
                  ? tickets.map(buildTicketHtml).join("")
                  : `<div class="small">目前找不到對應票券。</div>`
              }
              <div style="margin-top:10px;">
                <button class="btn btn-sm" data-load-tickets="${esc(order.id)}">重新讀取票券</button>
              </div>
            `;

            const newBtn = box.querySelector("[data-load-tickets]");
            if (newBtn) newBtn.onclick = btn.onclick;
          }catch(e){
            console.error(e);
            alert("票券讀取失敗");
          }finally{
            btn.disabled = false;
            btn.textContent = oldText;
          }
        };
      });

      orderList.querySelectorAll("[data-save]").forEach(btn => {
        btn.onclick = () => saveOrder(btn.dataset.save);
      });
    }

    async function loadOrders(){
      orderList.innerHTML = `<div class="card empty">讀取中…</div>`;
      reloadBtn.disabled = true;
      eventFilter.disabled = true;

      try{
        const targetEventId = eventFilter.value || "all";
        const targetEvents = targetEventId === "all"
          ? eventOptions
          : eventOptions.filter(event => event.id === targetEventId);

        const allRows = [];

        for (const event of targetEvents) {
          try {
            const snap = await db.collection("events").doc(event.id).collection("orders").get();

            snap.forEach(doc => {
              const data = doc.data() || {};
              allRows.push({
                id: doc.id,
                eventId: data.eventId || event.id,
                eventTitle: data.eventTitle || event.title || "",
                ...data
              });
            });
          } catch (err) {
            console.error("讀取活動訂單失敗", event.id, err);
          }
        }

        // 對 seatLabels 空的訂單，從票券補座位資料
        const ordersNeedingSeatFix = allRows.filter(order =>
          (!Array.isArray(order.seatLabels) || order.seatLabels.length === 0) &&
          order.eventId && order.id
        );

        for (const order of ordersNeedingSeatFix) {
          try {
            const ticketSnap = await db.collection("events").doc(order.eventId)
              .collection("tickets").where("orderId", "==", order.id).get();
            if (!ticketSnap.empty) {
              const seatLabels = ticketSnap.docs
                .map(d => norm(d.data().seatLabel || d.data().seat || ""))
                .filter(Boolean);
              const sectionNames = [...new Set(ticketSnap.docs
                .map(d => norm(d.data().sectionName || d.data().sectionId || ""))
                .filter(Boolean))];
              if (seatLabels.length) order.seatLabels = seatLabels;
              if (sectionNames.length) order.sectionIds = sectionNames;
            }
          } catch(e) { /* 查不到票券就略過 */ }
        }

        orderCache = allRows.sort((a, b) => {
          const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
          return tb - ta;
        });

        ticketCacheMap = new Map();
        renderOrders();
      }catch(e){
        console.error(e);
        orderList.innerHTML = `<div class="card empty">訂單讀取失敗，請查看 Console。
若仍失敗，代表該活動底下 orders 仍被 Firestore rules 擋住。</div>`;
      }finally{
        reloadBtn.disabled = false;
        eventFilter.disabled = false;
      }
    }

    async function saveOrder(orderId){
      const order = orderCache.find(item => item.id === orderId);
      if (!order) return;

      const nextStatus = norm(document.getElementById(`statusSel-${orderId}`)?.value || "");
      const nextNote = norm(document.getElementById(`note-${orderId}`)?.value || "");

      if (!nextStatus) {
        alert("請選擇狀態");
        return;
      }

      const ok = confirm("確定要儲存這筆訂單變更嗎？");
      if (!ok) return;

      try{
        await db.collection("events").doc(order.eventId).collection("orders").doc(order.id).update({
          status: nextStatus,
          adminNote: nextNote,
          updatedAt: new Date(),
          updatedByUid: currentUser ? currentUser.uid : ""
        });

        alert("已儲存");
        await loadOrders();
      }catch(e){
        console.error(e);
        alert("儲存失敗，可能是權限不足。");
      }
    }

    searchInput.oninput = renderOrders;
    document.getElementById("exportCsvBtn").onclick = exportCsv;
    statusFilter.onchange = renderOrders;
    eventFilter.onchange = loadOrders;
    reloadBtn.onclick = loadOrders;

    firebase.auth().onAuthStateChanged(async (user) => {
      currentUser = user || null;

      if (!user) {
        showGate("活動訂單管理", "請先登入管理帳號以繼續。", true);
        return;
      }

      try{
        myUserDoc = await loadMyUser(user.uid);

        if (!myUserDoc) {
          showGate("等待授權", "你的帳號尚未被授權為管理者。", false);
          return;
        }

        if (myUserDoc.enabled !== true) {
          showGate("已停用", "此帳號已被停用，請聯絡系統管理員。", false);
          return;
        }

        myRole = norm(myUserDoc.role);

        if (!canUsePage(myRole)) {
          showGate("權限不足", "此頁面目前僅開放後台管理角色使用。", false);
          return;
        }

        whoEl.textContent = myUserDoc.email || user.email || "-";
        myRoleEl.textContent = myRole || "-";

        gate.style.display = "none";
        app.style.display = "block";

        await loadManageableEvents();
        await loadOrders();
      }catch(e){
        console.error(e);
        showGate("發生錯誤", "無法讀取權限資料，請查看 Console。", false);
      }
    });
  </script>
</body>
</html>
