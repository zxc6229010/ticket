<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜我的訂單</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --green:#166534;
      --green-bg:#dcfce7;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --gray:#6b7280;
      --gray-bg:#f3f4f6;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{ min-height:100vh; }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{ color:var(--text); }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 22px 88px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .ghost-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      font-size:14px;
      font-weight:700;
      color:#111827;
      cursor:pointer;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:34px 30px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 56px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:14px;
      max-width:860px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-meta{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .toolbar-left,
    .toolbar-right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .input,
    .select{
      min-height:46px;
      padding:10px 14px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:18px;
      background:#fff;
      color:#111827;
      font-size:14px;
      outline:none;
      box-shadow:var(--shadow-soft);
    }

    .input{
      min-width:280px;
    }

    .input:focus,
    .select:focus{
      border-color:rgba(0,0,0,.24);
    }

    .list{
      display:grid;
      gap:18px;
    }

    .order-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .order-head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .order-head-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .order-title{
      margin:0;
      font-size:22px;
      line-height:1.35;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .order-sub{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.9;
      white-space:pre-wrap;
    }

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .status-ok{
      background:var(--green-bg);
      color:var(--green);
    }

    .status-pending{
      background:var(--orange-bg);
      color:var(--orange);
    }

    .status-cancel{
      background:var(--red-bg);
      color:var(--red);
    }

    .status-gray{
      background:var(--gray-bg);
      color:var(--gray);
    }

    .status-blue{
      background:var(--blue-bg);
      color:var(--blue);
    }

    .order-body{
      padding:20px;
    }

    .order-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    @media (max-width:760px){
      .order-grid{
        grid-template-columns:1fr;
      }
    }

    .info-box{
      border:1px solid rgba(0,0,0,.06);
      border-radius:22px;
      background:#fff;
      padding:16px;
      box-shadow:var(--shadow-soft);
    }

    .box-title{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.04em;
      margin-bottom:10px;
    }

    .kv{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:8px 10px;
      padding:8px 0;
      border-top:1px dashed var(--line);
    }

    .kv:first-child{
      border-top:none;
      padding-top:0;
    }

    .k{
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }

    .v{
      font-size:13px;
      color:#111827;
      font-weight:800;
      line-height:1.9;
      word-break:break-word;
    }

    .seat-list{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .seat-pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#f8f8f9;
      border:1px solid rgba(0,0,0,.06);
      font-size:12px;
      font-weight:800;
      color:#111;
    }

    .order-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .notice{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.05);
    }

    .empty,
    .loading{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.95;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      white-space:pre-wrap;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{ display:none; }

      .page{
        padding:22px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }

      .input{
        min-width:unset;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a href="member.html" class="back-link">← 返回會員中心</a>
        <div class="toolbar-right">
          <a href="my-tickets.html" class="ghost-btn">我的票券</a>
        </div>
      </div>

      <div class="hero">
        <h1 class="hero-title">我的訂單</h1>
        <div class="hero-sub">
這裡會顯示你建立過的全部訂單，以及別人替你一起購買後分享給你的訂單。
一筆訂單可能對應多張票券，也可能還在等待填寫持票人資料。
        </div>
        <div class="hero-meta">
          <span class="pill" id="heroUserText">登入狀態：讀取中…</span>
          <span class="pill" id="heroCountText">訂單數量：–</span>
        </div>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="login.html">登入</a>
        </div>
      </footer>

      <div class="bottom-note">
        訂單內容以系統最新狀態為準。若訂單仍在等待填資料，請在期限內完成。
      </div>
    </main>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getFirestore,
    collection,
    collectionGroup,
    getDocs,
    query,
    where
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  const appFirebase = initializeApp(firebaseConfig);
  const auth = getAuth(appFirebase);
  const db = getFirestore(appFirebase);

  const accountBtn = document.getElementById("accountBtn");
  const app = document.getElementById("app");
  const heroUserText = document.getElementById("heroUserText");
  const heroCountText = document.getElementById("heroCountText");

  let currentUser = null;
  let orderCache = [];

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[m]));
  }

  function norm(v){
    return String(v ?? "").trim();
  }

  function lower(v){
    return norm(v).toLowerCase();
  }

  function toDate(input){
    if (!input) return null;
    if (typeof input?.toDate === "function") return input.toDate();
    const d = new Date(input);
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function formatDateTime(input){
    const d = toDate(input);
    if (!d) return "-";
    return d.toLocaleString("zh-Hant", {
      hour12:false,
      year:"numeric",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit"
    });
  }

  function formatPrice(v){
    const n = Number(v || 0);
    if (!n) return "免費";
    return "NT$ " + n.toLocaleString("zh-Hant");
  }

  function updateAccountLinks(user){
    if (user) {
      accountBtn.href = "member.html";
      accountBtn.title = user.email || "會員中心";
      accountBtn.setAttribute("aria-label", "會員中心");
    } else {
      accountBtn.href = "login.html";
      accountBtn.title = "登入 / 會員中心";
      accountBtn.setAttribute("aria-label", "登入 / 會員中心");
    }
  }

  function goLogin(){
    const redirect = encodeURIComponent(location.href);
    location.href = `login.html?redirect=${redirect}`;
  }

  function isExpired(order){
    const status = lower(order.status);
    if (status === "expired") return true;

    const expiresAt = toDate(order.expiresAt);
    if (!expiresAt) return false;

    return (
      Date.now() > expiresAt.getTime() &&
      !["paid","completed","registered"].includes(status)
    );
  }

  function getRealStatus(order){
    return isExpired(order) ? "expired" : lower(order.status || "");
  }

  function getStatusText(status){
    status = lower(status);

    const map = {
      pending_holder_info: "待填持票人資料",
      ready_for_checkout: "可進入下一步",
      registered: "已建立",
      paid: "已付款",
      completed: "已完成",
      pending: "待處理",
      processing: "處理中",
      cancelled: "已取消",
      void: "已作廢",
      refunded: "已退款",
      expired: "已逾期"
    };

    return map[status] || "未知狀態";
  }

  function getStatusClass(status){
    status = lower(status);

    if (["registered","paid","completed","ready_for_checkout"].includes(status)) return "status-ok";
    if (["pending","processing","pending_holder_info"].includes(status)) return "status-pending";
    if (["cancelled","void","refunded","expired"].includes(status)) return "status-cancel";
    return "status-gray";
  }

  function sortOrders(list){
    return list.slice().sort((a, b) => {
      const aExpired = isExpired(a) ? 1 : 0;
      const bExpired = isExpired(b) ? 1 : 0;
      if (aExpired !== bExpired) return aExpired - bExpired;

      const ta = toDate(a.createdAt)?.getTime() || 0;
      const tb = toDate(b.createdAt)?.getTime() || 0;
      return tb - ta;
    });
  }

  function getRoleLabel(order){
    const buyerUid = norm(order.buyerUid || order.uid || "");
    if (currentUser && buyerUid === currentUser.uid) return "主購者";
    return "同行持票人";
  }

  function getOrderFillUrl(order){
    const url = new URL("order-fill.html", location.href);
    url.searchParams.set("id", order.eventId || "");
    url.searchParams.set("orderId", order.id || "");
    return url.pathname + url.search;
  }

  function getEventUrl(order){
    const url = new URL("ticket.html", location.href);
    url.searchParams.set("id", order.eventId || "");
    return url.pathname + url.search;
  }

  function getHolderAssignments(order){
    return Array.isArray(order.holderAssignments) ? order.holderAssignments : [];
  }

  function getBuyerTicketCount(order){
    const assignments = getHolderAssignments(order);
    if (!assignments.length) return 0;
    return assignments.filter(item => item?.isBuyerTicket === true).length;
  }

  function getValidHolderCount(order){
    return getHolderAssignments(order).filter(item => lower(item?.status) === "valid").length;
  }

  function getTotalHolderCount(order){
    const assignments = getHolderAssignments(order);
    if (assignments.length) return assignments.length;
    return Number(order.totalQuantity || order.quantity || 0);
  }

  function getCreatedTicketCount(order){
    return Number(order.ticketCount || order.createdTicketCount || 0);
  }

  function getHolderSummaryText(order){
    const assignments = getHolderAssignments(order);
    if (!assignments.length) return "-";

    return assignments.map((item, index) => {
      const label = item.isBuyerTicket ? `第 ${index + 1} 張（主購人票）` : `第 ${index + 1} 張`;
      const email = norm(item.email || "-");
      const name = norm(item.name || "");
      const status = lower(item.status) === "valid" ? "已通過" : "未完成";
      return `${label}：${name ? name + "｜" : ""}${email}｜${status}`;
    }).join("\n");
  }

  async function loadBuyerOrders(uid){
    const eventsSnap = await getDocs(collection(db, "events"));
    const allOrders = [];

    for (const ev of eventsSnap.docs){
      const eventId = ev.id;

      const tries = [
        query(collection(db, "events", eventId, "orders"), where("buyerUid", "==", uid)),
        query(collection(db, "events", eventId, "orders"), where("uid", "==", uid))
      ];

      for (const qRef of tries){
        const snap = await getDocs(qRef);
        snap.forEach(docSnap => {
          allOrders.push({
            id: docSnap.id,
            eventId,
            ...(docSnap.data() || {})
          });
        });
      }
    }

    return allOrders;
  }

  async function loadSharedOrdersByParticipant(uid){
    try{
      const qRef = query(
        collectionGroup(db, "orders"),
        where("participantUids", "array-contains", uid)
      );

      const snap = await getDocs(qRef);
      const rows = [];

      snap.forEach(docSnap => {
        const parent = docSnap.ref.parent.parent;
        rows.push({
          id: docSnap.id,
          eventId: parent ? parent.id : "",
          ...(docSnap.data() || {})
        });
      });

      return rows;
    }catch(err){
      console.warn("participantUids 查詢失敗，可能尚未建立索引", err);
      return [];
    }
  }

  async function loadSharedOrdersMirror(uid){
    try{
      const snap = await getDocs(collection(db, "users", uid, "sharedOrders"));
      const rows = [];
      snap.forEach(docSnap => {
        rows.push({
          id: docSnap.id,
          ...(docSnap.data() || {}),
          __fromMirror__: true
        });
      });
      return rows;
    }catch(err){
      console.warn("sharedOrders mirror 讀取失敗", err);
      return [];
    }
  }

  async function loadOrders(uid){
    const [buyerOrders, participantOrders, mirrorOrders] = await Promise.all([
      loadBuyerOrders(uid),
      loadSharedOrdersByParticipant(uid),
      loadSharedOrdersMirror(uid)
    ]);

    const mergedMap = new Map();

    [...buyerOrders, ...participantOrders, ...mirrorOrders].forEach(order => {
      const eventId = norm(order.eventId || "");
      const orderId = norm(order.id || "");
      if (!eventId && !orderId) return;

      const key = `${eventId}__${orderId}`;
      const prev = mergedMap.get(key) || {};
      mergedMap.set(key, { ...prev, ...order });
    });

    return sortOrders([...mergedMap.values()]);
  }

  function renderOrderList(orders){
    const listHtml = orders.map(o => {
      const seatLabels = Array.isArray(o.seatLabels) ? o.seatLabels.filter(Boolean) : [];
      const sectionIds = Array.isArray(o.sectionIds) ? o.sectionIds.filter(Boolean) : [];
      const participantEmails = Array.isArray(o.participantEmails) ? o.participantEmails.filter(Boolean) : [];
      const participantUids = Array.isArray(o.participantUids) ? o.participantUids.filter(Boolean) : [];
      const participantCount = participantUids.length || participantEmails.length || 0;
      const roleLabel = getRoleLabel(o);
      const realStatus = getRealStatus(o);
      const statusText = getStatusText(realStatus);
      const statusClass = getStatusClass(realStatus);

      const holderTotal = getTotalHolderCount(o);
      const holderValid = getValidHolderCount(o);
      const buyerTicketCount = getBuyerTicketCount(o);
      const createdTicketCount = getCreatedTicketCount(o);
      const holderSummaryText = getHolderSummaryText(o);

      const canFillNow =
        realStatus !== "expired" &&
        ["pending_holder_info","ready_for_checkout"].includes(realStatus);

      const itemSummaryText =
        Array.isArray(o.itemSummary) && o.itemSummary.length
          ? o.itemSummary.map(item => {
              const name = item.ticketTypeName || "票種";
              const qty = item.quantity || 0;
              return `${name} × ${qty}`;
            }).join("、")
          : "-";

      return `
        <div class="order-card">
          <div class="order-head">
            <div class="order-head-top">
              <div>
                <h2 class="order-title">${esc(o.eventTitle || "活動")}</h2>
                <div class="order-sub">
訂單 ID：<span class="mono">${esc(o.id)}</span>
活動 ID：<span class="mono">${esc(o.eventId || "-")}</span>
你的角色：${esc(roleLabel)}
                </div>
              </div>

              <span class="status ${statusClass}">
                ${esc(statusText)}
              </span>
            </div>
          </div>

          <div class="order-body">
            <div class="order-grid">
              <div class="info-box">
                <div class="box-title">訂單資訊</div>

                <div class="kv">
                  <div class="k">主購者</div>
                  <div class="v">${esc(o.buyerEmail || o.email || "-")}</div>
                </div>
                <div class="kv">
                  <div class="k">票種摘要</div>
                  <div class="v">${esc(itemSummaryText)}</div>
                </div>
                <div class="kv">
                  <div class="k">總張數</div>
                  <div class="v">${esc(holderTotal || 0)}</div>
                </div>
                <div class="kv">
                  <div class="k">主購人票</div>
                  <div class="v">${esc(buyerTicketCount)}</div>
                </div>
                <div class="kv">
                  <div class="k">填寫進度</div>
                  <div class="v">${esc(`${holderValid} / ${holderTotal}`)}</div>
                </div>
                <div class="kv">
                  <div class="k">已建立票券</div>
                  <div class="v">${esc(createdTicketCount)}</div>
                </div>
                <div class="kv">
                  <div class="k">總金額</div>
                  <div class="v">${esc(formatPrice(o.totalAmount))}</div>
                </div>
                <div class="kv">
                  <div class="k">付款狀態</div>
                  <div class="v">${esc(o.paymentStatus || "-")}</div>
                </div>
                <div class="kv">
                  <div class="k">建立時間</div>
                  <div class="v">${esc(formatDateTime(o.createdAt))}</div>
                </div>
                <div class="kv">
                  <div class="k">填寫期限</div>
                  <div class="v">${esc(formatDateTime(o.expiresAt))}</div>
                </div>
              </div>

              <div class="info-box">
                <div class="box-title">共享 / 座位資訊</div>

                <div class="kv">
                  <div class="k">共享人數</div>
                  <div class="v">${esc(participantCount)}</div>
                </div>
                <div class="kv">
                  <div class="k">共享對象</div>
                  <div class="v">${participantEmails.length ? esc(participantEmails.join("、")) : "-"}</div>
                </div>
                <div class="kv">
                  <div class="k">持票人摘要</div>
                  <div class="v" style="white-space:pre-wrap;">${esc(holderSummaryText)}</div>
                </div>
                <div class="kv">
                  <div class="k">座位</div>
                  <div class="v">
                    ${
                      seatLabels.length
                        ? `<div class="seat-list">${seatLabels.map(seat => `<span class="seat-pill">${esc(seat)}</span>`).join("")}</div>`
                        : "-"
                    }
                  </div>
                </div>
                <div class="kv">
                  <div class="k">區域</div>
                  <div class="v">${sectionIds.length ? esc(sectionIds.join("、")) : "-"}</div>
                </div>
                <div class="kv">
                  <div class="k">校園驗證</div>
                  <div class="v">${esc(o.verifiedSchoolName || o.verifiedSchoolId || "-")}</div>
                </div>
                <div class="kv">
                  <div class="k">購買身份</div>
                  <div class="v">${esc(o.matchedRole || "-")}</div>
                </div>
              </div>
            </div>

            <div class="order-actions">
              ${
                canFillNow
                  ? `<a class="btn btn-primary" href="${esc(getOrderFillUrl(o))}">繼續填資料</a>`
                  : `<a class="btn btn-primary" href="my-tickets.html">查看票券</a>`
              }
              <a class="btn" href="${esc(getEventUrl(o))}">查看活動</a>
            </div>

            <div class="notice">
              ${
                realStatus === "expired"
                  ? "這筆訂單已超過填寫期限，因此已失效。若仍想購買，請重新回到活動頁下單。"
                  : realStatus === "pending_holder_info"
                  ? "此訂單已成立，但尚未完成所有持票人資料填寫。第一張票固定為主購人票，請在期限內完成其餘持票人資料。"
                  : realStatus === "ready_for_checkout"
                  ? "此訂單的持票人資料已完成，可以進入下一步付款或後續流程。"
                  : realStatus === "registered"
                  ? "此訂單已建立完成。若票券已同步建立，可前往「我的票券」查看。"
                  : realStatus === "paid"
                  ? "此訂單已完成付款，可前往「我的票券」查看可入場票券。"
                  : realStatus === "completed"
                  ? "此訂單已完成全部流程。"
                  : realStatus === "cancelled"
                  ? "此訂單已取消。若有疑問，請聯絡主辦單位。"
                  : realStatus === "refunded"
                  ? "此訂單已退款。"
                  : "此訂單狀態請以系統顯示為準。"
              }
            </div>
          </div>
        </div>
      `;
    }).join("");

    return `<div class="list">${listHtml}</div>`;
  }

  function render(orders){
    if (!orders.length){
      heroCountText.textContent = "訂單數量：0";
      app.className = "empty";
      app.innerHTML = "目前沒有任何訂單";
      return;
    }

    heroCountText.textContent = `訂單數量：${orders.length}`;

    app.className = "";
    app.innerHTML = `
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="searchInput" class="input" placeholder="搜尋活動名稱 / 票種 / 訂單 ID / 主購者 Email / 持票人" />
        </div>

        <div class="toolbar-right">
          <select id="statusFilter" class="select">
            <option value="all">全部狀態</option>
            <option value="pending_holder_info">待填資料</option>
            <option value="ready_for_checkout">可進下一步</option>
            <option value="registered">已建立</option>
            <option value="paid">已付款</option>
            <option value="completed">已完成</option>
            <option value="expired">已逾期</option>
            <option value="cancelled">已取消</option>
            <option value="refunded">已退款</option>
          </select>
        </div>
      </div>

      <div id="orderListWrap"></div>
    `;

    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const orderListWrap = document.getElementById("orderListWrap");

    function paint(){
      const q = lower(searchInput.value);
      const f = statusFilter.value;

      const filtered = orders.filter(o => {
        const realStatus = getRealStatus(o);

        if (f !== "all" && realStatus !== f) return false;

        if (!q) return true;

        const hay = [
          o.eventTitle,
          o.id,
          o.buyerEmail,
          ...(Array.isArray(o.seatLabels) ? o.seatLabels : []),
          ...(Array.isArray(o.participantEmails) ? o.participantEmails : []),
          ...(Array.isArray(o.itemSummary) ? o.itemSummary.map(x => `${x.ticketTypeName || ""}`) : []),
          ...(Array.isArray(o.holderAssignments) ? o.holderAssignments.map(x => `${x.email || ""} ${x.name || ""}`) : [])
        ].map(lower).join(" ");

        return hay.includes(q);
      });

      if (!filtered.length) {
        orderListWrap.innerHTML = `<div class="empty">找不到符合條件的訂單。</div>`;
        return;
      }

      orderListWrap.innerHTML = renderOrderList(filtered);
    }

    searchInput.addEventListener("input", paint);
    statusFilter.addEventListener("change", paint);
    paint();
  }

  onAuthStateChanged(auth, async user => {
    currentUser = user || null;
    updateAccountLinks(currentUser);

    if (!user){
      goLogin();
      return;
    }

    heroUserText.textContent = `登入帳號：${user.email || user.uid}`;
    app.className = "loading";
    app.innerHTML = "載入中…";

    try{
      orderCache = await loadOrders(user.uid);
      render(orderCache);
    }catch(err){
      console.error(err);
      app.className = "empty";
      app.innerHTML = "訂單載入失敗，請稍後再試。";
    }
  });
  </script>
