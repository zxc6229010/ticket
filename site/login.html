<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Passium｜登入</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:40px 22px 88px;
    }

    .login-wrap{
      max-width:520px;
      margin:0 auto;
    }

    .hero{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:32px 28px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 52px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:12px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:32px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 22px 14px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .card-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .card-body{
      padding:22px;
    }

    .field{
      display:grid;
      gap:6px;
      margin-bottom:14px;
    }

    .label{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .row-between{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
      margin-bottom:18px;
    }

    .text-link{
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-block{
      width:100%;
    }

    .btn-row{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .notice{
      margin-top:16px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      font-size:13px;
      line-height:1.9;
      color:#4b5563;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.12);
      color:var(--blue);
    }

    .notice.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.12);
      color:var(--green);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.12);
      color:var(--red);
    }

    .notice.pending{
      background:var(--orange-bg);
      border-color:rgba(194,65,12,.12);
      color:var(--orange);
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .copyright{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:24px 16px 72px;
      }

      .hero{
        border-radius:28px;
        padding:28px 20px;
      }

      .card{
        border-radius:28px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="login-wrap">
        <div class="hero">
          <h1 class="hero-title">登入</h1>
          <div class="hero-sub">使用你的會員帳號登入。
若尚未完成信箱驗證，系統會提示你先完成驗證。</div>
        </div>

        <div class="card">
          <div class="card-head">
            <h2 class="card-title">會員帳號</h2>
          </div>

          <div class="card-body">
            <div class="field">
              <label class="label" for="email">電子郵件</label>
              <input id="email" class="input" type="email" placeholder="請輸入 Email" autocomplete="email" />
            </div>

            <div class="field">
              <label class="label" for="password">密碼</label>
              <input id="password" class="input" type="password" placeholder="請輸入密碼" autocomplete="current-password" />
            </div>

            <div class="row-between">
              <a class="text-link" href="register.html">註冊帳號</a>
              <a class="text-link" href="forgot-password.html">忘記密碼</a>
            </div>

            <div id="msg" class="notice info">請輸入登入資料。</div>

            <div class="btn-row">
              <button class="btn btn-primary btn-block" id="loginBtn">登入</button>
              <button class="btn btn-block hidden" id="checkVerifyBtn">我已完成驗證，重新檢查</button>
              <button class="btn btn-block hidden" id="resendVerifyBtn">重寄驗證信</button>
              <button class="btn btn-block hidden" id="logoutBtn">登出目前帳號</button>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="register.html">註冊</a>
          <a class="footer-link" href="member.html">會員中心</a>
        </div>
      </footer>

      <div class="copyright">
        © 2026 Passium. All rights reserved.
      </div>
    </main>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    sendEmailVerification,
    signOut,
    onAuthStateChanged,
    reload
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
    authDomain: "concert-1ff7e.firebaseapp.com",
    projectId: "concert-1ff7e",
    storageBucket: "concert-1ff7e.firebasestorage.app",
    messagingSenderId: "704757384914",
    appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
  };

  const appFirebase = initializeApp(firebaseConfig);
  const auth = getAuth(appFirebase);

  const accountBtn = document.getElementById("accountBtn");
  const emailEl = document.getElementById("email");
  const passwordEl = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const checkVerifyBtn = document.getElementById("checkVerifyBtn");
  const resendVerifyBtn = document.getElementById("resendVerifyBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const msg = document.getElementById("msg");

  const params = new URLSearchParams(location.search);
  const redirectTarget = params.get("redirect");
  const prefillEmail = params.get("email");

  let redirecting = false;
  let lastPendingEmail = "";
  let lastPendingPassword = "";

  function esc(value){
    return String(value ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[m]));
  }

  function norm(value){
    return String(value ?? "").trim();
  }

  function setMsg(type, text){
    msg.className = `notice ${type}`;
    msg.innerHTML = text;
  }

  function isValidEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function getSafeRedirect(){
    if (!redirectTarget) return "member.html";

    const target = String(redirectTarget).trim();

    if (!target) return "member.html";
    if (target.startsWith("http://") || target.startsWith("https://")) return "member.html";
    if (target.includes("login.html")) return "member.html";

    return target;
  }

  function updateAccountLinks(user){
    if (user) {
      accountBtn.href = "member.html";
      accountBtn.title = user.email || "會員中心";
      accountBtn.setAttribute("aria-label", "會員中心");
    } else {
      accountBtn.href = "login.html";
      accountBtn.title = "登入 / 會員中心";
      accountBtn.setAttribute("aria-label", "登入 / 會員中心");
    }
  }

  function showVerifyActions(show){
    checkVerifyBtn.classList.toggle("hidden", !show);
    resendVerifyBtn.classList.toggle("hidden", !show);
    logoutBtn.classList.toggle("hidden", !show);
  }

  function goNext(){
    if (redirecting) return;
    redirecting = true;
    location.href = getSafeRedirect();
  }

  if (prefillEmail) {
    try {
      emailEl.value = decodeURIComponent(prefillEmail);
    } catch {
      emailEl.value = prefillEmail;
    }
  }

  async function safeSignOut(){
    try {
      await signOut(auth);
    } catch (e) {
      console.error("signOut failed:", e);
    }
  }

  async function login(){
    const email = norm(emailEl.value).toLowerCase();
    const password = passwordEl.value;

    if (!email) {
      setMsg("warn", "請輸入電子郵件");
      return;
    }

    if (!isValidEmail(email)) {
      setMsg("warn", "電子郵件格式不正確");
      return;
    }

    if (!password) {
      setMsg("warn", "請輸入密碼");
      return;
    }

    loginBtn.disabled = true;
    const oldText = loginBtn.textContent;
    loginBtn.textContent = "登入中…";
    setMsg("info", "登入中…");
    showVerifyActions(false);

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const user = cred.user;

      await reload(user);

      if (!user.emailVerified) {
        lastPendingEmail = email;
        lastPendingPassword = password;

        await safeSignOut();

        setMsg(
          "pending",
          `此帳號尚未完成信箱驗證。<br>請先到 <span class="mono">${esc(email)}</span> 收信並點擊驗證連結後，再重新登入。`
        );
        showVerifyActions(true);
        return;
      }

      setMsg("ok", `登入成功<br><span class="mono">${esc(email)}</span>`);
      showVerifyActions(false);

      setTimeout(() => {
        goNext();
      }, 400);

    } catch (e) {
      console.error(e);

      let text = "登入失敗";
      const code = String(e.code || "");

      if (code.includes("auth/user-not-found")) {
        text = "查無此帳號";
      } else if (code.includes("auth/wrong-password")) {
        text = "密碼錯誤";
      } else if (code.includes("auth/invalid-credential")) {
        text = "帳號或密碼錯誤";
      } else if (code.includes("auth/invalid-email")) {
        text = "電子郵件格式不正確";
      } else if (code.includes("auth/too-many-requests")) {
        text = "嘗試次數過多，請稍後再試";
      } else if (code.includes("auth/network-request-failed")) {
        text = "網路連線失敗";
      }

      setMsg("warn", esc(text));
      showVerifyActions(false);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = oldText;
    }
  }

  async function resendVerificationEmail(){
    const email = norm(emailEl.value || lastPendingEmail).toLowerCase();
    const password = passwordEl.value || lastPendingPassword;

    if (!email || !password) {
      setMsg("warn", "請先輸入註冊時的電子郵件與密碼，再重寄驗證信。");
      return;
    }

    resendVerifyBtn.disabled = true;
    const oldText = resendVerifyBtn.textContent;
    resendVerifyBtn.textContent = "寄送中…";

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const user = cred.user;

      await reload(user);

      if (user.emailVerified) {
        await safeSignOut();
        setMsg("ok", `這個帳號已完成驗證，請直接登入。<br><span class="mono">${esc(email)}</span>`);
        showVerifyActions(false);
        return;
      }

      await sendEmailVerification(user);
      await safeSignOut();

      setMsg("ok", `驗證信已重新寄出到：<span class="mono">${esc(email)}</span>`);
      showVerifyActions(true);
    } catch (e) {
      console.error(e);
      await safeSignOut();
      setMsg("warn", "重寄驗證信失敗，請確認帳號密碼是否正確，或稍後再試。");
    } finally {
      resendVerifyBtn.disabled = false;
      resendVerifyBtn.textContent = oldText;
    }
  }

  async function checkVerificationNow(){
    const email = norm(emailEl.value || lastPendingEmail).toLowerCase();
    const password = passwordEl.value || lastPendingPassword;

    if (!email || !password) {
      setMsg("warn", "請先輸入電子郵件與密碼，再重新檢查驗證狀態。");
      return;
    }

    checkVerifyBtn.disabled = true;
    const oldText = checkVerifyBtn.textContent;
    checkVerifyBtn.textContent = "檢查中…";

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const user = cred.user;

      await reload(user);

      if (!user.emailVerified) {
        await safeSignOut();
        setMsg(
          "pending",
          `目前尚未完成驗證。<br>請先到 <span class="mono">${esc(email)}</span> 收信並點擊驗證連結後，再按一次重新檢查。`
        );
        showVerifyActions(true);
        return;
      }

      setMsg("ok", `信箱驗證完成，正在登入…<br><span class="mono">${esc(email)}</span>`);
      showVerifyActions(false);

      setTimeout(() => {
        goNext();
      }, 400);

    } catch (e) {
      console.error(e);
      await safeSignOut();
      setMsg("warn", "重新檢查失敗，請確認帳號密碼是否正確。");
    } finally {
      checkVerifyBtn.disabled = false;
      checkVerifyBtn.textContent = oldText;
    }
  }

  async function logoutCurrentUser(){
    await safeSignOut();
    showVerifyActions(false);
    setMsg("info", "已登出，目前可重新登入。");
  }

  loginBtn.onclick = login;
  resendVerifyBtn.onclick = resendVerificationEmail;
  checkVerifyBtn.onclick = checkVerificationNow;
  logoutBtn.onclick = logoutCurrentUser;

  [emailEl, passwordEl].forEach(el => {
    el.addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  });

  onAuthStateChanged(auth, async user => {
    updateAccountLinks(user || null);

    if (!user) {
      return;
    }

    try {
      await reload(user);
    } catch (e) {
      console.error(e);
    }

    if (!user.emailVerified) {
      const unsafeEmail = user.email || "";
      await safeSignOut();

      if (!emailEl.value && unsafeEmail) {
        emailEl.value = unsafeEmail;
      }

      lastPendingEmail = unsafeEmail;

      setMsg(
        "pending",
        `此帳號尚未完成信箱驗證，系統已自動登出。<br>請先到 <span class="mono">${esc(unsafeEmail || "-")}</span> 收信完成驗證後再登入。`
      );
      showVerifyActions(true);
      return;
    }

    goNext();
  });
</script>
</body>
</html>
