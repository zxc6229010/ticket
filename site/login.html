<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>會員登入</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --text:#111827;
      --muted:#6b7280;
      --line:rgba(17,24,39,.08);
      --line-strong:rgba(17,24,39,.14);
      --shadow:0 18px 50px rgba(15,23,42,.08);
      --shadow-soft:0 10px 30px rgba(15,23,42,.05);
      --black:#111111;
      --ok:#166534;
      --ok-bg:#dcfce7;
      --warn:#b91c1c;
      --warn-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.9), rgba(245,247,251,.95) 36%),
        linear-gradient(180deg, #f8fafc 0%, #f5f7fb 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:28px 18px 64px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#374151;
      font-size:14px;
      font-weight:800;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.8);
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .ghost-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      font-size:14px;
      font-weight:900;
      color:#111827;
      cursor:pointer;
    }

    .hero{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    .hero-title{
      margin:0;
      font-size:30px;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .hero-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
    }

    .hero-pills{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:1000;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 22px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .card-title{
      margin:0;
      font-size:22px;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .card-sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.9;
    }

    .card-body{
      padding:22px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .label{
      font-size:13px;
      font-weight:1000;
      color:#111827;
    }

    .required{
      color:#dc2626;
      margin-left:4px;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:15px;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease;
    }

    .input:focus{
      border-color:#111827;
      box-shadow:0 0 0 4px rgba(17,24,39,.06);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.8;
    }

    .notice{
      margin-top:18px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      font-size:13px;
      line-height:1.9;
      color:#4b5563;
      white-space:pre-wrap;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.12);
      color:var(--blue);
    }

    .notice.ok{
      background:var(--ok-bg);
      border-color:rgba(22,101,52,.12);
      color:var(--ok);
    }

    .notice.warn{
      background:var(--warn-bg);
      border-color:rgba(185,28,28,.12);
      color:var(--warn);
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .row-between{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.08);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .btn-primary{
      background:var(--black);
      color:#fff;
      border-color:var(--black);
    }

    .btn-block{
      width:100%;
    }

    .text-link{
      font-size:13px;
      font-weight:1000;
      color:#111827;
    }

    .footer-links{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    .footer-links a{
      font-weight:900;
      color:#111827;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="index.html">← 返回首頁</a>
      <a class="ghost-btn" href="register.html">前往註冊</a>
    </div>

    <div class="hero">
      <h1 class="hero-title">會員登入</h1>
      <div class="hero-sub">
        登入後即可進入會員中心、查看訂單、顯示票券，以及完成校園驗證。<br>
        若你尚未註冊會員，請先建立帳號。
      </div>
      <div class="hero-pills">
        <span class="pill">可查看我的票券</span>
        <span class="pill">可進入會員中心</span>
        <span class="pill">可接續校園驗證流程</span>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2 class="card-title">登入帳號</h2>
        <div class="card-sub">
          請輸入你的會員 Email 與密碼。
        </div>
      </div>

      <div class="card-body">
        <div class="grid">
          <div class="field">
            <label class="label" for="email">電子郵件<span class="required">*</span></label>
            <input id="email" class="input" type="email" placeholder="請輸入 Email" autocomplete="email" />
            <div class="hint">此信箱為你的會員登入帳號</div>
          </div>

          <div class="field">
            <label class="label" for="password">密碼<span class="required">*</span></label>
            <input id="password" class="input" type="password" placeholder="請輸入密碼" autocomplete="current-password" />
            <div class="hint">請輸入你註冊時設定的密碼</div>
          </div>
        </div>

        <div class="row-between">
          <a class="text-link" href="register.html">還沒有帳號？前往註冊</a>
          <a class="text-link" href="forgot-password.html">忘記密碼？</a>
        </div>

        <div id="msg" class="notice info">
          登入成功後，系統會自動帶你前往會員中心。
        </div>

        <div class="row" style="margin-top:18px;">
          <button class="btn btn-primary btn-block" id="loginBtn">登入會員帳號</button>
        </div>

        <div class="footer-links">
          <span>註冊後即可使用</span>
          <a href="member.html">會員中心</a>
          <span>、</span>
          <a href="my-tickets.html">我的票券</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain: "concert-1ff7e.firebaseapp.com",
        projectId: "concert-1ff7e",
        storageBucket: "concert-1ff7e.firebasestorage.app",
        messagingSenderId: "704757384914",
        appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }

    const auth = firebase.auth();

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function setMsg(type, text){
      msg.className = `notice ${type}`;
      msg.innerHTML = text;
    }

    function isValidEmail(email){
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function login(){
      const email = norm(emailEl.value).toLowerCase();
      const password = passwordEl.value;

      if (!email) {
        setMsg("warn", "請輸入電子郵件");
        return;
      }

      if (!isValidEmail(email)) {
        setMsg("warn", "電子郵件格式不正確");
        return;
      }

      if (!password) {
        setMsg("warn", "請輸入密碼");
        return;
      }

      loginBtn.disabled = true;
      const oldText = loginBtn.textContent;
      loginBtn.textContent = "登入中…";
      setMsg("info", "正在登入，請稍候…");

      try {
        await auth.signInWithEmailAndPassword(email, password);
        setMsg("ok", `登入成功，正在前往會員中心…<br>帳號：<span class="mono">${esc(email)}</span>`);
        setTimeout(() => {
          location.href = "member.html";
        }, 700);
      } catch (e) {
        console.error(e);

        let text = "登入失敗，請稍後再試";
        const code = String(e.code || "");

        if (code.includes("auth/user-not-found")) {
          text = "查無此帳號，請確認電子郵件是否正確";
        } else if (code.includes("auth/wrong-password")) {
          text = "密碼錯誤，請重新輸入";
        } else if (code.includes("auth/invalid-credential")) {
          text = "帳號或密碼錯誤";
        } else if (code.includes("auth/invalid-email")) {
          text = "電子郵件格式不正確";
        } else if (code.includes("auth/too-many-requests")) {
          text = "登入嘗試次數過多，請稍後再試";
        } else if (code.includes("auth/network-request-failed")) {
          text = "網路連線失敗，請確認網路後再試";
        } else if (e.message) {
          text = e.message;
        }

        setMsg("warn", esc(text));
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = oldText;
      }
    }

    loginBtn.onclick = login;

    [emailEl, passwordEl].forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter") login();
      });
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        location.href = "member.html";
      }
    });
  </script>
</body>
</html>
