<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>核銷｜掃描入場</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── Gate（登入畫面） ── */
    #gateWrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: #0a0a0a;
    }
    .gate-inner {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .gate-logo {
      font-size: 44px;
      margin-bottom: 12px;
    }
    .gate-title {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 4px;
    }
    .gate-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }
    .gate-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
      text-align: left;
    }
    .gate-card label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .gate-card input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .15s;
    }
    .gate-card input:focus { border-color: #22c55e; }
    .gate-card input::placeholder { color: #444; }
    #loginBtn {
      width: 100%;
      padding: 13px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }
    #loginBtn:hover { background: #16a34a; }
    #loginBtn:disabled { opacity: .55; cursor: not-allowed; }
    #loginErr {
      font-size: 13px;
      color: #f87171;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    /* ── App ── */
    #appWrap { display: none; }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .event-title {
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #22c55e;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .btn-logout {
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #aaa;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: color .13s, border-color .13s;
    }
    .btn-logout:hover { color: #f87171; border-color: #7f1d1d; }

    /* Scanner */
    .scanner-frame {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      aspect-ratio: 1;
      max-height: 340px;
    }
    #reader { width: 100% !important; height: 100% !important; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    #reader img, #reader__dashboard, #reader__filescan_input { display: none !important; }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-box {
      width: 190px; height: 190px;
      border: 3px solid rgba(255,255,255,.75);
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.5);
    }
    .scan-line {
      position: absolute;
      top: calc(50% - 93px);
      left: calc(50% - 93px);
      width: 186px; height: 3px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scanLine 1.8s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%   { transform: translateY(0); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(186px); opacity: 0; }
    }

    .result-flash {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .12s ease;
    }
    .result-flash.ok   { background: rgba(34,197,94,.3); }
    .result-flash.warn { background: rgba(239,68,68,.3); }
    .result-flash.show { opacity: 1; }

    /* Status bar */
    .status-bar {
      margin-top: 10px;
      padding: 12px 15px;
      border-radius: 12px;
      background: #111;
      border: 1px solid #222;
      font-size: 14px;
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-bar .icon { font-size: 20px; flex-shrink: 0; }
    .status-bar .msg  { flex: 1; line-height: 1.5; }
    .status-bar.ok   { border-color: #166534; background: #052e16; }
    .status-bar.warn { border-color: #7f1d1d; background: #1c0d0d; }
    .status-bar.info { border-color: #1e3a5f; background: #0c1f35; }

    /* Scan controls */
    .scan-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-scan {
      height: 50px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .13s, color .13s;
    }
    .btn-scan:hover:not(:disabled) { background: #222; color: #fff; }
    .btn-scan.active { background: #14532d; border-color: #166534; color: #4ade80; }
    .btn-scan:disabled { opacity: .4; cursor: not-allowed; }

    /* Manual */
    .manual-wrap {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .manual-wrap input {
      flex: 1;
      padding: 11px 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .manual-wrap input:focus { border-color: #22c55e; }
    .manual-wrap input::placeholder { color: #444; }
    .btn-manual {
      padding: 11px 18px;
      background: #22c55e;
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      transition: background .13s;
    }
    .btn-manual:hover { background: #16a34a; }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .stat-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-num   { font-size: 28px; font-weight: 900; color: #fff; }
    .stat-num.green { color: #22c55e; }
    .stat-label { font-size: 11px; color: #555; margin-top: 3px; }

    /* Log */
    .log-section { margin-top: 14px; }
    .log-title {
      font-size: 11px;
      color: #444;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .log-list { display: grid; gap: 5px; }
    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 9px;
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      font-size: 13px;
      animation: fadeInDown .13s ease;
    }
    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-3px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .log-item.ok   { border-color: #14532d; }
    .log-item.warn { border-color: #450a0a; }
    .log-icon  { flex-shrink: 0; font-size: 15px; }
    .log-body  { flex: 1; min-width: 0; }
    .log-main  { font-weight: 700; color: #d1d5db; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-sub   { color: #4b5563; font-size: 11px; margin-top: 2px; word-break: break-all; }
    .log-time  { font-size: 11px; color: #374151; flex-shrink: 0; white-space: nowrap; }
  </style>

<script id="email-login-patch">
(function(){
  function ensureUtilityBar(){
    if(document.getElementById('pageUtilityBar')) return;
    var bar=document.createElement('div');
    bar.id='pageUtilityBar';
    bar.className='page-utility-bar';
    bar.innerHTML='\n      <div class="pub-email" id="pubEmailChip">未登入</div>\n      <button class="pub-btn pub-home" type="button" id="pubHomeBtn">回到初選單</button>\n      <button class="pub-btn pub-logout" type="button" id="pubLogoutBtn">登出</button>';
    document.body.appendChild(bar);
    document.body.classList.add('utility-bar-space');
    document.getElementById('pubHomeBtn').onclick=function(){ location.href='dashboard.html'; };
    document.getElementById('pubLogoutBtn').onclick=async function(){ try{ if(window.firebase) await firebase.auth().signOut(); else location.href='dashboard.html'; }catch(e){ console.error(e); alert('登出失敗，請看 Console。'); } };
  }

  async function emailPasswordPrompt(){
    var email=window.prompt('請輸入 Email');
    if(email===null) throw new Error('cancelled');
    email=String(email||'').trim();
    if(!email) throw new Error('missing email');
    var password=window.prompt('請輸入密碼');
    if(password===null) throw new Error('cancelled');
    password=String(password||'');
    if(!password) throw new Error('missing password');
    return {email:email,password:password};
  }

  function patchFirebaseEmailLogin(){
    if(!window.firebase || !firebase.auth) return;
    var auth=firebase.auth();
    if(auth.__emailPatchApplied) return;
    auth.__emailPatchApplied=true;
    var original=auth.signInWithPopup ? auth.signInWithPopup.bind(auth) : null;
    auth.signInWithPopup=async function(){
      var creds=await emailPasswordPrompt();
      return auth.signInWithEmailAndPassword(creds.email, creds.password);
    };
    window.__originalSignInWithPopup=original;
    try{ auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }catch(e){}
  }

  function replaceTextNodes(){
    var walker=document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
    var nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(function(node){
      var t=node.nodeValue;
      if(!t) return;
      t=t.replace(/使用\s*Google\s*登入/g,'使用 Email 登入');
      t=t.replace(/請先使用\s*Google\s*(帳號)?\s*登入後台/g,'請先使用 Email／密碼登入後台');
      t=t.replace(/請先使用\s*Google\s*(帳號)?\s*登入/g,'請先使用 Email／密碼登入');
      t=t.replace(/前往 Dashboard/g,'前往初選單');
      t=t.replace(/回 Dashboard/g,'回到初選單');
      t=t.replace(/接下來請前往 Dashboard 測試/g,'接下來請前往初選單測試');
      node.nodeValue=t;
    });
    document.querySelectorAll('a,button').forEach(function(el){
      var txt=(el.textContent||'').trim();
      if(txt==='回 Dashboard') el.textContent='回到初選單';
      if(txt==='前往 Dashboard') el.textContent='前往初選單';
    });
  }

  function patchHomeLinks(){
    document.querySelectorAll('a[href="dashboard.html"]').forEach(function(a){
      if((a.textContent||'').includes('Dashboard')) a.textContent=a.textContent.replace(/Dashboard/g,'初選單');
    });
  }

  function updateEmailChip(){
    var chip=document.getElementById('pubEmailChip');
    if(!chip || !window.firebase || !firebase.auth) return;
    var user=firebase.auth().currentUser;
    chip.textContent=user && user.email ? user.email : '未登入';
  }

  function init(){
    ensureUtilityBar();
    patchFirebaseEmailLogin();
    replaceTextNodes();
    patchHomeLinks();
    updateEmailChip();
    if(window.firebase && firebase.auth){
      firebase.auth().onAuthStateChanged(function(){ updateEmailChip(); replaceTextNodes(); patchHomeLinks(); });
    }
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>

    /* ══════════════════════════════════════

        messagingSenderId: "704757384914",
        appId:             "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }
    const auth = firebase.auth();
    const db   = firebase.firestore();

    /* ══════════════════════════════════════
       2. 工具函數
    ══════════════════════════════════════ */
    const esc  = s => String(s ?? "").replace(/[&<>"']/g,
      m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const norm = s => String(s ?? "").trim();

    /* ══════════════════════════════════════
       3. DOM 參照
    ══════════════════════════════════════ */
    const gateWrap    = document.getElementById("gateWrap");
    const appWrap     = document.getElementById("appWrap");
    const loginEmail  = document.getElementById("loginEmail");
    const loginPw     = document.getElementById("loginPassword");
    const loginBtn    = document.getElementById("loginBtn");
    const loginErr    = document.getElementById("loginErr");
    const logoutBtn   = document.getElementById("logoutBtn");
    const eventTitleEl= document.getElementById("eventTitle");
    const statusBar   = document.getElementById("statusBar");
    const resultFlash = document.getElementById("resultFlash");
    const scanLine    = document.getElementById("scanLine");
    const startBtn    = document.getElementById("startBtn");
    const stopBtn     = document.getElementById("stopBtn");
    const manualCode  = document.getElementById("manualCode");
    const manualBtn   = document.getElementById("manualBtn");
    const logListEl   = document.getElementById("logList");

    /* ══════════════════════════════════════
       4. 狀態
    ══════════════════════════════════════ */
    let currentUser       = null;
    let myAssignedEventId = "";
    let qr                = null;
    let scanning          = false;
    let busy              = false;
    let logCount          = 0;
    let unsubStats        = null;

    /* ══════════════════════════════════════
       5. 登入 / 登出
    ══════════════════════════════════════ */
    async function doLogin() {
      const email    = norm(loginEmail.value);
      const password = loginPw.value;
      loginErr.style.display = "none";

      if (!email || !password) {
        loginErr.textContent = "請輸入帳號與密碼";
        loginErr.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "登入中…";

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (e) {
        loginErr.textContent = "帳號或密碼錯誤，請再試一次";
        loginErr.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.textContent = "登入";
      }
    }

    loginBtn.onclick = doLogin;
    loginEmail.addEventListener("keydown", e => { if (e.key === "Enter") loginPw.focus(); });
    loginPw.addEventListener("keydown",    e => { if (e.key === "Enter") doLogin(); });

    logoutBtn.onclick = async () => {
      try { await auth.signOut(); } catch (_) {}
    };

    /* ══════════════════════════════════════
       6. UI 切換
    ══════════════════════════════════════ */
    function showGate() {
      gateWrap.style.display = "flex";
      appWrap.style.display  = "none";
      loginBtn.disabled      = false;
      loginBtn.textContent   = "登入";
      loginErr.style.display = "none";
    }

    function showApp() {
      gateWrap.style.display = "none";
      appWrap.style.display  = "block";
    }

    /* ══════════════════════════════════════
       7. 音效
    ══════════════════════════════════════ */
    const AC = window.AudioContext || window.webkitAudioContext;
    function beep(freq = 880, dur = 120, type = "sine", gain = 0.3) {
      if (!AC) return;
      try {
        const ctx = new AC();
        const osc = ctx.createOscillator();
        const vol = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        vol.gain.value = gain;
        osc.connect(vol);
        vol.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + dur / 1000);
        setTimeout(() => ctx.close(), dur + 100);
      } catch (_) {}
    }
    const okBeep   = () => { beep(880, 80); setTimeout(() => beep(1200, 100), 90); };
    const warnBeep = () => { beep(300, 200, "square", 0.15); };

    /* ══════════════════════════════════════
       8. Flash 動畫
    ══════════════════════════════════════ */
    let flashTimer = null;
    function flash(type) {
      resultFlash.className   = `result-flash ${type} show`;
      resultFlash.textContent = type === "ok" ? "✓" : "✗";
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        resultFlash.className = `result-flash ${type}`;
      }, 500);
    }

    /* ══════════════════════════════════════
       9. Status bar
    ══════════════════════════════════════ */
    function setStatus(type, icon, msg) {
      statusBar.className = `status-bar ${type}`;
      statusBar.innerHTML = `<span class="icon">${icon}</span><span class="msg">${esc(msg)}</span>`;
    }

    /* ══════════════════════════════════════
       10. Log
    ══════════════════════════════════════ */
    function pushLog(type, main, sub) {
      if (logCount === 0) logListEl.innerHTML = "";
      logCount++;
      const now  = new Date().toLocaleTimeString("zh-Hant", { hour12: false });
      const icon = type === "ok" ? "✅" : "⚠️";
      const item = document.createElement("div");
      item.className = `log-item ${type}`;
      item.innerHTML = `
        <span class="log-icon">${icon}</span>
        <div class="log-body">
          <div class="log-main">${esc(main)}</div>
          ${sub ? `<div class="log-sub">${esc(sub)}</div>` : ""}
        </div>
        <span class="log-time">${now}</span>
      `;
      logListEl.insertBefore(item, logListEl.firstChild);
      while (logListEl.children.length > 30) logListEl.removeChild(logListEl.lastChild);
    }

    /* ══════════════════════════════════════
       11. 即時統計
    ══════════════════════════════════════ */
    function startStats(eventId) {
      if (unsubStats) unsubStats();
      unsubStats = db.collection("events").doc(eventId).collection("orders")
        .onSnapshot(snap => {
          let total = 0, checked = 0;
          snap.forEach(d => {
            total++;
            if ((d.data() || {}).checkedIn === true) checked++;
          });
          document.getElementById("sTotal").textContent   = total;
          document.getElementById("sChecked").textContent = checked;
          document.getElementById("sRemain").textContent  = total - checked;
        }, err => console.warn("stats error:", err));
    }

    /* ══════════════════════════════════════
       12. 核心核銷邏輯
    ══════════════════════════════════════ */
    async function doCheckin(rawCode) {
      const code = norm(rawCode);
      if (!code) return;

      setStatus("info", "⏳", `讀取：${code}`);

      try {
        // 先查 events/{eventId}/orders/{code}
        const orderRef  = db.collection("events").doc(myAssignedEventId).collection("orders").doc(code);
        const orderSnap = await orderRef.get();

        if (orderSnap.exists) {
          const o = orderSnap.data() || {};
          if (o.checkedIn === true) {
            const atStr = o.checkedInAt
              ? (o.checkedInAt.toDate ? o.checkedInAt.toDate() : new Date(o.checkedInAt))
                  .toLocaleTimeString("zh-Hant", { hour12: false })
              : "未知";
            flash("warn"); warnBeep();
            setStatus("warn", "⚠️", `重複入場（${atStr} 已核銷）`);
            pushLog("warn", "重複入場", `${code} 已於 ${atStr} 核銷`);
            return;
          }
          await orderRef.update({
            checkedIn:      true,
            checkedInAt:    new Date(),
            checkedInBy:    currentUser.uid,
            checkedInEmail: currentUser.email || "",
          });
          flash("ok"); okBeep();
          setStatus("ok", "✅", "入場成功！");
          pushLog("ok", "入場成功", `訂單 ${code}`);
          return;
        }

        // Fallback：tickets collectionGroup
        const q = await db.collectionGroup("tickets")
          .where(firebase.firestore.FieldPath.documentId(), "==", code)
          .limit(1).get();

        if (q.empty) {
          flash("warn"); warnBeep();
          setStatus("warn", "❌", "找不到此票券");
          pushLog("warn", "找不到票", code);
          return;
        }

        const tDoc = q.docs[0];
        const t    = tDoc.data() || {};

        if (myAssignedEventId && norm(t.eventId) !== myAssignedEventId) {
          flash("warn"); warnBeep();
          setStatus("warn", "⚠️", "此票不屬於本活動");
          pushLog("warn", "活動不符", code);
          return;
        }
        if (t.checkedIn === true) {
          flash("warn"); warnBeep();
          setStatus("warn", "⚠️", "此票已核銷");
          pushLog("warn", "重複核銷", code);
          return;
        }
        await tDoc.ref.update({
          checkedIn:        true,
          checkedInAt:      new Date(),
          checkedInBy:      currentUser.uid,
          checkedInByEmail: currentUser.email || "",
        });
        flash("ok"); okBeep();
        setStatus("ok", "✅", "入場成功！");
        pushLog("ok", "入場成功（票券）", code);

      } catch (e) {
        console.error(e);
        flash("warn"); warnBeep();
        setStatus("warn", "❌", "核銷失敗：" + (e.message || e));
        pushLog("warn", "核銷失敗", e.message || String(e));
      }
    }

    /* ══════════════════════════════════════
       13. 掃描器控制
    ══════════════════════════════════════ */
    async function startScan() {
      if (scanning) return;
      if (!myAssignedEventId) {
        setStatus("warn", "⚠️", "你尚未被指派活動，請聯絡管理員");
        return;
      }
      setStatus("info", "📷", "啟動相機…");
      try {
        if (!qr) qr = new Html5Qrcode("reader");
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras?.length) {
          setStatus("warn", "❌", "找不到相機，請改用手動輸入");
          return;
        }
        const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
        scanning = true;
        startBtn.disabled = true;
        startBtn.classList.add("active");
        stopBtn.disabled = false;
        scanLine.style.display = "block";

        await qr.start(
          cam.id,
          { fps: 15, qrbox: { width: 200, height: 200 } },
          async decoded => {
            if (busy) return;
            busy = true;
            try { await doCheckin(decoded); }
            finally { setTimeout(() => { busy = false; }, 1200); }
          },
          () => {}
        );
        setStatus("info", "🎯", "對準 QR Code 即可核銷");
      } catch (e) {
        console.error(e);
        scanning = false;
        startBtn.disabled = false;
        startBtn.classList.remove("active");
        stopBtn.disabled = true;
        scanLine.style.display = "none";
        setStatus("warn", "❌", "相機啟動失敗，請確認已授予相機權限且使用 HTTPS");
      }
    }

    async function stopScan() {
      if (!qr || !scanning) return;
      try { await qr.stop(); await qr.clear(); } catch (_) {}
      qr = null;
      scanning = false;
      startBtn.disabled = false;
      startBtn.classList.remove("active");
      stopBtn.disabled = true;
      scanLine.style.display = "none";
      setStatus("info", "📷", "已停止掃描");
    }

    startBtn.onclick  = startScan;
    stopBtn.onclick   = stopScan;
    manualBtn.onclick = () => { doCheckin(manualCode.value); manualCode.value = ""; };
    manualCode.addEventListener("keydown", e => {
      if (e.key === "Enter") { doCheckin(manualCode.value); manualCode.value = ""; }
    });

    /* ══════════════════════════════════════
       14. Auth 狀態監聽
    ══════════════════════════════════════ */
    auth.onAuthStateChanged(async user => {
      currentUser = user || null;

      if (!user) {
        if (unsubStats) { unsubStats(); unsubStats = null; }
        await stopScan();
        showGate();
        return;
      }

      try {
        const snap = await db.collection("users").doc(user.uid).get();

        if (!snap.exists) {
          showGate();
          loginErr.textContent = "此帳號尚未被授權，請聯絡管理員。";
          loginErr.style.display = "block";
          await auth.signOut();
          return;
        }

        const u    = snap.data() || {};
        const role = norm(u.role);
        const VALID = ["platform_super","platform_admin","org_super","org_admin","org_staff"];

        if (u.enabled !== true) {
          showGate();
          loginErr.textContent = "此帳號已被停用，請聯絡管理員。";
          loginErr.style.display = "block";
          await auth.signOut();
          return;
        }

        if (!VALID.includes(role)) {
          showGate();
          loginErr.textContent = `角色「${role}」沒有核銷權限。`;
          loginErr.style.display = "block";
          await auth.signOut();
          return;
        }

        myAssignedEventId = norm(u.assignedEventId || "");

        // 讀活動名稱
        let evtName = myAssignedEventId || "（未指派活動）";
        if (myAssignedEventId) {
          try {
            const es = await db.collection("events").doc(myAssignedEventId).get();
            if (es.exists) evtName = norm(es.data()?.title || myAssignedEventId);
          } catch (_) {}
          startStats(myAssignedEventId);
        }

        eventTitleEl.textContent = evtName;
        showApp();

        setStatus(
          myAssignedEventId ? "info" : "warn",
          myAssignedEventId ? "📷" : "⚠️",
          myAssignedEventId ? "按「開始掃描」啟動相機" : "你尚未被指派活動，請聯絡管理員"
        );

      } catch (e) {
        console.error(e);
        showGate();
        loginErr.textContent = "讀取失敗：" + (e.message || e);
        loginErr.style.display = "block";
      }
    });
  </script>
</body>
