<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>掃碼核銷</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:10px;background:#111;color:#fff;font-weight:700}
.small{font-size:13px;color:#666;margin-top:4px}
.mono{font-family:monospace}
video{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="card">
  <h2>目前核銷設定</h2>
  <div class="small">活動：<span id="eventName" class="mono">-</span></div>
  <div class="small">出入口：<span id="gateName" class="mono">-</span></div>
  <div class="small">人員：<span id="staffEmail" class="mono">-</span></div>
</div>

<div class="card">
  <video id="video" autoplay playsinline></video>
  <button class="btn" id="startBtn">開始掃描</button>
</div>

<div class="card">
  <div id="status">尚未掃描</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "你的",
  authDomain: "你的",
  projectId: "你的"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let assignedEventId = "";
let assignedGate = "";

auth.onAuthStateChanged(async user=>{
  if(!user){
    alert("請先登入");
    location.href="login.html";
    return;
  }

  const uDoc = await db.collection("users").doc(user.uid).get();
  const u = uDoc.data()||{};

  assignedEventId = u.assignedCheckinEventId || "";
  assignedGate = u.assignedCheckinGateName || "";

  if(!assignedEventId || !assignedGate){
    alert("你沒有被指派核銷工作");
    return;
  }

  const eDoc = await db.collection("events").doc(assignedEventId).get();
  const e = eDoc.data()||{};

  document.getElementById("eventName").textContent = e.title || assignedEventId;
  document.getElementById("gateName").textContent = assignedGate;
  document.getElementById("staffEmail").textContent = user.email;
});

document.getElementById("startBtn").onclick = async ()=>{
  const video = document.getElementById("video");
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  const scanner = new BarcodeDetector({formats:["qr_code"]});

  setInterval(async ()=>{
    const barcodes = await scanner.detect(video);
    if(barcodes.length){
      handleScan(barcodes[0].rawValue);
    }
  },800);
};

async function handleScan(code){
  document.getElementById("status").textContent = "掃描："+code;

  const snap = await db.collectionGroup("tickets")
    .where(firebase.firestore.FieldPath.documentId(),"==",code)
    .limit(1)
    .get();

  if(snap.empty){
    document.getElementById("status").textContent="❌ 找不到票";
    return;
  }

  const doc = snap.docs[0];
  const data = doc.data();

  if(data.eventId !== assignedEventId){
    document.getElementById("status").textContent="❌ 活動不符";
    return;
  }

  if(data.checkedIn){
    document.getElementById("status").textContent="⚠️ 已入場";
    return;
  }

  await doc.ref.update({
    checkedIn:true,
    checkedInAt:new Date(),
    checkedInGate:assignedGate
  });

  document.getElementById("status").textContent="✅ 入場成功";
}
</script>
</body>
</html>
