<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>核銷｜掃描入場</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    body { background: #0a0a0a; color: #fff; }
    .wrap { max-width: 540px; padding: 20px 16px; }

    /* Header */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .event-title {
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; gap: 8px; }

    /* Scanner viewport */
    .scanner-frame {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
      aspect-ratio: 1;
      max-height: 360px;
    }
    #reader {
      width: 100% !important;
      height: 100% !important;
    }
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    /* Hide html5-qrcode default UI noise */
    #reader img, #reader__dashboard, #reader__filescan_input { display: none !important; }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-box {
      width: 200px;
      height: 200px;
      border: 3px solid rgba(255,255,255,.8);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.45);
    }
    .scan-line {
      position: absolute;
      top: calc(50% - 97px);
      left: calc(50% - 97px);
      width: 194px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scanLine 1.8s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%   { transform: translateY(0); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(194px); opacity: 0; }
    }

    /* Result flash */
    .result-flash {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    .result-flash.ok   { background: rgba(34,197,94,.35); }
    .result-flash.warn { background: rgba(239,68,68,.35); }
    .result-flash.show { opacity: 1; }

    /* Status bar */
    .status-bar {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      font-size: 14px;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-bar .icon { font-size: 22px; flex-shrink: 0; }
    .status-bar .msg  { flex: 1; line-height: 1.5; }
    .status-bar.ok    { border-color: #166534; background: #052e16; }
    .status-bar.warn  { border-color: #7f1d1d; background: #1c0d0d; }
    .status-bar.info  { border-color: #1e3a5f; background: #0c1f35; }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .stat-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .stat-num   { font-size: 26px; font-weight: 900; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

    /* Scan btn */
    .scan-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .scan-btn-row .btn {
      border-radius: 14px;
      background: #1e1e1e;
      border-color: #333;
      color: #fff;
      height: 52px;
      font-size: 15px;
    }
    .scan-btn-row .btn.active {
      background: #166534;
      border-color: #166534;
    }

    /* Manual input */
    .manual-wrap {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .manual-wrap input {
      flex: 1;
      background: #1a1a1a;
      border-color: #2a2a2a;
      color: #fff;
      border-radius: 14px;
    }
    .manual-wrap input::placeholder { color: #555; }
    .manual-wrap .btn {
      background: #22c55e;
      border-color: #22c55e;
      color: #000;
      font-weight: 900;
      border-radius: 14px;
      padding: 0 20px;
      flex-shrink: 0;
    }

    /* Log */
    .log-section { margin-top: 16px; }
    .log-title {
      font-size: 12px;
      color: #666;
      font-weight: 900;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .log-list { display: grid; gap: 6px; }
    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #111;
      border: 1px solid #222;
      font-size: 13px;
      animation: fadeInDown .15s ease;
    }
    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-4px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .log-item.ok   { border-color: #14532d; }
    .log-item.warn { border-color: #7f1d1d; }
    .log-icon { flex-shrink: 0; font-size: 16px; }
    .log-body { flex: 1; }
    .log-main { font-weight: 900; color: #e5e7eb; }
    .log-sub  { color: #6b7280; font-size: 12px; margin-top: 2px; word-break: break-all; }
    .log-time { font-size: 11px; color: #4b5563; flex-shrink: 0; white-space: nowrap; }

    /* Gate */
    #gate { background: #111; border-color: #222; color: #fff; }
    #gate .sub, #gate .hint { color: #888; }
    #gate input {
      background: #1a1a1a; border-color: #333; color: #fff;
    }
    #gate .btn { background: #1a1a1a; border-color: #333; color: #fff; }
    #gate .btn-primary { background: #22c55e; border-color: #22c55e; color: #000; }

    /* Live dot */
    .live { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:#22c55e; }
    .live-dot {
      width:7px; height:7px; border-radius:50%; background:#22c55e;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="gate" class="card" style="display:none;"></div>

    <div id="app" style="display:none;">

      <!-- Top bar -->
      <div class="top-bar">
        <div class="event-title" id="eventTitle">讀取中…</div>
        <div class="top-actions">
          <span class="live"><span class="live-dot"></span>即時</span>
          <button class="btn btn-sm" style="background:#1a1a1a; border-color:#333; color:#fff; border-radius:10px;" id="logoutBtn">登出</button>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-frame" id="scannerFrame">
        <div id="reader"></div>
        <div class="scan-overlay">
          <div class="scan-box"></div>
          <div class="scan-line" id="scanLine" style="display:none;"></div>
        </div>
        <div class="result-flash" id="resultFlash"></div>
      </div>

      <!-- Status -->
      <div class="status-bar info" id="statusBar">
        <span class="icon">📷</span>
        <span class="msg">按「開始掃描」啟動相機</span>
      </div>

      <!-- Scan controls -->
      <div class="scan-btn-row">
        <button class="btn" id="startBtn">▶ 開始掃描</button>
        <button class="btn" id="stopBtn" disabled>■ 停止</button>
      </div>

      <!-- Manual input (backup) -->
      <div class="manual-wrap">
        <input type="text" id="manualCode" placeholder="或手動輸入訂單 ID"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn" id="manualBtn">核銷</button>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="sTotal">-</div>
          <div class="stat-label">總票數</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:#22c55e;" id="sChecked">-</div>
          <div class="stat-label">已入場</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="sRemain">-</div>
          <div class="stat-label">未入場</div>
        </div>
      </div>

      <!-- Log -->
      <div class="log-section">
        <div class="log-title">本次記錄</div>
        <div class="log-list" id="logList">
          <div style="font-size:13px; color:#444; padding:6px 0;">等待掃描…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
  <script>
    const db = window.db;
    const { esc, norm, pageIn, showGate } = AppUI;

    const gate        = document.getElementById("gate");
    const app         = document.getElementById("app");
    const eventTitleEl= document.getElementById("eventTitle");
    const logoutBtn   = document.getElementById("logoutBtn");
    const startBtn    = document.getElementById("startBtn");
    const stopBtn     = document.getElementById("stopBtn");
    const statusBar   = document.getElementById("statusBar");
    const resultFlash = document.getElementById("resultFlash");
    const scanLine    = document.getElementById("scanLine");
    const manualCode  = document.getElementById("manualCode");
    const manualBtn   = document.getElementById("manualBtn");
    const logListEl   = document.getElementById("logList");

    logoutBtn.onclick = AppAuth.logout;

    let currentUser       = null;
    let myAssignedEventId = "";
    let qr                = null;
    let scanning          = false;
    let busy              = false;
    let logCount          = 0;
    let unsubStats        = null;

    // ── Audio feedback ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    function beep(freq = 880, dur = 120, type = "sine", gain = 0.3) {
      if (!AudioCtx) return;
      try {
        const ctx  = new AudioCtx();
        const osc  = ctx.createOscillator();
        const vol  = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        vol.gain.value = gain;
        osc.connect(vol);
        vol.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + dur / 1000);
        setTimeout(() => ctx.close(), dur + 100);
      } catch (_) {}
    }
    const okBeep   = () => { beep(880, 80); setTimeout(() => beep(1200, 100), 90); };
    const warnBeep = () => { beep(300, 200, "square", 0.15); };

    // ── Flash overlay ──
    let flashTimer = null;
    function flash(type) {
      resultFlash.className = `result-flash ${type} show`;
      resultFlash.textContent = type === "ok" ? "✓" : "✗";
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        resultFlash.className = `result-flash ${type}`;
      }, 500);
    }

    // ── Status bar ──
    function setStatus(type, icon, msg) {
      statusBar.className = `status-bar ${type}`;
      statusBar.innerHTML = `<span class="icon">${icon}</span><span class="msg">${msg}</span>`;
    }

    // ── Log ──
    function pushLog(type, main, sub) {
      if (logCount === 0) logListEl.innerHTML = "";
      logCount++;
      const now  = new Date().toLocaleTimeString("zh-Hant", { hour12: false });
      const icon = type === "ok" ? "✅" : "⚠️";
      const item = document.createElement("div");
      item.className = `log-item ${type}`;
      item.innerHTML = `
        <span class="log-icon">${icon}</span>
        <div class="log-body">
          <div class="log-main">${esc(main)}</div>
          ${sub ? `<div class="log-sub">${esc(sub)}</div>` : ""}
        </div>
        <span class="log-time">${now}</span>
      `;
      logListEl.insertBefore(item, logListEl.firstChild);
      while (logListEl.children.length > 30) logListEl.removeChild(logListEl.lastChild);
    }

    // ── Live stats ──
    function startStats(eventId) {
      if (unsubStats) unsubStats();
      unsubStats = db.collection("events").doc(eventId).collection("orders")
        .onSnapshot(snap => {
          let total = 0, checked = 0;
          snap.forEach(d => {
            total++;
            if ((d.data() || {}).checkedIn === true) checked++;
          });
          document.getElementById("sTotal").textContent   = total;
          document.getElementById("sChecked").textContent = checked;
          document.getElementById("sRemain").textContent  = total - checked;
        }, () => {});
    }

    // ── Core checkin ──
    async function doCheckin(rawCode) {
      const code = norm(rawCode);
      if (!code) return;

      setStatus("info", "⏳", `讀取：${code}`);

      try {
        // Try orders collection first
        const orderRef  = db.collection("events").doc(myAssignedEventId).collection("orders").doc(code);
        const orderSnap = await orderRef.get();

        if (orderSnap.exists) {
          const o = orderSnap.data() || {};
          if (o.checkedIn === true) {
            const atStr = o.checkedInAt
              ? (o.checkedInAt.toDate ? o.checkedInAt.toDate() : new Date(o.checkedInAt))
                  .toLocaleTimeString("zh-Hant", { hour12: false })
              : "未知";
            flash("warn"); warnBeep();
            setStatus("warn", "⚠️", `重複入場（${atStr} 已核銷）`);
            pushLog("warn", "重複入場", `${code} 已於 ${atStr} 入場`);
            return;
          }
          await orderRef.update({
            checkedIn:      true,
            checkedInAt:    new Date(),
            checkedInBy:    currentUser.uid,
            checkedInEmail: currentUser.email || "",
          });
          flash("ok"); okBeep();
          setStatus("ok", "✅", "入場成功！");
          pushLog("ok", "入場成功", `訂單 ${code}`);
          return;
        }

        // Fallback: tickets collectionGroup
        const q = await db.collectionGroup("tickets")
          .where(firebase.firestore.FieldPath.documentId(), "==", code)
          .limit(1).get();

        if (q.empty) {
          flash("warn"); warnBeep();
          setStatus("warn", "❌", "找不到此票券");
          pushLog("warn", "找不到票", code);
          return;
        }

        const tDoc = q.docs[0];
        const t    = tDoc.data() || {};

        if (myAssignedEventId && norm(t.eventId) !== myAssignedEventId) {
          flash("warn"); warnBeep();
          setStatus("warn", "⚠️", "此票不屬於本活動");
          pushLog("warn", "活動不符", code);
          return;
        }
        if (t.checkedIn === true) {
          flash("warn"); warnBeep();
          setStatus("warn", "⚠️", "此票已核銷");
          pushLog("warn", "重複核銷", code);
          return;
        }
        await tDoc.ref.update({
          checkedIn:        true,
          checkedInAt:      new Date(),
          checkedInBy:      currentUser.uid,
          checkedInByEmail: currentUser.email || "",
        });
        flash("ok"); okBeep();
        setStatus("ok", "✅", "入場成功！");
        pushLog("ok", "入場成功（票券）", code);

      } catch (e) {
        console.error(e);
        flash("warn"); warnBeep();
        setStatus("warn", "❌", "核銷失敗：" + (e.message || e));
        pushLog("warn", "核銷失敗", e.message || String(e));
      }
    }

    // ── Scanner ──
    async function startScan() {
      if (scanning) return;
      if (!myAssignedEventId) {
        setStatus("warn", "⚠️", "你尚未被指派活動，請聯絡管理員");
        return;
      }
      setStatus("info", "📷", "啟動相機…");
      try {
        if (!qr) qr = new Html5Qrcode("reader");
        const cameras = await Html5Qrcode.getCameras();
        if (!cameras?.length) {
          setStatus("warn", "❌", "找不到相機，請改用手動輸入");
          return;
        }
        // Prefer back camera
        const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
        scanning = true;
        startBtn.disabled = true; startBtn.classList.add("active");
        stopBtn.disabled  = false;
        scanLine.style.display = "block";

        await qr.start(
          cam.id,
          { fps: 15, qrbox: { width: 220, height: 220 } },
          async decoded => {
            if (busy) return;
            busy = true;
            try { await doCheckin(decoded); }
            finally { setTimeout(() => { busy = false; }, 1000); }
          },
          () => {}
        );
        setStatus("info", "🎯", "對準 QR Code 即可核銷");
      } catch (e) {
        console.error(e);
        scanning = false;
        startBtn.disabled = false; startBtn.classList.remove("active");
        stopBtn.disabled  = true;
        scanLine.style.display = "none";
        setStatus("warn", "❌", "相機啟動失敗，請確認 https 及相機權限");
      }
    }

    async function stopScan() {
      if (!qr || !scanning) return;
      try { await qr.stop(); await qr.clear(); } catch (_) {}
      scanning = false;
      qr = null;
      startBtn.disabled = false; startBtn.classList.remove("active");
      stopBtn.disabled  = true;
      scanLine.style.display = "none";
      setStatus("info", "📷", "已停止掃描");
    }

    startBtn.onclick = startScan;
    stopBtn.onclick  = stopScan;

    manualBtn.onclick = () => { doCheckin(manualCode.value); manualCode.value = ""; };
    manualCode.addEventListener("keydown", e => {
      if (e.key === "Enter") { doCheckin(manualCode.value); manualCode.value = ""; }
    });

    // ── Auth ──
    firebase.auth().onAuthStateChanged(async user => {
      currentUser = user || null;
      if (!user) {
        AppUI.showGate(gate, app, {
          title: "入場核銷",
          msg:   "請先登入帳號以繼續。",
          showEmailLogin: true,
        });
        return;
      }

      try {
        const snap = await db.collection("users").doc(user.uid).get();
        if (!snap.exists) {
          AppUI.showGate(gate, app, { title: "無法進入", msg: "此帳號尚未授權。" });
          return;
        }
        const u = snap.data() || {};
        if (u.enabled !== true) {
          AppUI.showGate(gate, app, { title: "帳號已停用", msg: "請聯絡管理員。" });
          return;
        }
        const role = norm(u.role);
        const VALID_ROLES = ["platform_super","platform_admin","org_super","org_admin","org_staff"];
        if (!VALID_ROLES.includes(role)) {
          AppUI.showGate(gate, app, { title: "權限不足", msg: `角色 "${role}" 無法使用核銷功能。` });
          return;
        }

        myAssignedEventId = norm(u.assignedEventId || "");

        // Load event name
        let evtName = myAssignedEventId || "(未指派活動)";
        if (myAssignedEventId) {
          try {
            const es = await db.collection("events").doc(myAssignedEventId).get();
            if (es.exists) evtName = norm(es.data()?.title || myAssignedEventId);
          } catch (_) {}
          startStats(myAssignedEventId);
        }

        eventTitleEl.textContent = evtName;
        gate.style.display = "none";
        app.style.display  = "block";

        if (!myAssignedEventId) {
          setStatus("warn", "⚠️", "你尚未被指派活動，請聯絡管理員");
        } else {
          setStatus("info", "📷", "按「開始掃描」啟動相機");
        }

      } catch (e) {
        console.error(e);
        AppUI.showGate(gate, app, { title: "載入失敗", msg: e.message || String(e) });
      }
    });
  </script>
</body>
</html>
