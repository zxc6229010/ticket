<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>核銷｜掃描入場</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    #gateWrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: #0a0a0a;
    }

    .gate-inner {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .gate-logo {
      font-size: 44px;
      margin-bottom: 12px;
    }

    .gate-title {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 4px;
    }

    .gate-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .gate-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
      text-align: left;
    }

    .gate-card label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .gate-card input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .15s;
    }

    .gate-card input:focus { border-color: #22c55e; }
    .gate-card input::placeholder { color: #444; }

    #loginBtn {
      width: 100%;
      padding: 13px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }

    #loginBtn:hover { background: #16a34a; }
    #loginBtn:disabled { opacity: .55; cursor: not-allowed; }

    #loginErr {
      font-size: 13px;
      color: #f87171;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    #appWrap { display: none; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .event-title {
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      flex: 1;
      line-height: 1.5;
      min-width: 0;
    }

    .event-title-main {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
      line-height: 1.6;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #22c55e;
      white-space: nowrap;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100%{opacity:1}
      50%{opacity:.3}
    }

    .btn-logout {
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #aaa;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: color .13s, border-color .13s;
    }

    .btn-logout:hover { color: #f87171; border-color: #7f1d1d; }

    .scanner-frame {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      aspect-ratio: 1;
      max-height: 340px;
    }

    #reader { width: 100% !important; height: 100% !important; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    #reader img, #reader__dashboard, #reader__filescan_input { display: none !important; }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-box {
      width: 190px;
      height: 190px;
      border: 3px solid rgba(255,255,255,.75);
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.5);
    }

    .scan-line {
      position: absolute;
      top: calc(50% - 93px);
      left: calc(50% - 93px);
      width: 186px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scanLine 1.8s ease-in-out infinite;
    }

    @keyframes scanLine {
      0%   { transform: translateY(0); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(186px); opacity: 0; }
    }

    .result-flash {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .12s ease;
    }

    .result-flash.ok   { background: rgba(34,197,94,.3); }
    .result-flash.warn { background: rgba(239,68,68,.3); }
    .result-flash.show { opacity: 1; }

    .status-bar {
      margin-top: 10px;
      padding: 12px 15px;
      border-radius: 12px;
      background: #111;
      border: 1px solid #222;
      font-size: 14px;
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-bar .icon { font-size: 20px; flex-shrink: 0; }
    .status-bar .msg  { flex: 1; line-height: 1.5; }
    .status-bar.ok   { border-color: #166534; background: #052e16; }
    .status-bar.warn { border-color: #7f1d1d; background: #1c0d0d; }
    .status-bar.info { border-color: #1e3a5f; background: #0c1f35; }

    .scan-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-scan {
      height: 50px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .13s, color .13s;
    }

    .btn-scan:hover:not(:disabled) { background: #222; color: #fff; }
    .btn-scan.active { background: #14532d; border-color: #166534; color: #4ade80; }
    .btn-scan:disabled { opacity: .4; cursor: not-allowed; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .stat-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-num { font-size: 28px; font-weight: 900; color: #fff; }
    .stat-num.green { color: #22c55e; }
    .stat-label { font-size: 11px; color: #555; margin-top: 3px; }

    .ticket-card {
      margin-top: 10px;
      padding: 14px;
      border-radius: 14px;
      background: #111;
      border: 1px solid #222;
    }

    .ticket-card-title {
      font-size: 12px;
      color: #9ca3af;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px 10px;
    }

    .ticket-k {
      color: #6b7280;
      font-size: 12px;
      line-height: 1.6;
    }

    .ticket-v {
      color: #f3f4f6;
      font-size: 13px;
      line-height: 1.7;
      font-weight: 800;
      word-break: break-word;
    }

    .schedule-box {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #111;
      border: 1px solid #222;
    }

    .schedule-title {
      font-size: 12px;
      color: #9ca3af;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .schedule-item {
      padding: 8px 0;
      border-top: 1px dashed #232323;
      font-size: 13px;
      line-height: 1.6;
    }

    .schedule-item:first-child {
      border-top: none;
      padding-top: 0;
    }

    .schedule-main {
      color: #e5e7eb;
      font-weight: 700;
    }

    .schedule-sub {
      color: #6b7280;
      font-size: 12px;
      margin-top: 2px;
    }

    .log-section { margin-top: 14px; }

    .log-title {
      font-size: 11px;
      color: #444;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .log-list { display: grid; gap: 5px; }

    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 9px;
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      font-size: 13px;
      animation: fadeInDown .13s ease;
    }

    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-3px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .log-item.ok   { border-color: #14532d; }
    .log-item.warn { border-color: #450a0a; }
    .log-icon  { flex-shrink: 0; font-size: 15px; }
    .log-body  { flex: 1; min-width: 0; }
    .log-main  { font-weight: 700; color: #d1d5db; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-sub   { color: #4b5563; font-size: 11px; margin-top: 2px; word-break: break-all; }
    .log-time  { font-size: 11px; color: #374151; flex-shrink: 0; white-space: nowrap; }

    .empty-note {
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div id="gateWrap">
    <div class="gate-inner">
      <div class="gate-logo">🎤</div>
      <div class="gate-title">核銷入場系統</div>
      <div class="gate-sub">請使用後台帳號登入</div>
      <div class="gate-card">
        <label for="loginEmail">帳號</label>
        <input id="loginEmail" type="email" placeholder="輸入 Email" autocomplete="username" />
        <label for="loginPassword">密碼</label>
        <input id="loginPassword" type="password" placeholder="輸入密碼" autocomplete="current-password" />
        <button id="loginBtn">登入</button>
        <div id="loginErr"></div>
      </div>
    </div>
  </div>

  <div id="appWrap">
    <div class="wrap">

      <div class="top-bar">
        <div class="event-title">
          <div class="event-title-main" id="eventTitle">載入中…</div>
          <div class="event-sub" id="eventSub">入口：<span id="gateName">未設定</span></div>
        </div>
        <div class="top-actions">
          <span class="live"><span class="live-dot"></span>即時</span>
          <button class="btn-logout" id="logoutBtn">登出</button>
        </div>
      </div>

      <div class="scanner-frame">
        <div id="reader"></div>
        <div class="scan-overlay">
          <div class="scan-box"></div>
          <div class="scan-line" id="scanLine" style="display:none;"></div>
        </div>
        <div class="result-flash" id="resultFlash"></div>
      </div>

      <div class="status-bar info" id="statusBar">
        <span class="icon">📷</span>
        <span class="msg">按「開始掃描」啟動相機，只能掃描票券條碼</span>
      </div>

      <div class="scan-btn-row">
        <button class="btn-scan" id="startBtn">▶ 開始掃描</button>
        <button class="btn-scan" id="stopBtn" disabled>■ 停止</button>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="sTotal">–</div>
          <div class="stat-label">總票數</div>
        </div>
        <div class="stat-box">
          <div class="stat-num green" id="sChecked">–</div>
          <div class="stat-label">已入場</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="sRemain">–</div>
          <div class="stat-label">未入場</div>
        </div>
      </div>

      <div class="ticket-card" id="ticketInfoCard">
        <div class="ticket-card-title">最近一次掃描資訊</div>
        <div id="ticketInfoBody" class="empty-note">尚未掃描票券</div>
      </div>

      <div class="schedule-box">
        <div class="schedule-title">今日相關活動</div>
        <div id="scheduleList">
          <div class="empty-note">載入中…</div>
        </div>
      </div>

      <div class="log-section">
        <div class="log-title">本次記錄</div>
        <div class="log-list" id="logList">
          <div style="font-size:13px;color:#333;padding:4px 0;">等待掃描…</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
        authDomain:        "concert-1ff7e.firebaseapp.com",
        projectId:         "concert-1ff7e",
        storageBucket:     "concert-1ff7e.firebasestorage.app",
        messagingSenderId: "704757384914",
        appId:             "1:704757384914:web:9f58e4085dd71180c5cf0b"
      });
    }

    const auth = firebase.auth();
    const db   = firebase.firestore();

    const esc  = s => String(s ?? "").replace(/[&<>"']/g,
      m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const norm = s => String(s ?? "").trim();

    const gateWrap       = document.getElementById("gateWrap");
    const appWrap        = document.getElementById("appWrap");
    const loginEmail     = document.getElementById("loginEmail");
    const loginPw        = document.getElementById("loginPassword");
    const loginBtn       = document.getElementById("loginBtn");
    const loginErr       = document.getElementById("loginErr");
    const logoutBtn      = document.getElementById("logoutBtn");
    const eventTitleEl   = document.getElementById("eventTitle");
    const gateNameEl     = document.getElementById("gateName");
    const eventSubEl     = document.getElementById("eventSub");
    const statusBar      = document.getElementById("statusBar");
    const resultFlash    = document.getElementById("resultFlash");
    const scanLine       = document.getElementById("scanLine");
    const startBtn       = document.getElementById("startBtn");
    const stopBtn        = document.getElementById("stopBtn");
    const logListEl      = document.getElementById("logList");
    const sTotalEl       = document.getElementById("sTotal");
    const sCheckedEl     = document.getElementById("sChecked");
    const sRemainEl      = document.getElementById("sRemain");
    const scheduleList   = document.getElementById("scheduleList");
    const ticketInfoBody = document.getElementById("ticketInfoBody");

    let currentUser = null;
    let currentSelectedAssignment = null;
    let currentEventData = null;
    let qr = null;
    let scanning = false;
    let busy = false;
    let logCount = 0;
    let unsubStats = null;
    let myAssignments = [];

    function showGate() {
      gateWrap.style.display = "flex";
      appWrap.style.display  = "none";
      loginBtn.disabled      = false;
      loginBtn.textContent   = "登入";
      loginErr.style.display = "none";
    }

    function showApp() {
      gateWrap.style.display = "none";
      appWrap.style.display  = "block";
    }

    function setTicketInfoEmpty(text = "尚未掃描票券") {
      ticketInfoBody.innerHTML = `<div class="empty-note">${esc(text)}</div>`;
    }

    function setTicketInfo(data = {}) {
      ticketInfoBody.innerHTML = `
        <div class="ticket-grid">
          <div class="ticket-k">活動</div>
          <div class="ticket-v">${esc(data.eventTitle || "-")}</div>

          <div class="ticket-k">票券 ID</div>
          <div class="ticket-v">${esc(data.ticketId || "-")}</div>

          <div class="ticket-k">票種</div>
          <div class="ticket-v">${esc(data.ticketTypeName || "-")}</div>

          <div class="ticket-k">座位</div>
          <div class="ticket-v">${esc(data.seatLabel || "-")}</div>

          <div class="ticket-k">持票者</div>
          <div class="ticket-v">${esc(data.email || "-")}</div>

          <div class="ticket-k">狀態</div>
          <div class="ticket-v">${esc(data.statusText || "-")}</div>

          <div class="ticket-k">入口</div>
          <div class="ticket-v">${esc(data.gateName || "-")}</div>
        </div>
      `;
    }

    async function doLogin() {
      const email = norm(loginEmail.value);
      const password = loginPw.value;
      loginErr.style.display = "none";

      if (!email || !password) {
        loginErr.textContent = "請輸入帳號與密碼";
        loginErr.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "登入中…";

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (e) {
        loginErr.textContent = "帳號或密碼錯誤，請再試一次";
        loginErr.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.textContent = "登入";
      }
    }

    loginBtn.onclick = doLogin;
    loginEmail.addEventListener("keydown", e => { if (e.key === "Enter") loginPw.focus(); });
    loginPw.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    logoutBtn.onclick = async () => {
      try { await auth.signOut(); } catch (_) {}
    };

    const AC = window.AudioContext || window.webkitAudioContext;
    function beep(freq = 880, dur = 120, type = "sine", gain = 0.3) {
      if (!AC) return;
      try {
        const ctx = new AC();
        const osc = ctx.createOscillator();
        const vol = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        vol.gain.value = gain;
        osc.connect(vol);
        vol.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + dur / 1000);
        setTimeout(() => ctx.close(), dur + 100);
      } catch (_) {}
    }

    const okBeep   = () => { beep(880, 80); setTimeout(() => beep(1200, 100), 90); };
    const warnBeep = () => { beep(300, 200, "square", 0.15); };

    let flashTimer = null;
    function flash(type) {
      resultFlash.className = `result-flash ${type} show`;
      resultFlash.textContent = type === "ok" ? "✓" : "✗";
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        resultFlash.className = `result-flash ${type}`;
      }, 500);
    }

    function setStatus(type, icon, msg) {
      statusBar.className = `status-bar ${type}`;
      statusBar.innerHTML = `<span class="icon">${icon}</span><span class="msg">${esc(msg)}</span>`;
    }

    function pushLog(type, main, sub) {
      if (logCount === 0) logListEl.innerHTML = "";
      logCount++;
      const now = new Date().toLocaleTimeString("zh-Hant", { hour12: false });
      const icon = type === "ok" ? "✅" : "⚠️";
      const item = document.createElement("div");
      item.className = `log-item ${type}`;
      item.innerHTML = `
        <span class="log-icon">${icon}</span>
        <div class="log-body">
          <div class="log-main">${esc(main)}</div>
          ${sub ? `<div class="log-sub">${esc(sub)}</div>` : ""}
        </div>
        <span class="log-time">${now}</span>
      `;
      logListEl.insertBefore(item, logListEl.firstChild);
      while (logListEl.children.length > 30) logListEl.removeChild(logListEl.lastChild);
    }

    function toMillis(ts) {
      if (!ts) return null;
      if (typeof ts.toDate === "function") return ts.toDate().getTime();
      if (ts instanceof Date) return ts.getTime();
      const d = new Date(ts);
      return isNaN(d.getTime()) ? null : d.getTime();
    }

    function formatDateTime(ts) {
      const ms = toMillis(ts);
      if (!ms) return "-";
      return new Date(ms).toLocaleString("zh-Hant", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function formatTime(ts) {
      const ms = toMillis(ts);
      if (!ms) return "-";
      return new Date(ms).toLocaleTimeString("zh-Hant", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function isTodayTs(ts) {
      const ms = toMillis(ts);
      if (!ms) return false;
      const d = new Date(ms);
      const now = new Date();
      return d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
    }

    function getEventTimeState(eventData) {
      const now = Date.now();
      const startMs = toMillis(eventData?.eventStartAt);
      const endMs = toMillis(eventData?.eventEndAt);

      if (!startMs || !endMs) {
        return {
          state: "invalid",
          ok: false,
          reason: "活動時間未設定完整，暫時無法核銷"
        };
      }

      if (now < startMs) {
        return {
          state: "upcoming",
          ok: false,
          reason: "活動尚未開始，目前不可核銷"
        };
      }

      if (now > endMs) {
        return {
          state: "ended",
          ok: false,
          reason: "活動已結束，目前不可核銷"
        };
      }

      return {
        state: "active",
        ok: true,
        reason: ""
      };
    }

    function parseTicketPayload(raw) {
      const code = norm(raw);
      if (!code) return { eventId: "", ticketId: "" };

      if (code.includes("::")) {
        const [eventId, ticketId] = code.split("::");
        return {
          eventId: norm(eventId),
          ticketId: norm(ticketId)
        };
      }

      if (/^https?:\/\//i.test(code)) {
        try {
          const url = new URL(code);
          return {
            eventId: norm(url.searchParams.get("eventId") || ""),
            ticketId: norm(
              url.searchParams.get("ticketId") ||
              url.searchParams.get("id") ||
              url.pathname.split("/").pop()
            )
          };
        } catch (_) {}
      }

      return {
        eventId: "",
        ticketId: code.replace(/^ticket[:#-]?/i, "").trim()
      };
    }

    function getTicketStatusText(t) {
      const status = norm(t.status || "").toLowerCase();
      const checkedIn = t.checkedIn === true || norm(t.checkinStatus || "").toLowerCase() === "checked_in";

      if (checkedIn) return "已核銷";
      if (status === "valid" || !status) return "可入場";
      if (status === "cancelled") return "已取消";
      if (status === "void") return "已作廢";
      if (status === "refunded") return "已退款";
      return status || "-";
    }

    function isTicketCheckedIn(t) {
      return t.checkedIn === true || norm(t.checkinStatus || "").toLowerCase() === "checked_in";
    }

    function isTicketValid(t) {
      const status = norm(t.status || "valid").toLowerCase();
      return status === "valid";
    }

    function startStats(eventId) {
      if (unsubStats) unsubStats();

      unsubStats = db.collection("events").doc(eventId).collection("tickets")
        .onSnapshot(snap => {
          let total = 0;
          let checked = 0;

          snap.forEach(d => {
            total++;
            const data = d.data() || {};
            if (data.checkedIn === true || norm(data.checkinStatus || "").toLowerCase() === "checked_in") checked++;
          });

          sTotalEl.textContent = total;
          sCheckedEl.textContent = checked;
          sRemainEl.textContent = total - checked;
        }, err => {
          console.warn("stats error:", err);
          sTotalEl.textContent = "–";
          sCheckedEl.textContent = "–";
          sRemainEl.textContent = "–";
        });
    }

    async function getMyCheckinAssignments(uid) {
      const eventsSnap = await db.collection("events").get();
      const rows = [];

      for (const eventDoc of eventsSnap.docs) {
        const eventId = eventDoc.id;
        const eventData = eventDoc.data() || {};

        try {
          const staffDoc = await db.collection("events")
            .doc(eventId)
            .collection("staffAssignments")
            .doc(uid)
            .get();

          if (!staffDoc.exists) continue;

          const a = staffDoc.data() || {};
          const canCheckin =
            a?.permissions?.canCheckin === true ||
            norm(a.roleInEvent) === "checkin" ||
            norm(a.roleInEvent) === "manager";

          if (!canCheckin) continue;

          rows.push({
            eventId,
            eventData,
            ...a
          });
        } catch (_) {}
      }

      return rows;
    }

    function pickBestAssignment(assignments) {
      if (!assignments.length) return null;

      const todayOnly = assignments.filter(a => isTodayTs(a.eventData?.eventStartAt));
      const rows = todayOnly.length ? todayOnly : assignments.slice();

      rows.sort((a, b) => {
        const ta = toMillis(a.eventData?.eventStartAt) || 0;
        const tb = toMillis(b.eventData?.eventStartAt) || 0;
        return ta - tb;
      });

      const active = rows.find(a => getEventTimeState(a.eventData).state === "active");
      if (active) return active;

      const upcoming = rows.find(a => getEventTimeState(a.eventData).state === "upcoming");
      if (upcoming) return upcoming;

      return rows[rows.length - 1];
    }

    function renderSchedule(assignments) {
      if (!assignments.length) {
        scheduleList.innerHTML = `<div class="schedule-item"><div class="schedule-main">今天沒有可核銷活動</div><div class="schedule-sub">若你未被指派任何活動，也會顯示在這裡。</div></div>`;
        return;
      }

      const todayOnly = assignments.filter(a => isTodayTs(a.eventData?.eventStartAt));
      const rows = todayOnly.length ? todayOnly : assignments.slice();

      rows.sort((a, b) => {
        const ta = toMillis(a.eventData?.eventStartAt) || 0;
        const tb = toMillis(b.eventData?.eventStartAt) || 0;
        return ta - tb;
      });

      scheduleList.innerHTML = rows.map(a => {
        const state = getEventTimeState(a.eventData);
        let label = "活動資訊";
        if (state.state === "active") label = "目前可核銷";
        if (state.state === "upcoming") label = "尚未開始";
        if (state.state === "ended") label = "已結束";
        if (state.state === "invalid") label = "時間未設定";

        return `
          <div class="schedule-item">
            <div class="schedule-main">${esc(a.eventData?.title || a.eventId)}｜${esc(label)}</div>
            <div class="schedule-sub">
              ${esc(formatTime(a.eventData?.eventStartAt))} - ${esc(formatTime(a.eventData?.eventEndAt))}
              ｜入口：${esc(a.gateName || "未指定")}
              ｜身份：${esc(a.roleInEvent || "-")}
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadSelectedAssignmentInfo() {
      currentEventData = currentSelectedAssignment?.eventData || null;

      if (!currentSelectedAssignment) {
        eventTitleEl.textContent = "沒有可用活動";
        gateNameEl.textContent = "未設定";
        eventSubEl.innerHTML = `入口：<span id="gateName">未設定</span>`;
        sTotalEl.textContent = "–";
        sCheckedEl.textContent = "–";
        sRemainEl.textContent = "–";
        setTicketInfoEmpty("目前沒有可核銷的活動指派");
        setStatus("warn", "⚠️", "目前沒有可核銷的活動指派");
        return;
      }

      const eventTitle = norm(currentEventData?.title || currentSelectedAssignment.eventId || "未命名活動");
      const gateName = norm(currentSelectedAssignment.gateName || "");
      const roleInEvent = norm(currentSelectedAssignment.roleInEvent || "");

      eventTitleEl.textContent = eventTitle;
      gateNameEl.textContent = gateName || "未設定";
      eventSubEl.innerHTML = `
        入口：<span id="gateName">${esc(gateName || "未設定")}</span>
        ｜身份：<span class="mono">${esc(roleInEvent || "-")}</span>
        ｜時間：<span class="mono">${esc(formatTime(currentEventData?.eventStartAt))} - ${esc(formatTime(currentEventData?.eventEndAt))}</span>
      `;

      startStats(currentSelectedAssignment.eventId);
      setTicketInfoEmpty("尚未掃描票券");

      const timeState = getEventTimeState(currentEventData);
      if (!timeState.ok) {
        setStatus("warn", "⏰", timeState.reason);
      } else {
        setStatus("info", "📷", `按「開始掃描」啟動相機，只能掃描票券條碼${gateName ? `｜目前入口：${gateName}` : ""}`);
      }
    }

    async function doCheckin(rawCode) {
      const parsed = parseTicketPayload(rawCode);
      const ticketId = norm(parsed.ticketId);
      const codePreview = norm(rawCode);

      if (!ticketId) return;

      setStatus("info", "⏳", `讀取票券：${ticketId}`);

      try {
        if (!currentSelectedAssignment) {
          flash("warn");
          warnBeep();
          setTicketInfoEmpty("目前沒有可核銷的活動指派");
          setStatus("warn", "⚠️", "目前沒有可核銷的活動指派");
          pushLog("warn", "未被指派可核銷活動", codePreview);
          return;
        }

        const timeState = getEventTimeState(currentEventData);
        if (!timeState.ok) {
          flash("warn");
          warnBeep();
          setTicketInfoEmpty(timeState.reason);
          setStatus("warn", "⏰", timeState.reason);
          pushLog("warn", "目前不可核銷", timeState.reason);
          return;
        }

        const assignedEventId = currentSelectedAssignment.eventId;
        const gateName = norm(currentSelectedAssignment.gateName || "");

        if (parsed.eventId && parsed.eventId !== assignedEventId) {
          flash("warn");
          warnBeep();
          setTicketInfo({
            eventTitle: parsed.eventId,
            ticketId,
            ticketTypeName: "-",
            seatLabel: "-",
            email: "-",
            statusText: "非本活動票券",
            gateName
          });
          setStatus("warn", "❌", "此票券不屬於目前核銷活動");
          pushLog("warn", "非本活動票券", `${parsed.eventId}｜${ticketId}`);
          return;
        }

        const ticketRef = db
          .collection("events")
          .doc(assignedEventId)
          .collection("tickets")
          .doc(ticketId);

        const ticketDoc = await ticketRef.get();

        if (!ticketDoc.exists) {
          flash("warn");
          warnBeep();
          setTicketInfo({
            eventTitle: currentEventData?.title || assignedEventId,
            ticketId,
            ticketTypeName: "-",
            seatLabel: "-",
            email: "-",
            statusText: "找不到票券",
            gateName
          });
          setStatus("warn", "❌", "找不到此票券");
          pushLog("warn", "找不到票券", ticketId);
          return;
        }

        const t = ticketDoc.data() || {};
        const checkedIn = isTicketCheckedIn(t);
        const valid = isTicketValid(t);

        setTicketInfo({
          eventTitle: t.eventTitle || currentEventData?.title || assignedEventId,
          ticketId: ticketDoc.id,
          ticketTypeName: t.ticketTypeName || "-",
          seatLabel: t.seatLabel || "-",
          email: t.email || "-",
          statusText: getTicketStatusText(t),
          gateName
        });

        if (!valid) {
          flash("warn");
          warnBeep();
          setStatus("warn", "❌", `此票券狀態不可入場（${getTicketStatusText(t)}）`);
          pushLog("warn", "票券不可入場", `${ticketId}｜${getTicketStatusText(t)}`);
          return;
        }

        if (checkedIn) {
          const atStr = t.checkedInAt ? formatDateTime(t.checkedInAt) : "未知時間";
          const oldGate = norm(t.checkedInGate || "未記錄入口");

          flash("warn");
          warnBeep();
          setStatus("warn", "⚠️", `重複入場｜${oldGate}｜${atStr}`);
          pushLog("warn", "重複核銷", `${ticketId}｜${oldGate}｜${atStr}`);
          return;
        }

        await ticketRef.update({
          checkedIn: true,
          checkinStatus: "checked_in",
          checkedInAt: new Date(),
          checkedInBy: currentUser.uid,
          checkedInByUid: currentUser.uid,
          checkedInByEmail: currentUser.email || "",
          checkedInGate: gateName || "",
          checkedInEventId: assignedEventId || "",
          updatedAt: new Date()
        });

        try {
          await db.collection("events")
            .doc(assignedEventId)
            .collection("scanLogs")
            .add({
              ticketId,
              qrRaw: codePreview,
              checkedInAt: new Date(),
              checkedInBy: currentUser.uid,
              checkedInByUid: currentUser.uid,
              checkedInByEmail: currentUser.email || "",
              checkedInGate: gateName || "",
              checkedInEventId: assignedEventId || "",
              result: "success",
              ticketTypeName: t.ticketTypeName || "",
              seatLabel: t.seatLabel || "",
              email: t.email || ""
            });
        } catch (logErr) {
          console.warn("scanLogs write failed:", logErr);
        }

        flash("ok");
        okBeep();
        setTicketInfo({
          eventTitle: t.eventTitle || currentEventData?.title || assignedEventId,
          ticketId,
          ticketTypeName: t.ticketTypeName || "-",
          seatLabel: t.seatLabel || "-",
          email: t.email || "-",
          statusText: "核銷成功",
          gateName
        });
        setStatus("ok", "✅", `入場成功${gateName ? `｜${gateName}` : ""}`);
        pushLog("ok", "入場成功", `${ticketId}｜${t.ticketTypeName || "-"}｜${t.seatLabel || "-"}`);

      } catch (e) {
        console.error(e);
        flash("warn");
        warnBeep();

        const msg = String(e.message || e || "");
        setTicketInfoEmpty(msg || "核銷失敗");
        if (/permission|insufficient/i.test(msg)) {
          setStatus("warn", "❌", "目前沒有核銷權限，或不在可核銷時間內");
          pushLog("warn", "核銷被拒絕", msg);
        } else {
          setStatus("warn", "❌", "核銷失敗：" + msg);
          pushLog("warn", "核銷失敗", msg);
        }
      }
    }

    async function startScan() {
      if (scanning) return;

      if (!currentSelectedAssignment) {
        setStatus("warn", "⚠️", "目前沒有可核銷的活動指派");
        return;
      }

      const timeState = getEventTimeState(currentEventData);
      if (!timeState.ok) {
        setStatus("warn", "⏰", timeState.reason);
        return;
      }

      setStatus("info", "📷", "啟動相機…");

      try {
        if (!qr) qr = new Html5Qrcode("reader");

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras?.length) {
          setStatus("warn", "❌", "找不到相機，請確認相機權限");
          return;
        }

        const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];

        scanning = true;
        startBtn.disabled = true;
        startBtn.classList.add("active");
        stopBtn.disabled = false;
        scanLine.style.display = "block";

        await qr.start(
          cam.id,
          { fps: 15, qrbox: { width: 200, height: 200 } },
          async decoded => {
            if (busy) return;
            busy = true;
            try {
              await doCheckin(decoded);
            } finally {
              setTimeout(() => { busy = false; }, 1200);
            }
          },
          () => {}
        );

        setStatus("info", "🎯", "對準票券 QR Code 即可核銷");
      } catch (e) {
        console.error(e);
        scanning = false;
        startBtn.disabled = false;
        startBtn.classList.remove("active");
        stopBtn.disabled = true;
        scanLine.style.display = "none";
        setStatus("warn", "❌", "相機啟動失敗，請確認已授予相機權限且使用 HTTPS");
      }
    }

    async function stopScan() {
      if (!qr || !scanning) return;
      try {
        await qr.stop();
        await qr.clear();
      } catch (_) {}
      qr = null;
      scanning = false;
      startBtn.disabled = false;
      startBtn.classList.remove("active");
      stopBtn.disabled = true;
      scanLine.style.display = "none";

      if (currentEventData) {
        const timeState = getEventTimeState(currentEventData);
        if (!timeState.ok) {
          setStatus("warn", "⏰", timeState.reason);
        } else {
          setStatus("info", "📷", "已停止掃描");
        }
      } else {
        setStatus("info", "📷", "已停止掃描");
      }
    }

    startBtn.onclick = startScan;
    stopBtn.onclick  = stopScan;

    auth.onAuthStateChanged(async user => {
      currentUser = user || null;

      if (!user) {
        if (unsubStats) {
          unsubStats();
          unsubStats = null;
        }
        await stopScan();
        myAssignments = [];
        currentSelectedAssignment = null;
        currentEventData = null;
        setTicketInfoEmpty("尚未登入");
        showGate();
        return;
      }

      try {
        const snap = await db.collection("users").doc(user.uid).get();

        if (!snap.exists) {
          showGate();
          loginErr.textContent = "此帳號尚未被授權，請聯絡管理員。";
          loginErr.style.display = "block";
          await auth.signOut();
          return;
        }

        const u = snap.data() || {};
        const role = norm(u.role);
        const VALID = ["platform_super", "platform_admin", "org_super", "org_admin", "org_staff"];

        if (u.enabled !== true) {
          showGate();
          loginErr.textContent = "此帳號已被停用，請聯絡管理員。";
          loginErr.style.display = "block";
          await auth.signOut();
          return;
        }

        if (!VALID.includes(role)) {
          showGate();
          loginErr.textContent = `角色「${role}」沒有後台登入資格。`;
          loginErr.style.display = "block";
          await auth.signOut();
          return;
        }

        myAssignments = await getMyCheckinAssignments(user.uid);
        currentSelectedAssignment = pickBestAssignment(myAssignments);

        renderSchedule(myAssignments);
        await loadSelectedAssignmentInfo();
        showApp();

        if (!currentSelectedAssignment) {
          setStatus("warn", "⚠️", "今天沒有可核銷活動，或你尚未被指派可核銷身份");
        } else {
          const ts = getEventTimeState(currentEventData);
          if (!ts.ok) {
            setStatus("warn", "⏰", ts.reason);
          }
        }

      } catch (e) {
        console.error(e);
        showGate();
        loginErr.textContent = "讀取失敗：" + (e.message || e);
        loginErr.style.display = "block";
      }
    });
  </script>
</body>
