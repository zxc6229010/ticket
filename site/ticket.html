<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Event Details</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --white:#ffffff;
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --radius-xl:34px;
      --radius-lg:26px;
      --radius-md:20px;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:26px 22px 88px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0, 1.05fr) minmax(360px, .95fr);
      gap:22px;
      align-items:stretch;
    }

    @media (max-width:980px){
      .hero{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .poster{
      position:relative;
      min-height:560px;
      background:linear-gradient(180deg,#f2f2f4 0%, #ececef 100%);
    }

    @media (max-width:980px){
      .poster{
        min-height:360px;
      }
    }

    .poster img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .poster-placeholder{
      width:100%;
      height:100%;
      min-height:560px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:800;
      color:#9ca3af;
      background:linear-gradient(180deg,#f3f4f6 0%, #e5e7eb 100%);
    }

    @media (max-width:980px){
      .poster-placeholder{
        min-height:360px;
      }
    }

    .poster-badge{
      position:absolute;
      left:20px;
      top:20px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.06);
      color:#111;
      font-size:12px;
      font-weight:800;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow-soft);
    }

    .hero-info{
      padding:28px 28px 30px;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:6px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:var(--shadow-soft);
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      width:max-content;
    }

    .title{
      margin:18px 0 0;
      font-size:clamp(34px, 5vw, 58px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .subtitle{
      margin-top:16px;
      font-size:17px;
      line-height:1.85;
      color:var(--muted);
      max-width:720px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:22px;
    }

    @media (max-width:640px){
      .meta-grid{
        grid-template-columns:1fr;
      }
    }

    .meta-card{
      border:1px solid var(--line);
      border-radius:22px;
      background:#fbfbfc;
      padding:16px 16px;
    }

    .meta-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .meta-value{
      font-size:15px;
      line-height:1.75;
      font-weight:700;
      color:#111;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      width:max-content;
      margin-top:18px;
      border:1px solid transparent;
    }

    .status-chip.selling{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.08);
    }

    .status-chip.upcoming{
      background:var(--orange-bg);
      color:var(--orange);
      border-color:rgba(194,65,12,.08);
    }

    .status-chip.ended{
      background:var(--red-bg);
      color:var(--red);
      border-color:rgba(185,28,28,.08);
    }

    .status-chip.hidden{
      background:#f3f4f6;
      color:#4b5563;
      border-color:rgba(0,0,0,.05);
    }

    .info-note{
      margin-top:16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .section{
      margin-top:56px;
    }

    .section-title{
      margin:0;
      font-size:clamp(28px, 4vw, 42px);
      line-height:1.08;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .section-sub{
      margin-top:10px;
      font-size:15px;
      line-height:1.85;
      color:var(--muted);
      max-width:760px;
      white-space:pre-wrap;
    }

    .cta-wrap{
      margin-top:22px;
      display:grid;
      grid-template-columns:minmax(0,1fr) 360px;
      gap:22px;
      align-items:start;
    }

    @media (max-width:980px){
      .cta-wrap{
        grid-template-columns:1fr;
      }
    }

    .content-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      box-shadow:var(--shadow-soft);
      padding:26px 24px;
    }

    .content-text{
      font-size:15px;
      line-height:2;
      color:#4b5563;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .buy-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:22px 20px;
      position:sticky;
      top:82px;
    }

    @media (max-width:980px){
      .buy-card{
        position:static;
      }
    }

    .buy-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .buy-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
      white-space:pre-wrap;
    }

    .summary{
      margin-top:18px;
      border-top:1px solid rgba(0,0,0,.08);
      padding-top:16px;
      display:grid;
      gap:10px;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      color:var(--muted);
      line-height:1.8;
    }

    .summary-row strong{
      color:#111;
      text-align:right;
    }

    .notice{
      margin-top:16px;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.06);
      color:var(--muted);
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .loading,
    .empty{
      padding:42px 0;
      text-align:center;
      font-size:15px;
      color:var(--muted);
      line-height:1.9;
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:900px){
      .footer{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero-info{
        padding:22px 20px 24px;
      }
    }
  </style>
</head>
<body>

      <div class="nav">

              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a class="back-link" href="index.html">← 返回首頁</a>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>

        </div>

        <div>
          <div class="footer-title">Support</div>
          <a class="footer-link" href="member.html">基本資料</a>
          <a class="footer-link" href="campus-verify.html">校園驗證</a>
        </div>

        <div>
          <div class="footer-title">About</div>
          <a class="footer-link" href="index.html">Passium</a>
          <a class="footer-link" href="dashboard.html">管理後台</a>

      <div class="bottom-note">
        票種、資格限制、入場方式與座位圖是否啟用，皆依各活動設定為準。
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const accountBtn = document.getElementById("accountBtn");
    const params = new URLSearchParams(location.search);
    const eventId = String(params.get("id") || "").trim();

    let currentUser = null;
    let currentEvent = null;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input.toDate === "function") return input.toDate();
      const d = new Date(input);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "日期未定";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden" };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended" };
      return { text:"受理中", key:"selling" };
    }

    function getEventDescription(event){
      return norm(
        event.summary ||
        event.subtitle ||
        event.description ||
        event.shortDescription ||
        ""
      );
    }

    function getEventDetailText(event){
      return norm(
        event.longDescription ||
        event.content ||
        event.details ||
        event.description ||
        ""
      );
    }

    function getEventVenue(event){
      return norm(
        event.venueName ||
        event.location ||
        event.place ||
        event.eventLocation ||
        ""
      );
    }

    function getEventImage(event){
      return norm(
        event.coverImage ||
        event.image ||
        event.bannerImage ||
        event.posterImage ||
        event.thumbnail ||
        ""
      );
    }

    function getTicketTypes(event){
      const raw = Array.isArray(event.ticketTypes) ? event.ticketTypes : [];
      if (raw.length) {
        return raw
          .map((item, index) => ({
            id: norm(item.id || `ticket_${index + 1}`),
            name: norm(item.name || `票種 ${index + 1}`),
            price: Number(item.price || 0),
            description: norm(item.description || ""),
            enabled: item.enabled !== false,
            maxPerUser: Number(item.maxPerUser || 0)
          }))
          .filter(item => item.enabled !== false);
      }

      return [{
        id:"general",
        name:"一般報名",
        price:0,
        description:"此活動目前未細分票種，將以一般報名方式繼續。",
        enabled:true,
        maxPerUser:0
      }];
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      return snap.exists() ? { id: snap.id, ...(snap.data() || {}) } : null;
    }

    function canProceedToPurchase(event){
      return getEventStatus(event).key === "selling";
    }

    function buildNextPurchaseUrl(event){
      const types = getTicketTypes(event);
      const firstType = types[0] || { id:"general" };
      const quantity = 1;
      const seatMapEnabled = event.seatMapEnabled === true;

      const url = new URL(
        seatMapEnabled ? "seat-picker.html" : "register.html",
        location.href
      );
      url.searchParams.set("id", event.id);
      url.searchParams.set("ticketTypeId", firstType.id || "general");
      url.searchParams.set("quantity", String(quantity));
      return url.pathname + url.search;
    }

    function buildLoginRedirectUrl(){
      const loginUrl = new URL("login.html", location.href);
      loginUrl.searchParams.set("redirect", location.pathname + location.search);
      return loginUrl.pathname + loginUrl.search;
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        accountBtn.href = buildLoginRedirectUrl();
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    function renderPage(){
      const status = getEventStatus(currentEvent);
      const image = getEventImage(currentEvent);
      const desc = getEventDescription(currentEvent) || "探索活動資訊與入場方式。";
      const detailText = getEventDetailText(currentEvent);
      const venue = getEventVenue(currentEvent) || "活動地點將依主辦單位公告為準";
      const canBuy = canProceedToPurchase(currentEvent);
      const seatMapEnabled = currentEvent.seatMapEnabled === true;
      const eventStartText = formatDateTime(currentEvent.eventStartAt);
      const eventEndText = formatDateTime(currentEvent.eventEndAt);
      const saleStartText = formatDateTime(currentEvent.saleStartAt);
      const saleEndText = formatDateTime(currentEvent.saleEndAt);
      const ticketTypes = getTicketTypes(currentEvent);

      app.className = "";
      app.innerHTML = `
        <section class="hero">
          <div class="card poster">
            ${
              image
                ? `<img src="${esc(image)}" alt="${esc(currentEvent.title || "活動圖片")}" />`
                : `<div class="poster-placeholder">Event</div>`
            }
            <div class="poster-badge">Event</div>
          </div>

          <div class="card hero-info">
            <div class="eyebrow">Live Event</div>

            <h1 class="title">${esc(currentEvent.title || "未命名活動")}</h1>

            <div class="subtitle">${esc(desc)}</div>

            <div class="status-chip ${esc(status.key)}">${esc(status.text)}</div>

            <div class="meta-grid">
              <div class="meta-card">
                <div class="meta-label">活動時間</div>
                <div class="meta-value">${esc(eventStartText)}\n${esc(eventEndText)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">活動地點</div>
                <div class="meta-value">${esc(venue)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">開賣時間</div>
                <div class="meta-value">${esc(saleStartText)}\n${esc(saleEndText)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">票種數量</div>
                <div class="meta-value">${esc(String(ticketTypes.length))} 種</div>
              </div>
            </div>

            <div class="info-note">
              ${
                currentUser
                  ? `目前登入：${esc(currentUser.email || currentUser.uid)}`
                  : `查看活動資訊不需要登入；只有在你按下購買時，系統才會要求先登入。`
              }
            </div>

            <div class="hero-actions">
              <button class="btn btn-primary" id="buyNowBtn" ${canBuy ? "" : "disabled"}>立即購買</button>
              <a class="btn" href="index.html">回活動首頁</a>
            </div>

            <div class="notice ${canBuy ? "info" : "warn"}">
              ${
                canBuy
                  ? "目前活動正在受理中。按下「立即購買」後，才會進入下一步購票流程。"
                  : "目前尚未開放購票或已截止，暫時無法進入購買流程。"
              }
              \n${
                seatMapEnabled
                  ? "此活動有啟用座位圖，下一步會進入選位頁面。"
                  : "此活動未啟用座位圖，下一步會進入一般購買 / 報名流程。"
              }
            </div>
          </div>
        </section>

        ${
          detailText
            ? `
              <section class="section">
                <h2 class="section-title">About this event.</h2>
                <div class="section-sub">更完整的活動介紹與說明。</div>

                <div class="cta-wrap">
                  <div class="content-card">
                    <div class="content-text">${esc(detailText)}</div>
                  </div>

                  <aside class="buy-card">
                    <h3 class="buy-title">購買說明</h3>
                    <div class="buy-sub">
                      這一頁只提供活動資訊瀏覽。
                      按下下方按鈕後，才會進入購票下一步。
                    </div>

                    <div class="summary">
                      <div class="summary-row">
                        <span>活動</span>
                        <strong>${esc(currentEvent.title || "-")}</strong>
                      </div>
                      <div class="summary-row">
                        <span>狀態</span>
                        <strong>${esc(status.text)}</strong>
                      </div>
                      <div class="summary-row">
                        <span>票種</span>
                        <strong>${esc(String(ticketTypes.length))} 種</strong>
                      </div>
                      <div class="summary-row">
                        <span>購買方式</span>
                        <strong>${seatMapEnabled ? "選位購票" : "一般購票"}</strong>
                      </div>
                    </div>

                    <div class="notice ${canBuy ? "info" : "warn"}">
                      ${
                        currentUser
                          ? "你目前已登入，按下按鈕即可前往下一步。"
                          : "你目前尚未登入；按下按鈕後會先前往登入頁。"
                      }
                    </div>

                    <div style="margin-top:18px;display:grid;gap:10px;">
                      <button class="btn btn-primary" id="buyNowBtnBottom" ${canBuy ? "" : "disabled"}>立即購買</button>
                    </div>
                  </aside>
                </div>
              </section>
            `
            : `
              <section class="section">
                <div class="cta-wrap">
                  <div class="content-card">
                    <div class="content-text">目前主辦單位尚未提供更完整的活動說明。</div>
                  </div>

                  <aside class="buy-card">
                    <h3 class="buy-title">購買說明</h3>
                    <div class="buy-sub">
                      這一頁只提供活動資訊瀏覽。
                      按下下方按鈕後，才會進入購票下一步。
                    </div>

                    <div class="summary">
                      <div class="summary-row">
                        <span>活動</span>
                        <strong>${esc(currentEvent.title || "-")}</strong>
                      </div>
                      <div class="summary-row">
                        <span>狀態</span>
                        <strong>${esc(status.text)}</strong>
                      </div>
                      <div class="summary-row">
                        <span>票種</span>
                        <strong>${esc(String(ticketTypes.length))} 種</strong>
                      </div>
                      <div class="summary-row">
                        <span>購買方式</span>
                        <strong>${seatMapEnabled ? "選位購票" : "一般購票"}</strong>
                      </div>
                    </div>

                    <div class="notice ${canBuy ? "info" : "warn"}">
                      ${
                        currentUser
                          ? "你目前已登入，按下按鈕即可前往下一步。"
                          : "你目前尚未登入；按下按鈕後會先前往登入頁。"
                      }
                    </div>

                    <div style="margin-top:18px;display:grid;gap:10px;">
                      <button class="btn btn-primary" id="buyNowBtnBottom" ${canBuy ? "" : "disabled"}>立即購買</button>
                    </div>
                  </aside>
                </div>
              </section>
            `
        }
      `;

      const goPurchase = () => {
        if (!canBuy) return;

        if (!currentUser) {
          location.href = buildLoginRedirectUrl();
          return;
        }

        location.href = buildNextPurchaseUrl(currentEvent);
      };

      const buyNowBtn = document.getElementById("buyNowBtn");
      const buyNowBtnBottom = document.getElementById("buyNowBtnBottom");

      if (buyNowBtn) buyNowBtn.onclick = goPurchase;
      if (buyNowBtnBottom) buyNowBtnBottom.onclick = goPurchase;
    }

    async function initPage(){
      if (!eventId) {
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      currentEvent = await getEventById(eventId);

      if (!currentEvent) {
        app.className = "empty";
        app.innerHTML = "找不到活動。";
        return;
      }

      renderPage();
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      updateAccountLinks(currentUser);
      await initPage();
    });
  </script>
</body>
</html>
