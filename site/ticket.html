<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium｜活動資訊</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --max:1280px;
      --radius-xl:34px;
      --radius-lg:28px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:26px 22px 88px;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0, 1.05fr) minmax(360px, .95fr);
      gap:22px;
      align-items:stretch;
    }

    @media (max-width:980px){
      .hero{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .poster{
      position:relative;
      min-height:560px;
      background:linear-gradient(180deg,#f2f2f4 0%, #ececef 100%);
    }

    .poster img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .poster-placeholder{
      width:100%;
      height:100%;
      min-height:560px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:800;
      color:#9ca3af;
      background:linear-gradient(180deg,#f3f4f6 0%, #e5e7eb 100%);
    }

    .poster-badge{
      position:absolute;
      left:20px;
      top:20px;
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.06);
      font-size:12px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .hero-info{
      padding:28px 28px 30px;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:6px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:var(--shadow-soft);
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      width:max-content;
    }

    .title{
      margin:18px 0 0;
      font-size:clamp(34px, 5vw, 58px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .subtitle{
      margin-top:16px;
      font-size:17px;
      line-height:1.85;
      color:var(--muted);
      max-width:720px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:22px;
    }

    @media (max-width:640px){
      .meta-grid{
        grid-template-columns:1fr;
      }
    }

    .meta-card{
      border:1px solid var(--line);
      border-radius:22px;
      background:#fbfbfc;
      padding:16px;
    }

    .meta-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .meta-value{
      font-size:15px;
      line-height:1.75;
      font-weight:700;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      width:max-content;
      margin-top:18px;
    }

    .status-chip.selling{
      background:var(--green-bg);
      color:var(--green);
    }

    .status-chip.upcoming{
      background:var(--orange-bg);
      color:var(--orange);
    }

    .status-chip.ended{
      background:var(--red-bg);
      color:var(--red);
    }

    .status-chip.hidden{
      background:#f3f4f6;
      color:#4b5563;
    }

    .info-note{
      margin-top:16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .section{
      margin-top:56px;
    }

    .section-title{
      margin:0;
      font-size:clamp(28px, 4vw, 42px);
      line-height:1.08;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .section-sub{
      margin-top:10px;
      font-size:15px;
      line-height:1.85;
      color:var(--muted);
      max-width:760px;
      white-space:pre-wrap;
    }

    .content-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      box-shadow:var(--shadow-soft);
      padding:26px 24px;
      margin-top:20px;
    }

    .content-text{
      font-size:15px;
      line-height:2;
      color:#4b5563;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .cta-card{
      margin-top:20px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:22px 20px;
    }

    .cta-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .cta-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
      white-space:pre-wrap;
    }

    .notice{
      margin-top:16px;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.06);
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .loading,
    .empty{
      padding:42px 0;
      text-align:center;
      font-size:15px;
      color:var(--muted);
      line-height:1.9;
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    @media (max-width:860px){
      .nav{
        min-height:auto;
        padding-top:12px;
        padding-bottom:12px;
        align-items:flex-start;
      }

      .nav-links{
        display:none;
      }

      .page{
        padding:22px 16px 72px;
      }

      .hero-info{
        padding:22px 20px 24px;
      }

      .poster,
      .poster-placeholder{
        min-height:360px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="index.html#featured">精選活動</a>
          <a class="nav-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <div class="back-row">
        <a class="back-link" href="index.html">← 返回首頁</a>
      </div>

      <div id="app" class="loading">載入中…</div>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="index.html#featured">精選活動</a>
          <a class="footer-link" href="index.html#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="login.html">登入</a>
        </div>
      </footer>

      <div class="bottom-note">
        本頁僅提供活動資訊瀏覽；購票將於下一步進行。
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const accountBtn = document.getElementById("accountBtn");
    const params = new URLSearchParams(location.search);
    const eventId = String(params.get("id") || "").trim();

    let currentUser = null;
    let currentEvent = null;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input?.toDate === "function") return input.toDate();
      const d = new Date(input);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function buildDateRangeText(startInput, endInput){
      const startText = formatDateTime(startInput);
      const endText = formatDateTime(endInput);
      return [startText, endText].filter(Boolean).join("\n") || "-";
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden" };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended" };
      return { text:"受理中", key:"selling" };
    }

    function getEventDescription(event){
      return norm(
        event.summary ||
        event.subtitle ||
        event.description ||
        event.shortDescription ||
        ""
      );
    }

    function getEventDetailText(event){
      return norm(
        event.longDescription ||
        event.content ||
        event.details ||
        event.description ||
        ""
      );
    }

    function getEventVenue(event){
      return norm(
        event.venueName ||
        event.location ||
        event.place ||
        event.eventLocation ||
        ""
      );
    }

    function getEventImage(event){
      return norm(
        event.coverImage ||
        event.image ||
        event.bannerImage ||
        event.posterImage ||
        event.thumbnail ||
        ""
      );
    }

    function getTicketTypes(event){
      const raw = Array.isArray(event.ticketTypes) ? event.ticketTypes : [];
      return raw.filter(item => item?.enabled !== false);
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      return snap.exists() ? { id: snap.id, ...(snap.data() || {}) } : null;
    }

    function buildBuyUrl(){
      const url = new URL("buy.html", location.href);
      url.searchParams.set("id", currentEvent.id);
      return url.pathname + url.search;
    }

    function buildLoginRedirectUrl(targetPath){
      const loginUrl = new URL("login.html", location.href);
      loginUrl.searchParams.set("redirect", targetPath);
      return loginUrl.pathname + url.search;
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        accountBtn.href = "login.html";
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    function renderPage(){
      const status = getEventStatus(currentEvent);
      const image = getEventImage(currentEvent);
      const desc = getEventDescription(currentEvent) || "探索活動資訊與入場方式。";
      const detailText = getEventDetailText(currentEvent);
      const venue = getEventVenue(currentEvent) || "活動地點將依主辦單位公告為準";
      const eventTimeText = buildDateRangeText(currentEvent.eventStartAt, currentEvent.eventEndAt);
      const saleTimeText = buildDateRangeText(currentEvent.saleStartAt, currentEvent.saleEndAt);
      const ticketTypes = getTicketTypes(currentEvent);
      const canBuy = status.key === "selling";

      app.className = "";
      app.innerHTML = `
        <section class="hero">
          <div class="card poster">
            ${
              image
                ? `<img src="${esc(image)}" alt="${esc(currentEvent.title || "活動圖片")}" />`
                : `<div class="poster-placeholder">Event</div>`
            }
            <div class="poster-badge">Event</div>
          </div>

          <div class="card hero-info">
            <div class="eyebrow">Live Event</div>

            <h1 class="title">${esc(currentEvent.title || "未命名活動")}</h1>

            <div class="subtitle">${esc(desc)}</div>

            <div class="status-chip ${esc(status.key)}">${esc(status.text)}</div>

            <div class="meta-grid">
              <div class="meta-card">
                <div class="meta-label">活動時間</div>
                <div class="meta-value">${esc(eventTimeText)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">活動地點</div>
                <div class="meta-value">${esc(venue)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">開賣時間</div>
                <div class="meta-value">${esc(saleTimeText)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">票種數量</div>
                <div class="meta-value">${esc(String(ticketTypes.length || 0))} 種</div>
              </div>
            </div>

            <div class="info-note">
              ${
                currentUser
                  ? `目前登入：${esc(currentUser.email || currentUser.uid)}`
                  : `查看活動資訊不需要登入；只有在你按下「立即購買」時，系統才會要求登入。`
              }
            </div>

            <div class="hero-actions">
              <button class="btn btn-primary" id="buyNowBtn" ${canBuy ? "" : "disabled"}>立即購買</button>
              <a class="btn" href="index.html">回活動首頁</a>
            </div>

            <div class="notice ${canBuy ? "info" : "warn"}">
              ${
                canBuy
                  ? "本頁只顯示活動資訊。按下「立即購買」後，會進入下一步選票頁面。"
                  : "目前尚未開放購票或已截止，因此暫時不能進入選票頁。"
              }
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">About this event.</h2>
          <div class="section-sub">更完整的活動介紹與說明。</div>

          <div class="content-card">
            <div class="content-text">${esc(detailText || "目前主辦單位尚未提供更完整的活動說明。")}</div>
          </div>

          <div class="cta-card">
            <h3 class="cta-title">購買說明</h3>
            <div class="cta-sub">
              這一頁不會直接顯示購票欄位。
              按下「立即購買」後，才會進入下一頁選擇票數並建立暫時訂單。
            </div>
          </div>
        </section>
      `;

      const buyNowBtn = document.getElementById("buyNowBtn");
      if (buyNowBtn) {
        buyNowBtn.onclick = () => {
          if (!canBuy) return;

          const buyUrl = buildBuyUrl();

          if (!currentUser) {
            const loginUrl = new URL("login.html", location.href);
            loginUrl.searchParams.set("redirect", buyUrl);
            location.href = loginUrl.pathname + loginUrl.search;
            return;
          }

          location.href = buyUrl;
        };
      }
    }

    async function initPage(){
      if (!eventId) {
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      currentEvent = await getEventById(eventId);

      if (!currentEvent) {
        app.className = "empty";
        app.innerHTML = "找不到活動。";
        return;
      }

      renderPage();
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      updateAccountLinks(currentUser);
      await initPage();
    });
  </script>
</body>
</html>
