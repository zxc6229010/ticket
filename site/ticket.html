<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>購票 / 報名</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:rgba(17,24,39,.08);
      --line-strong:rgba(17,24,39,.14);
      --shadow:0 18px 50px rgba(15,23,42,.08);
      --shadow-soft:0 10px 30px rgba(15,23,42,.05);
      --black:#111111;
      --green-bg:#dcfce7;
      --green:#166534;
      --blue-bg:#dbeafe;
      --blue:#1d4ed8;
      --gray-bg:#f3f4f6;
      --gray:#6b7280;
      --red-bg:#fee2e2;
      --red:#b91c1c;
      --orange-bg:#ffedd5;
      --orange:#c2410c;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.9), rgba(245,247,251,.95) 36%),
        linear-gradient(180deg, #f8fafc 0%, #f5f7fb 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width:1240px;
      margin:0 auto;
      padding:28px 18px 64px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#374151;
      font-size:14px;
      font-weight:800;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.8);
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .ghost-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      font-size:14px;
      font-weight:900;
      color:#111827;
      cursor:pointer;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0, 1.18fr) minmax(320px, .82fr);
      gap:22px;
      align-items:start;
    }

    @media (max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero{
      position:relative;
      min-height:290px;
      background:
        linear-gradient(180deg, rgba(15,23,42,.06), rgba(15,23,42,.38)),
        linear-gradient(135deg, #dbeafe 0%, #f5f3ff 40%, #fde68a 100%);
      overflow:hidden;
    }

    .hero img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.00) 0%, rgba(17,24,39,.72) 100%);
      pointer-events:none;
    }

    .hero-inner{
      position:absolute;
      inset:auto 0 0 0;
      z-index:2;
      padding:24px;
      color:#fff;
    }

    .status{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      font-weight:900;
      backdrop-filter:blur(10px);
    }
    .status-selling{ background:rgba(22,101,52,.16); color:#d1fae5; border:1px solid rgba(255,255,255,.16); }
    .status-upcoming{ background:rgba(29,78,216,.16); color:#dbeafe; border:1px solid rgba(255,255,255,.16); }
    .status-ended{ background:rgba(107,114,128,.18); color:#f3f4f6; border:1px solid rgba(255,255,255,.16); }
    .status-muted{ background:rgba(107,114,128,.18); color:#f3f4f6; border:1px solid rgba(255,255,255,.16); }

    .hero-title{
      margin:14px 0 0;
      font-size:clamp(26px, 3.8vw, 38px);
      line-height:1.2;
      font-weight:1000;
      letter-spacing:-.03em;
    }

    .hero-sub{
      margin-top:10px;
      font-size:14px;
      line-height:1.8;
      opacity:.95;
    }

    .main-body{
      padding:24px;
    }

    .section{
      margin-top:24px;
    }

    .section:first-child{
      margin-top:0;
    }

    .section-title{
      font-size:18px;
      font-weight:1000;
      letter-spacing:-.01em;
      margin-bottom:10px;
    }

    .section-text{
      color:#374151;
      line-height:1.95;
      white-space:pre-wrap;
      word-break:break-word;
      font-size:15px;
    }

    .info-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width:720px){
      .info-grid{ grid-template-columns:1fr; }
    }

    .info-card{
      border:1px solid var(--line);
      background:#fff;
      border-radius:20px;
      padding:16px;
      box-shadow:var(--shadow-soft);
    }

    .info-label{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      letter-spacing:.02em;
    }

    .info-value{
      margin-top:6px;
      font-size:15px;
      color:#111827;
      line-height:1.7;
      font-weight:900;
      word-break:break-word;
    }

    .ticket-list{
      display:grid;
      gap:12px;
    }

    .ticket-card{
      border:1.5px solid var(--line);
      border-radius:22px;
      padding:16px;
      background:#fff;
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      transition:border-color .12s ease, transform .12s ease, box-shadow .12s ease;
    }

    .ticket-card:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 28px rgba(15,23,42,.08);
    }

    .ticket-card.active{
      border-color:#111827;
      box-shadow:0 16px 32px rgba(17,24,39,.12);
    }

    .ticket-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .ticket-name{
      font-size:17px;
      font-weight:1000;
      line-height:1.5;
    }

    .ticket-price{
      font-size:18px;
      font-weight:1000;
      color:#111827;
      white-space:nowrap;
    }

    .ticket-desc{
      margin-top:8px;
      font-size:13px;
      color:#6b7280;
      line-height:1.8;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .side{
      position:sticky;
      top:18px;
      display:grid;
      gap:16px;
    }

    @media (max-width:980px){
      .side{
        position:static;
      }
    }

    .side-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .side-head{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(249,250,251,1) 100%);
    }

    .side-title{
      font-size:20px;
      font-weight:1000;
      letter-spacing:-.02em;
      margin:0;
    }

    .side-sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.7;
    }

    .side-body{
      padding:18px 20px 20px;
    }

    .kv{
      display:grid;
      grid-template-columns:96px 1fr;
      gap:8px 10px;
      padding:10px 0;
      border-top:1px dashed var(--line);
    }

    .kv:first-child{
      border-top:none;
      padding-top:0;
    }

    .k{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .v{
      color:#111827;
      font-size:13px;
      font-weight:900;
      line-height:1.7;
      word-break:break-word;
    }

    .status-box{
      border-radius:18px;
      padding:14px;
      margin-top:14px;
      border:1px solid var(--line);
      background:#fafafa;
    }

    .status-box.ok{
      background:var(--green-bg);
      border-color:rgba(22,101,52,.12);
      color:var(--green);
    }

    .status-box.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.12);
      color:var(--red);
    }

    .status-box.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.12);
      color:var(--blue);
    }

    .status-box.muted{
      background:var(--gray-bg);
      border-color:rgba(107,114,128,.12);
      color:var(--gray);
    }

    .status-box.orange{
      background:var(--orange-bg);
      border-color:rgba(194,65,12,.12);
      color:var(--orange);
    }

    .status-title{
      font-size:14px;
      font-weight:1000;
      line-height:1.6;
    }

    .status-desc{
      margin-top:6px;
      font-size:13px;
      line-height:1.8;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:12px;
      font-weight:900;
    }

    .selected-box{
      margin-top:16px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
    }

    .qty-wrap{
      margin-top:16px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
    }

    .qty-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:10px;
    }

    .qty-controls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .qty-btn{
      width:42px;
      height:42px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .qty-btn[disabled]{
      opacity:.45;
      cursor:not-allowed;
    }

    .qty-value{
      min-width:38px;
      text-align:center;
      font-size:18px;
      font-weight:1000;
    }

    .main-cta{
      width:100%;
      margin-top:16px;
      border:none;
      background:var(--black);
      color:#fff;
      border-radius:18px;
      padding:16px 18px;
      font-size:16px;
      font-weight:1000;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease;
      box-shadow:0 14px 28px rgba(17,17,17,.16);
    }

    .main-cta:hover{
      transform:translateY(-1px);
    }

    .main-cta[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .secondary-btn{
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      width:100%;
    }

    .secondary-btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .notice{
      margin-top:14px;
      font-size:13px;
      color:var(--muted);
      line-height:1.9;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .loading, .empty{
      max-width:900px;
      margin:32px auto;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    .modal-back{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.38);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modal-back.show{
      display:flex;
    }

    .modal{
      width:min(560px, 100%);
      background:#fff;
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:0 28px 80px rgba(15,23,42,.22);
      overflow:hidden;
    }

    .modal-head{
      padding:18px 20px 14px;
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .modal-title{
      margin:0;
      font-size:20px;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .modal-sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
      line-height:1.8;
    }

    .modal-body{
      padding:18px 20px 20px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      margin-top:16px;
    }

    .input{
      width:100%;
      padding:14px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111827;
      font-size:16px;
      outline:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="backLink" href="index.html">← 返回活動詳情</a>
      <div class="top-actions">
        <a class="ghost-btn" href="member.html">會員中心</a>
      </div>
    </div>

    <div id="app" class="loading">載入中...</div>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <h3 class="modal-title" id="modalTitle">提示</h3>
        <div class="modal-sub" id="modalSub">-</div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      addDoc,
      query,
      where,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const params = new URLSearchParams(location.search);
    const eventId = norm(params.get("id"));
    const inviteCodeFromUrl = norm(params.get("inviteCode"));
    const backLink = document.getElementById("backLink");

    const modalBack = document.getElementById("modalBack");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    const modalBody = document.getElementById("modalBody");

    let currentUser = null;
    let currentUserProfile = null;
    let currentEvent = null;
    let latestEligibility = null;
    let selectedTicketId = "";
    let selectedTicket = null;
    let validatedInviteCode = inviteCodeFromUrl || "";
    let selectedQuantity = 1;
    let currentPurchaseLimit = 1;
    let currentPurchasedCount = 0;
    let currentMatchedRecord = null;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function lower(value){
      return norm(value).toLowerCase();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input.toDate === "function") return input.toDate();
      const d = new Date(input);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "-";
      return d.toLocaleString("zh-Hant", {
        hour12:false,
        year:"numeric",
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
      });
    }

    function formatPrice(value){
      const num = Number(value || 0);
      if (!num) return "免費";
      return `NT$ ${num.toLocaleString("zh-Hant")}`;
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", className:"status-muted", key:"muted" };
      if (saleStart && now < saleStart) return { text:"即將開賣", className:"status-upcoming", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", className:"status-ended", key:"ended" };
      return { text:"受理中", className:"status-selling", key:"selling" };
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      return snap.exists() ? { id: snap.id, ...(snap.data() || {}) } : null;
    }

    async function loadCurrentUserProfile(){
      if (!currentUser) {
        currentUserProfile = null;
        return;
      }
      const snap = await getDoc(doc(db, "users", currentUser.uid));
      currentUserProfile = snap.exists() ? (snap.data() || {}) : {};
    }

    function isSaleOpen(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      if (saleStart && now < saleStart) return false;
      if (saleEnd && now > saleEnd) return false;
      return true;
    }

    function getUserFieldValue(field, user, profile){
      const key = lower(field);

      if (key === "email") return norm(profile?.schoolEmail || profile?.email || user?.email || "");
      if (key === "schoolemail") return norm(profile?.schoolEmail || user?.email || "");
      if (key === "studentid") return norm(profile?.studentId || profile?.studentCode || "");
      if (key === "studentcode") return norm(profile?.studentCode || profile?.studentId || "");
      if (key === "verifykey") return norm(profile?.verifyKey || "");
      if (key === "verifiedschoolid") return norm(profile?.verifiedSchoolId || "");
      if (key === "name") return norm(profile?.name || "");
      if (key === "class") return norm(profile?.class || "");
      if (key === "seat") return norm(profile?.seat || "");
      if (key === "group") return norm(profile?.group || "");

      return norm(profile?.[field] || profile?.[key] || "");
    }

    async function checkAllowedUser(event, user, profile){
      const fields = Array.isArray(event.allowedUserMatchFields)
        ? event.allowedUserMatchFields.map(norm).filter(Boolean)
        : [];

      if (!fields.length) {
        return { matched:false, reason:"missing_match_fields", matchKey:"", record:null };
      }

      const values = fields.map(field => getUserFieldValue(field, user, profile));
      if (values.some(v => !norm(v))) {
        return {
          matched:false,
          reason:"missing_user_fields",
          matchKey:values.join("｜"),
          fields,
          record:null
        };
      }

      const matchKey = values.join("｜");
      const snap = await getDoc(doc(db, "events", event.id, "allowedUsers", matchKey));

      if (!snap.exists()) {
        return {
          matched:false,
          reason:"not_in_allowed_list",
          matchKey,
          fields,
          record:null
        };
      }

      const data = snap.data() || {};
      if (data.canRegister === false) {
        return {
          matched:false,
          reason:"blocked_by_record",
          matchKey,
          fields,
          record:data
        };
      }

      return {
        matched:true,
        reason:"matched",
        matchKey,
        fields,
        record:data
      };
    }

    function validateInviteCodeOnClient(event, code){
      const input = lower(code);
      if (!input) return { ok:false, message:"請先輸入邀請碼" };

      const invites = Array.isArray(event.inviteCodes) ? event.inviteCodes : [];
      const found = invites.find(item => {
        const itemCode = lower(item?.code || "");
        return itemCode && itemCode === input && item?.enabled === true;
      });

      if (!found) return { ok:false, message:"邀請碼無效或未啟用" };

      const maxUses = Number(found.maxUses || 0);
      const usedCount = Number(found.usedCount || 0);

      if (maxUses > 0 && usedCount >= maxUses) {
        return { ok:false, message:"此邀請碼已達使用上限" };
      }

      return { ok:true, item:found };
    }

    function getTicketTypes(event){
      const raw = Array.isArray(event.ticketTypes) ? event.ticketTypes : [];
      if (raw.length) {
        return raw.map((item, index) => ({
          id: norm(item.id || `ticket_${index+1}`),
          name: norm(item.name || `票種 ${index+1}`),
          price: Number(item.price || 0),
          description: norm(item.description || ""),
          enabled: item.enabled !== false,
          maxPerUser: Number(item.maxPerUser || 0)
        })).filter(item => item.enabled !== false);
      }

      return [{
        id:"general",
        name:"一般報名",
        price:0,
        description:"此活動目前未細分票種，將以一般報名方式建立資料。",
        enabled:true,
        maxPerUser:0
      }];
    }

    async function getCurrentPurchasedCount(eventId, uid){
      if (!uid) return 0;

      const q = query(
        collection(db, "events", eventId, "orders"),
        where("uid", "==", uid)
      );
      const snap = await getDocs(q);

      let total = 0;
      snap.forEach(docSnap => {
        const data = docSnap.data() || {};
        const status = norm(data.status || "").toLowerCase();
        if (["cancelled", "void", "refunded"].includes(status)) return;
        total += Number(data.quantity || 1);
      });

      return total;
    }

    function resolvePurchaseLimit(event, ticket, matchedRecord){
      const limits = [];

      const recordLimit = Number(matchedRecord?.maxTickets || 0);
      const ticketLimit = Number(ticket?.maxPerUser || 0);
      const eventLimit = Number(event?.maxTicketsPerUserDefault || 0);

      if (recordLimit > 0) limits.push(recordLimit);
      if (ticketLimit > 0) limits.push(ticketLimit);
      if (eventLimit > 0) limits.push(eventLimit);

      if (!limits.length) return 999;
      return Math.min(...limits);
    }

    async function evaluateEligibility(event){
      const inviteEnabled = event.inviteCodeEnabled === true;
      currentMatchedRecord = null;

      if (event.published !== true) {
        return { type:"event_unpublished", canSubmit:false, actionText:"目前不可報名" };
      }

      if (!currentUser) {
        return {
          type:"login_required",
          canSubmit:false,
          canUseInviteCode:inviteEnabled,
          actionText: inviteEnabled ? "登入後繼續 / 邀請碼" : "請先登入"
        };
      }

      if (!isSaleOpen(event)) {
        return { type:"sale_not_open", canSubmit:false, actionText:"不在報名期間" };
      }

      if (event.allowedUsersEnabled !== true) {
        return {
          type:"open_registration",
          canSubmit:true,
          canUseInviteCode:inviteEnabled,
          actionText:"確認報名 / 購票"
        };
      }

      const hasCampusVerify = !!norm(currentUserProfile?.verifiedSchoolId || "");
      if (!hasCampusVerify) {
        if (validatedInviteCode) {
          const inviteResult = validateInviteCodeOnClient(event, validatedInviteCode);
          if (inviteResult.ok) {
            return {
              type:"invite_override",
              canSubmit:true,
              canUseInviteCode:true,
              actionText:"使用邀請碼報名"
            };
          }
        }

        return {
          type:"verify_needed_but_invite_possible",
          canSubmit:false,
          canUseInviteCode:inviteEnabled,
          actionText: inviteEnabled ? "校園驗證 / 邀請碼" : "先完成校園驗證"
        };
      }

      const allowedResult = await checkAllowedUser(event, currentUser, currentUserProfile);
      if (allowedResult.matched) {
        currentMatchedRecord = allowedResult.record || null;
        return {
          type:"eligible",
          canSubmit:true,
          canUseInviteCode:inviteEnabled,
          actionText:"確認報名 / 購票"
        };
      }

      if (inviteEnabled) {
        if (validatedInviteCode) {
          const inviteResult = validateInviteCodeOnClient(event, validatedInviteCode);
          if (inviteResult.ok) {
            return {
              type:"invite_override",
              canSubmit:true,
              canUseInviteCode:true,
              actionText:"使用邀請碼報名"
            };
          }
        }

        return {
          type:"not_eligible_but_invite_possible",
          canSubmit:false,
          canUseInviteCode:true,
          actionText:"輸入邀請碼"
        };
      }

      return {
        type:"not_eligible",
        canSubmit:false,
        canUseInviteCode:false,
        actionText:"目前不符合資格"
      };
    }

    function getEligibilityBlock(eligibility){
      switch (eligibility.type) {
        case "event_unpublished":
          return { className:"muted", title:"此活動目前尚未公開", desc:"目前仍不能報名，請等待主辦單位開放。" };
        case "login_required":
          return { className:"info", title:"請先登入會員帳號", desc:"登入後才能建立報名或購票資料。" };
        case "sale_not_open":
          return { className:"orange", title:"目前不在報名期間", desc:"請依活動開放時間再回來操作。" };
        case "open_registration":
          return { className:"ok", title:"此活動可直接報名", desc:"這場活動目前沒有額外資格名單限制。" };
        case "eligible":
          return { className:"ok", title:"你目前符合此活動資格", desc:"系統已成功比對到你的資格，可以直接完成報名或購票。" };
        case "invite_override":
          return { className:"ok", title:"已套用有效邀請碼", desc:"你目前可使用邀請碼完成本次活動報名。" };
        case "verify_needed_but_invite_possible":
          return { className:"warn", title:"你尚未完成校園驗證", desc:"你可以先去校園驗證，或直接改用邀請碼參加。" };
        case "not_eligible_but_invite_possible":
          return { className:"warn", title:"你目前不在此活動名單中", desc:"你可以改用邀請碼參加本次活動。" };
        case "not_eligible":
          return { className:"warn", title:"你目前不符合此活動資格", desc:"系統找不到你的活動資格資料，且此活動未開放邀請碼備援。" };
        default:
          return { className:"muted", title:"目前無法判斷狀態", desc:"請稍後再試。" };
      }
    }

    function selectTicket(ticketId){
      selectedTicketId = ticketId;
      const ticketTypes = getTicketTypes(currentEvent);
      selectedTicket = ticketTypes.find(item => item.id === ticketId) || null;
      updateQuantityBounds();
      renderPage(currentEvent, latestEligibility);
    }

    function updateQuantityBounds(){
      if (!currentEvent || !selectedTicket) {
        currentPurchaseLimit = 1;
        selectedQuantity = 1;
        return;
      }

      const totalLimit = resolvePurchaseLimit(currentEvent, selectedTicket, currentMatchedRecord);
      currentPurchaseLimit = Math.max(0, totalLimit - currentPurchasedCount);

      if (currentPurchaseLimit <= 0) {
        selectedQuantity = 0;
      } else {
        selectedQuantity = Math.max(1, Math.min(selectedQuantity || 1, currentPurchaseLimit));
      }
    }

    function changeQuantity(delta){
      if (currentPurchaseLimit <= 0) return;
      selectedQuantity = Math.min(currentPurchaseLimit, Math.max(1, selectedQuantity + delta));
      renderPage(currentEvent, latestEligibility);
    }

    function buildSeatPickerUrl(){
      const url = new URL("seat-picker.html", window.location.href);
      url.searchParams.set("id", currentEvent.id);
      url.searchParams.set("ticketTypeId", selectedTicket.id);
      url.searchParams.set("quantity", String(selectedQuantity));
      if (validatedInviteCode) {
        url.searchParams.set("inviteCode", validatedInviteCode);
      }
      return url.toString();
    }

    async function createOrder(){
      if (!currentEvent || !latestEligibility) return;

      if (!currentUser) {
        showNeedLoginModal();
        return;
      }

      if (!selectedTicket) {
        alert("請先選擇票種");
        return;
      }

      if (!latestEligibility.canSubmit) {
        if (latestEligibility.type === "verify_needed_but_invite_possible") {
          showNeedVerifyModal();
          return;
        }
        if (latestEligibility.type === "not_eligible_but_invite_possible") {
          showInviteModal();
          return;
        }
        alert("你目前無法完成此活動報名");
        return;
      }

      if (currentPurchaseLimit <= 0) {
        alert("你此活動已達可購買上限");
        return;
      }

      if (selectedQuantity <= 0 || selectedQuantity > currentPurchaseLimit) {
        alert("目前張數超出可購買上限");
        return;
      }

      // 啟用座位圖就跳到選位頁
      if (currentEvent.seatMapEnabled === true) {
        location.href = buildSeatPickerUrl();
        return;
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      const oldText = submitBtn.textContent;
      submitBtn.textContent = "送出中…";

      try {
        const freshPurchasedCount = await getCurrentPurchasedCount(currentEvent.id, currentUser.uid);
        currentPurchasedCount = freshPurchasedCount;
        updateQuantityBounds();

        if (selectedQuantity <= 0 || selectedQuantity > currentPurchaseLimit) {
          throw new Error("目前剩餘可購買張數不足，請重新確認");
        }

        const orderPayload = {
          uid: currentUser.uid,
          email: currentUser.email || "",
          eventId: currentEvent.id,
          eventTitle: currentEvent.title || "",
          ticketTypeId: selectedTicket.id,
          ticketTypeName: selectedTicket.name,
          ticketPrice: Number(selectedTicket.price || 0),
          quantity: selectedQuantity,
          totalAmount: Number(selectedTicket.price || 0) * selectedQuantity,
          inviteCode: validatedInviteCode || "",
          eligibilityType: latestEligibility.type,
          verifiedSchoolId: norm(currentUserProfile?.verifiedSchoolId || ""),
          verifiedSchoolName: norm(currentUserProfile?.verifiedSchoolName || ""),
          verifyMethod: norm(currentUserProfile?.verifyMethod || ""),
          schoolEmail: norm(currentUserProfile?.schoolEmail || ""),
          matchedRole: norm(currentMatchedRecord?.purchaseRole || ""),
          matchedTags: Array.isArray(currentMatchedRecord?.purchaseTags) ? currentMatchedRecord.purchaseTags : [],
          status: "registered",
          paymentStatus: Number(selectedTicket.price || 0) > 0 ? "pending" : "free",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        };

        await addDoc(collection(db, "events", currentEvent.id, "orders"), orderPayload);

        currentPurchasedCount += selectedQuantity;
        updateQuantityBounds();

        showModal({
          title:"報名成功",
          sub:"你的活動資料已建立完成。",
          body:`
            <div class="notice">
              活動：${esc(currentEvent.title || "-")}<br>
              票種：${esc(selectedTicket.name || "-")}<br>
              張數：${esc(selectedQuantity)}<br>
              金額：${esc(formatPrice((selectedTicket.price || 0) * selectedQuantity))}<br>
              ${validatedInviteCode ? `邀請碼：${esc(validatedInviteCode)}<br>` : ""}
              狀態：已建立報名 / 訂單資料
            </div>
            <div class="modal-actions">
              <button class="secondary-btn" id="successGoMemberBtn">前往會員中心</button>
              <button class="ghost-btn" id="successCloseBtn" style="border-color:#111;">留在此頁</button>
            </div>
          `
        });

        document.getElementById("successGoMemberBtn").onclick = () => {
          location.href = "member.html";
        };
        document.getElementById("successCloseBtn").onclick = closeModal;

        await refreshPageState();

      } catch (e) {
        console.error(e);
        alert(e.message || "建立訂單失敗，請稍後再試");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = oldText;
      }
    }

    async function refreshPageState(){
      if (!eventId){
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      try {
        currentEvent = await getEventById(eventId);

        if (!currentEvent){
          app.className = "empty";
          app.innerHTML = "找不到活動。";
          return;
        }

        latestEligibility = await evaluateEligibility(currentEvent);
        backLink.href = `event.html?id=${encodeURIComponent(currentEvent.id)}`;

        const ticketTypes = getTicketTypes(currentEvent);
        if (!selectedTicketId && ticketTypes.length) {
          selectedTicketId = ticketTypes[0].id;
          selectedTicket = ticketTypes[0];
        } else {
          selectedTicket = ticketTypes.find(item => item.id === selectedTicketId) || ticketTypes[0] || null;
          selectedTicketId = selectedTicket?.id || "";
        }

        currentPurchasedCount = currentUser ? await getCurrentPurchasedCount(currentEvent.id, currentUser.uid) : 0;
        updateQuantityBounds();
        renderPage(currentEvent, latestEligibility);
      } catch (e){
        console.error(e);
        app.className = "empty";
        app.innerHTML = "頁面載入失敗，請稍後再試。";
      }
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      await loadCurrentUserProfile();
      await refreshPageState();
    });
  </script>
</body>
</html>
