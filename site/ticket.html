<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Event Details</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --white:#ffffff;
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;
      --radius-xl:34px;
      --radius-lg:26px;
      --radius-md:20px;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:26px 22px 88px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .back-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      color:#111;
      font-size:14px;
      font-weight:700;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0, 1.05fr) minmax(360px, .95fr);
      gap:22px;
      align-items:stretch;
    }

    @media (max-width:980px){
      .hero{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .poster{
      position:relative;
      min-height:560px;
      background:linear-gradient(180deg,#f2f2f4 0%, #ececef 100%);
    }

    @media (max-width:980px){
      .poster{
        min-height:360px;
      }
    }

    .poster img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .poster-placeholder{
      width:100%;
      height:100%;
      min-height:560px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:800;
      color:#9ca3af;
      background:linear-gradient(180deg,#f3f4f6 0%, #e5e7eb 100%);
    }

    @media (max-width:980px){
      .poster-placeholder{
        min-height:360px;
      }
    }

    .poster-badge{
      position:absolute;
      left:20px;
      top:20px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.06);
      color:#111;
      font-size:12px;
      font-weight:800;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow-soft);
    }

    .hero-info{
      padding:28px 28px 30px;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:6px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:var(--shadow-soft);
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      width:max-content;
    }

    .title{
      margin:18px 0 0;
      font-size:clamp(34px, 5vw, 58px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .subtitle{
      margin-top:16px;
      font-size:17px;
      line-height:1.85;
      color:var(--muted);
      max-width:720px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:22px;
    }

    @media (max-width:640px){
      .meta-grid{
        grid-template-columns:1fr;
      }
    }

    .meta-card{
      border:1px solid var(--line);
      border-radius:22px;
      background:#fbfbfc;
      padding:16px 16px;
    }

    .meta-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .meta-value{
      font-size:15px;
      line-height:1.75;
      font-weight:700;
      color:#111;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      width:max-content;
      margin-top:18px;
      border:1px solid transparent;
    }

    .status-chip.selling{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.08);
    }

    .status-chip.upcoming{
      background:var(--orange-bg);
      color:var(--orange);
      border-color:rgba(194,65,12,.08);
    }

    .status-chip.ended{
      background:var(--red-bg);
      color:var(--red);
      border-color:rgba(185,28,28,.08);
    }

    .status-chip.hidden{
      background:#f3f4f6;
      color:#4b5563;
      border-color:rgba(0,0,0,.05);
    }

    .info-note{
      margin-top:16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .section{
      margin-top:56px;
    }

    .section-title{
      margin:0;
      font-size:clamp(28px, 4vw, 42px);
      line-height:1.08;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .section-sub{
      margin-top:10px;
      font-size:15px;
      line-height:1.85;
      color:var(--muted);
      max-width:760px;
      white-space:pre-wrap;
    }

    .ticket-layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 380px;
      gap:22px;
      align-items:start;
      margin-top:22px;
    }

    @media (max-width:980px){
      .ticket-layout{
        grid-template-columns:1fr;
      }
    }

    .ticket-list{
      display:grid;
      gap:16px;
    }

    .ticket-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      box-shadow:var(--shadow-soft);
      padding:20px 20px;
      transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      cursor:pointer;
    }

    .ticket-card:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 36px rgba(0,0,0,.06);
      border-color:rgba(0,0,0,.10);
    }

    .ticket-card.active{
      border-color:#111;
      box-shadow:0 18px 40px rgba(0,0,0,.08);
    }

    .ticket-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .ticket-name{
      margin:0;
      font-size:24px;
      line-height:1.15;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .ticket-price{
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
      white-space:nowrap;
    }

    .ticket-desc{
      margin-top:10px;
      font-size:14px;
      line-height:1.9;
      color:var(--muted);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .ticket-meta{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      font-size:12px;
      font-weight:700;
    }

    .buy-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:22px 20px;
      position:sticky;
      top:82px;
    }

    @media (max-width:980px){
      .buy-card{
        position:static;
      }
    }

    .buy-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .buy-sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
      white-space:pre-wrap;
    }

    .field{
      margin-top:16px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      font-weight:800;
      color:#111;
    }

    .input,
    .select{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border-radius:18px;
      border:1px solid rgba(0,0,0,.10);
      background:#fff;
      color:#111;
      font-size:15px;
      outline:none;
    }

    .input:focus,
    .select:focus{
      border-color:rgba(0,0,0,.24);
    }

    .summary{
      margin-top:18px;
      border-top:1px solid rgba(0,0,0,.08);
      padding-top:16px;
      display:grid;
      gap:10px;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      color:var(--muted);
      line-height:1.8;
    }

    .summary-row strong{
      color:#111;
      text-align:right;
    }

    .notice{
      margin-top:16px;
      border-radius:18px;
      padding:14px;
      background:#fafafa;
      border:1px solid rgba(0,0,0,.06);
      color:var(--muted);
      font-size:13px;
      line-height:1.9;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .notice.info{
      background:var(--blue-bg);
      border-color:rgba(29,78,216,.10);
      color:var(--blue);
    }

    .notice.warn{
      background:var(--red-bg);
      border-color:rgba(185,28,28,.10);
      color:var(--red);
    }

    .content-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      box-shadow:var(--shadow-soft);
      padding:26px 24px;
      margin-top:20px;
    }

    .content-text{
      font-size:15px;
      line-height:2;
      color:#4b5563;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .loading,
    .empty{
      padding:42px 0;
      text-align:center;
      font-size:15px;
      color:var(--muted);
      line-height:1.9;
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:900px){
      .footer{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .bottom-note{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }
  </style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const app = document.getElementById("app");
    const params = new URLSearchParams(location.search);
    const eventId = String(params.get("id") || "").trim();

    let currentUser = null;
    let currentEvent = null;
    let selectedTicketTypeId = "";
    let quantity = 1;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input.toDate === "function") return input.toDate();
      const d = new Date(input);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "日期未定";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function formatPrice(value){
      const num = Number(value || 0);
      if (!num) return "免費";
      return `NT$ ${num.toLocaleString("zh-Hant")}`;
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden" };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming" };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended" };
      return { text:"受理中", key:"selling" };
    }

    function getEventDescription(event){
      return norm(
        event.summary ||
        event.subtitle ||
        event.description ||
        event.shortDescription ||
        ""
      );
    }

    function getEventDetailText(event){
      return norm(
        event.longDescription ||
        event.content ||
        event.details ||
        event.description ||
        ""
      );
    }

    function getEventVenue(event){
      return norm(
        event.venueName ||
        event.location ||
        event.place ||
        event.eventLocation ||
        ""
      );
    }

    function getEventImage(event){
      return norm(
        event.coverImage ||
        event.image ||
        event.bannerImage ||
        event.posterImage ||
        event.thumbnail ||
        ""
      );
    }

    function getTicketTypes(event){
      const raw = Array.isArray(event.ticketTypes) ? event.ticketTypes : [];
      if (raw.length) {
        return raw
          .map((item, index) => ({
            id: norm(item.id || `ticket_${index + 1}`),
            name: norm(item.name || `票種 ${index + 1}`),
            price: Number(item.price || 0),
            description: norm(item.description || ""),
            enabled: item.enabled !== false,
            maxPerUser: Number(item.maxPerUser || 0)
          }))
          .filter(item => item.enabled !== false);
      }

      return [{
        id:"general",
        name:"一般報名",
        price:0,
        description:"此活動目前未細分票種，將以一般報名方式建立資料。",
        enabled:true,
        maxPerUser:0
      }];
    }

    async function getEventById(id){
      const snap = await getDoc(doc(db, "events", id));
      return snap.exists() ? { id: snap.id, ...(snap.data() || {}) } : null;
    }

    function getSelectedTicketType(){
      const types = getTicketTypes(currentEvent);
      return types.find(item => item.id === selectedTicketTypeId) || types[0] || null;
    }

    function canProceedToPurchase(event){
      const status = getEventStatus(event);
      return status.key === "selling";
    }

    function buildSeatPickerUrl(){
      const selected = getSelectedTicketType();
      const q = Number(quantity || 1);

      const url = new URL("seat-picker.html", location.href);
      url.searchParams.set("id", currentEvent.id);
      url.searchParams.set("ticketTypeId", selected?.id || "general");
      url.searchParams.set("quantity", String(q));
      return url.pathname + url.search;
    }

    function buildSimpleOrderUrl(){
      const selected = getSelectedTicketType();
      const q = Number(quantity || 1);

      const url = new URL("register.html", location.href);
      url.searchParams.set("id", currentEvent.id);
      url.searchParams.set("ticketTypeId", selected?.id || "general");
      url.searchParams.set("quantity", String(q));
      return url.pathname + url.search;
    }

    function renderTicketCard(ticket, active){
      return `
        <div class="ticket-card ${active ? "active" : ""}" data-ticket-id="${esc(ticket.id)}">
          <div class="ticket-top">
            <div>
              <h3 class="ticket-name">${esc(ticket.name)}</h3>
            </div>
            <div class="ticket-price">
              ${esc(formatPrice(ticket.price))}
            </div>
          </div>

          <div class="ticket-desc">
            ${esc(ticket.description || "查看此票種的資格限制與購買方式。")}
          </div>

          <div class="ticket-meta">
            <span class="meta-pill">票種代碼：${esc(ticket.id)}</span>
            <span class="meta-pill">
              ${ticket.maxPerUser > 0 ? `每人最多 ${ticket.maxPerUser} 張` : "張數不限"}
            </span>
          </div>
        </div>
      `;
    }

    function renderPage(){
      const status = getEventStatus(currentEvent);
      const types = getTicketTypes(currentEvent);

      if (!selectedTicketTypeId && types.length) {
        selectedTicketTypeId = types[0].id;
      }

      const selected = getSelectedTicketType();
      const image = getEventImage(currentEvent);
      const desc = getEventDescription(currentEvent) || "探索活動資訊、票種與入場方式。";
      const detailText = getEventDetailText(currentEvent);
      const venue = getEventVenue(currentEvent) || "活動地點將依主辦單位公告為準";
      const canBuy = canProceedToPurchase(currentEvent);
      const seatMapEnabled = currentEvent.seatMapEnabled === true;
      const eventStartText = formatDateTime(currentEvent.eventStartAt);
      const eventEndText = formatDateTime(currentEvent.eventEndAt);
      const saleStartText = formatDateTime(currentEvent.saleStartAt);
      const saleEndText = formatDateTime(currentEvent.saleEndAt);
      const total = Number(selected?.price || 0) * Number(quantity || 1);

      app.className = "";
      app.innerHTML = `
        <section class="hero">
          <div class="card poster">
            ${
              image
                ? `<img src="${esc(image)}" alt="${esc(currentEvent.title || "活動圖片")}" />`
                : `<div class="poster-placeholder">Event</div>`
            }
            <div class="poster-badge">Event</div>
          </div>

          <div class="card hero-info">
            <div class="eyebrow">Live Event</div>

            <h1 class="title">${esc(currentEvent.title || "未命名活動")}</h1>

            <div class="subtitle">${esc(desc)}</div>

            <div class="status-chip ${esc(status.key)}">${esc(status.text)}</div>

            <div class="meta-grid">
              <div class="meta-card">
                <div class="meta-label">活動時間</div>
                <div class="meta-value">${esc(eventStartText)}\n${esc(eventEndText)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">活動地點</div>
                <div class="meta-value">${esc(venue)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">開賣時間</div>
                <div class="meta-value">${esc(saleStartText)}\n${esc(saleEndText)}</div>
              </div>

              <div class="meta-card">
                <div class="meta-label">購票方式</div>
                <div class="meta-value">${seatMapEnabled ? "可選位購票" : "一般購票流程"}</div>
              </div>
            </div>

            <div class="info-note">
              ${
                currentUser
                  ? `目前登入：${esc(currentUser.email || currentUser.uid)}`
                  : `你尚未登入。部分活動在購票前可能需要先登入或完成資格驗證。`
              }
            </div>

            <div class="hero-actions">
              <a class="btn btn-primary" href="#tickets">選擇票種</a>
              <a class="btn" href="member.html">查看帳號</a>
            </div>
          </div>
        </section>

        <section class="section" id="tickets">
          <h2 class="section-title">Choose your ticket.</h2>
          <div class="section-sub">
            選擇最適合你的票種與張數，再繼續下一步。
            ${seatMapEnabled ? "此活動有啟用座位圖，下一步會進入選位頁面。" : "此活動沒有啟用座位圖，下一步會直接進入報名 / 建立訂單流程。"}
          </div>

          <div class="ticket-layout">
            <div class="ticket-list" id="ticketList">
              ${types.map(item => renderTicketCard(item, item.id === selectedTicketTypeId)).join("")}
            </div>

            <aside class="buy-card">
              <h3 class="buy-title">購票摘要</h3>
              <div class="buy-sub">
                選擇票種後，可設定張數並繼續下一步。
              </div>

              <div class="field">
                <label>目前票種</label>
                <div class="input" style="display:flex;align-items:center;">
                  ${esc(selected?.name || "-")}
                </div>
              </div>

              <div class="field">
                <label for="quantitySel">張數</label>
                <select class="select" id="quantitySel">
                  ${[1,2,3,4,5,6,7,8].map(num => `
                    <option value="${num}" ${Number(quantity) === num ? "selected" : ""}>${num} 張</option>
                  `).join("")}
                </select>
              </div>

              <div class="summary">
                <div class="summary-row">
                  <span>活動</span>
                  <strong>${esc(currentEvent.title || "-")}</strong>
                </div>
                <div class="summary-row">
                  <span>票種</span>
                  <strong>${esc(selected?.name || "-")}</strong>
                </div>
                <div class="summary-row">
                  <span>單張價格</span>
                  <strong>${esc(formatPrice(selected?.price || 0))}</strong>
                </div>
                <div class="summary-row">
                  <span>張數</span>
                  <strong>${esc(String(quantity))}</strong>
                </div>
                <div class="summary-row">
                  <span>總計</span>
                  <strong>${esc(formatPrice(total))}</strong>
                </div>
              </div>

              <div class="notice ${canBuy ? "info" : "warn"}">
                ${
                  seatMapEnabled
                    ? "此活動已啟用座位圖。下一步將進入選位頁面。"
                    : "此活動目前未啟用座位圖。下一步將直接進入建立訂單流程。"
                }
                \n${
                  canBuy
                    ? "目前活動正在受理中，可繼續購票。"
                    : "目前尚未開放購票或活動已截止。"
                }
              </div>

              <div style="margin-top:18px;display:grid;gap:10px;">
                <button class="btn btn-primary" id="nextBtn" ${canBuy ? "" : "disabled"}>
                  ${seatMapEnabled ? "繼續選位" : "繼續購買"}
                </button>
                ${
                  !currentUser
                    ? `<a class="btn" href="login.html">先登入帳號</a>`
                    : `<a class="btn" href="member.html">查看會員中心</a>`
                }
              </div>
            </aside>
          </div>
        </section>

        ${
          detailText
            ? `
              <section class="section">
                <h2 class="section-title">About this event.</h2>
                <div class="section-sub">
                  更完整的活動內容與說明。
                </div>

                <div class="content-card">
                  <div class="content-text">${esc(detailText)}</div>
                </div>
              </section>
            `
            : ``
        }
      `;

      document.querySelectorAll("[data-ticket-id]").forEach(el => {
        el.addEventListener("click", () => {
          selectedTicketTypeId = el.dataset.ticketId || "";
          renderPage();
        });
      });

      document.getElementById("quantitySel").addEventListener("change", (e) => {
        quantity = Number(e.target.value || 1);
        renderPage();
      });

      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) {
        nextBtn.onclick = () => {
          if (!canBuy) return;

          if (!currentUser) {
            alert("請先登入帳號");
            location.href = "login.html";
            return;
          }

          if (seatMapEnabled) {
            location.href = buildSeatPickerUrl();
            return;
          }

          location.href = buildSimpleOrderUrl();
        };
      }
    }

    async function initPage(){
      if (!eventId) {
        app.className = "empty";
        app.innerHTML = "缺少活動 ID。";
        return;
      }

      currentEvent = await getEventById(eventId);

      if (!currentEvent) {
        app.className = "empty";
        app.innerHTML = "找不到活動。";
        return;
      }

      renderPage();
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      await initPage();
    });
  </script>
</body>
</html>
