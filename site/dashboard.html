<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜主選單</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f5f5f7;
      --card:rgba(255,255,255,.92);
      --card-strong:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --line-strong:rgba(0,0,0,.12);
      --shadow:0 18px 44px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.045);
      --danger:#b91c1c;
      --danger-bg:#fff1f2;
      --max:1180px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    body{
      min-height:100vh;
    }

    button,input{
      font:inherit;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:30px 20px 64px;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .24s ease, transform .24s ease;
    }

    .page.on{
      opacity:1;
      transform:translateY(0);
    }

    .page.leaving{
      opacity:0;
      transform:translateY(8px);
    }

    .hero{
      position:relative;
      overflow:hidden;
      margin-bottom:20px;
      padding:28px 26px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:34px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.95), rgba(255,255,255,.88) 42%, rgba(255,255,255,.82) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      box-shadow:0 24px 60px rgba(0,0,0,.06);
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-72px;
      top:-72px;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.04), rgba(0,0,0,0));
      pointer-events:none;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .hero-title{
      margin:0;
      font-size:clamp(30px,4.4vw,48px);
      line-height:1.04;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .hero-sub{
      margin-top:10px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      user-select:none;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
      box-shadow:var(--shadow-soft);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 26px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn[disabled],
    .btn[aria-disabled="true"]{
      opacity:.55;
      cursor:not-allowed;
      pointer-events:none;
      box-shadow:none;
      transform:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
      border-color:var(--danger);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:13px;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }

    .panel{
      margin-bottom:18px;
      padding:18px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:saturate(180%) blur(18px);
    }

    .panel-title{
      margin:0 0 12px;
      font-size:22px;
      line-height:1.2;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .panel-head .panel-title{
      margin:0;
      font-size:20px;
    }

    .alert{
      border:1px solid rgba(185,28,28,.10);
      background:var(--danger-bg);
    }

    .alert-title{
      font-size:15px;
      font-weight:800;
      color:var(--danger);
    }

    .alert-text{
      margin-top:8px;
      color:#7f1d1d;
      font-size:14px;
      line-height:1.8;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:16px;
    }

    .tile{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:12px;
      min-height:150px;
      padding:18px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:26px;
      background:var(--card-strong);
      box-shadow:var(--shadow-soft);
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }

    .tile:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 34px rgba(0,0,0,.06);
      border-color:rgba(0,0,0,.10);
    }

    .tile-title{
      margin:0;
      font-size:20px;
      line-height:1.18;
      letter-spacing:-.02em;
      font-weight:800;
      word-break:break-word;
    }

    .tile-desc{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
    }

    .gate-box{
      max-width:420px;
      margin:72px auto 0;
      padding:24px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:28px;
      background:#fff;
      box-shadow:var(--shadow);
    }

    .gate-title{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.12;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .gate-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.85;
    }

    .form-stack{
      display:grid;
      gap:10px;
      margin-top:16px;
    }

    .input{
      width:100%;
      min-height:48px;
      padding:12px 14px;
      border:1px solid var(--line-strong);
      border-radius:16px;
      background:#fff;
      color:#111;
      font-size:15px;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    .input:focus{
      border-color:rgba(0,0,0,.24);
      box-shadow:0 0 0 4px rgba(0,0,0,.04);
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:720px){
      .page{
        padding:20px 14px 52px;
      }

      .hero{
        padding:24px 18px;
        border-radius:28px;
      }

      .panel{
        border-radius:24px;
        padding:16px;
      }

      .tile{
        border-radius:22px;
      }
    }
  </style>
</head>

<body>
  <div class="page" id="pageRoot">

    <div id="gate" class="hidden"></div>

    <div id="app" class="hidden">
      <div id="impersonateBanner" class="panel alert hidden">
        <div class="panel-head" style="margin-bottom:0;">
          <div>
            <div class="alert-title">目前正在模擬帳號</div>
            <div class="alert-text" id="impersonateText"></div>
          </div>
          <div>
            <button class="btn btn-danger" id="stopImpersonateBtn">結束模擬</button>
          </div>
        </div>
      </div>

      <section class="hero">
        <div class="hero-top">
          <div>
            <h1 class="hero-title">後台主選單</h1>
            <div class="hero-sub">
              歡迎使用管理後台
            </div>
            <div class="hero-actions" style="margin-top:16px;">
              <span class="pill" id="rolePill">-</span>
              <span class="pill mono" id="email">-</span>
            </div>
          </div>

          <div class="hero-actions">
            <button class="btn" onclick="doLogout()">登出</button>
          </div>
        </div>
      </section>

      <section id="pinnedSection" class="panel hidden">
        <div class="panel-head">
          <h2 class="panel-title">常用功能</h2>
          <span class="pill mono" id="pinnedRoleTag">-</span>
        </div>
        <div class="grid" id="pinnedTiles"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">功能</h2>
        </div>
        <div class="grid" id="tiles"></div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const pageRoot = document.getElementById("pageRoot");
    const gate = document.getElementById("gate");
    const app  = document.getElementById("app");

    const tiles = document.getElementById("tiles");
    const pinnedSection = document.getElementById("pinnedSection");
    const pinnedTiles = document.getElementById("pinnedTiles");
    const pinnedRoleTag = document.getElementById("pinnedRoleTag");

    const impersonateBanner = document.getElementById("impersonateBanner");
    const impersonateText = document.getElementById("impersonateText");
    const stopImpersonateBtn = document.getElementById("stopImpersonateBtn");

    requestAnimationFrame(() => pageRoot.classList.add("on"));

    function go(href){
      pageRoot.classList.add("leaving");
      setTimeout(()=> location.href = href, 140);
    }

    document.addEventListener("click", (e)=>{
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("http")) return;
      if (a.getAttribute("aria-disabled") === "true") return;
      e.preventDefault();
      go(href);
    });

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function showGate(title, msg, showLogin){
      gate.classList.remove("hidden");
      app.classList.add("hidden");

      gate.innerHTML = `
        <div class="gate-box">
          <h1 class="gate-title">${esc(title)}</h1>
          <div class="gate-text">${msg}</div>

          ${
            showLogin ? `
              <div class="form-stack">
                <input id="loginEmail" class="input" type="text" placeholder="帳號">
                <input id="loginPassword" class="input" type="password" placeholder="密碼">
                <button class="btn btn-primary" id="loginBtn">登入</button>
              </div>
            ` : `
              <div style="margin-top:16px;">
                <button class="btn" onclick="doLogout()">登出</button>
              </div>
            `
          }
        </div>
      `;

      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn){
        loginBtn.onclick = async () => {
          const email = String(document.getElementById("loginEmail")?.value || "").trim();
          const password = String(document.getElementById("loginPassword")?.value || "");

          if (!email || !password){
            alert("請輸入帳號與密碼");
            return;
          }

          loginBtn.disabled = true;
          const oldText = loginBtn.textContent;
          loginBtn.textContent = "登入中…";

          try{
            await firebase.auth().signInWithEmailAndPassword(email, password);
          }catch(e){
            console.error(e);
            alert("登入失敗，請確認帳號密碼是否正確");
          }finally{
            loginBtn.disabled = false;
            loginBtn.textContent = oldText;
          }
        };

        const loginEmail = document.getElementById("loginEmail");
        const loginPassword = document.getElementById("loginPassword");
        const trySubmit = (ev) => {
          if (ev.key === "Enter") loginBtn.click();
        };
        loginEmail?.addEventListener("keydown", trySubmit);
        loginPassword?.addEventListener("keydown", trySubmit);
      }
    }

    window.doLogout = async () => {
      try {
        await firebase.auth().signOut();
      } catch(e){
        console.error(e);
        alert("登出失敗");
      }
    };

    const FEATURES = [
      { id:"partner-schools",       title:"特約校園管理", desc:"管理校園與驗證方式。", ready:true, href:"partner-schools.html" },
      { id:"import-verify",         title:"名單匯入",     desc:"匯入活動資格名單。", ready:true, href:"admin-studentslist-import.html" },
      { id:"admin-member-lookup",   title:"會員查詢",     desc:"查詢會員帳號資料。", ready:true, href:"admin-member-lookup.html" },

      { id:"admin-events",          title:"活動管理",     desc:"建立與設定活動。", ready:true, href:"admin-events.html" },
      { id:"admin-events-overview", title:"活動總覽",     desc:"查看全部活動。", ready:true, href:"admin-events-overview.html" },
      { id:"admin-event-orders",    title:"訂單管理",     desc:"查看訂單與報名資料。", ready:true, href:"admin-event-orders.html" },

      { id:"seat-editor",           title:"座位編輯器",   desc:"設定座位與區域。", ready:true, href:"seat-editor.html" },
      { id:"staff-checkin",         title:"核銷掃碼",     desc:"掃碼核銷入場。", ready:true, href:"staff-checkin.html" },
      { id:"service-center",        title:"服務中心",     desc:"查單、補發、處理問題。", ready:true, href:"service-center.html" },

      { id:"admin-staff-users",     title:"後台人員管理", desc:"管理後台帳號。", ready:true, href:"admin-staff-users.html" },
      { id:"admin-user-assignment", title:"權限細部設定", desc:"設定功能顯示與權限。", ready:true, href:"admin-user-assign.html" },
      { id:"org-team",              title:"組織團隊",     desc:"管理組織與人員。", ready:true, href:"org-team.html" },

      { id:"admin-dashboard-settings", title:"主選單設定", desc:"設定不同角色看到的功能。", ready:true, href:"admin-dashboard-settings.html" },
      { id:"admin-impersonate",        title:"身分模擬",   desc:"測試不同帳號權限。", ready:true, href:"admin-impersonate.html" },
      { id:"admin-platform-users",     title:"平台使用者", desc:"管理平台帳號。", ready:true, href:"admin-platform-users.html" }
    ];

    const FEATURE_MAP = new Map(FEATURES.map(x => [x.id, x]));
    const FEATURE_ORDER = new Map(FEATURES.map((x, i) => [x.id, i]));

    function sortByFeatureOrder(ids){
      return (ids || []).slice().sort((a,b)=>{
        const ia = FEATURE_ORDER.has(a) ? FEATURE_ORDER.get(a) : 9999;
        const ib = FEATURE_ORDER.has(b) ? FEATURE_ORDER.get(b) : 9999;
        return ia - ib;
      });
    }

    let currentUserData = null;
    let currentRole = "";
    let sysCfgCache = null;
    let orgCfgCache = null;

    let unsubSys = null;
    let unsubOrg = null;

    function roleIsOrg(role){
      return ["org_super","org_admin","org_staff"].includes(role);
    }

    function parseRoleCfg(roleCfg){
      const visible = [];
      const pinned = [];
      if (!roleCfg || typeof roleCfg !== "object") return { visible, pinned };

      for (const [fid, cfg] of Object.entries(roleCfg)){
        if (cfg && cfg.visible === true) visible.push(fid);
        if (cfg && cfg.pinned === true) pinned.push(fid);
      }
      return { visible, pinned };
    }

    function renderTiles(containerEl, featureIds){
      const ids = sortByFeatureOrder(featureIds)
        .map(id => FEATURE_MAP.get(id))
        .filter(Boolean);

      if (!ids.length){
        containerEl.innerHTML = "";
        return;
      }

      containerEl.innerHTML = ids.map((it) => {
        const canEnter = (it.ready === true && it.href);
        if (canEnter){
          return `
            <div class="tile">
              <div>
                <h3 class="tile-title">${esc(it.title)}</h3>
                <div class="tile-desc">${esc(it.desc || "")}</div>
              </div>
              <div>
                <a class="btn" href="${esc(it.href)}">進入</a>
              </div>
            </div>
          `;
        }
        return `
          <div class="tile">
            <div>
              <h3 class="tile-title">${esc(it.title)}</h3>
            </div>
            <div>
              <span class="btn" aria-disabled="true">未開放</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function computeAndRenderFromCache(){
      if (!currentUserData || !currentRole) return;

      const role = currentRole;
      const sys = sysCfgCache || null;
      const sysRoles = (sys && sys.roles) ? sys.roles : {};
      const sysParsed = parseRoleCfg(sysRoles[role] || {});

      const fallbackVisible = (role === "platform_super")
        ? [
            "partner-schools",
            "import-verify",
            "admin-member-lookup",
            "admin-events",
            "admin-events-overview",
            "admin-event-orders",
            "seat-editor",
            "staff-checkin",
            "service-center",
            "admin-staff-users",
            "admin-user-assignment",
            "org-team",
            "admin-dashboard-settings",
            "admin-impersonate",
            "admin-platform-users"
          ]
        : [];

      const maxVisible = sysParsed.visible.length ? sysParsed.visible : fallbackVisible;
      const maxPinned  = sysParsed.pinned.length ? sysParsed.pinned : [];

      let finalVisible = maxVisible.slice();
      let finalPinned  = maxPinned.slice();

      if (roleIsOrg(role)) {
        const orgCfg = orgCfgCache || null;
        const orgRoles = (orgCfg && orgCfg.roles) ? orgCfg.roles : {};
        const orgParsed = parseRoleCfg(orgRoles[role] || {});

        if (orgParsed.visible.length){
          const allowSet = new Set(maxVisible);
          finalVisible = orgParsed.visible.filter(id => allowSet.has(id));
        }

        if (orgParsed.pinned.length){
          const allowSet2 = new Set(finalVisible);
          finalPinned = orgParsed.pinned.filter(id => allowSet2.has(id));
        } else {
          const allowSet2 = new Set(finalVisible);
          finalPinned = finalPinned.filter(id => allowSet2.has(id));
        }
      } else {
        const allowSet2 = new Set(finalVisible);
        finalPinned = finalPinned.filter(id => allowSet2.has(id));
      }

      const autoAddForHighRoles = ["platform_super","platform_admin","org_super","org_admin"];
      if (autoAddForHighRoles.includes(role)) {
        [
          "admin-events",
          "admin-events-overview",
          "admin-event-orders",
          "seat-editor",
          "staff-checkin",
          "service-center",
          "admin-dashboard-settings"
        ].forEach(id => {
          if (!finalVisible.includes(id)) finalVisible.push(id);
        });
      }

      pinnedRoleTag.textContent = role;

      if (finalPinned.length){
        pinnedSection.classList.remove("hidden");
        renderTiles(pinnedTiles, finalPinned);
      } else {
        pinnedSection.classList.add("hidden");
        pinnedTiles.innerHTML = "";
      }

      const pinSet = new Set(finalPinned);
      const normalIds = sortByFeatureOrder(finalVisible.filter(id => !pinSet.has(id)));
      renderTiles(tiles, normalIds);
    }

    function startSysListener(){
      if (unsubSys) unsubSys();
      unsubSys = db.collection("system").doc("dashboard").onSnapshot((snap)=>{
        sysCfgCache = snap.exists ? (snap.data() || {}) : null;
        computeAndRenderFromCache();
      }, ()=>{
        computeAndRenderFromCache();
      });
    }

    function startOrgListener(orgId){
      if (unsubOrg) unsubOrg();
      orgCfgCache = null;

      if (!orgId){
        computeAndRenderFromCache();
        return;
      }

      unsubOrg = db.collection("organizations").doc(orgId)
        .collection("system").doc("dashboard")
        .onSnapshot((snap)=>{
          orgCfgCache = snap.exists ? (snap.data() || {}) : null;
          computeAndRenderFromCache();
        }, ()=>{
          computeAndRenderFromCache();
        });
    }

    function getActingUid(user){
      return sessionStorage.getItem("impersonateUid") || user.uid;
    }

    function updateImpersonateBanner(){
      const impersonateUid = sessionStorage.getItem("impersonateUid");
      const impersonateEmail = sessionStorage.getItem("impersonateEmail");
      const impersonateRole = sessionStorage.getItem("impersonateRole");
      const impersonateOrgId = sessionStorage.getItem("impersonateOrgId");
      const impersonateSchoolId = sessionStorage.getItem("impersonateSchoolId");

      if (!impersonateUid){
        impersonateBanner.classList.add("hidden");
        impersonateText.innerHTML = "";
        return;
      }

      impersonateBanner.classList.remove("hidden");
      impersonateText.innerHTML = `
        ${esc(impersonateEmail || impersonateUid)}<br>
        ${esc(impersonateRole || "-")}｜
        ${esc(impersonateOrgId || "-")}｜
        ${esc(impersonateSchoolId || "-")}
      `;
    }

    function stopImpersonate(){
      sessionStorage.removeItem("impersonateUid");
      sessionStorage.removeItem("impersonateEmail");
      sessionStorage.removeItem("impersonateRole");
      sessionStorage.removeItem("impersonateOrgId");
      sessionStorage.removeItem("impersonateSchoolId");
      sessionStorage.removeItem("impersonateTeam");
      sessionStorage.removeItem("impersonateStartedAt");
      location.reload();
    }

    stopImpersonateBtn.onclick = stopImpersonate;

    window.addEventListener("pageshow", () => {
      updateImpersonateBanner();
      computeAndRenderFromCache();
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        updateImpersonateBanner();
        computeAndRenderFromCache();
      }
    });

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user){
        currentUserData = null;
        currentRole = "";
        if (unsubSys) unsubSys();
        unsubSys = null;
        if (unsubOrg) unsubOrg();
        unsubOrg = null;
        sysCfgCache = null;
        orgCfgCache = null;

        updateImpersonateBanner();
        showGate("登入後台", "請先登入", true);
        return;
      }

      try{
        const actingUid = getActingUid(user);
        const snap = await db.collection("users").doc(actingUid).get();

        if (!snap.exists){
          currentUserData = null;
          currentRole = "";
          if (unsubSys) unsubSys();
          unsubSys = null;
          if (unsubOrg) unsubOrg();
          unsubOrg = null;
          sysCfgCache = null;
          orgCfgCache = null;

          updateImpersonateBanner();
          showGate("無法進入", "目前無法使用後台", false);
          return;
        }

        const u = snap.data() || {};

        if (u.enabled !== true){
          currentUserData = null;
          currentRole = "";
          if (unsubSys) unsubSys();
          unsubSys = null;
          if (unsubOrg) unsubOrg();
          unsubOrg = null;
          sysCfgCache = null;
          orgCfgCache = null;

          updateImpersonateBanner();
          showGate("無法進入", "目前無法使用後台", false);
          return;
        }

        const role = String(u.role || "").trim();

        if (!role){
          currentUserData = null;
          currentRole = "";
          if (unsubSys) unsubSys();
          unsubSys = null;
          if (unsubOrg) unsubOrg();
          unsubOrg = null;
          sysCfgCache = null;
          orgCfgCache = null;

          updateImpersonateBanner();
          showGate("無法進入", "目前無法使用後台", false);
          return;
        }

        currentUserData = u;
        currentRole = role;

        document.getElementById("email").textContent = (u.email || user.email || "-");
        document.getElementById("rolePill").textContent = role;

        gate.classList.add("hidden");
        app.classList.remove("hidden");

        updateImpersonateBanner();

        startSysListener();

        const orgId = String(u.orgId || u.organizationId || u.org || "").trim();
        if (roleIsOrg(role)) startOrgListener(orgId);
        else startOrgListener("");

        computeAndRenderFromCache();

      }catch(err){
        console.error(err);
        updateImpersonateBanner();
        showGate("發生錯誤", "請稍後再試", false);
      }
    });
  </script>
</body>
</html>
