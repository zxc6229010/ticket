<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>後台｜總覽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
/* ============================================================
   shared.css — 校園演唱會購票系統 共用樣式
   ============================================================ */

:root {
  --bg: #f6f7fb;
  --card: #fff;
  --text: #111;
  --muted: rgba(17,17,17,.65);
  --line: rgba(17,17,17,.10);
  --shadow: 0 14px 40px rgba(0,0,0,.08);
  --shadow-sm: 0 10px 26px rgba(0,0,0,.05);
  --danger: #b91c1c;
  --ok: #166534;
  --info: #1d4ed8;
  --warn-bg: #fff5f5;
  --warn-border: rgba(185,28,28,.18);
  --soft-bg: #f1f2f6;
  --soft-border: rgba(17,17,17,.12);

  --btn-h: 44px;
  --btn-fs: 16px;
  --r: 18px;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
}

/* ── Layout ── */
.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px;
}
.wrap-lg { max-width: 1100px; }
.wrap-xl { max-width: 1080px; }

@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
}

/* ── Cards ── */
.card, .section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 18px;
}

.card-soft, .soft {
  background: var(--soft-bg);
  border: 1px solid var(--soft-border);
}

.card-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
}

/* ── Typography ── */
h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .2px; }
h2 { margin: 0; font-size: 16px; font-weight: 900; }
h3 { margin: 0 0 6px; font-size: 15px; font-weight: 900; }

.sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.small, .hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.ok  { color: var(--ok);     font-weight: 900; }
.warn{ color: var(--danger); font-weight: 900; }
.info{ color: var(--info);   font-weight: 900; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--btn-h);
  padding: 10px 20px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-weight: 900;
  font-size: var(--btn-fs);
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  white-space: nowrap;
  transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.btn:hover  { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.btn:active { transform: translateY(0) scale(.98); box-shadow: none; }
.btn[disabled],
.btn[aria-disabled="true"] {
  opacity: .55;
  cursor: not-allowed;
  pointer-events: none;
  box-shadow: none;
  transform: none;
}

.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-danger  { background: #fff; color: var(--danger); border-color: rgba(239,68,68,.35); }
.btn-danger-fill { background: var(--danger); color: #fff; border-color: var(--danger); }

.btn-sm { height: 40px; padding: 8px 16px; font-size: 15px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, box-shadow .12s ease;
}
.tab:hover { box-shadow: 0 10px 22px rgba(0,0,0,.08); transform: translateY(-1px); }
.tab.active { background: #111; color: #fff; border-color: #111; box-shadow: none; transform: none; }

/* ── Pills & Badges ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 900;
  font-size: 14px;
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Forms ── */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 900;
}
input[type="text"],
input[type="number"],
input[type="password"],
input[type="email"],
input[type="datetime-local"],
input[type="file"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  font-size: 16px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }

/* ── Grid Helpers ── */
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.row-center { align-items: center; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.actions-end { justify-content: flex-end; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }

@media (max-width: 900px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
}

/* ── List / Item ── */
.list { display: grid; gap: 12px; }
.item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.item-title {
  margin: 0;
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
}
.meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

/* ── Table ── */
.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  font-size: 14px;
  vertical-align: top;
}
th {
  background: #fafafa;
  font-weight: 900;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }

/* ── KV Detail Block ── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 12px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
}
.kv:first-child { border-top: none; }
.kv .k { color: var(--muted); font-size: 13px; line-height: 1.5; }
.kv .v { font-size: 13px; font-weight: 900; line-height: 1.5; word-break: break-word; }

@media (max-width: 640px) {
  .kv { grid-template-columns: 105px 1fr; }
}

/* ── Modal ── */
.modal-back {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,.35);
}
.modal-back.open { display: flex; }
.modal {
  width: min(980px, 100%);
  max-height: 88vh;
  overflow: auto;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: #fff;
  box-shadow: 0 18px 60px rgba(0,0,0,.25);
}
.modal-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

/* ── Navbar ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
}
.navbar-brand {
  font-weight: 900;
  font-size: 15px;
  text-decoration: none;
  color: var(--text);
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--line);
  margin-right: 14px;
}
.navbar-crumb {
  font-size: 14px;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.navbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}
.navbar-role {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 640px) {
  .navbar { padding: 0 16px; }
  .navbar-crumb { display: none; }
}

/* ── Page transition ── */
.page {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.page.on { opacity: 1; transform: translateY(0); }
.page.leaving { opacity: 0; transform: translateY(6px); }

/* ── Tile (dashboard) ── */
.tile {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}
.tile h3 { margin: 0; font-size: 16px; }
.tile p  { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }

/* ── Divider ── */
.divider { height: 1px; background: var(--line); margin: 12px 0; }

/* ── Impersonate Banner ── */
.impersonate-banner {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.impersonate-title { font-weight: 900; color: var(--danger); }

</style>
  <style>
/* ============================================================
   sidebar.css — 後台側邊欄（圓角版，白色側欄）
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
  background: #e8eaee !important;
  display: flex !important;
  min-height: 100vh;
  padding: 12px;
  gap: 12px;
  color: #111;
}

/* ════════════════════════
   SIDEBAR — 白色左欄，圓角
════════════════════════ */
#adminSidebar {
  width: 260px;
  min-width: 260px;
  height: calc(100vh - 24px);
  position: sticky;
  top: 0;
  background: #fff;
  border-radius: 16px;           /* ← 四角都圓 */
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  /* 未登入時隱藏 */
  display: none;
}
#adminSidebar.sb-visible { display: flex; }

/* Brand */
.sb-brand {
  padding: 20px 16px 16px;
  display: flex;
  align-items: center;
  gap: 11px;
  text-decoration: none;
  flex-shrink: 0;
  border-bottom: 1px solid #f2f2f2;
}
.sb-brand-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #f0f4ff;
  font-size: 21px;
}
.sb-brand-name {
  font-size: 13px; font-weight: 900; color: #111;
  line-height: 1.35;
}
.sb-brand-sub {
  font-size: 9px; color: #bbb;
  letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px;
}

/* Nav */
.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
  scrollbar-width: thin;
  scrollbar-color: #ebebeb transparent;
}
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: #e8e8e8; border-radius: 2px; }

/* 不顯示分組標籤 */
.sb-group-label { display: none; }

.sb-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 11px;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  color: #555;
  transition: background .12s, color .12s;
  margin-bottom: 2px;
}
.sb-item:hover  { background: #f5f7fb; color: #111; }
.sb-item.sb-active {
  background: #2563eb;
  color: #fff;
  box-shadow: 0 3px 10px rgba(37,99,235,.25);
}
.sb-item[aria-disabled="true"] { opacity: .35; pointer-events: none; }

.sb-item-icon {
  width: 34px; height: 34px;
  background: #f5f7fb;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  transition: background .12s;
}
.sb-item:hover     .sb-item-icon { background: #eef2ff; }
.sb-item.sb-active .sb-item-icon { background: rgba(255,255,255,.22); }

.sb-item-label {
  font-size: 13px; font-weight: 700;
  color: inherit; line-height: 1.3;
}
.sb-item-desc {
  font-size: 11px; color: #aaa;
  line-height: 1.3; margin-top: 1px;
}
.sb-item.sb-active .sb-item-desc  { color: rgba(255,255,255,.65); }
.sb-item.sb-active .sb-item-label { color: #fff; }

/* Footer */
.sb-footer-info {
  padding: 8px 14px 6px;
  font-size: 11px; color: #bbb;
  border-top: 1px solid #f2f2f2;
  flex-shrink: 0;
  line-height: 1.6;
}

.sb-logout {
  display: flex; align-items: center; justify-content: center;
  width: calc(100% - 20px);
  margin: 6px 10px 12px;
  padding: 10px;
  border-radius: 10px;
  background: #2563eb;
  border: none; color: #fff;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background .13s;
  flex-shrink: 0;
}
.sb-logout:hover { background: #1d4ed8; }

/* Mobile toggle */
#sbToggle {
  display: none;
  position: fixed; top: 16px; left: 16px; z-index: 200;
  width: 38px; height: 38px; border-radius: 10px;
  background: #fff; border: 1px solid #e8eaed;
  color: #333; font-size: 16px; cursor: pointer;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
#sbOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 49;
}

/* ════════════════════════
   MAIN — 白色右欄，圓角
════════════════════════ */
#adminMain {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  height: calc(100vh - 24px);
  background: #fff;
  border-radius: 16px;           /* ← 四角都圓 */
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  overflow: hidden;
  /* 未登入時佔滿寬度 */
}

/* Topbar */
#adminTopbar {
  height: 56px;
  padding: 0 26px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #f2f2f2;
}
.tb-page-title {
  font-size: 15px; font-weight: 900; color: #111; flex: 1;
}
.tb-user  { display: flex; align-items: center; gap: 9px; }
.tb-info  { text-align: right; }
.tb-name  { font-size: 13px; font-weight: 800; color: #111; }
.tb-sub   { font-size: 11px; color: #aaa; margin-top: 1px; }
.tb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #60a5fa, #2563eb);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 900; flex-shrink: 0;
}
.tb-online {
  width: 8px; height: 8px;
  background: #22c55e; border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(34,197,94,.2);
}

/* Content */
#adminContent {
  flex: 1;
  overflow-y: auto;
  padding: 22px 26px 26px;
  background: #fff;
}

/* 取消 .wrap 佈局限制 */
#adminContent .wrap,
#adminContent .wrap.page {
  max-width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  opacity: 1 !important;
  transform: none !important;
  display: block !important;
}

/* Modals 不受限 */
.modalBack, .modal-back { z-index: 9999 !important; }
.modal { border-radius: 16px !important; }

/* ════════════════════════
   GATE（登入畫面）— 仿圖片風格
════════════════════════ */
body.gate-mode {
  padding: 0;
  background: #e8ecf0 !important;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
}
body.gate-mode #adminSidebar  { display: none !important; }
body.gate-mode #adminTopbar   { display: none !important; }
body.gate-mode #adminMain {
  flex: none;
  width: 100%;
  height: 100vh;
  min-height: 100vh;
  border-radius: 0;
  box-shadow: none;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px 48px;
}
body.gate-mode #adminContent {
  width: 100%;
  max-width: 480px;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: visible;
}

/* ════════════════════════
   MOBILE
════════════════════════ */
@media (max-width: 820px) {
  body { padding: 0; gap: 0; }
  #adminSidebar {
    position: fixed;
    left: -280px;
    top: 0; height: 100vh;
    border-radius: 0 16px 16px 0;
    transition: left .22s ease;
    z-index: 100;
  }
  #adminSidebar.sb-open { left: 0; }
  #sbToggle.sb-show { display: flex; }
  #sbOverlay.sb-open { display: block; }
  #adminMain  { border-radius: 0; height: 100vh; }
  #adminTopbar { padding-left: 60px; }
  #adminContent { padding: 14px; }

  body.gate-mode { padding: 16px; }
  body.gate-mode #adminMain {
    max-width: 100%; border-radius: 16px;
  }
}

  /* ══════════════════════════════════════════

  window.AppUI = {

    /** HTML 跳脫（防 XSS） */
    esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));

    norm(s) {
      return String(s ?? "").trim();
    },

    /** Firestore Timestamp → 本地時間字串 */
    tsToText(ts) {
      try {
        if (!ts) return "-";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleString("zh-Hant", { hour12: false });
      } catch { return "-"; }
    },

    /** 頁面淡入 */
    pageIn(el) {
      if (!el) return;
      requestAnimationFrame(() => el.classList.add("on"));

    go(href, pageEl) {
      const root = pageEl || document.getElementById("pageRoot");

    /** 攔截所有 <a> 的頁面跳轉並套用轉場動畫 */
    initPageLinks(pageEl) {

        const a = e.target.closest("a");
        if (!a) return;
        const href = a.getAttribute("href");
        if (!href || href.startsWith("#") || href.startsWith("http")) return;
        if (a.getAttribute("aria-disabled") === "true") return;
        e.preventDefault();
        AppUI.go(href, pageEl);
      });
    },

    /**

    showGate(gateEl, appEl, { title = "請先登入", msg = "", showEmailLogin = false, extraBtns = "" } = {}) {

      if (isGateMode) {
        // 新版：仿圖片，背景灰，白卡片

            <div style="margin-bottom:15px;">

            ${showEmailLogin
              ? `<div style="font-size:17px;font-weight:900;color:#111;margin-bottom:18px;">登入</div>`

          ${showEmailLogin ? `
            <div style="max-width:360px;display:grid;gap:10px;margin-top:8px;">
              <input id="_loginEmail" type="text" placeholder="帳號（Email）"
                style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #dde1e7;font-size:15px;outline:none;"/>
              <input id="_loginPassword" type="password" placeholder="密碼"
                style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #dde1e7;font-size:15px;outline:none;"/>
              <button id="_loginBtn" style="padding:12px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">登入</button>
              <div id="_loginMsg" style="font-size:13px;color:#dc2626;display:none;"></div>
            </div>
          ` : ""}
          ${extraBtns ? `<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">${extraBtns}</div>` : ""}
          ${!showEmailLogin && !extraBtns ? `<button class="btn" id="_logoutBtn" style="margin-top:12px;">登出</button>` : ""}
        `;
      }

      // 登入按鈕共用邏輯
      const loginBtn = document.getElementById("_loginBtn");
      if (loginBtn) {
        const doLogin = async () => {
          const emailVal = (document.getElementById("_loginEmail")?.value || "").trim();
          const pwVal    = document.getElementById("_loginPassword")?.value || "";
          const msgEl    = document.getElementById("_loginMsg");
          if (!emailVal || !pwVal) {
            if (msgEl) { msgEl.textContent = "請輸入帳號與密碼"; msgEl.style.display = "block"; }

          loginBtn.disabled = true;

          if (msgEl) msgEl.style.display = "none";
          try {
            await firebase.auth().signInWithEmailAndPassword(emailVal, pwVal);

            if (msgEl) { msgEl.textContent = "帳號或密碼錯誤，請再試一次。"; msgEl.style.display = "block"; }

            if (loginBtn.style) loginBtn.style.background = "#2563eb";

        });
      }
      const logoutBtn = document.getElementById("_logoutBtn");
      if (logoutBtn) logoutBtn.onclick = AppAuth.logout;
    } = {}) {
      if (appEl) appEl.style.display = "none";

      gateEl.innerHTML = `
        <h1 style="margin:0 0 6px; font-size:22px;">${AppUI.esc(title)}</h1>
        <div class="sub">${msg}</div>

        ${showEmailLogin ? `
          <div style="margin-top:16px; max-width:360px; display:grid; gap:10px;">
            <input
              id="_loginEmail"
              type="text"
              placeholder="帳號（Email）"
              style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;"
            />
            <input
              id="_loginPassword"
              type="password"
              placeholder="密碼"
              style="width:100%; padding:12px; border-radius:14px; border:1px solid rgba(17,17,17,.1); font-size:16px; background:#fff; outline:none;"
            />
            <button class="btn btn-primary" id="_loginBtn">登入</button>
            <div id="_loginMsg" style="font-size:13px; color:#b91c1c; display:none;"></div>
          </div>
        ` : ""}

        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
          ${extraBtns}
          ${!showEmailLogin ? `<button class="btn" id="_logoutBtn">登出</button>` : ""}
        </div>
      `;

      const loginBtn = document.getElementById("_loginBtn");
      if (loginBtn) {
        const doLogin = async () => {
          const email = (document.getElementById("_loginEmail")?.value || "").trim();
          const password = document.getElementById("_loginPassword")?.value || "";
          const msgEl = document.getElementById("_loginMsg");

          if (!email || !password) { alert("請輸入帳號與密碼"); return; }

          loginBtn.disabled = true;

          try {
            await firebase.auth().signInWithEmailAndPassword(email, password);

            loginBtn.textContent = oldText;

            if (e.key === "Enter") doLogin();

    /** 顯示 Toast 提示（輕量版，自動消失） */
    toast(msg, type = "ok", duration = 3000) {
      let el = document.getElementById("_appToast");
      if (!el) {
        el = document.createElement("div");
        el.id = "_appToast";
        el.style.cssText = `
          position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
          min-width:200px; max-width:360px; padding:12px 20px;
          border-radius:999px; font-size:14px; font-weight:900;
          box-shadow:0 10px 30px rgba(0,0,0,.15); z-index:99999;
          opacity:0; transition:opacity .2s ease, transform .2s ease;
          text-align:center; pointer-events:none;
        `;
        document.body.appendChild(el);
      }

      const colors = {
        ok:   { bg: "#166534", color: "#fff" },
        warn: { bg: "#b91c1c", color: "#fff" },
        info: { bg: "#1d4ed8", color: "#fff" },
        neutral: { bg: "#111", color: "#fff" }
      };
      const c = colors[type] || colors.neutral;
      el.style.background = c.bg;
      el.style.color = c.color;
      el.textContent = msg;

      clearTimeout(el._timer);
      requestAnimationFrame(() => {
        el.style.opacity = "1";
        el.style.transform = "translateX(-50%) translateY(0)";
      });

      el._timer = setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(-50%) translateY(10px)";
      }, duration);
    }
  };

  // 短別名

        await firebase.auth().signOut();

        console.error(e);
        alert("登出失敗（請看 Console）");
      }
    },

    /** 從 Firestore users/{uid} 讀取用戶資料 */
    async loadUser(uid) {
      const snap = await window.db.collection("users").doc(uid).get();
      if (!snap.exists) return null;
      return { id: snap.id, ...snap.data() };
    },

    /** 角色判斷 */
    isPlatform(role)      { return role === "platform_super" || role === "platform_admin"; },
    isPlatformSuper(role) { return role === "platform_super"; },
    isOrgRole(role)       { return ["org_super","org_admin","org_staff"].includes(role); },
    isProtectedSuper(u)   { return norm(u?.role) === "platform_super"; },

    /**
     * 模擬帳號（impersonate）工具
     */
    impersonate: {
      get uid()      { return sessionStorage.getItem("impersonateUid") || ""; },
      get email()    { return sessionStorage.getItem("impersonateEmail") || ""; },
      get role()     { return sessionStorage.getItem("impersonateRole") || ""; },
      get orgId()    { return sessionStorage.getItem("impersonateOrgId") || ""; },
      get schoolId() { return sessionStorage.getItem("impersonateSchoolId") || ""; },
      get active()   { return !!sessionStorage.getItem("impersonateUid"); },

      start({ uid, email, role, orgId, schoolId, team }) {
        sessionStorage.setItem("impersonateUid", uid || "");
        sessionStorage.setItem("impersonateEmail", email || "");
        sessionStorage.setItem("impersonateRole", role || "");
        sessionStorage.setItem("impersonateOrgId", orgId || "");
        sessionStorage.setItem("impersonateSchoolId", schoolId || "");
        sessionStorage.setItem("impersonateTeam", team || "");
        sessionStorage.setItem("impersonateStartedAt", new Date().toISOString());
      },

      stop() {
        [
          "impersonateUid", "impersonateEmail", "impersonateRole",
          "impersonateOrgId", "impersonateSchoolId", "impersonateTeam",
          "impersonateStartedAt"
        ].forEach(k => sessionStorage.removeItem(k));
      },

      /** 取得目前「有效」的 uid（模擬中用模擬 uid，否則用真實 uid） */
      getActingUid(realUser) {
        return sessionStorage.getItem("impersonateUid") || realUser?.uid || "";
      }

     * @param {Function} onStop — 點「結束模擬」後的回呼
     */

      const imp = AppAuth.impersonate;

      if (!imp.active) {
        banner.style.display = "none";
        return;

      banner.style.display = "flex";
      banner.innerHTML = `
        <div style="flex:1;">
          <div class="impersonate-title">⚠ 目前正在模擬帳號</div>
          <div class="sub" style="margin-top:6px;">
            模擬：<span class="mono">${esc(imp.email || imp.uid)}</span><br/>
            role：<span class="mono">${esc(imp.role || "-")}</span>｜
            orgId：<span class="mono">${esc(imp.orgId || "-")}</span>｜
            schoolId：<span class="mono">${esc(imp.schoolId || "-")}</span>
          </div>
        </div>
        <div>
          <button class="btn btn-danger-fill btn-sm" id="_stopImpersonateBtn">結束模擬</button>
        </div>
      `;

      document.getElementById("_stopImpersonateBtn").onclick = () => {
        imp.stop();
        if (typeof onStop === "function") onStop();
        else location.reload();
      };
    }

      const nav = document.createElement("nav");
      nav.id = "_appNavbar";
      nav.className = "navbar";
      nav.innerHTML = `
        <a class="navbar-brand" href="dashboard.html">後台</a>

          ${role ? `<span class="navbar-role mono">${esc(role)}</span>` : ""}
          ${showBack ? `<a class="btn btn-sm" href="dashboard.html">回主選單</a>` : ""}

      `;

      document.body.insertBefore(nav, document.body.firstChild);

      document.getElementById("_navLogoutBtn").onclick = AppAuth.logout;
    },

    /** 在導覽列更新 role / email 顯示（auth 回呼完成後呼叫） */
    update({ role = "", email = "" } = {}) {
      const roleEl = document.querySelector(".navbar-role");
      if (roleEl && role) roleEl.textContent = role;
    }
  };

  /* ══════════════════════════════════════════
     AppData — 共用資料載入
  ══════════════════════════════════════════ */
  window.AppData = {
    /** 載入全部 partnerSchools 回傳 { id: name } map */
    async loadSchoolMap() {
      const map = {};
      try {
        const snap = await window.db.collection("partnerSchools").get();
        snap.forEach(doc => {
          map[doc.id] = doc.data()?.name || doc.id;
        });
      } catch (e) { console.error("loadSchoolMap 失敗", e); }
      return map;
    },

    /** 載入全部 organizations 回傳 { id: name } map */
    async loadOrgMap() {
      const map = {};
      try {
        const snap = await window.db.collection("organizations").get();
        snap.forEach(doc => {
          map[doc.id] = doc.data()?.name || doc.id;
        });
      } catch (e) { console.error("loadOrgMap 失敗", e); }
      return map;
    },

    /**
     * 產生 <select> 的 <option> HTML（school）
     * @param {Object} schoolMap
     * @param {string} selectedId
     */
    buildSchoolOptions(schoolMap, selectedId = "") {
      const sel = norm(selectedId);
      const keys = Object.keys(schoolMap).sort((a, b) =>
        (schoolMap[a] || a).localeCompare(schoolMap[b] || b, "zh-Hant")
      );
      return `
        <option value="">（未設定）</option>
        ${keys.map(id => `
          <option value="${esc(id)}" ${sel === id ? "selected" : ""}>
            ${esc(schoolMap[id] ? `${schoolMap[id]}（${id}）` : id)}
          </option>
        `).join("")}
      `;
    },

    /**
     * 產生 <select> 的 <option> HTML（org）
     */
    buildOrgOptions(orgMap, selectedId = "") {
      const sel = norm(selectedId);
      const keys = Object.keys(orgMap).sort((a, b) =>
        (orgMap[a] || a).localeCompare(orgMap[b] || b, "zh-Hant")
      );
      return `
        <option value="">（未設定）</option>
        ${keys.map(id => `
          <option value="${esc(id)}" ${sel === id ? "selected" : ""}>
            ${esc(orgMap[id] ? `${orgMap[id]}（${id}）` : id)}
          </option>
        `).join("")}
      `;
    }
  };

})();

  /* ── 載入活動摘要 ── */
  async function loadEvents(schoolId, isPlatform) {
    const card = document.getElementById("cardEvents");
    try {
      let q = db.collection("events").orderBy("createdAt","desc").limit(10);
      if (!isPlatform && schoolId) {
        q = db.collection("events").where("ownerSchoolId","==",schoolId)
              .orderBy("createdAt","desc").limit(10);
      }
      const snap = await q.get();
      const events = snap.docs.map(d => ({ id:d.id, ...d.data() }));

      const published = events.filter(e => e.published===true || e.status==="published");
      const drafts    = events.filter(e => e.published!==true && e.status!=="published");

      let html = `<div class="dash-card-title">活動狀況</div>`;

      if (!events.length) {
        html += `<div class="dash-row">
          <div class="dash-row-label">目前沒有活動</div>
          <a class="dash-view-link" href="admin-events.html">建立 →</a>
        </div>`;
      } else {
        html += `
          <div class="dash-row">
            <div>
              <div class="dash-row-label">已發布活動</div>
            </div>
            <div style="text-align:right;">
              <div class="big-stat">
                <span class="big-stat-num">${published.length}</span>
                <span class="big-stat-unit">場</span>
              </div>
            </div>
          </div>`;

        // 列出最近 3 筆已發布活動
        published.slice(0,3).forEach(e => {
          const title = esc(norm(e.title || e.id));
          html += `
            <div class="dash-row">
              <div>
                <div class="dash-row-label">${title}</div>
                <div class="dash-row-sub">${esc(norm(e.ownerSchoolId==="__global__"?"平台活動":e.ownerSchoolId||""))}</div>
              </div>
              <div style="text-align:right;">
                <span class="status-badge ${e.published===true?"status-open":"status-draft"}">
                  ${e.published===true?"已發布":"草稿"}
                </span>
                <a class="dash-view-link" href="admin-events.html">查看</a>
              </div>
            </div>`;
        });

        if (drafts.length) {
          html += `
            <div class="dash-row" style="padding-top:10px;border-top:1px solid #f5f5f5;margin-top:4px;">
              <div class="dash-row-label" style="color:#aaa;">草稿</div>
              <div class="dash-row-value" style="color:#aaa;">${drafts.length} 場</div>
            </div>`;
        }
      }

      html += `<div style="margin-top:12px;">
        <a href="admin-events.html" style="font-size:12px;font-weight:700;color:#2563eb;text-decoration:none;">
          前往活動管理 →
        </a>

      card.innerHTML = html;

      card.innerHTML = `<div class="dash-card-title">活動狀況</div>
        <div class="dash-row-sub">載入失敗：${esc(e.message)}</div>`;

  /* ── 載入待審核申請（快速提醒） ── */
  async function loadReminders(isPlatform) {
    const card = document.getElementById("cardReminders");
    try {
      const rows = [];

      if (isPlatform) {
        // 待審核帳號申請
        const reqSnap = await db.collection("accessRequests")
          .where("status","==","pending").limit(99).get();
        rows.push({
          label: "待審核帳號申請",
          sub:   "後台帳號申請等待審核",
          count: reqSnap.size,
          href:  "admin-user-assign.html"
        });
      }

      // 目前報名中訂單總數（隨機取 5 場統計）
      const evtSnap = await db.collection("events")
        .where("published","==",true).limit(5).get();
      let totalOrders = 0;
      let checkedIn   = 0;
      for (const doc of evtSnap.docs) {
        const ordSnap = await db.collection("events").doc(doc.id)
          .collection("orders").limit(500).get();
        totalOrders += ordSnap.size;
        ordSnap.forEach(d => { if((d.data()||{}).checkedIn===true) checkedIn++; });
      }
      rows.push({
        label: "報名訂單總數",
        sub:   `已入場 ${checkedIn} 筆`,
        count: totalOrders,
        href:  "admin-event-orders.html"
      });

      let html = `<div class="dash-card-title">快速提醒</div>`;
      if (!rows.length) {
        html += `<div class="dash-row-sub">目前沒有提醒事項</div>`;
      } else {
        rows.forEach(r => {
          html += `
            <div class="notice-item">
              <div>
                <div class="notice-label">${esc(r.label)}</div>
                <div class="notice-sub">${esc(r.sub)}</div>

                <a class="dash-view-link" href="${esc(r.href)}">查看</a>
              </div>
            </div>`;
        });
      }
      card.innerHTML = html;
    } catch(e) {
      card.innerHTML = `<div class="dash-card-title">快速提醒</div>
        <div class="dash-row-sub">載入失敗：${esc(e.message)}</div>`;
    }
  }

          label: "已完成校園驗證",

          count: vSnap.size
        });
      }

      // 活動未入場訂單
      const evtSnap = await db.collection("events")
        .where("published","==",true).limit(3).get();
      let pending = 0;
      for (const doc of evtSnap.docs) {
        const oSnap = await db.collection("events").doc(doc.id)
          .collection("orders").where("checkedIn","==",false).limit(200).get();
        pending += oSnap.size;
      }
      rows.push({
        label: "未入場訂單",
        sub:   "仍待核銷入場",
        count: pending,
        href:  "admin-event-orders.html"
      });

      let html = `<div class="dash-card-title">通知中心</div>`;
      rows.forEach(r => {
        html += `
          <div class="notice-item">
            <div>
              <div class="notice-label">${esc(r.label)}</div>
              <div class="notice-sub">${esc(r.sub)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">

      html += `<div style="margin-top:10px;font-size:12px;color:#ccc;">

      card.innerHTML = html;
    } catch(e) {
      card.innerHTML = `<div class="dash-card-title">通知中心</div>
        <div class="dash-row-sub">載入失敗：${esc(e.message)}</div>`;
    }
  }

  /* ── 帳號資訊卡 ── */

      <div class="dash-row" style="margin-top:4px;padding-top:12px;border-top:1px solid #f5f5f5;">
        <div class="dash-row-label" style="color:#aaa;">系統時間</div>
        <div class="dash-row-value" style="color:#aaa;font-size:12px;" id="sysTimeTxt">${timeStr()}</div>

    // 每分鐘更新系統時間
    setInterval(() => {
      const el = document.getElementById("sysTimeTxt");
      if (el) el.textContent = timeStr();

  /* ── 狀態 ── */
  let unsubSys=null, unsubOrg=null;

  function clearSubs() {
    if(unsubSys){unsubSys();unsubSys=null;}
    if(unsubOrg){unsubOrg();unsubOrg=null;}
  }

  window.addEventListener("pageshow", refreshBanner);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) refreshBanner(); });

  /* ── Auth ── */
  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      clearSubs();
      if (window.SidebarHide) SidebarHide();
      showGate({ icon:"🔐", title:"後台管理系統", msg:"請登入你的管理帳號。", showLogin:true });
      return;
    }
    try {
      const uid = AppAuth.impersonate.getActingUid(user);
      const u   = await AppAuth.loadUser(uid);

      if (!u) {
        clearSubs();
        showGate({ icon:"🚫", title:"尚未擁有後台權限",
          msg:`帳號 <strong>${esc(user.email||"-")}</strong> 尚未被授權。`,
          extraBtns:`<button onclick="location.href='request-access.html'"
            style="padding:9px 18px;border-radius:10px;background:#2563eb;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;">
            申請後台帳號
          </button>` });
        return;
      }
      if (u.enabled!==true) {
        clearSubs();
        showGate({ icon:"⛔", title:"後台權限未啟用",
          msg:`帳號 <strong>${esc(u.email||user.email)}</strong> 目前已停用。` });
        return;
      }
      const role = norm(u.role);
      if (!role) {
        clearSubs();
        showGate({ icon:"⏳", title:"尚未完成角色指派",
          msg:"你的帳號已登錄，等候管理員審核。" });
        return;
      }

      // 顯示 App + 側邊欄
      gateWrap.style.display = "none";
      appEl.style.display    = "block";
      if (window.SidebarShow) SidebarShow(email, role);
      refreshBanner();

      // 更新右上角用戶資訊
      const email = u.email || user.email || "-";
      const dispName = u.displayName || u.name || email.split("@")[0];
      const ROLE_LABEL = {
        platform_super:"超級管理員",platform_admin:"平台管理員",
        org_super:"組織超管",org_admin:"組織管理員",org_staff:"組織人員"
      };
      dashUserName.innerHTML = `${esc(ROLE_LABEL[role]||role)} ｜ ${esc(dispName)}`;
      dashUserEmail.textContent = email;
      dashSub.textContent = `系統時間：${timeStr()}`;

      const isPlatform = role==="platform_super"||role==="platform_admin";
      const schoolId   = norm(u.schoolId||u.orgSchoolId||"");

      // 載入所有摘要
      renderAccount(u, user);
      loadEvents(schoolId, isPlatform);
      loadReminders(isPlatform);
      loadNotices(schoolId);

    } catch(err) {
      console.error(err);
      clearSubs();
      showGate({ icon:"💥", title:"發生錯誤", msg:"無法讀取權限資料，請稍後再試。" });
    }
  });

})();

</script>
  <script>
/**
 * sidebar.js — 後台側邊欄（登入前隱藏，登入後顯示）
 */
(function () {
  "use strict";

  const NAV = [
    { g:"活動", e:"🎟️", t:"活動管理",       d:"建立活動 / 票種",        h:"admin-events.html" },
    { g:"活動", e:"🧾", t:"訂單 / 報名資料", d:"報名清單、匯出、核銷",  h:"admin-event-orders.html" },
    { g:"校園", e:"🏫", t:"特約校園管理",     d:"校園設定 / 停用",        h:"partner-schools.html" },
    { g:"校園", e:"📥", t:"名單匯入 / 驗證", d:"匯入名單、驗證設定",     h:"admin-studentslist-import.html" },
    { g:"校園", e:"🔎", t:"會員查詢",         d:"查詢帳號與驗證狀態",     h:"admin-member-lookup.html" },
    { g:"人事", e:"🧑‍💼", t:"後台帳號管理",     d:"建立、審核、派發",       h:"admin-staff-users.html" },
    { g:"人事", e:"🏢", t:"全組織管理",        d:"各校管理人員一覽",       h:"admin-org-overview.html" },
    { g:"人事", e:"👥", t:"組織團隊",          d:"管理員 / 服務員 / 組別", h:"org-team.html" },
    { g:"入場", e:"✅", t:"核銷掃碼",          d:"掃碼核銷指定活動",       h:"staff-checkin.html" },
    { g:"入場", e:"🛠️", t:"服務中心核銷",      d:"條碼槍查詢與核銷",       h:"admin-checkin-assist.html" },
    { g:"系統", e:"⚙️", t:"Dashboard 設定",   d:"各角色顯示 / 置頂",     h:"admin-dashboard-settings.html" },
    { g:"系統", e:"🧪", t:"身分測試切換",      d:"模擬其他帳號",            h:"admin-impersonate.html" },
    { g:"系統", e:"📝", t:"後台帳號申請",      d:"填寫申請",                h:"request-access.html" },
  ];

  const esc = s => String(s ?? "").replace(/[&<>"']/g,
    m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])
  );
  const cur = location.pathname.split("/").pop() || "";

  function pageTitle() {
    return document.title.replace(/^後台[｜|]/, "").trim()
      || document.querySelector("h1")?.textContent?.trim() || "後台管理";
  }

  /* ── 建構側邊欄 HTML ── */
  function buildSidebar() {
    const nav = NAV.map(n => `
      <a class="sb-item${cur === n.h ? " sb-active" : ""}" href="${esc(n.h)}">
        <div class="sb-item-icon">${n.e}</div>
        <div>
          <div class="sb-item-label">${esc(n.t)}</div>
          <div class="sb-item-desc">${esc(n.d)}</div>
        </div>
      </a>`).join("");

    const el = document.createElement("nav");
    el.id = "adminSidebar";   // 預設 display:none，登入後加 .sb-visible
    el.innerHTML = `
      <a class="sb-brand" href="dashboard.html">
        <div class="sb-brand-icon">🎤</div>
        <div>
          <div class="sb-brand-name">演唱會購票系統</div>
          <div class="sb-brand-sub">Admin Panel</div>
        </div>
      </a>
      <nav class="sb-nav">${nav}</nav>
      <div class="sb-footer-info" id="sbFooterInfo"></div>
      <button class="sb-logout" id="sbLogoutBtn">登出</button>`;
    return el;
  }

  /* ── 建構 Topbar ── */
  function buildTopbar() {
    const el = document.createElement("div");
    el.id = "adminTopbar";
    el.innerHTML = `
      <div class="tb-page-title">${esc(pageTitle())}</div>
      <div class="tb-user">
        <div class="tb-online"></div>
        <div class="tb-info">
          <div class="tb-name" id="sbName">-</div>
          <div class="tb-sub"  id="sbRole">-</div>
        </div>
        <div class="tb-avatar" id="sbAvatar">?</div>
      </div>`;
    return el;
  }

  /* ── 注入框架（只建結構，不顯示側欄） ── */
  function inject() {
    if (document.getElementById("adminSidebar")) return;

    // 1. 把現有 body 內容包進 #adminContent
    const content = document.createElement("div");
    content.id = "adminContent";
    while (document.body.firstChild) content.appendChild(document.body.firstChild);

    // 2. Mobile helpers
    const toggle  = document.createElement("button");
    toggle.id = "sbToggle"; toggle.innerHTML = "☰";
    toggle.setAttribute("aria-label", "選單");

    const overlay = document.createElement("div");
    overlay.id = "sbOverlay";

    // 3. Main 區域
    const main = document.createElement("div");
    main.id = "adminMain";
    main.appendChild(buildTopbar());
    main.appendChild(content);

    // 4. 組裝（側邊欄先隱藏）
    document.body.appendChild(toggle);
    document.body.appendChild(overlay);
    document.body.appendChild(buildSidebar());
    document.body.appendChild(main);

    // 5. 一開始進入「gate mode」— body 加 class
    document.body.classList.add("gate-mode");

    // 6. 事件
    const sidebar = document.getElementById("adminSidebar");
    toggle.onclick  = () => { sidebar.classList.toggle("sb-open"); overlay.classList.toggle("sb-open"); };
    overlay.onclick = () => { sidebar.classList.remove("sb-open"); overlay.classList.remove("sb-open"); };
    document.getElementById("sbLogoutBtn").onclick = () => {
      if (typeof AppAuth !== "undefined") AppAuth.logout();
      else if (typeof firebase !== "undefined") firebase.auth().signOut();
    };

    if (typeof AppUI !== "undefined") AppUI.initPageLinks(document.body);
  }

  /* ── 登入成功後「解鎖」佈局 ── */
  window.SidebarShow = function(email, role) {
    document.body.classList.remove("gate-mode");

    const sidebar = document.getElementById("adminSidebar");
    if (sidebar) sidebar.classList.add("sb-visible");  // display:flex

    const toggle = document.getElementById("sbToggle");
    if (toggle) toggle.classList.add("sb-show");       // mobile 才顯示

    // 更新 topbar
    const name  = document.getElementById("sbName");
    const roleEl= document.getElementById("sbRole");
    const avatar= document.getElementById("sbAvatar");
    const footer= document.getElementById("sbFooterInfo");

    if (name)   name.textContent   = email || "-";
    if (roleEl) roleEl.textContent = role  || "-";
    if (avatar) avatar.textContent = (email||"?")[0].toUpperCase();
    if (footer) footer.textContent = `角色：${role}`;
  };

  /* ── 登出後「鎖回」gate mode ── */
  window.SidebarHide = function() {
    document.body.classList.add("gate-mode");
    const sidebar = document.getElementById("adminSidebar");
    if (sidebar) {
      sidebar.classList.remove("sb-visible");
      sidebar.classList.remove("sb-open");
    }
    const overlay = document.getElementById("sbOverlay");
    if (overlay) overlay.classList.remove("sb-open");
    const toggle = document.getElementById("sbToggle");
    if (toggle) toggle.classList.remove("sb-show");
  };

  /* ── Auth 監聽（只更新 topbar，不控制顯示邏輯） ── */
  function watchAuth() {
    if (typeof firebase === "undefined") return;
    firebase.auth().onAuthStateChanged(async user => {
      if (!user) { window.SidebarHide && SidebarHide(); return; }
      try {
        const db  = window.db || firebase.firestore();
        const uid = (typeof AppAuth !== "undefined")
          ? AppAuth.impersonate.getActingUid(user) : user.uid;
        const snap = await db.collection("users").doc(uid).get();
        const u    = snap.exists ? (snap.data() || {}) : {};
        const email= u.email || user.email || "";
        const role = u.role  || "";
        // 顯示控制交由各頁面的 dashboard.js / 主 JS 呼叫 SidebarShow()
        // 這裡只更新 topbar（非 gate-mode 才有意義）
        if (!document.body.classList.contains("gate-mode")) {
          window.SidebarShow && SidebarShow(email, role);
        }
      } catch (_) {}
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => { inject(); watchAuth(); });
  } else {
    inject(); watchAuth();
  }

})();

</script>
