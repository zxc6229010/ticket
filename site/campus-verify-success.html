<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>校園驗證完成｜Tickets</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);

      --ok:#166534;
      --ok-bg:#dcfce7;
      --warn:#b91c1c;
      --warn-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;

      --max:980px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, background .12s ease;
      box-shadow:var(--shadow-soft);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn:active{
      transform:translateY(0) scale(.98);
      box-shadow:none;
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      width:100%;
      padding:34px 22px 88px;
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .result-card{
      width:100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.96), rgba(255,255,255,.90) 42%, rgba(255,255,255,.84) 100%),
        linear-gradient(180deg,#ffffff 0%, #f7f7f8 100%);
      border:1px solid rgba(0,0,0,.05);
      border-radius:40px;
      box-shadow:0 24px 60px rgba(0,0,0,.06);
      padding:42px 32px;
      position:relative;
      overflow:hidden;
    }

    .result-card::after{
      content:"";
      position:absolute;
      right:-70px;
      top:-80px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.03), rgba(0,0,0,0));
      pointer-events:none;
    }

    .icon{
      width:72px;
      height:72px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:800;
      margin-bottom:18px;
      box-shadow:var(--shadow-soft);
    }

    .icon.ok{
      background:var(--ok-bg);
      color:var(--ok);
    }

    .icon.warn{
      background:var(--warn-bg);
      color:var(--warn);
    }

    .icon.info{
      background:var(--blue-bg);
      color:var(--blue);
    }

    .title{
      margin:0;
      font-size:clamp(32px, 5vw, 54px);
      line-height:1.05;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .sub{
      margin-top:16px;
      max-width:760px;
      color:var(--muted);
      font-size:16px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .notice{
      margin-top:22px;
      padding:16px 18px;
      border-radius:22px;
      border:1px solid rgba(0,0,0,.06);
      background:#fff;
      font-size:14px;
      line-height:1.9;
      box-shadow:var(--shadow-soft);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .notice.ok{
      background:var(--ok-bg);
      color:var(--ok);
      border-color:rgba(22,101,52,.10);
    }

    .notice.warn{
      background:var(--warn-bg);
      color:var(--warn);
      border-color:rgba(185,28,28,.10);
    }

    .notice.info{
      background:var(--blue-bg);
      color:var(--blue);
      border-color:rgba(29,78,216,.10);
    }

    .meta{
      margin-top:20px;
      display:grid;
      gap:10px;
    }

    .meta-row{
      display:flex;
      justify-content:space-between;
      gap:14px;
      padding:12px 0;
      border-top:1px dashed rgba(0,0,0,.08);
      font-size:14px;
      line-height:1.8;
    }

    .meta-row:first-child{
      border-top:none;
      padding-top:0;
    }

    .meta-label{
      color:var(--muted);
      font-weight:700;
      flex:0 0 110px;
    }

    .meta-value{
      text-align:right;
      font-weight:800;
      word-break:break-word;
      flex:1;
    }

    .actions{
      margin-top:28px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .footer-note{
      margin-top:26px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:860px){
      .page{
        padding:22px 16px 72px;
      }

      .result-card{
        border-radius:28px;
        padding:28px 20px;
      }

      .meta-row{
        flex-direction:column;
        gap:4px;
      }

      .meta-value{
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">T</span>
          <span>Tickets</span>
        </a>

        <div class="nav-actions">
          <a class="btn" href="member.html">會員中心</a>
        </div>
      </div>
    </div>

    <main class="page">
      <section class="result-card">
        <div id="loadingState">
          <div class="icon info">…</div>
          <h1 class="title">正在確認驗證結果</h1>
          <div class="sub">系統正在處理這次校園驗證，請稍候一下。</div>
          <div class="notice info">正在驗證連結有效性與綁定資料…</div>
        </div>

        <div id="successState" class="hidden">
          <div class="icon ok">✓</div>
          <h1 class="title">校園驗證完成</h1>
          <div class="sub">你的帳號已成功完成校園身分綁定。
之後系統會依照這份綁定資料，判斷你是否符合特定活動的報名資格。</div>

          <div class="notice ok" id="successNotice">
            驗證成功。
          </div>

          <div class="meta" id="successMeta"></div>

          <div class="actions">
            <a class="btn btn-primary" href="member.html">前往會員中心</a>
            <a class="btn" href="campus-verify.html">返回校園驗證</a>
          </div>

          <div class="footer-note">
            若畫面資料未立即更新，可回到會員中心重新整理頁面。
          </div>
        </div>

        <div id="errorState" class="hidden">
          <div class="icon warn">!</div>
          <h1 class="title">驗證失敗</h1>
          <div class="sub">這次驗證沒有成功完成，可能是連結已失效、已使用，或資料不符合規則。</div>

          <div class="notice warn" id="errorNotice">
            驗證失敗。
          </div>

          <div class="actions">
            <a class="btn btn-primary" href="campus-verify.html">返回重新驗證</a>
            <a class="btn" href="member.html">回會員中心</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function norm(v){
      return String(v ?? "").trim();
    }

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function getToken(){
      const sp = new URLSearchParams(location.search);
      return norm(sp.get("token"));
    }

    function showState(type){
      document.getElementById("loadingState").classList.add("hidden");
      document.getElementById("successState").classList.add("hidden");
      document.getElementById("errorState").classList.add("hidden");

      if (type === "success") {
        document.getElementById("successState").classList.remove("hidden");
      } else if (type === "error") {
        document.getElementById("errorState").classList.remove("hidden");
      } else {
        document.getElementById("loadingState").classList.remove("hidden");
      }
    }

    function renderSuccess(data){
      const notice = document.getElementById("successNotice");
      const meta = document.getElementById("successMeta");

      const schoolName = norm(data?.schoolName || data?.verifiedSchoolName || "");
      const schoolId = norm(data?.schoolId || data?.verifiedSchoolId || "");
      const schoolEmail = norm(data?.schoolEmail || "");
      const verifyMethod = norm(data?.verifyMethod || "email");

      notice.innerHTML = `
        驗證成功，校園身分已綁定到你的帳號。
      `;

      const rows = [
        schoolName ? `
          <div class="meta-row">
            <div class="meta-label">學校</div>
            <div class="meta-value">${esc(schoolName)}</div>
          </div>
        ` : "",
        schoolId ? `
          <div class="meta-row">
            <div class="meta-label">schoolId</div>
            <div class="meta-value">${esc(schoolId)}</div>
          </div>
        ` : "",
        schoolEmail ? `
          <div class="meta-row">
            <div class="meta-label">學校信箱</div>
            <div class="meta-value">${esc(schoolEmail)}</div>
          </div>
        ` : "",
        `
          <div class="meta-row">
            <div class="meta-label">驗證方式</div>
            <div class="meta-value">${esc(verifyMethod)}</div>
          </div>
        `
      ].filter(Boolean).join("");

      meta.innerHTML = rows;
      showState("success");
    }

    function renderError(message){
      const notice = document.getElementById("errorNotice");
      notice.textContent = message || "驗證失敗，請重新操作。";
      showState("error");
    }

    async function confirmToken(){
      const token = getToken();

      if (!token) {
        renderError("缺少驗證 token，請重新從信件中的連結開啟。");
        return;
      }

      showState("loading");

      try {
        const response = await fetch("/api/confirmCampusVerification", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data?.error || "驗證失敗");
        }

        renderSuccess(data || {});
      } catch (err) {
        console.error(err);
        renderError(err?.message || "驗證失敗，請稍後再試。");
      }
    }

    confirmToken();
  </script>
</body>
</html>
