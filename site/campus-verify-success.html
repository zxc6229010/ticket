<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>校園驗證結果</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 20px 48px rgba(0,0,0,.08);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);

      --ok:#166534;
      --ok-bg:#dcfce7;
      --warn:#b91c1c;
      --warn-bg:#fee2e2;
      --blue:#1d4ed8;
      --blue-bg:#dbeafe;

      --max:760px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:var(--max);
      background:#fff;
      border:1px solid var(--line);
      border-radius:34px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .head{
      padding:28px 28px 18px;
      background:linear-gradient(180deg,#fff 0%, #f8f8fa 100%);
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .brand{
      display:inline-flex;
      width:44px;
      height:44px;
      border-radius:12px;
      align-items:center;
      justify-content:center;
      background:#111;
      color:#fff;
      font-weight:900;
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:32px;
      line-height:1.1;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
    }

    .body{
      padding:24px 28px 28px;
    }

    .notice{
      border-radius:22px;
      padding:18px 18px;
      line-height:1.9;
      font-size:14px;
      border:1px solid rgba(0,0,0,.06);
      background:#fff;
      box-shadow:var(--shadow-soft);
    }

    .notice.ok{
      background:var(--ok-bg);
      color:var(--ok);
      border-color:rgba(22,101,52,.12);
    }

    .notice.warn{
      background:var(--warn-bg);
      color:var(--warn);
      border-color:rgba(185,28,28,.12);
    }

    .notice.info{
      background:var(--blue-bg);
      color:var(--blue);
      border-color:rgba(29,78,216,.12);
    }

    .actions{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      font-size:14px;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="brand">T</div>
        <h1>校園驗證結果</h1>
        <div class="sub">系統正在處理你的校園身分驗證。</div>
      </div>

      <div class="body">
        <div id="resultBox" class="notice info">
          驗證中，請稍候…
        </div>

        <div class="actions">
          <a class="btn" href="index.html">回首頁</a>
          <a class="btn btn-primary" href="member.html">前往會員中心</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const resultBox = document.getElementById("resultBox");

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function getQueryToken(){
      const sp = new URLSearchParams(location.search);
      return String(sp.get("token") || "").trim();
    }

    async function runConfirm(){
      const token = getQueryToken();

      if (!token) {
        resultBox.className = "notice warn";
        resultBox.innerHTML = "缺少驗證 token，無法完成驗證。";
        return;
      }

      try {
        const response = await fetch("/api/confirmCampusVerification", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "驗證失敗");
        }

        resultBox.className = "notice ok";
        resultBox.innerHTML = `
          <div style="font-weight:800;">校園身分綁定成功</div>
          <div style="margin-top:6px;">
            你的帳號已完成校園驗證，之後系統會依照此綁定資料判斷活動資格。
          </div>
        `;
      } catch (e) {
        console.error(e);
        resultBox.className = "notice warn";
        resultBox.innerHTML = `
          <div style="font-weight:800;">驗證失敗</div>
          <div style="margin-top:6px;">
            ${esc(e.message || "發生錯誤，請稍後再試。")}
          </div>
        `;
      }
    }

    runConfirm();
  </script>
</body>
</html>
