<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passium</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --text:#1d1d1f;
      --muted:#6e6e73;
      --line:rgba(0,0,0,.08);
      --shadow:0 16px 40px rgba(0,0,0,.06);
      --shadow-soft:0 10px 24px rgba(0,0,0,.04);
      --black:#111111;
      --green:#166534;
      --green-bg:#dcfce7;
      --orange:#c2410c;
      --orange-bg:#ffedd5;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --max:1280px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Noto Sans TC",sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
    }

    .shell{
      min-height:100vh;
    }

    .nav-wrap{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:saturate(180%) blur(18px);
      background:rgba(245,245,247,.78);
      border-bottom:1px solid rgba(0,0,0,.05);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .brand-mark{
      width:28px;
      height:28px;
      border-radius:9px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      transition:color .15s ease;
    }

    .nav-link:hover{
      color:var(--text);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .account-icon-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-soft);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor:pointer;
    }

    .account-icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .account-icon-btn svg{
      width:18px;
      height:18px;
      color:#111;
    }

    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:38px 22px 80px;
    }

    .section{
      margin-top:20px;
    }

    .section + .section{
      margin-top:72px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .section-title{
      margin:0;
      font-size:clamp(30px, 4vw, 48px);
      line-height:1.04;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .section-sub{
      margin-top:10px;
      max-width:760px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
      white-space:pre-wrap;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:18px;
    }

    @media (max-width:1100px){
      .grid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width:720px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    .event-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .event-card:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 40px rgba(0,0,0,.07);
      border-color:rgba(0,0,0,.10);
    }

    .event-cover{
      aspect-ratio:16/10;
      background:linear-gradient(180deg,#f3f4f6 0%, #e5e7eb 100%);
      overflow:hidden;
    }

    .event-cover img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .event-cover-placeholder{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#b0b0b6;
      font-size:22px;
      font-weight:800;
    }

    .event-body{
      padding:20px 20px 22px;
    }

    .event-status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      width:max-content;
      margin-bottom:14px;
      border:1px solid transparent;
    }

    .event-status.selling{
      background:var(--green-bg);
      color:var(--green);
      border-color:rgba(22,101,52,.08);
    }

    .event-status.upcoming{
      background:var(--orange-bg);
      color:var(--orange);
      border-color:rgba(194,65,12,.08);
    }

    .event-status.ended{
      background:var(--red-bg);
      color:var(--red);
      border-color:rgba(185,28,28,.08);
    }

    .event-status.hidden{
      background:#f3f4f6;
      color:#4b5563;
      border-color:rgba(0,0,0,.05);
    }

    .event-title{
      margin:0;
      font-size:24px;
      line-height:1.14;
      letter-spacing:-.03em;
      font-weight:800;
    }

    .event-desc{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.9;
      min-height:80px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .event-meta{
      margin-top:14px;
      display:grid;
      gap:8px;
      color:#3f3f46;
      font-size:13px;
      line-height:1.8;
    }

    .event-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:11px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .btn-primary{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .loading,
    .empty{
      padding:42px 0;
      text-align:center;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
    }

    .footer{
      margin-top:78px;
      padding-top:26px;
      border-top:1px solid rgba(0,0,0,.07);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:20px;
    }

    @media (max-width:560px){
      .footer{
        grid-template-columns:1fr;
      }
    }

    .footer-title{
      font-size:13px;
      font-weight:800;
      color:#111;
      margin-bottom:12px;
    }

    .footer-link{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:2;
    }

    .footer-link:hover{
      color:var(--text);
    }

    .copyright{
      margin-top:30px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="nav-wrap">
      <div class="nav">
        <a class="brand" href="index.html">
          <span class="brand-mark">P</span>
          <span>Passium</span>
        </a>

        <div class="nav-links">
          <a class="nav-link" href="#featured">精選活動</a>
          <a class="nav-link" href="#upcoming">即將開始</a>
          <a class="nav-link" href="my-tickets.html">我的票券</a>
          <a class="nav-link" href="my-orders.html">我的訂單</a>
        </div>

        <div class="nav-actions">
          <a class="account-icon-btn" id="accountBtn" href="login.html" aria-label="登入 / 會員中心" title="登入 / 會員中心">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4.25 4.25 0 1 0 0-8.5A4.25 4.25 0 0 0 12 12Zm0 2.25c-4.486 0-8.25 2.3-8.25 5.25a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75c0-2.95-3.764-5.25-8.25-5.25Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <main class="page">
      <section class="section" id="featured">
        <div class="section-head">
          <div>
            <h2 class="section-title">精選活動</h2>
            <div class="section-sub">
              目前公開中的活動會優先顯示在這裡。
            </div>
          </div>
        </div>
        <div id="featuredGrid" class="grid">
          <div class="loading" style="grid-column:1/-1;">載入中…</div>
        </div>
      </section>

      <section class="section" id="upcoming">
        <div class="section-head">
          <div>
            <h2 class="section-title">即將開始</h2>
            <div class="section-sub">
              尚未開賣但已公開的活動會顯示在這裡。
            </div>
          </div>
        </div>
        <div id="upcomingGrid" class="grid">
          <div class="loading" style="grid-column:1/-1;">載入中…</div>
        </div>
      </section>

      <footer class="footer">
        <div>
          <div class="footer-title">Events</div>
          <a class="footer-link" href="#featured">精選活動</a>
          <a class="footer-link" href="#upcoming">即將開始</a>
        </div>

        <div>
          <div class="footer-title">Account</div>
          <a class="footer-link" href="member.html">會員中心</a>
          <a class="footer-link" href="my-tickets.html">我的票券</a>
          <a class="footer-link" href="my-orders.html">我的訂單</a>
        </div>
      </footer>

      <div class="copyright">
        © 2026 Passium. All rights reserved.
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
      authDomain: "concert-1ff7e.firebaseapp.com",
      projectId: "concert-1ff7e",
      storageBucket: "concert-1ff7e.firebasestorage.app",
      messagingSenderId: "704757384914",
      appId: "1:704757384914:web:9f58e4085dd71180c5cf0b"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const auth = getAuth(appFirebase);
    const db = getFirestore(appFirebase);

    const accountBtn = document.getElementById("accountBtn");
    const featuredGrid = document.getElementById("featuredGrid");
    const upcomingGrid = document.getElementById("upcomingGrid");

    let currentUser = null;
    let eventsCache = [];

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function norm(value){
      return String(value ?? "").trim();
    }

    function toDate(input){
      if (!input) return null;
      if (typeof input.toDate === "function") return input.toDate();
      const d = new Date(input);
      return isNaN(d.getTime()) ? null : d;
    }

    function formatDateTime(input){
      const d = toDate(input);
      if (!d) return "日期未定";
      return d.toLocaleString("zh-Hant", {
        year:"numeric",
        month:"long",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
      });
    }

    function getEventStatus(event){
      const now = new Date();
      const saleStart = toDate(event.saleStartAt);
      const saleEnd = toDate(event.saleEndAt);
      const published = event.published === true;

      if (!published) return { text:"未公開", key:"hidden", order:4 };
      if (saleStart && now < saleStart) return { text:"即將開賣", key:"upcoming", order:2 };
      if (saleEnd && now > saleEnd) return { text:"已截止", key:"ended", order:3 };
      return { text:"受理中", key:"selling", order:1 };
    }

    function getEventDescription(event){
      return norm(
        event.summary ||
        event.subtitle ||
        event.description ||
        event.shortDescription ||
        ""
      );
    }

    function getEventImage(event){
      return norm(
        event.coverImage ||
        event.image ||
        event.bannerImage ||
        event.posterImage ||
        event.thumbnail ||
        ""
      );
    }

    function getEventVenue(event){
      return norm(
        event.venueName ||
        event.location ||
        event.place ||
        event.eventLocation ||
        ""
      );
    }

    function sortEvents(list){
      return list.slice().sort((a, b) => {
        const sa = getEventStatus(a).order;
        const sb = getEventStatus(b).order;
        if (sa !== sb) return sa - sb;

        const ta = toDate(a.saleStartAt)?.getTime() || 0;
        const tb = toDate(b.saleStartAt)?.getTime() || 0;
        return ta - tb;
      });
    }

    function buildEventCard(event){
      const status = getEventStatus(event);
      const image = getEventImage(event);
      const desc = getEventDescription(event) || "查看活動資訊與購票方式。";
      const venue = getEventVenue(event) || "地點未定";
      const eventTime = formatDateTime(event.eventStartAt);

      return `
        <a class="event-card" href="ticket.html?id=${encodeURIComponent(event.id)}">
          <div class="event-cover">
            ${
              image
                ? `<img src="${esc(image)}" alt="${esc(event.title || "活動圖片")}" />`
                : `<div class="event-cover-placeholder">Event</div>`
            }
          </div>

          <div class="event-body">
            <div class="event-status ${esc(status.key)}">${esc(status.text)}</div>
            <h3 class="event-title">${esc(event.title || "未命名活動")}</h3>
            <div class="event-desc">${esc(desc)}</div>

            <div class="event-meta">
              <div>活動時間：${esc(eventTime)}</div>
              <div>活動地點：${esc(venue)}</div>
            </div>

            <div class="event-actions">
              <span class="btn btn-primary">查看活動</span>
            </div>
          </div>
        </a>
      `;
    }

    function renderSections(){
      const published = eventsCache.filter(item => item.published === true);
      const featured = sortEvents(published.filter(item => getEventStatus(item).key === "selling"));
      const upcoming = sortEvents(published.filter(item => getEventStatus(item).key === "upcoming"));

      if (!featured.length) {
        featuredGrid.innerHTML = `<div class="empty" style="grid-column:1/-1;">目前沒有公開中的活動。</div>`;
      } else {
        featuredGrid.innerHTML = featured.map(buildEventCard).join("");
      }

      if (!upcoming.length) {
        upcomingGrid.innerHTML = `<div class="empty" style="grid-column:1/-1;">目前沒有即將開始的活動。</div>`;
      } else {
        upcomingGrid.innerHTML = upcoming.map(buildEventCard).join("");
      }
    }

    async function loadEvents(){
      try {
        const snap = await getDocs(collection(db, "events"));
        const rows = [];
        snap.forEach(docSnap => {
          rows.push({
            id: docSnap.id,
            ...(docSnap.data() || {})
          });
        });
        eventsCache = rows;
        renderSections();
      } catch (e) {
        console.error(e);
        featuredGrid.innerHTML = `<div class="empty" style="grid-column:1/-1;">活動載入失敗，請稍後再試。</div>`;
        upcomingGrid.innerHTML = `<div class="empty" style="grid-column:1/-1;">目前無法讀取即將開始活動。</div>`;
      }
    }

    function updateAccountLinks(user){
      if (user) {
        accountBtn.href = "member.html";
        accountBtn.title = user.email || "會員中心";
        accountBtn.setAttribute("aria-label", "會員中心");
      } else {
        accountBtn.href = "login.html";
        accountBtn.title = "登入 / 會員中心";
        accountBtn.setAttribute("aria-label", "登入 / 會員中心");
      }
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      updateAccountLinks(currentUser);
      await loadEvents();
    });
  </script>
</body>
</html>
