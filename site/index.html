<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>活動平台</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --line:rgba(17,24,39,.08);
  --shadow:0 18px 50px rgba(15,23,42,.08);
  --black:#111;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  background:var(--bg);
}

/* ====== layout ====== */
.wrap{
  max-width:1200px;
  margin:auto;
  padding:24px;
}

/* ====== header ====== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.logo{
  font-weight:900;
  font-size:22px;
}

.actions{
  display:flex;
  gap:10px;
}

.btn{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  font-weight:800;
}

.btn.black{
  background:#111;
  color:#fff;
}

/* ===== hero ===== */
.hero{
  background:#fff;
  border-radius:24px;
  padding:24px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
}

.hero h1{
  margin:0;
  font-size:28px;
}

/* ===== grid ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}

/* ===== card ===== */
.card{
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:14px;
}

.title{
  font-weight:900;
  margin-bottom:6px;
}

.sub{
  font-size:13px;
  color:var(--muted);
}

/* ===== badge ===== */
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin-top:8px;
}

.badge.green{ background:#dcfce7; color:#166534;}
.badge.red{ background:#fee2e2; color:#b91c1c;}
.badge.gray{ background:#f3f4f6; color:#6b7280;}
.badge.blue{ background:#dbeafe; color:#1d4ed8;}

.card-footer{
  margin-top:auto;
  padding:14px;
}

.card button{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:#111;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

.empty{
  text-align:center;
  color:#6b7280;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- header -->
  <div class="header">
    <div class="logo">🎫 活動平台</div>
    <div class="actions" id="authArea">
      載入中...
    </div>
  </div>

  <!-- hero -->
  <div class="hero">
    <h1>探索活動</h1>
    <div class="sub">報名、選位、入場一站完成</div>
  </div>

  <!-- list -->
  <div id="eventList" class="grid"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDtF2pHo84vy2n_dJAkCisopllaLAWjaj0",
  authDomain:"concert-1ff7e.firebaseapp.com",
  projectId:"concert-1ff7e"
});

const auth = firebase.auth();
const db = firebase.firestore();

const eventList = document.getElementById("eventList");
const authArea = document.getElementById("authArea");

/* ===== auth UI ===== */
auth.onAuthStateChanged(user=>{
  if(user){
    authArea.innerHTML = `
      <a class="btn" href="member.html">會員中心</a>
      <button class="btn" onclick="logout()">登出</button>
    `;
  }else{
    authArea.innerHTML = `
      <a class="btn" href="login.html">登入</a>
      <a class="btn black" href="register.html">註冊</a>
    `;
  }
});

function logout(){
  auth.signOut();
}

/* ===== time ===== */
function toDate(t){
  if(!t) return null;
  if(t.toDate) return t.toDate();
  return new Date(t);
}

function getStatus(e){
  const now = new Date();
  const start = toDate(e.saleStartAt);
  const end = toDate(e.saleEndAt);

  if(e.published!==true) return {text:"未公開",cls:"gray"};
  if(start && now<start) return {text:"即將開賣",cls:"blue"};
  if(end && now>end) return {text:"已截止",cls:"red"};
  return {text:"報名中",cls:"green"};
}

/* ===== load events ===== */
async function loadEvents(){
  const snap = await db.collection("events")
    .where("published","==",true)
    .get();

  if(snap.empty){
    eventList.innerHTML = `<div class="empty">目前沒有活動</div>`;
    return;
  }

  eventList.innerHTML = "";

  snap.forEach(doc=>{
    const e = doc.data();
    const status = getStatus(e);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      ${e.coverImage ? `<img src="${e.coverImage}">` : ""}
      <div class="card-body">
        <div class="title">${e.title || "未命名活動"}</div>
        <div class="sub">
          ${formatTime(e.eventStartAt)}
        </div>
        <div class="badge ${status.cls}">
          ${status.text}
        </div>
      </div>
      <div class="card-footer">
        <button onclick="go('${doc.id}')">
          查看活動
        </button>
      </div>
    `;

    eventList.appendChild(card);
  });
}

function formatTime(t){
  const d = toDate(t);
  if(!d) return "-";
  return d.toLocaleString("zh-Hant");
}

function go(id){
  location.href = `ticket.html?id=${id}`;
}

loadEvents();
</script>

</body>
</html>
